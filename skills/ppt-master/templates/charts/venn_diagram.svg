<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!--
    韦恩关系图模板
    用途: 集合关系、交叉领域、共性分析
    适用场景: 能力交叉分析、部门协作关系、产品定位
    支持: 3圆交叉 (经典三元韦恩)
    -->

    <defs>
        <radialGradient id="bgGlow" cx="37%" cy="57%" r="36%">
            <stop offset="0%" stop-color="#EEF2FF" stop-opacity="0.65"/>
            <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
        </radialGradient>
        <filter id="cardShadow" x="-15%" y="-20%" width="130%" height="150%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="0" dy="2"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.08"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>

    <!-- 背景 -->
    <rect width="1280" height="720" fill="#FFFFFF"/>
    <rect width="1280" height="720" fill="url(#bgGlow)"/>

    <!-- 标题区域 -->
    <text x="60" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="28" font-weight="700" fill="#0F172A">核心能力交叉分析</text>
    <text x="60" y="86" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" fill="#64748B" letter-spacing="1">Core Competency Intersection  ·  三大领域的协同关系</text>

    <!-- ===== 韦恩图三圆 ===== -->
    <!-- 圆A: 技术 cx=420 cy=350 r=175 -->
    <circle cx="420" cy="350" r="175" fill="#3B82F6" fill-opacity="0.18" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.55"/>
    <!-- 圆B: 市场 cx=540 cy=350 r=175 -->
    <circle cx="540" cy="350" r="175" fill="#EF4444" fill-opacity="0.18" stroke="#EF4444" stroke-width="2" stroke-opacity="0.55"/>
    <!-- 圆C: 运营 cx=480 cy=460 r=175 -->
    <circle cx="480" cy="460" r="175" fill="#10B981" fill-opacity="0.18" stroke="#10B981" stroke-width="2" stroke-opacity="0.55"/>

    <!-- ===== 圆名称标签 (各圆独有区域内) ===== -->
    <!-- 技术: (340,277) → 在A内、在B/C外 ✓ -->
    <text x="340" y="278" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="22" font-weight="700" fill="#2563EB">技术</text>
    <text x="340" y="302" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="13" fill="#6B7280">Technology</text>
    <!-- 市场: (620,277) → 在B内、在A/C外 ✓ -->
    <text x="620" y="278" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="22" font-weight="700" fill="#DC2626">市场</text>
    <text x="620" y="302" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="13" fill="#6B7280">Market</text>
    <!-- 运营: (480,572) → 在C内、在A/B外 ✓ -->
    <text x="480" y="572" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="22" font-weight="700" fill="#059669">运营</text>
    <text x="480" y="596" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="13" fill="#6B7280">Operations</text>

    <!-- ===== 交叉区域标签 (白色底pill + 文字) ===== -->
    <!-- A∩B only (不在C内): (480, 268) — dist to C(480,460)=192 > 175 ✓ -->
    <rect x="447" y="253" width="66" height="24" rx="5" fill="#FFFFFF" fill-opacity="0.90"/>
    <text x="480" y="270" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="700" fill="#7C3AED">产品创新</text>

    <!-- A∩C only (不在B内): (382, 442) — dist to B(540,350)=183 > 175 ✓ -->
    <rect x="349" y="427" width="66" height="24" rx="5" fill="#FFFFFF" fill-opacity="0.90"/>
    <text x="382" y="444" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="700" fill="#0D9488">技术运维</text>

    <!-- B∩C only (不在A内): (578, 442) — dist to A(420,350)=183 > 175 ✓ -->
    <rect x="545" y="427" width="66" height="24" rx="5" fill="#FFFFFF" fill-opacity="0.90"/>
    <text x="578" y="444" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="700" fill="#EA580C">客户运营</text>

    <!-- 三圆交叉中心 (480, 398) — 在A/B/C内 ✓ -->
    <rect x="440" y="384" width="80" height="26" rx="6" fill="#FFFFFF" fill-opacity="0.88"/>
    <text x="480" y="402" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="800" fill="#0F172A">核心竞争力</text>

    <!-- ===== 右侧说明面板 ===== -->
    <g filter="url(#cardShadow)">
        <rect x="740" y="133" width="490" height="96" rx="10" fill="#FFFFFF"/>
        <rect x="740" y="133" width="6" height="96" rx="3" fill="#3B82F6"/>
        <circle cx="771" cy="162" r="10" fill="#3B82F6" fill-opacity="0.15"/>
        <circle cx="771" cy="162" r="5" fill="#3B82F6"/>
        <text x="794" y="167" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
              font-size="16" font-weight="700" fill="#0F172A">技术能力</text>
        <text x="771" y="199" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
              font-size="14" fill="#6B7280">自主研发引擎 · AI算法 · 云原生架构</text>
    </g>

    <g filter="url(#cardShadow)">
        <rect x="740" y="249" width="490" height="96" rx="10" fill="#FFFFFF"/>
        <rect x="740" y="249" width="6" height="96" rx="3" fill="#EF4444"/>
        <circle cx="771" cy="278" r="10" fill="#EF4444" fill-opacity="0.15"/>
        <circle cx="771" cy="278" r="5" fill="#EF4444"/>
        <text x="794" y="283" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
              font-size="16" font-weight="700" fill="#0F172A">市场洞察</text>
        <text x="771" y="315" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
              font-size="14" fill="#6B7280">全渠道覆盖 · 品牌认知领先 · 用户增长飞轮</text>
    </g>

    <g filter="url(#cardShadow)">
        <rect x="740" y="365" width="490" height="96" rx="10" fill="#FFFFFF"/>
        <rect x="740" y="365" width="6" height="96" rx="3" fill="#10B981"/>
        <circle cx="771" cy="394" r="10" fill="#10B981" fill-opacity="0.15"/>
        <circle cx="771" cy="394" r="5" fill="#10B981"/>
        <text x="794" y="399" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
              font-size="16" font-weight="700" fill="#0F172A">运营效率</text>
        <text x="771" y="431" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
              font-size="14" fill="#6B7280">供应链优化 · 智能仓储 · 精细化成本管控</text>
    </g>

    <!-- 核心交叉说明卡 -->
    <g filter="url(#cardShadow)">
        <rect x="740" y="484" width="490" height="84" rx="10" fill="#F5F3FF"/>
        <rect x="740" y="484" width="490" height="5" rx="3" fill="#7C3AED"/>
        <text x="985" y="522" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
              font-size="15" font-weight="700" fill="#7C3AED">核心竞争力 = 技术 × 市场 × 运营</text>
        <text x="985" y="549" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
              font-size="13" fill="#6B7280">三大能力的深度融合构成不可复制的竞争壁垒</text>
    </g>

    <!-- 底部注释 -->
    <text x="60" y="692" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#9CA3AF">圆形面积表示能力覆盖范围，交叉区域表示协同价值</text>
</svg>
