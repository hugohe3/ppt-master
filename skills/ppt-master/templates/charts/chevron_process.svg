<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!--
    Chevron Process Template
    Usage: Linear stage process, step-by-step progression, methodology display
    Scenarios: Sales funnel stages, project phases, methodology steps
    Supports: 5-stage horizontal chevron (3-6 recommended)
    Reuse tips:
      - Use polygon arrow structure for block arrows indicating phase progression
      - Do not use marker-end to simulate these wide arrows

    Reusable snippet 1: Pentagon chevron (phase arrow)
      <polygon points="40,0 220,0 260,48 220,96 40,96 80,48"
               fill="#4F46E5"/>

    Reusable snippet 2: Block arrow with long head (conclusion pointer)
      <path d="M60,10 H300 V-36 L470,80 L300,196 V150 H60 Z"
            fill="#5D96E4" stroke="#3F76C8" stroke-width="4"/>
    -->

    <defs>
                <filter id="chevronShadow" x="-15%" y="-15%" width="130%" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
            <feOffset dx="2" dy="4" result="offsetblur"/>
            <feFlood flood-color="#0F172A" flood-opacity="0.12" result="shadowColor"/>
            <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow"/>
            <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
            <feOffset dx="0" dy="4" result="offsetblur"/>
            <feFlood flood-color="#0F172A" flood-opacity="0.06" result="shadowColor"/>
            <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow"/>
            <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>

        <!-- Phase Gradients -->
        <linearGradient id="gradPhase1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="gradPhase2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="gradPhase3" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0284C7;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="gradPhase4" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="gradPhase5" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#FFFFFF"/>

    <!-- Title -->
    <text x="640" y="55" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="30" font-weight="700" fill="#1E293B"><tspan>Digital Transformation Methodology</tspan></text>
    <text x="640" y="82" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" fill="#64748B"><tspan>Chevron Process · Five-Stage Progressive Framework</tspan></text>

    <g id="main-content" transform="translate(75, -60)">
    <g id="chevrons">
    <!-- Chevron 1 (Leftmost) -->
    <g id="chevron-1">
    <polygon points="40,220 200,220 230,265 200,310 40,310" fill="url(#gradPhase1)" filter="url(#chevronShadow)"/>
    <text x="130" y="260" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="700" fill="#FFFFFF"><tspan>Diagnostics</tspan></text>
    <text x="130" y="280" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#FFFFFF" fill-opacity="0.8"><tspan>PHASE 01</tspan></text>

        </g>

    <!-- Chevron 2 -->
    <g id="chevron-2">
    <polygon points="235,220 400,220 430,265 400,310 235,310 265,265" fill="url(#gradPhase2)" filter="url(#chevronShadow)"/>
    <text x="330" y="260" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="700" fill="#FFFFFF"><tspan>Planning &amp; Design</tspan></text>
    <text x="330" y="280" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#FFFFFF" fill-opacity="0.8"><tspan>PHASE 02</tspan></text>

        </g>

    <!-- Chevron 3 -->
    <g id="chevron-3">
    <polygon points="435,220 610,220 640,265 610,310 435,310 465,265" fill="url(#gradPhase3)" filter="url(#chevronShadow)"/>
    <text x="533" y="260" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="700" fill="#FFFFFF"><tspan>Pilot Validation</tspan></text>
    <text x="533" y="280" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#FFFFFF" fill-opacity="0.8"><tspan>PHASE 03</tspan></text>

        </g>

    <!-- Chevron 4 -->
    <g id="chevron-4">
    <polygon points="645,220 830,220 860,265 830,310 645,310 675,265" fill="url(#gradPhase4)" filter="url(#chevronShadow)"/>
    <text x="748" y="260" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="700" fill="#FFFFFF"><tspan>Scale &amp; Rollout</tspan></text>
    <text x="748" y="280" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#FFFFFF" fill-opacity="0.8"><tspan>PHASE 04</tspan></text>

        </g>

    <!-- Chevron 5 -->
    <g id="chevron-5">
    <polygon points="865,220 1060,220 1090,265 1060,310 865,310 895,265" fill="url(#gradPhase5)" filter="url(#chevronShadow)"/>
    <text x="973" y="260" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="700" fill="#FFFFFF"><tspan>Optimization</tspan></text>
    <text x="973" y="280" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#FFFFFF" fill-opacity="0.8"><tspan>PHASE 05</tspan></text>

        </g>
    </g>

    <!-- Phase Timeline Bar -->
    <g id="timeline">
    <rect x="40" y="325" width="190" height="20" rx="4" fill="#4F46E5" fill-opacity="0.15"/>
    <text x="135" y="339" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" font-weight="600" fill="#4F46E5"><tspan>2-4 Weeks</tspan></text>
    <rect x="245" y="325" width="195" height="20" rx="4" fill="#2563EB" fill-opacity="0.15"/>
    <text x="342" y="339" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" font-weight="600" fill="#2563EB"><tspan>4-6 Weeks</tspan></text>
    <rect x="450" y="325" width="195" height="20" rx="4" fill="#0284C7" fill-opacity="0.15"/>
    <text x="547" y="339" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" font-weight="600" fill="#0284C7"><tspan>8-12 Weeks</tspan></text>
    <rect x="655" y="325" width="210" height="20" rx="4" fill="#059669" fill-opacity="0.15"/>
    <text x="760" y="339" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" font-weight="600" fill="#059669"><tspan>12-16 Weeks</tspan></text>
    <rect x="875" y="325" width="215" height="20" rx="4" fill="#D97706" fill-opacity="0.15"/>
    <text x="982" y="339" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" font-weight="600" fill="#D97706"><tspan>Ongoing</tspan></text>

        </g>

    <!-- Detail Cards Row -->
    <g id="cards">
    <!-- Card 1 -->
    <g id="card-1">
    <g filter="url(#cardShadow)">
        <rect x="40" y="370" width="190" height="290" rx="10" fill="#FFFFFF"/>
        <rect x="40" y="370" width="190" height="5" rx="3" fill="#4F46E5"/>
        <text x="135" y="405" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
              font-size="15" font-weight="700" fill="#1E293B"><tspan>Diagnostics</tspan></text>
        <line x1="65" y1="425" x2="205" y2="425" stroke="#F0F0F0" stroke-width="1"/>
        <text x="60" y="450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#475569"><tspan>· Current State Review</tspan></text>
        <text x="60" y="478" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#475569"><tspan>· Identify Pain Points</tspan></text>
        <text x="60" y="506" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#475569"><tspan>· Maturity Evaluation</tspan></text>
        <text x="60" y="534" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#475569"><tspan>· Gap Analysis</tspan></text>
        <line x1="65" y1="560" x2="205" y2="560" stroke="#F0F0F0" stroke-width="1"/>
        <text x="60" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#4F46E5"><tspan>Deliverables:</tspan></text>
        <text x="60" y="608" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#94A3B8"><tspan>Diagnostic Report</tspan></text>
        <text x="60" y="630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#94A3B8"><tspan>Maturity Scorecard</tspan></text>
    </g>

        </g>
    <!-- Card 2 -->
    <g id="card-2">
    <g filter="url(#cardShadow)">
        <rect x="250" y="370" width="190" height="290" rx="10" fill="#FFFFFF"/>
        <rect x="250" y="370" width="190" height="5" rx="3" fill="#2563EB"/>
        <text x="345" y="405" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
              font-size="15" font-weight="700" fill="#1E293B"><tspan>Planning &amp; Design</tspan></text>
        <line x1="275" y1="425" x2="415" y2="425" stroke="#F0F0F0" stroke-width="1"/>
        <text x="270" y="450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#475569"><tspan>· Architecture Design</tspan></text>
        <text x="270" y="478" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#475569"><tspan>· Tech Stack Eval.</tspan></text>
        <text x="270" y="506" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#475569"><tspan>· Roadmap Dev.</tspan></text>
        <text x="270" y="534" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#475569"><tspan>· ROI Calculation</tspan></text>
        <line x1="275" y1="560" x2="415" y2="560" stroke="#F0F0F0" stroke-width="1"/>
        <text x="270" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#2563EB"><tspan>Deliverables:</tspan></text>
        <text x="270" y="608" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#94A3B8"><tspan>Strategic Blueprint</tspan></text>
        <text x="270" y="630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#94A3B8"><tspan>ROI Analysis</tspan></text>
    </g>

        </g>
    <!-- Card 3 -->
    <g id="card-3">
    <g filter="url(#cardShadow)">
        <rect x="460" y="370" width="190" height="290" rx="10" fill="#FFFFFF"/>
        <rect x="460" y="370" width="190" height="5" rx="3" fill="#0284C7"/>
        <text x="555" y="405" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
              font-size="15" font-weight="700" fill="#1E293B"><tspan>Pilot Validation</tspan></text>
        <line x1="485" y1="425" x2="625" y2="425" stroke="#F0F0F0" stroke-width="1"/>
        <text x="480" y="450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#475569"><tspan>· Select Scenarios</tspan></text>
        <text x="480" y="478" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#475569"><tspan>· Rapid MVP Launch</tspan></text>
        <text x="480" y="506" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#475569"><tspan>· Performance Data</tspan></text>
        <text x="480" y="534" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#475569"><tspan>· Feedback Iteration</tspan></text>
        <line x1="485" y1="560" x2="625" y2="560" stroke="#F0F0F0" stroke-width="1"/>
        <text x="480" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#0284C7"><tspan>Deliverables:</tspan></text>
        <text x="480" y="608" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#94A3B8"><tspan>Pilot Summary</tspan></text>
        <text x="480" y="630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#94A3B8"><tspan>Feasibility Report</tspan></text>
    </g>

        </g>
    <!-- Card 4 -->
    <g id="card-4">
    <g filter="url(#cardShadow)">
        <rect x="670" y="370" width="190" height="290" rx="10" fill="#FFFFFF"/>
        <rect x="670" y="370" width="190" height="5" rx="3" fill="#059669"/>
        <text x="765" y="405" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
              font-size="15" font-weight="700" fill="#1E293B"><tspan>Scale &amp; Rollout</tspan></text>
        <line x1="695" y1="425" x2="835" y2="425" stroke="#F0F0F0" stroke-width="1"/>
        <text x="690" y="450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#475569"><tspan>· Full-Scale Rollout</tspan></text>
        <text x="690" y="478" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#475569"><tspan>· Org. Change Mgt.</tspan></text>
        <text x="690" y="506" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#475569"><tspan>· Team Training</tspan></text>
        <text x="690" y="534" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#475569"><tspan>· Build Standards</tspan></text>
        <line x1="695" y1="560" x2="835" y2="560" stroke="#F0F0F0" stroke-width="1"/>
        <text x="690" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#059669"><tspan>Deliverables:</tspan></text>
        <text x="690" y="608" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#94A3B8"><tspan>Rollout Plan</tspan></text>
        <text x="690" y="630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#94A3B8"><tspan>Capability Playbook</tspan></text>
    </g>

        </g>
    <!-- Card 5 -->
    <g id="card-5">
    <g filter="url(#cardShadow)">
        <rect x="880" y="370" width="190" height="290" rx="10" fill="#FFFFFF"/>
        <rect x="880" y="370" width="190" height="5" rx="3" fill="#D97706"/>
        <text x="975" y="405" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
              font-size="15" font-weight="700" fill="#1E293B"><tspan>Optimization</tspan></text>
        <line x1="905" y1="425" x2="1045" y2="425" stroke="#F0F0F0" stroke-width="1"/>
        <text x="900" y="450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#475569"><tspan>· Ops Monitoring</tspan></text>
        <text x="900" y="478" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#475569"><tspan>· Data-Driven Opt.</tspan></text>
        <text x="900" y="506" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#475569"><tspan>· Tech Upgrades</tspan></text>
        <text x="900" y="534" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#475569"><tspan>· Scenario Expansion</tspan></text>
        <line x1="905" y1="560" x2="1045" y2="560" stroke="#F0F0F0" stroke-width="1"/>
        <text x="900" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#D97706"><tspan>Deliverables:</tspan></text>
        <text x="900" y="608" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#94A3B8"><tspan>Ops Dashboard</tspan></text>
        <text x="900" y="630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#94A3B8"><tspan>Quarterly Report</tspan></text>
    </g>

        </g>
    </g>

    </g>

    <!-- Footer Note -->
    <text x="640" y="660" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#CBD5E1"><tspan>Phase durations and deliverables can be flexibly adjusted based on actual enterprise situations.</tspan></text>
</svg>
