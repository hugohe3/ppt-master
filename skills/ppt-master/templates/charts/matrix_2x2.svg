<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!-- 
    Matrix 2x2 Chart Template
    Usage: Four-quadrant analysis
    Scenarios: BCG Matrix, risk assessment, priority analysis, strategic evaluation
    -->
    
    <defs>
        <!-- Quadrant Gradients -->
        <linearGradient id="quadrant1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ECFDF5;stop-opacity:1" /> <!-- Emerald-50 -->
            <stop offset="100%" style="stop-color:#D1FAE5;stop-opacity:1" /> <!-- Emerald-100 -->
        </linearGradient>
        
        <linearGradient id="quadrant2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFFBEB;stop-opacity:1" /> <!-- Amber-50 -->
            <stop offset="100%" style="stop-color:#FEF3C7;stop-opacity:1" /> <!-- Amber-100 -->
        </linearGradient>
        
        <linearGradient id="quadrant3" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFF1F2;stop-opacity:1" /> <!-- Rose-50 -->
            <stop offset="100%" style="stop-color:#FFE4E6;stop-opacity:1" /> <!-- Rose-100 -->
        </linearGradient>
        
        <linearGradient id="quadrant4" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#EFF6FF;stop-opacity:1" /> <!-- Blue-50 -->
            <stop offset="100%" style="stop-color:#DBEAFE;stop-opacity:1" /> <!-- Blue-100 -->
        </linearGradient>
        
        <!-- Drop Shadow for Cards & Bubbles -->
        <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
            <feOffset dx="0" dy="2" result="offsetblur"/>
            <feFlood flood-color="#0F172A" flood-opacity="0.1" result="shadowColor"/>
            <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow"/>
            <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        
        <!-- Axis Arrows -->
        <marker id="arrowX" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
            <path d="M 2,2 L 12,7 L 2,12 Z" fill="#0F172A"/>
        </marker>
        <marker id="arrowY" markerWidth="14" markerHeight="14" refX="7" refY="2" orient="auto">
            <path d="M 2,12 L 7,2 L 12,12 Z" fill="#0F172A"/>
        </marker>
    </defs>
    
    <!-- Background -->
    <rect width="1280" height="720" fill="#F8FAFC"/>
    
    <!-- Title Area -->
    <text x="60" y="70" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="36" font-weight="800" fill="#0F172A" letter-spacing="-0.5">
        <tspan>Product Portfolio Matrix Analysis</tspan>
    </text>
    <text x="60" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="14" font-weight="600" fill="#64748B" letter-spacing="1">
        <tspan>BCG MATRIX · STRATEGIC PRODUCT PORTFOLIO EVALUATION</tspan>
    </text>
    <text x="60" y="125" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="14" font-weight="500" fill="#94A3B8">
        <tspan>Market Growth Rate vs Relative Market Share · Bubble size represents Revenue</tspan>
    </text>
    
    <!-- Matrix Main Area -->
    <g id="matrixArea">
        <!-- Quadrants -->
        <!-- Q1: Top Right (Stars) -->
        <rect x="565" y="170" width="480" height="240" fill="url(#quadrant1)" stroke="#FFFFFF" stroke-width="4" rx="4"/>
        <!-- Q2: Top Left (Question Marks) -->
        <rect x="85" y="170" width="480" height="240" fill="url(#quadrant2)" stroke="#FFFFFF" stroke-width="4" rx="4"/>
        <!-- Q3: Bottom Left (Dogs) -->
        <rect x="85" y="410" width="480" height="240" fill="url(#quadrant3)" stroke="#FFFFFF" stroke-width="4" rx="4"/>
        <!-- Q4: Bottom Right (Cash Cows) -->
        <rect x="565" y="410" width="480" height="240" fill="url(#quadrant4)" stroke="#FFFFFF" stroke-width="4" rx="4"/>
        
        <!-- Axes -->
        <line x1="85" y1="410" x2="1055" y2="410" stroke="#0F172A" stroke-width="3" marker-end="url(#arrowX)"/>
        <line x1="565" y1="160" x2="565" y2="650" stroke="#0F172A" stroke-width="3" marker-start="url(#arrowY)"/>
        
        <!-- X-Axis Labels -->
        <text x="565" y="685" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="15" font-weight="700" fill="#0F172A" text-anchor="middle">
            <tspan>Relative Market Share</tspan>
        </text>
        <text x="220" y="685" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" font-weight="600" fill="#64748B" text-anchor="middle">
            <tspan>Low</tspan>
        </text>
        <text x="910" y="685" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" font-weight="600" fill="#64748B" text-anchor="middle">
            <tspan>High</tspan>
        </text>
        
        <!-- Y-Axis Labels -->
        <text x="40" y="410" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="15" font-weight="700" fill="#0F172A" text-anchor="middle" transform="rotate(-90, 40, 410)">
            <tspan>Market Growth Rate</tspan>
        </text>
        
        <text x="60" y="640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" font-weight="600" fill="#64748B" text-anchor="end">
            <tspan>Low</tspan>
        </text>
        <text x="60" y="180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" font-weight="600" fill="#64748B" text-anchor="end">
            <tspan>High</tspan>
        </text>
        
        <!-- Quadrant Labels -->
        <!-- Q2: Question Marks -->
        <text x="110" y="205" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="800" fill="#B45309">Question Marks</text>
        <text x="110" y="225" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#D97706" letter-spacing="1">HIGH GROWTH · LOW SHARE</text>
        
        <!-- Q1: Stars -->
        <text x="590" y="205" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="800" fill="#047857">Stars</text>
        <text x="590" y="225" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#059669" letter-spacing="1">HIGH GROWTH · HIGH SHARE</text>
        
        <!-- Q3: Dogs -->
        <text x="110" y="615" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="800" fill="#BE123C">Dogs</text>
        <text x="110" y="635" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#E11D48" letter-spacing="1">LOW GROWTH · LOW SHARE</text>
        
        <!-- Q4: Cash Cows -->
        <text x="590" y="615" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="800" fill="#1D4ED8">Cash Cows</text>
        <text x="590" y="635" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#2563EB" letter-spacing="1">LOW GROWTH · HIGH SHARE</text>
        
        <!-- Product Data Bubbles -->
        <!-- Product A: Star -->
        <g filter="url(#cardShadow)">
            <circle cx="879" cy="247" r="55" fill="#10B981" opacity="0.95"/>
            <text x="879" y="243" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">Product A</text>
            <text x="879" y="261" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">$320M</text>
        </g>
        
        <!-- Product B: Cash Cow -->
        <g filter="url(#cardShadow)">
            <circle cx="935" cy="544" r="70" fill="#3B82F6" opacity="0.95"/>
            <text x="935" y="540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">Product B</text>
            <text x="935" y="560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">$480M</text>
        </g>
        
        <!-- Product C: Question -->
        <g filter="url(#cardShadow)">
            <circle cx="269" cy="228" r="42" fill="#F59E0B" opacity="0.95"/>
            <text x="269" y="225" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">Product C</text>
            <text x="269" y="243" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">$160M</text>
        </g>
        
        <!-- Product D: Question -->
        <g filter="url(#cardShadow)">
            <circle cx="325" cy="309" r="38" fill="#F59E0B" opacity="0.95"/>
            <text x="325" y="306" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Product D</text>
            <text x="325" y="323" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">$120M</text>
        </g>
        
        <!-- Product E: Dog -->
        <g filter="url(#cardShadow)">
            <circle cx="195" cy="573" r="30" fill="#F43F5E" opacity="0.95"/>
            <text x="195" y="571" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Product E</text>
            <text x="195" y="587" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">$50M</text>
        </g>
        
        <!-- Product F: Cash Cow -->
        <g filter="url(#cardShadow)">
            <circle cx="741" cy="506" r="45" fill="#3B82F6" opacity="0.95"/>
            <text x="741" y="503" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">Product F</text>
            <text x="741" y="521" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">$180M</text>
        </g>
        
        <!-- Product G: Star -->
        <g filter="url(#cardShadow)">
            <circle cx="695" cy="285" r="40" fill="#10B981" opacity="0.95"/>
            <text x="695" y="282" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">Product G</text>
            <text x="695" y="299" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">$140M</text>
        </g>
    </g>
    
    <!-- Strategic Recommendations Card -->
    <g id="strategicRecommendations" filter="url(#cardShadow)">
        <rect x="1070" y="170" width="165" height="250" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" rx="12"/>
        
        <text x="1152" y="205" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#0F172A" text-anchor="middle">Strategic Actions</text>
        <line x1="1085" y1="220" x2="1220" y2="220" stroke="#F1F5F9" stroke-width="2"/>
        
        <!-- Stars -->
        <circle cx="1090" cy="245" r="6" fill="#10B981"/>
        <text x="1105" y="250" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#047857">Stars: Invest</text>
        
        <!-- Question Marks -->
        <circle cx="1090" cy="285" r="6" fill="#F59E0B"/>
        <text x="1105" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#B45309">Questions: Analyze</text>
        
        <!-- Cash Cows -->
        <circle cx="1090" cy="325" r="6" fill="#3B82F6"/>
        <text x="1105" y="330" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#1D4ED8">Cows: Harvest</text>
        
        <!-- Dogs -->
        <circle cx="1090" cy="365" r="6" fill="#F43F5E"/>
        <text x="1105" y="370" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#BE123C">Dogs: Divest</text>
        
        <text x="1152" y="405" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#94A3B8" text-anchor="middle">Bubble Size = Revenue</text>
    </g>
    
    <!-- Source Footer -->
    <text x="60" y="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#94A3B8">
        <tspan>Source: Market Research Department</tspan>
    </text>
</svg>
