              <tspan font-size="14" fill="#94A3B8"> /月</tspan>
        </text>
        <!-- 功能列表 -->
        <line x1="110" y1="240" x2="390" y2="240" stroke="#F0F0F0" stroke-width="1"/>
        <text x="118" y="275" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15"><tspan fill="#3B82F6" font-weight="700">✓</tspan><tspan x="142" fill="#334155">5个项目空间</tspan></text>
        <text x="118" y="310" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15"><tspan fill="#3B82F6" font-weight="700">✓</tspan><tspan x="142" fill="#334155">10GB存储</tspan></text>
        <text x="118" y="345" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15"><tspan fill="#3B82F6" font-weight="700">✓</tspan><tspan x="142" fill="#334155">基础报表功能</tspan></text>
        <text x="118" y="380" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15"><tspan fill="#3B82F6" font-weight="700">✓</tspan><tspan x="142" fill="#334155">邮件支持</tspan></text>
        <text x="118" y="415" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15"><tspan fill="#CBD5E1" font-weight="700">—</tspan><tspan x="142" fill="#CBD5E1">API集成</tspan></text>
        <text x="118" y="450" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15"><tspan fill="#CBD5E1" font-weight="700">—</tspan><tspan x="142" fill="#CBD5E1">自定义工作流</tspan></text>
        <text x="118" y="485" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15"><tspan fill="#CBD5E1" font-weight="700">—</tspan><tspan x="142" fill="#CBD5E1">专属客户经理</tspan></text>
