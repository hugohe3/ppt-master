        <line x1="890" y1="240" x2="1170" y2="240" stroke="#F0F0F0" stroke-width="1"/>
        <text x="898" y="275" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15"><tspan fill="#0F172A" font-weight="700">✓</tspan><tspan x="922" fill="#334155">无限项目空间</tspan></text>
        <text x="898" y="310" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15"><tspan fill="#0F172A" font-weight="700">✓</tspan><tspan x="922" fill="#334155">无限存储</tspan></text>
        <text x="898" y="345" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15"><tspan fill="#0F172A" font-weight="700">✓</tspan><tspan x="922" fill="#334155">全部报表 + BI分析</tspan></text>
        <text x="898" y="380" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15"><tspan fill="#0F172A" font-weight="700">✓</tspan><tspan x="922" fill="#334155">7×24电话支持</tspan></text>
        <text x="898" y="415" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15"><tspan fill="#0F172A" font-weight="700">✓</tspan><tspan x="922" fill="#334155">API集成 + Webhook</tspan></text>
        <text x="898" y="450" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15"><tspan fill="#0F172A" font-weight="700">✓</tspan><tspan x="922" fill="#334155">自定义工作流</tspan></text>
        <text x="898" y="485" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15"><tspan fill="#0F172A" font-weight="700">✓</tspan><tspan x="922" fill="#334155">专属客户经理</tspan></text>
        <text x="898" y="520" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15"><tspan fill="#0F172A" font-weight="700">✓</tspan><tspan x="922" fill="#334155">99.9% SLA保障</tspan></text>
