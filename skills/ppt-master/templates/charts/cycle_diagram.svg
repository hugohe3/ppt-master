<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!-- 
    循环流程图模板
    用途: 循环往复流程、PDCA、迭代周期
    适用场景: 质量管理循环、敏捷迭代、业务闭环
    支持: 5阶段循环 (推荐4-6个)
    -->
    
    <defs>
        <!-- 节点阴影 -->
        <filter id="nodeShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
            <feOffset dx="0" dy="4" result="offsetblur"/>
            <feFlood flood-color="#0F172A" flood-opacity="0.15" result="shadowColor"/>
            <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow"/>
            <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        
        <!-- 卡片阴影 -->
        <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
            <feOffset dx="0" dy="3" result="offsetblur"/>
            <feFlood flood-color="#0F172A" flood-opacity="0.08" result="shadowColor"/>
            <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow"/>
            <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>
    
    <!-- 背景 -->
    <rect width="1280" height="720" fill="#FFFFFF"/>
    
    <!-- 标题区域 -->
    <text x="60" y="70" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="32" font-weight="700" fill="#0F172A" letter-spacing="-0.5"><tspan>持续改进循环</tspan></text>
    <text x="60" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="16" fill="#64748B"><tspan>Continuous Improvement Cycle · 五阶段闭环驱动</tspan></text>
    
    <!-- 中心引导圆环 (虚线) -->
    <circle cx="480" cy="410" r="200" fill="none" stroke="#E0E0E0" stroke-width="2" stroke-dasharray="8,4"/>
    <circle cx="480" cy="410" r="130" fill="none" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,4"/>
    
    <!-- 中心文字 -->
    <text x="480" y="398" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="24" font-weight="800" fill="#0F172A"><tspan>持续循环</tspan></text>
    <text x="480" y="428" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="15" fill="#94A3B8"><tspan>Continuous Loop</tspan></text>
    
    <!-- 5个节点沿圆环分布 (圆心480,410 r=200) -->
    <!-- 位置: 顶(480,210), 右上(670,350), 右下(600,570), 左下(360,570), 左上(290,350) -->
    
    <!-- 连接弧线箭头 (用弯曲path + polygon三角) -->
    <!-- 1→2 -->
    <path d="M 510,220 Q 620,240 650,340" stroke="#8B5CF6" stroke-width="3" fill="none" stroke-opacity="0.5"/>
    <polygon points="655,340 645,332 648,348" fill="#8B5CF6" fill-opacity="0.6"/>
    
    <!-- 2→3 -->
    <path d="M 670,380 Q 680,480 610,555" stroke="#10B981" stroke-width="3" fill="none" stroke-opacity="0.5"/>
    <polygon points="605,558 618,552 610,565" fill="#10B981" fill-opacity="0.6"/>
    
    <!-- 3→4 -->
    <path d="M 575,580 Q 480,620 375,575" stroke="#F59E0B" stroke-width="3" fill="none" stroke-opacity="0.5"/>
    <polygon points="372,572 380,584 368,580" fill="#F59E0B" fill-opacity="0.6"/>
    
    <!-- 4→5 -->
    <path d="M 340,555 Q 280,470 285,365" stroke="#F43F5E" stroke-width="3" fill="none" stroke-opacity="0.5"/>
    <polygon points="287,360 278,372 294,368" fill="#F43F5E" fill-opacity="0.6"/>
    
    <!-- 5→1 -->
    <path d="M 310,340 Q 340,250 460,215" stroke="#3B82F6" stroke-width="3" fill="none" stroke-opacity="0.5"/>
    <polygon points="462,213 452,206 454,222" fill="#3B82F6" fill-opacity="0.6"/>
    
    <g id="nodes">
    <g id="node-1">
    <!-- 节点1: 调研分析 (顶部) -->
    <circle cx="480" cy="210" r="45" fill="#8B5CF6" filter="url(#nodeShadow)"/>
    <text x="480" y="205" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="32" font-weight="700" fill="#FFFFFF"><tspan>01</tspan></text>
    <text x="480" y="228" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="13" font-weight="600" fill="#FFFFFF" fill-opacity="0.85"><tspan>调研分析</tspan></text>
    
        </g>
    <g id="node-2">
    <!-- 节点2: 方案设计 (右上) -->
    <circle cx="670" cy="355" r="45" fill="#10B981" filter="url(#nodeShadow)"/>
    <text x="670" y="350" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="32" font-weight="700" fill="#FFFFFF"><tspan>02</tspan></text>
    <text x="670" y="373" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="13" font-weight="600" fill="#FFFFFF" fill-opacity="0.85"><tspan>方案设计</tspan></text>
    
        </g>
    <g id="node-3">
    <!-- 节点3: 执行落地 (右下) -->
    <circle cx="600" cy="570" r="45" fill="#F59E0B" filter="url(#nodeShadow)"/>
    <text x="600" y="565" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="32" font-weight="700" fill="#FFFFFF"><tspan>03</tspan></text>
    <text x="600" y="588" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="13" font-weight="600" fill="#FFFFFF" fill-opacity="0.85"><tspan>执行落地</tspan></text>
    
        </g>
    <g id="node-4">
    <!-- 节点4: 效果评估 (左下) -->
    <circle cx="360" cy="570" r="45" fill="#F43F5E" filter="url(#nodeShadow)"/>
    <text x="360" y="565" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="32" font-weight="700" fill="#FFFFFF"><tspan>04</tspan></text>
    <text x="360" y="588" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="13" font-weight="600" fill="#FFFFFF" fill-opacity="0.85"><tspan>效果评估</tspan></text>
    
        </g>
    <g id="node-5">
    <!-- 节点5: 迭代优化 (左上) -->
    <circle cx="290" cy="355" r="45" fill="#3B82F6" filter="url(#nodeShadow)"/>
    <text x="290" y="350" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="32" font-weight="700" fill="#FFFFFF"><tspan>05</tspan></text>
    <text x="290" y="373" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="13" font-weight="600" fill="#FFFFFF" fill-opacity="0.85"><tspan>迭代优化</tspan></text>
    
        </g>
    </g>

    <g id="cards">
    <!-- 右侧说明面板 -->
    <g id="card-1">
    <g filter="url(#cardShadow)">
        <rect x="780" y="150" width="440" height="75" rx="8" fill="#FFFFFF"/>
        <rect x="780" y="150" width="5" height="75" rx="3" fill="#8B5CF6"/>
        <text x="802" y="180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="18" font-weight="700" fill="#8B5CF6"><tspan>01 调研分析</tspan></text>
        <text x="802" y="206" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" fill="#64748B"><tspan>深入了解现状，收集数据与用户反馈</tspan></text>
    </g>
    
    </g>
    
    <g id="card-2">
    
    <g filter="url(#cardShadow)">
        <rect x="780" y="240" width="440" height="75" rx="8" fill="#FFFFFF"/>
        <rect x="780" y="240" width="5" height="75" rx="3" fill="#10B981"/>
        <text x="802" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="18" font-weight="700" fill="#10B981"><tspan>02 方案设计</tspan></text>
        <text x="802" y="296" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" fill="#64748B"><tspan>制定改进方案，明确目标与关键路径</tspan></text>
    </g>
    
    </g>
    
    <g id="card-3">
    
    <g filter="url(#cardShadow)">
        <rect x="780" y="330" width="440" height="75" rx="8" fill="#FFFFFF"/>
        <rect x="780" y="330" width="5" height="75" rx="3" fill="#F59E0B"/>
        <text x="802" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="18" font-weight="700" fill="#D97706"><tspan>03 执行落地</tspan></text>
        <text x="802" y="386" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" fill="#64748B"><tspan>推进方案实施，协调资源与跟踪进度</tspan></text>
    </g>
    
    </g>
    
    <g id="card-4">
    
    <g filter="url(#cardShadow)">
        <rect x="780" y="420" width="440" height="75" rx="8" fill="#FFFFFF"/>
        <rect x="780" y="420" width="5" height="75" rx="3" fill="#F43F5E"/>
        <text x="802" y="450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="18" font-weight="700" fill="#F43F5E"><tspan>04 效果评估</tspan></text>
        <text x="802" y="476" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" fill="#64748B"><tspan>量化成果输出，对比目标达成率</tspan></text>
    </g>
    
    </g>
    
    <g id="card-5">
    
    <g filter="url(#cardShadow)">
        <rect x="780" y="510" width="440" height="75" rx="8" fill="#FFFFFF"/>
        <rect x="780" y="510" width="5" height="75" rx="3" fill="#3B82F6"/>
        <text x="802" y="540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="18" font-weight="700" fill="#3B82F6"><tspan>05 迭代优化</tspan></text>
        <text x="802" y="566" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" fill="#64748B"><tspan>总结经验教训，进入下一轮改进循环</tspan></text>
    </g>

        </g>
    </g>

    <!-- 底部注释 -->
    <text x="60" y="690" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="12" fill="#94A3B8"><tspan>每完成一个循环，整体能力向上跃迁一个台阶</tspan></text>
</svg>