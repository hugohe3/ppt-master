<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!-- 
    Horizontal Bar Chart Template
    Usage: Category ranking, value comparison (ideal for long category names)
    Scenarios: Sales leaderboards, brand awareness, satisfaction scores
    Supports: 8 bars (adjustable to 5-12)
    -->
    
    <defs>
        <!-- Bar Gradients (Lighter to darker) -->
        <linearGradient id="hbarGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
        </linearGradient>
        
        <linearGradient id="hbarGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#34D399;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
        </linearGradient>
        
        <linearGradient id="hbarGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
        </linearGradient>
        
        <!-- Standard Bar Shadow -->
        <filter id="barShadow" x="-5%" y="-20%" width="110%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
            <feOffset dx="0" dy="2" result="offsetblur"/>
            <feFlood flood-color="#0F172A" flood-opacity="0.1" result="shadowColor"/>
            <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow"/>
            <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="1280" height="720" fill="#F8FAFC"/>
    
    <!-- Title -->
    <text x="60" y="70" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="32" font-weight="700" fill="#0F172A">
        <tspan>Brand Awareness Rankings</tspan>
    </text>
    
    <text x="60" y="105" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="18" fill="#64748B">
        <tspan>2025 Consumer Survey Report · Sample Size N=5,000</tspan>
    </text>
    
    <!-- Chart Area -->
    <g id="chartArea">
        <!-- X-Axis Grid Lines -->
        <line x1="300" y1="140" x2="300" y2="620" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,4"/>
        <line x1="480" y1="140" x2="480" y2="620" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,4"/>
        <line x1="660" y1="140" x2="660" y2="620" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,4"/>
        <line x1="840" y1="140" x2="840" y2="620" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,4"/>
        <line x1="1020" y1="140" x2="1020" y2="620" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,4"/>
        <line x1="1200" y1="140" x2="1200" y2="620" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,4"/>
        
        <!-- X-Axis Tick Labels -->
        <text x="300" y="650" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" fill="#64748B" text-anchor="middle">
            <tspan>0%</tspan>
        </text>
        <text x="480" y="650" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" fill="#64748B" text-anchor="middle">
            <tspan>20%</tspan>
        </text>
        <text x="660" y="650" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" fill="#64748B" text-anchor="middle">
            <tspan>40%</tspan>
        </text>
        <text x="840" y="650" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" fill="#64748B" text-anchor="middle">
            <tspan>60%</tspan>
        </text>
        <text x="1020" y="650" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" fill="#64748B" text-anchor="middle">
            <tspan>80%</tspan>
        </text>
        <text x="1200" y="650" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" fill="#64748B" text-anchor="middle">
            <tspan>100%</tspan>
        </text>
        
        <!-- Y-Axis Baseline -->
        <line x1="300" y1="140" x2="300" y2="620" stroke="#94A3B8" stroke-width="2"/>
        <line x1="300" y1="620" x2="1200" y2="620" stroke="#94A3B8" stroke-width="2"/>
        
        <!-- Bar Data (Height 36px, Spacing 24px, Total 60px) -->
        
        <!-- Bar 1: Brand A - 92% (Rank 1, Blue) -->
        <text x="290" y="178" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="15" font-weight="500" fill="#475569" text-anchor="end">
            <tspan>Brand A (Market Leader)</tspan>
        </text>
        <rect x="300" y="155" width="828" height="36" rx="4" fill="url(#hbarGrad1)" filter="url(#barShadow)"/>
        <text x="1138" y="179" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="16" font-weight="700" fill="#0F172A">
            <tspan>92%</tspan>
        </text>
        
        <!-- Bar 2: Brand B - 78% (Rank 2, Blue) -->
        <text x="290" y="238" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="15" font-weight="500" fill="#475569" text-anchor="end">
            <tspan>Brand B (Emerging Challenger)</tspan>
        </text>
        <rect x="300" y="215" width="702" height="36" rx="4" fill="url(#hbarGrad1)" filter="url(#barShadow)"/>
        <text x="1012" y="239" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="16" font-weight="700" fill="#0F172A">
            <tspan>78%</tspan>
        </text>
        
        <!-- Bar 3: Brand C - 65% (Rank 3, Blue) -->
        <text x="290" y="298" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="15" font-weight="500" fill="#475569" text-anchor="end">
            <tspan>Brand C (Legacy Brand)</tspan>
        </text>
        <rect x="300" y="275" width="585" height="36" rx="4" fill="url(#hbarGrad1)" filter="url(#barShadow)"/>
        <text x="895" y="299" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="16" font-weight="700" fill="#0F172A">
            <tspan>65%</tspan>
        </text>
        
        <!-- Bar 4: Brand D - 52% (Rank 4, Green) -->
        <text x="290" y="358" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="15" font-weight="500" fill="#475569" text-anchor="end">
            <tspan>Brand D (Regional Player)</tspan>
        </text>
        <rect x="300" y="335" width="468" height="36" rx="4" fill="url(#hbarGrad2)" filter="url(#barShadow)"/>
        <text x="778" y="359" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="16" font-weight="700" fill="#0F172A">
            <tspan>52%</tspan>
        </text>
        
        <!-- Bar 5: Brand E - 45% (Rank 5, Green) -->
        <text x="290" y="418" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="15" font-weight="500" fill="#475569" text-anchor="end">
            <tspan>Brand E (Value Choice)</tspan>
        </text>
        <rect x="300" y="395" width="405" height="36" rx="4" fill="url(#hbarGrad2)" filter="url(#barShadow)"/>
        <text x="715" y="419" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="16" font-weight="700" fill="#0F172A">
            <tspan>45%</tspan>
        </text>
        
        <!-- Bar 6: Brand F - 38% (Rank 6, Green) -->
        <text x="290" y="478" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="15" font-weight="500" fill="#475569" text-anchor="end">
            <tspan>Brand F (Premium Tier)</tspan>
        </text>
        <rect x="300" y="455" width="342" height="36" rx="4" fill="url(#hbarGrad2)" filter="url(#barShadow)"/>
        <text x="652" y="479" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="16" font-weight="700" fill="#0F172A">
            <tspan>38%</tspan>
        </text>
        
        <!-- Bar 7: Brand G - 25% (Rank 7, Amber) -->
        <text x="290" y="538" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="15" font-weight="500" fill="#475569" text-anchor="end">
            <tspan>Brand G (New Entrant)</tspan>
        </text>
        <rect x="300" y="515" width="225" height="36" rx="4" fill="url(#hbarGrad3)" filter="url(#barShadow)"/>
        <text x="535" y="539" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="16" font-weight="700" fill="#0F172A">
            <tspan>25%</tspan>
        </text>
        
        <!-- Bar 8: Other - 12% (Rank 8, Amber) -->
        <text x="290" y="598" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="15" font-weight="500" fill="#475569" text-anchor="end">
            <tspan>Other Brands</tspan>
        </text>
        <rect x="300" y="575" width="108" height="36" rx="4" fill="url(#hbarGrad3)" filter="url(#barShadow)"/>
        <text x="418" y="599" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="16" font-weight="700" fill="#0F172A">
            <tspan>12%</tspan>
        </text>
    </g>
    
    <!-- Legend -->
    <g id="legend">
        <rect x="60" y="660" width="16" height="16" rx="2" fill="url(#hbarGrad1)"/>
        <text x="85" y="673" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" fill="#64748B">
            <tspan>High Awareness (≥50%)</tspan>
        </text>
        
        <rect x="270" y="660" width="16" height="16" rx="2" fill="url(#hbarGrad2)"/>
        <text x="295" y="673" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" fill="#64748B">
            <tspan>Moderate Awareness (30-50%)</tspan>
        </text>
        
        <rect x="520" y="660" width="16" height="16" rx="2" fill="url(#hbarGrad3)"/>
        <text x="545" y="673" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" fill="#64748B">
            <tspan>Low Awareness (&lt;30%)</tspan>
        </text>
    </g>
    
    <!-- Data Source -->
    <text x="1220" y="695" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="14" fill="#94A3B8" text-anchor="end">
        <tspan>Source: Market Research Department</tspan>
    </text>
</svg>
