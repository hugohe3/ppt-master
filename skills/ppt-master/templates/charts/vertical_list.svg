<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!--
    垂直列表模板
    用途: 纵向编号列表、特性/优势罗列、要点展示
    适用场景: 核心优势、关键发现、特性清单、要点总结
    支持: 5项纵向 (推荐3-6项)
    -->

    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F8F9FF"/>
            <stop offset="100%" stop-color="#FFFFFF"/>
        </linearGradient>
        <filter id="cardShadow" x="-5%" y="-15%" width="110%" height="135%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="0" dy="2"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.08"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="dotShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
            <feOffset dx="0" dy="2"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>

    <rect width="1280" height="720" fill="url(#bgGrad)"/>

    <!-- 标题 -->
    <text x="60" y="54" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="30" font-weight="700" fill="#0F172A">五大核心竞争优势</text>
    <text x="60" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" fill="#64748B" letter-spacing="1">Core Strengths  ·  构建差异化护城河的关键能力</text>

    <!-- 主竖线 (连接5个节点) -->
    <line x1="160" y1="115" x2="160" y2="635" stroke="#E2E8F0" stroke-width="3" stroke-linecap="round"/>

    <!-- ===== 项目1 ===== -->
    <!-- circle cy=155, card y=115~195 (h=80) -->
    <circle cx="160" cy="155" r="24" fill="#6366F1" filter="url(#dotShadow)"/>
    <text x="160" y="161" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="800" fill="#FFFFFF">01</text>
    <line x1="184" y1="155" x2="230" y2="155" stroke="#6366F1" stroke-width="2" stroke-opacity="0.35"/>
    <rect x="230" y="115" width="990" height="80" rx="10" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <rect x="230" y="115" width="5" height="80" rx="3" fill="#6366F1"/>
    <text x="258" y="143" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="700" fill="#0F172A">品牌影响力</text>
    <text x="258" y="168" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" fill="#6B7280">行业领先的品牌认知度与美誉度，覆盖全国主要市场，品牌价值连续三年位居行业 TOP3</text>
    <text x="1200" y="162" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="28" font-weight="800" fill="#6366F1" fill-opacity="0.10">BRAND</text>

    <!-- ===== 项目2 ===== -->
    <!-- circle cy=265, card y=225~305 (h=80) -->
    <circle cx="160" cy="265" r="24" fill="#10B981" filter="url(#dotShadow)"/>
    <text x="160" y="271" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="800" fill="#FFFFFF">02</text>
    <line x1="184" y1="265" x2="230" y2="265" stroke="#10B981" stroke-width="2" stroke-opacity="0.35"/>
    <rect x="230" y="225" width="990" height="80" rx="10" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <rect x="230" y="225" width="5" height="80" rx="3" fill="#10B981"/>
    <text x="258" y="253" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="700" fill="#0F172A">技术研发能力</text>
    <text x="258" y="278" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" fill="#6B7280">持续高研发投入占比 15%+，拥有 500+ 核心自主专利，AI 与大数据双引擎驱动创新</text>
    <text x="1200" y="272" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="28" font-weight="800" fill="#10B981" fill-opacity="0.10">TECH</text>

    <!-- ===== 项目3 ===== -->
    <!-- circle cy=375, card y=335~415 (h=80) -->
    <circle cx="160" cy="375" r="24" fill="#3B82F6" filter="url(#dotShadow)"/>
    <text x="160" y="381" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="800" fill="#FFFFFF">03</text>
    <line x1="184" y1="375" x2="230" y2="375" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.35"/>
    <rect x="230" y="335" width="990" height="80" rx="10" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <rect x="230" y="335" width="5" height="80" rx="3" fill="#3B82F6"/>
    <text x="258" y="363" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="700" fill="#0F172A">供应链管理</text>
    <text x="258" y="388" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" fill="#6B7280">全球化供应链布局与智能仓储物流体系，覆盖 300+ 城市，平均交付时效缩短 40%</text>
    <text x="1200" y="382" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="28" font-weight="800" fill="#3B82F6" fill-opacity="0.10">SUPPLY</text>

    <!-- ===== 项目4 ===== -->
    <!-- circle cy=485, card y=445~525 (h=80) -->
    <circle cx="160" cy="485" r="24" fill="#F59E0B" filter="url(#dotShadow)"/>
    <text x="160" y="491" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="800" fill="#FFFFFF">04</text>
    <line x1="184" y1="485" x2="230" y2="485" stroke="#F59E0B" stroke-width="2" stroke-opacity="0.35"/>
    <rect x="230" y="445" width="990" height="80" rx="10" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <rect x="230" y="445" width="5" height="80" rx="3" fill="#F59E0B"/>
    <text x="258" y="473" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="700" fill="#0F172A">客户服务体系</text>
    <text x="258" y="498" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" fill="#6B7280">7×24 小时快速响应机制，客户满意度持续保持在 96% 以上，NPS 行业领先</text>
    <text x="1200" y="492" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="28" font-weight="800" fill="#F59E0B" fill-opacity="0.10">SERVICE</text>

    <!-- ===== 项目5 ===== -->
    <!-- circle cy=595, card y=555~635 (h=80) -->
    <circle cx="160" cy="595" r="24" fill="#EF4444" filter="url(#dotShadow)"/>
    <text x="160" y="601" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" font-weight="800" fill="#FFFFFF">05</text>
    <line x1="184" y1="595" x2="230" y2="595" stroke="#EF4444" stroke-width="2" stroke-opacity="0.35"/>
    <rect x="230" y="555" width="990" height="80" rx="10" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <rect x="230" y="555" width="5" height="80" rx="3" fill="#EF4444"/>
    <text x="258" y="583" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="700" fill="#0F172A">创新与智能化</text>
    <text x="258" y="608" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" fill="#6B7280">AI 与大数据赋能业务决策，每年推出 10+ 创新产品与解决方案，引领行业技术变革</text>
    <text x="1200" y="602" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="28" font-weight="800" fill="#EF4444" fill-opacity="0.10">INNOVATION</text>

    <!-- 底部箭头 -->
    <polygon points="160,650 171,664 149,664" fill="#CBD5E1"/>

    <!-- 底部注释 -->
    <text x="640" y="700" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#94A3B8">左侧编号轴标注顺序，右侧卡片展开要点详情，适合优势清单与要点罗列</text>
</svg>
