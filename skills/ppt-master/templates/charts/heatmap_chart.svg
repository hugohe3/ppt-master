<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!-- 
    Heatmap Chart Template
    Usage: Matrix data visualization, correlation analysis
    Scenarios: Activity heatmaps, time-series analysis, user behavior
    Supports: 7×7 or 7x8 matrix grid
    -->
    
    <defs>
        <!-- Heatmap Gradient Scale (Blue to Red) -->
        <linearGradient id="heatGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#DBEAFE"/>
            <stop offset="25%" style="stop-color:#93C5FD"/>
            <stop offset="50%" style="stop-color:#FCD34D"/>
            <stop offset="75%" style="stop-color:#F97316"/>
            <stop offset="100%" style="stop-color:#DC2626"/>
        </linearGradient>
        
        <!-- Standard Shadow -->
        <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
            <feOffset dx="0" dy="2" result="offsetblur"/>
            <feFlood flood-color="#0F172A" flood-opacity="0.1" result="shadowColor"/>
            <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow"/>
            <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="1280" height="720" fill="#F8FAFC"/>
    
    <!-- Title -->
    <text x="60" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="32" font-weight="700" fill="#0F172A">
        <tspan>User Activity Heatmap Analysis</tspan>
    </text>
    
    <text x="60" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="18" fill="#64748B">
        <tspan>Active Users by Day and Time · Values in Thousands (K)</tspan>
    </text>
    
    <!-- Heatmap Area -->
    <g id="heatmapArea" transform="translate(180, 130)">
        
        <!-- Column Titles (Days) -->
        <text x="40" y="-15" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" font-weight="600" fill="#475569" text-anchor="middle"><tspan>Mon</tspan></text>
        <text x="120" y="-15" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" font-weight="600" fill="#475569" text-anchor="middle"><tspan>Tue</tspan></text>
        <text x="200" y="-15" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" font-weight="600" fill="#475569" text-anchor="middle"><tspan>Wed</tspan></text>
        <text x="280" y="-15" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" font-weight="600" fill="#475569" text-anchor="middle"><tspan>Thu</tspan></text>
        <text x="360" y="-15" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" font-weight="600" fill="#475569" text-anchor="middle"><tspan>Fri</tspan></text>
        <text x="440" y="-15" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" font-weight="600" fill="#EF4444" text-anchor="middle"><tspan>Sat</tspan></text>
        <text x="520" y="-15" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" font-weight="600" fill="#EF4444" text-anchor="middle"><tspan>Sun</tspan></text>
        
        <!-- Row Titles (Time) -->
        <text x="-15" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="13" fill="#64748B" text-anchor="end"><tspan>06:00 - 09:00</tspan></text>
        <text x="-15" y="95" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="13" fill="#64748B" text-anchor="end"><tspan>09:00 - 12:00</tspan></text>
        <text x="-15" y="155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="13" fill="#64748B" text-anchor="end"><tspan>12:00 - 14:00</tspan></text>
        <text x="-15" y="215" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="13" fill="#64748B" text-anchor="end"><tspan>14:00 - 17:00</tspan></text>
        <text x="-15" y="275" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="13" fill="#64748B" text-anchor="end"><tspan>17:00 - 19:00</tspan></text>
        <text x="-15" y="335" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="13" fill="#64748B" text-anchor="end"><tspan>19:00 - 21:00</tspan></text>
        <text x="-15" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="13" fill="#64748B" text-anchor="end"><tspan>21:00 - 23:00</tspan></text>
        <text x="-15" y="455" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="13" fill="#64748B" text-anchor="end"><tspan>23:00 - 06:00</tspan></text>
        
        <!-- Heatmap Cells -->
        <!-- Row 1 -->
        <rect x="0" y="5" width="78" height="58" rx="4" fill="#93C5FD"/><text x="40" y="40" font-size="13" fill="#1E3A8A" text-anchor="middle"><tspan>35</tspan></text>
        <rect x="80" y="5" width="78" height="58" rx="4" fill="#60A5FA"/><text x="120" y="40" font-size="13" fill="#1E3A8A" text-anchor="middle"><tspan>42</tspan></text>
        <rect x="160" y="5" width="78" height="58" rx="4" fill="#60A5FA"/><text x="200" y="40" font-size="13" fill="#1E3A8A" text-anchor="middle"><tspan>40</tspan></text>
        <rect x="240" y="5" width="78" height="58" rx="4" fill="#93C5FD"/><text x="280" y="40" font-size="13" fill="#1E3A8A" text-anchor="middle"><tspan>38</tspan></text>
        <rect x="320" y="5" width="78" height="58" rx="4" fill="#BFDBFE"/><text x="360" y="40" font-size="13" fill="#1E3A8A" text-anchor="middle"><tspan>28</tspan></text>
        <rect x="400" y="5" width="78" height="58" rx="4" fill="#DBEAFE"/><text x="440" y="40" font-size="13" fill="#1E3A8A" text-anchor="middle"><tspan>15</tspan></text>
        <rect x="480" y="5" width="78" height="58" rx="4" fill="#EFF6FF"/><text x="520" y="40" font-size="13" fill="#1E3A8A" text-anchor="middle"><tspan>10</tspan></text>
        
        <!-- Row 2 -->
        <rect x="0" y="65" width="78" height="58" rx="4" fill="#FEF08A"/><text x="40" y="100" font-size="13" fill="#9A3412" text-anchor="middle"><tspan>58</tspan></text>
        <rect x="80" y="65" width="78" height="58" rx="4" fill="#FCD34D"/><text x="120" y="100" font-size="13" fill="#9A3412" text-anchor="middle"><tspan>65</tspan></text>
        <rect x="160" y="65" width="78" height="58" rx="4" fill="#FACC15"/><text x="200" y="100" font-size="13" fill="#FFFFFF" text-anchor="middle"><tspan>72</tspan></text>
        <rect x="240" y="65" width="78" height="58" rx="4" fill="#FCD34D"/><text x="280" y="100" font-size="13" fill="#9A3412" text-anchor="middle"><tspan>68</tspan></text>
        <rect x="320" y="65" width="78" height="58" rx="4" fill="#FEF08A"/><text x="360" y="100" font-size="13" fill="#9A3412" text-anchor="middle"><tspan>55</tspan></text>
        <rect x="400" y="65" width="78" height="58" rx="4" fill="#60A5FA"/><text x="440" y="100" font-size="13" fill="#1E3A8A" text-anchor="middle"><tspan>45</tspan></text>
        <rect x="480" y="65" width="78" height="58" rx="4" fill="#93C5FD"/><text x="520" y="100" font-size="13" fill="#1E3A8A" text-anchor="middle"><tspan>38</tspan></text>
        
        <!-- Row 3 -->
        <rect x="0" y="125" width="78" height="58" rx="4" fill="#FDBA74"/><text x="40" y="160" font-size="13" fill="#7C2D12" text-anchor="middle"><tspan>75</tspan></text>
        <rect x="80" y="125" width="78" height="58" rx="4" fill="#FB923C"/><text x="120" y="160" font-size="13" fill="#FFFFFF" text-anchor="middle"><tspan>82</tspan></text>
        <rect x="160" y="125" width="78" height="58" rx="4" fill="#F97316"/><text x="200" y="160" font-size="13" fill="#FFFFFF" text-anchor="middle"><tspan>88</tspan></text>
        <rect x="240" y="125" width="78" height="58" rx="4" fill="#FB923C"/><text x="280" y="160" font-size="13" fill="#FFFFFF" text-anchor="middle"><tspan>80</tspan></text>
        <rect x="320" y="125" width="78" height="58" rx="4" fill="#FDBA74"/><text x="360" y="160" font-size="13" fill="#7C2D12" text-anchor="middle"><tspan>70</tspan></text>
        <rect x="400" y="125" width="78" height="58" rx="4" fill="#FEF08A"/><text x="440" y="160" font-size="13" fill="#9A3412" text-anchor="middle"><tspan>60</tspan></text>
        <rect x="480" y="125" width="78" height="58" rx="4" fill="#FCD34D"/><text x="520" y="160" font-size="13" fill="#9A3412" text-anchor="middle"><tspan>65</tspan></text>
        
        <!-- Row 4 -->
        <rect x="0" y="185" width="78" height="58" rx="4" fill="#FEF08A"/><text x="40" y="220" font-size="13" fill="#9A3412" text-anchor="middle"><tspan>55</tspan></text>
        <rect x="80" y="185" width="78" height="58" rx="4" fill="#FCD34D"/><text x="120" y="220" font-size="13" fill="#9A3412" text-anchor="middle"><tspan>62</tspan></text>
        <rect x="160" y="185" width="78" height="58" rx="4" fill="#FCD34D"/><text x="200" y="220" font-size="13" fill="#9A3412" text-anchor="middle"><tspan>68</tspan></text>
        <rect x="240" y="185" width="78" height="58" rx="4" fill="#FEF08A"/><text x="280" y="220" font-size="13" fill="#9A3412" text-anchor="middle"><tspan>60</tspan></text>
        <rect x="320" y="185" width="78" height="58" rx="4" fill="#60A5FA"/><text x="360" y="220" font-size="13" fill="#1E3A8A" text-anchor="middle"><tspan>48</tspan></text>
        <rect x="400" y="185" width="78" height="58" rx="4" fill="#FDBA74"/><text x="440" y="220" font-size="13" fill="#7C2D12" text-anchor="middle"><tspan>72</tspan></text>
        <rect x="480" y="185" width="78" height="58" rx="4" fill="#FB923C"/><text x="520" y="220" font-size="13" fill="#FFFFFF" text-anchor="middle"><tspan>78</tspan></text>
        
        <!-- Row 5 -->
        <rect x="0" y="245" width="78" height="58" rx="4" fill="#93C5FD"/><text x="40" y="280" font-size="13" fill="#1E3A8A" text-anchor="middle"><tspan>32</tspan></text>
        <rect x="80" y="245" width="78" height="58" rx="4" fill="#93C5FD"/><text x="120" y="280" font-size="13" fill="#1E3A8A" text-anchor="middle"><tspan>35</tspan></text>
        <rect x="160" y="245" width="78" height="58" rx="4" fill="#93C5FD"/><text x="200" y="280" font-size="13" fill="#1E3A8A" text-anchor="middle"><tspan>38</tspan></text>
        <rect x="240" y="245" width="78" height="58" rx="4" fill="#93C5FD"/><text x="280" y="280" font-size="13" fill="#1E3A8A" text-anchor="middle"><tspan>35</tspan></text>
        <rect x="320" y="245" width="78" height="58" rx="4" fill="#BFDBFE"/><text x="360" y="280" font-size="13" fill="#1E3A8A" text-anchor="middle"><tspan>28</tspan></text>
        <rect x="400" y="245" width="78" height="58" rx="4" fill="#FCD34D"/><text x="440" y="280" font-size="13" fill="#9A3412" text-anchor="middle"><tspan>65</tspan></text>
        <rect x="480" y="245" width="78" height="58" rx="4" fill="#FDBA74"/><text x="520" y="280" font-size="13" fill="#7C2D12" text-anchor="middle"><tspan>70</tspan></text>
        
        <!-- Row 6 (Peak) -->
        <rect x="0" y="305" width="78" height="58" rx="4" fill="#FB923C"/><text x="40" y="340" font-size="13" fill="#FFFFFF" text-anchor="middle"><tspan>78</tspan></text>
        <rect x="80" y="305" width="78" height="58" rx="4" fill="#F97316"/><text x="120" y="340" font-size="13" fill="#FFFFFF" text-anchor="middle"><tspan>85</tspan></text>
        <rect x="160" y="305" width="78" height="58" rx="4" fill="#F97316"/><text x="200" y="340" font-size="13" fill="#FFFFFF" text-anchor="middle"><tspan>88</tspan></text>
        <rect x="240" y="305" width="78" height="58" rx="4" fill="#F97316"/><text x="280" y="340" font-size="13" fill="#FFFFFF" text-anchor="middle"><tspan>86</tspan></text>
        <rect x="320" y="305" width="78" height="58" rx="4" fill="#FB923C"/><text x="360" y="340" font-size="13" fill="#FFFFFF" text-anchor="middle"><tspan>80</tspan></text>
        <rect x="400" y="305" width="78" height="58" rx="4" fill="#EF4444"/><text x="440" y="340" font-size="13" fill="#FFFFFF" text-anchor="middle"><tspan>95</tspan></text>
        <rect x="480" y="305" width="78" height="58" rx="4" fill="#DC2626"/><text x="520" y="340" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle"><tspan>98</tspan></text>
        
        <!-- Row 7 -->
        <rect x="0" y="365" width="78" height="58" rx="4" fill="#FCD34D"/><text x="40" y="400" font-size="13" fill="#9A3412" text-anchor="middle"><tspan>62</tspan></text>
        <rect x="80" y="365" width="78" height="58" rx="4" fill="#FDBA74"/><text x="120" y="400" font-size="13" fill="#7C2D12" text-anchor="middle"><tspan>70</tspan></text>
        <rect x="160" y="365" width="78" height="58" rx="4" fill="#FDBA74"/><text x="200" y="400" font-size="13" fill="#7C2D12" text-anchor="middle"><tspan>72</tspan></text>
        <rect x="240" y="365" width="78" height="58" rx="4" fill="#FDBA74"/><text x="280" y="400" font-size="13" fill="#7C2D12" text-anchor="middle"><tspan>68</tspan></text>
        <rect x="320" y="365" width="78" height="58" rx="4" fill="#FCD34D"/><text x="360" y="400" font-size="13" fill="#9A3412" text-anchor="middle"><tspan>65</tspan></text>
        <rect x="400" y="365" width="78" height="58" rx="4" fill="#F97316"/><text x="440" y="400" font-size="13" fill="#FFFFFF" text-anchor="middle"><tspan>85</tspan></text>
        <rect x="480" y="365" width="78" height="58" rx="4" fill="#FB923C"/><text x="520" y="400" font-size="13" fill="#FFFFFF" text-anchor="middle"><tspan>82</tspan></text>
        
        <!-- Row 8 -->
        <rect x="0" y="425" width="78" height="58" rx="4" fill="#DBEAFE"/><text x="40" y="460" font-size="13" fill="#1E3A8A" text-anchor="middle"><tspan>18</tspan></text>
        <rect x="80" y="425" width="78" height="58" rx="4" fill="#DBEAFE"/><text x="120" y="460" font-size="13" fill="#1E3A8A" text-anchor="middle"><tspan>15</tspan></text>
        <rect x="160" y="425" width="78" height="58" rx="4" fill="#DBEAFE"/><text x="200" y="460" font-size="13" fill="#1E3A8A" text-anchor="middle"><tspan>12</tspan></text>
        <rect x="240" y="425" width="78" height="58" rx="4" fill="#DBEAFE"/><text x="280" y="460" font-size="13" fill="#1E3A8A" text-anchor="middle"><tspan>15</tspan></text>
        <rect x="320" y="425" width="78" height="58" rx="4" fill="#BFDBFE"/><text x="360" y="460" font-size="13" fill="#1E3A8A" text-anchor="middle"><tspan>22</tspan></text>
        <rect x="400" y="425" width="78" height="58" rx="4" fill="#93C5FD"/><text x="440" y="460" font-size="13" fill="#1E3A8A" text-anchor="middle"><tspan>35</tspan></text>
        <rect x="480" y="425" width="78" height="58" rx="4" fill="#BFDBFE"/><text x="520" y="460" font-size="13" fill="#1E3A8A" text-anchor="middle"><tspan>28</tspan></text>
    </g>
    
    <!-- Color Legend -->
    <g id="colorLegend" transform="translate(780, 150)">
        <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" font-weight="600" fill="#0F172A"><tspan>Activity Intensity</tspan></text>
        
        <rect x="0" y="15" width="240" height="20" rx="4" fill="url(#heatGradient)"/>
        
        <text x="0" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="12" fill="#64748B"><tspan>Low (0)</tspan></text>
        <text x="120" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="12" fill="#64748B" text-anchor="middle"><tspan>Med (50)</tspan></text>
        <text x="240" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="12" fill="#64748B" text-anchor="end"><tspan>High (100)</tspan></text>
    </g>
    
    <!-- Stats Panel -->
    <g id="statsPanel" transform="translate(780, 240)">
        <rect x="0" y="0" width="240" height="180" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1" filter="url(#cardShadow)"/>
        
        <text x="120" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" font-weight="600" fill="#0F172A" text-anchor="middle"><tspan>Key Statistics</tspan></text>
        
        <line x1="15" y1="42" x2="225" y2="42" stroke="#E2E8F0" stroke-width="1"/>
        
        <text x="20" y="68" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="13" font-weight="600" fill="#475569"><tspan>🔥 Peak Time</tspan></text>
        <text x="20" y="88" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="12" fill="#DC2626"><tspan>Sun 19:00-21:00 (98K)</tspan></text>
        
        <text x="20" y="115" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="13" font-weight="600" fill="#475569"><tspan>❄️ Low Time</tspan></text>
        <text x="20" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="12" fill="#2563EB"><tspan>Sun 06:00-09:00 (10K)</tspan></text>
        
        <text x="20" y="162" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="13" font-weight="600" fill="#475569"><tspan>📊 Daily Avg</tspan></text>
        <text x="140" y="162" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" font-weight="700" fill="#0F172A"><tspan>54.2K</tspan></text>
    </g>
    
    <!-- Insight Card -->
    <g id="insightCard" transform="translate(780, 440)">
        <rect x="0" y="0" width="240" height="120" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="1" filter="url(#cardShadow)"/>
        
        <text x="20" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="14" font-weight="600" fill="#166534"><tspan>💡 Key Insights</tspan></text>
        
        <text x="20" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="12" fill="#475569"><tspan>• Peak activity on weekend nights</tspan></text>
        <text x="20" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="12" fill="#475569"><tspan>• Mid-day spikes on weekdays</tspan></text>
        <text x="20" y="95" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="12" fill="#475569"><tspan>• Lowest traffic in early hours</tspan></text>
        <text x="20" y="115" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
              font-size="11" font-weight="600" fill="#64748B"><tspan>Action: Scale servers on weekends</tspan></text>
    </g>
    
    <!-- Data Source -->
    <text x="60" y="695" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="14" fill="#94A3B8">
        <tspan>Source: User Behavior Analytics Platform</tspan>
    </text>
</svg>
