<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!--
    蛇形流程图模板
    用途: S型蜿蜒步骤、长流程展示
    适用场景: 用户旅程、客户生命周期、多阶段流程
    支持: 8步蛇形 (推荐6-10步)
    -->

    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F8F9FF"/>
            <stop offset="100%" stop-color="#FFFFFF"/>
        </linearGradient>
        <filter id="nodeShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
            <feOffset dx="0" dy="3"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="cardShadow" x="-5%" y="-20%" width="110%" height="145%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="0" dy="2"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.08"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>

    <rect width="1280" height="720" fill="url(#bgGrad)"/>

    <!-- 标题 -->
    <text x="640" y="52" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="30" font-weight="700" fill="#0F172A">客户生命周期旅程</text>
    <text x="640" y="78" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" fill="#64748B" letter-spacing="1">Customer Journey  ·  8个关键触点的蛇形流程</text>

    <!-- ===== 导轨 (先绘制，位于节点下层) ===== -->
    <!-- 第一行 左→右 y=210 -->
    <line x1="160" y1="210" x2="1120" y2="210" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round"/>
    <!-- 右侧折返弧 -->
    <path d="M 1120,210 C 1212,210 1212,460 1120,460" stroke="#E2E8F0" stroke-width="4" fill="none"/>
    <!-- 第二行 右→左 y=460 -->
    <line x1="1120" y1="460" x2="160" y2="460" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round"/>

    <!-- 折返方向小指示 (弧顶附近，下行方向) -->
    <polygon points="1207,335 1198,320 1216,320" fill="#CBD5E1"/>

    <!-- ===== 行进方向箭头 ===== -->
    <!-- 第一行 右向箭头 at x=320, 640, 960 -->
    <polygon points="322,210 310,202 310,218" fill="#C7D2FE"/>
    <polygon points="642,210 630,202 630,218" fill="#C7D2FE"/>
    <polygon points="962,210 950,202 950,218" fill="#C7D2FE"/>
    <!-- 第二行 左向箭头 at x=960, 640, 320 -->
    <polygon points="958,460 970,452 970,468" fill="#BBF7D0"/>
    <polygon points="638,460 650,452 650,468" fill="#BBF7D0"/>
    <polygon points="318,460 330,452 330,468" fill="#BBF7D0"/>

    <!-- ===== 第一行节点 (左→右, y=210) ===== -->
    <!-- 步骤01 品牌认知 #6366F1 -->
    <circle cx="160" cy="210" r="38" fill="#6366F1" filter="url(#nodeShadow)"/>
    <text x="160" y="216" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="800" fill="#FFFFFF">01</text>
    <text x="160" y="266" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="700" fill="#0F172A">品牌认知</text>
    <text x="160" y="284" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#6B7280">广告触达用户</text>

    <!-- 步骤02 兴趣激发 #8B5CF6 -->
    <circle cx="480" cy="210" r="38" fill="#8B5CF6" filter="url(#nodeShadow)"/>
    <text x="480" y="216" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="800" fill="#FFFFFF">02</text>
    <text x="480" y="266" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="700" fill="#0F172A">兴趣激发</text>
    <text x="480" y="284" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#6B7280">内容种草引导</text>

    <!-- 步骤03 考虑对比 #3B82F6 -->
    <circle cx="800" cy="210" r="38" fill="#3B82F6" filter="url(#nodeShadow)"/>
    <text x="800" y="216" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="800" fill="#FFFFFF">03</text>
    <text x="800" y="266" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="700" fill="#0F172A">考虑对比</text>
    <text x="800" y="284" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#6B7280">产品评测对比</text>

    <!-- 步骤04 首次购买 #0EA5E9 -->
    <circle cx="1120" cy="210" r="38" fill="#0EA5E9" filter="url(#nodeShadow)"/>
    <text x="1120" y="216" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="800" fill="#FFFFFF">04</text>
    <text x="1120" y="266" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="700" fill="#0F172A">首次购买</text>
    <text x="1120" y="284" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#6B7280">下单转化</text>

    <!-- ===== 第二行节点 (右→左, y=460) ===== -->
    <!-- 步骤05 使用体验 #10B981 -->
    <circle cx="1120" cy="460" r="38" fill="#10B981" filter="url(#nodeShadow)"/>
    <text x="1120" y="466" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="800" fill="#FFFFFF">05</text>
    <text x="1120" y="516" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="700" fill="#0F172A">使用体验</text>
    <text x="1120" y="534" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#6B7280">产品交付使用</text>

    <!-- 步骤06 售后服务 #F59E0B -->
    <circle cx="800" cy="460" r="38" fill="#F59E0B" filter="url(#nodeShadow)"/>
    <text x="800" y="466" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="800" fill="#FFFFFF">06</text>
    <text x="800" y="516" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="700" fill="#0F172A">售后服务</text>
    <text x="800" y="534" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#6B7280">问题响应解决</text>

    <!-- 步骤07 忠诚复购 #F97316 -->
    <circle cx="480" cy="460" r="38" fill="#F97316" filter="url(#nodeShadow)"/>
    <text x="480" y="466" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="800" fill="#FFFFFF">07</text>
    <text x="480" y="516" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="700" fill="#0F172A">忠诚复购</text>
    <text x="480" y="534" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#6B7280">二次购买转化</text>

    <!-- 步骤08 口碑传播 #EF4444 -->
    <circle cx="160" cy="460" r="38" fill="#EF4444" filter="url(#nodeShadow)"/>
    <text x="160" y="466" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="800" fill="#FFFFFF">08</text>
    <text x="160" y="516" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="15" font-weight="700" fill="#0F172A">口碑传播</text>
    <text x="160" y="534" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#6B7280">裂变推荐新客</text>

    <!-- ===== 底部总结卡 ===== -->
    <rect x="100" y="568" width="1080" height="74" rx="12" fill="#F0F4FF" filter="url(#cardShadow)"/>
    <rect x="100" y="568" width="6" height="74" rx="3" fill="#6366F1"/>
    <text x="640" y="600" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="16" font-weight="700" fill="#4F46E5">全生命周期闭环</text>
    <text x="640" y="623" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="13" fill="#6B7280">从品牌认知到口碑传播，形成自增长飞轮，平均客户 LTV 提升 3.2 倍</text>

    <!-- 底部注释 -->
    <text x="640" y="700" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#94A3B8">每个触点的体验优化都会提升整体转化漏斗效率</text>
</svg>
