<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="gradBrand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#005792"/><stop offset="40%" stop-color="#1A6E6E"/><stop offset="100%" stop-color="#2F9A47"/>
    </linearGradient>
    <linearGradient id="leftScrim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="42%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="chipShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/><feOffset dx="0" dy="3" result="o"/>
      <feFlood flood-color="#003D66" flood-opacity="0.12" result="c"/><feComposite in="c" in2="o" operator="in" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g id="bg-image">
    <image href="../images/hero_cover.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#leftScrim)"/>
  </g>

  <g id="eyebrow-chip">
    <rect x="64" y="56" width="248" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.82" stroke="#C5DCEE" stroke-width="1" filter="url(#chipShadow)"/>
    <circle cx="86" cy="73" r="4" fill="#2F9A47"/>
    <text x="100" y="78" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="0.5" fill="#003D66">中国电信 · 临港算力</text>
  </g>

  <g id="cover-title">
    <text x="64" y="368" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="1.6" fill="#005792">智算运营 · INTELLIGENT COMPUTE OPERATIONS</text>
    <text x="61" y="438" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="58" font-weight="700" letter-spacing="-1.4" fill="#003D66">智算运营服务平台</text>
    <rect x="64" y="458" width="96" height="6" rx="3" fill="url(#gradBrand)"/>
    <text x="64" y="510" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="24" font-weight="400" letter-spacing="-0.4" fill="#3A7FAF">让算力的<tspan fill="#2F9A47" font-weight="700">利用率、效率、性价比</tspan>，都做到最优</text>
    <text x="64" y="544" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" font-weight="400" fill="#5A6B7B">以行业场景化的业务模式 —— 把别家的「三低」，翻成临港的「三优」</text>
  </g>

  <g id="feature-chips">
    <rect x="64" y="636" width="186" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.82" stroke="#C5DCEE" stroke-width="1" filter="url(#chipShadow)"/>
    <circle cx="88" cy="656" r="4" fill="#005792"/><text x="102" y="661" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" font-weight="600" fill="#003D66">场景化业务模式</text>
    <rect x="262" y="636" width="160" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.82" stroke="#C5DCEE" stroke-width="1" filter="url(#chipShadow)"/>
    <circle cx="286" cy="656" r="4" fill="#2F9A47"/><text x="300" y="661" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" font-weight="600" fill="#003D66">三优 + 合规</text>
    <rect x="434" y="636" width="232" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.82" stroke="#C5DCEE" stroke-width="1" filter="url(#chipShadow)"/>
    <circle cx="458" cy="656" r="4" fill="#005792"/><text x="472" y="661" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="14" font-weight="600" fill="#003D66">一账户 · 1/8 卡 → 万卡</text>
  </g>
</svg>
