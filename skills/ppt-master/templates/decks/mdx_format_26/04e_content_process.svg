<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="720" viewBox="0 0 1280 720">
  <!-- MDX Format '26 — Content, process / flowchart (fidelity). Source slide40/53 ×1.3333 -->
  <defs>
    <marker id="mdxArrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1D2088"/>
    </marker>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>
    <image href="assets/content_bg.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>
  </g>

  <g id="header">
    <text x="96" y="107" text-anchor="start" font-family="Arial, &quot;Noto Sans JP&quot;, sans-serif" font-size="39" font-weight="bold" fill="#000000">{{TITLE}}</text>
  </g>

  <!-- {{STEPS}} — sequential step cards connected by navy arrows; accent bar cycles navy → cyan → pink -->
  <g id="step-1">
    <rect x="96" y="290" width="300" height="150" rx="8" ry="8" fill="#EDEDF3"/>
    <rect x="96" y="290" width="8" height="150" fill="#1D2088"/>
    <text x="128" y="345" text-anchor="start" font-family="&quot;Poppins ExtraBold&quot;, sans-serif" font-size="28" fill="#1D2088">01</text>
    <text x="128" y="392" text-anchor="start" font-family="&quot;Noto Sans JP&quot;, sans-serif" font-size="18" fill="#333333">{{STEP_1}}</text>
  </g>
  <line x1="404" y1="365" x2="484" y2="365" stroke="#1D2088" stroke-width="3" marker-end="url(#mdxArrow)"/>
  <g id="step-2">
    <rect x="490" y="290" width="300" height="150" rx="8" ry="8" fill="#EDEDF3"/>
    <rect x="490" y="290" width="8" height="150" fill="#00A0E9"/>
    <text x="522" y="345" text-anchor="start" font-family="&quot;Poppins ExtraBold&quot;, sans-serif" font-size="28" fill="#00A0E9">02</text>
    <text x="522" y="392" text-anchor="start" font-family="&quot;Noto Sans JP&quot;, sans-serif" font-size="18" fill="#333333">{{STEP_2}}</text>
  </g>
  <line x1="798" y1="365" x2="878" y2="365" stroke="#1D2088" stroke-width="3" marker-end="url(#mdxArrow)"/>
  <g id="step-3">
    <rect x="884" y="290" width="300" height="150" rx="8" ry="8" fill="#EDEDF3"/>
    <rect x="884" y="290" width="8" height="150" fill="#E4007F"/>
    <text x="916" y="345" text-anchor="start" font-family="&quot;Poppins ExtraBold&quot;, sans-serif" font-size="28" fill="#E4007F">03</text>
    <text x="916" y="392" text-anchor="start" font-family="&quot;Noto Sans JP&quot;, sans-serif" font-size="18" fill="#333333">{{STEP_3}}</text>
  </g>

  <g id="diagram">
    <text x="96" y="600" text-anchor="start" font-family="&quot;Noto Sans JP&quot;, sans-serif" font-size="14" fill="#666666">{{DIAGRAM}}</text>
  </g>

  <g id="footer">
    <text x="142" y="668" text-anchor="middle" font-family="&quot;Poppins&quot;, sans-serif" font-size="18" fill="#1D2088">© 2026 Givery, Inc</text>
    <line x1="59" y1="688" x2="226" y2="688" stroke="#1D2088" stroke-width="2"/>
  </g>

  <g id="pagenum">
    <rect x="1119" y="657" width="121" height="42" rx="6" ry="6" fill="#1D2088"/>
    <text x="1179" y="684" text-anchor="middle" font-family="&quot;Poppins&quot;, sans-serif" font-size="18" fill="#FFFFFF">Page {{PAGE_NUM}}</text>
  </g>
</svg>
