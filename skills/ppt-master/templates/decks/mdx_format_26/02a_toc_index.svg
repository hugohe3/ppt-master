    <text x="561" y="441" text-anchor="start" font-family="&quot;Noto Sans JP&quot;, sans-serif" font-size="32" font-weight="bold" fill="#0097A7" text-decoration="underline"><tspan fill="#0097A7" font-weight="bold">● </tspan>{{TOC_ITEM_3_TITLE}}</text>
    <text x="561" y="489" text-anchor="start" font-family="&quot;Noto Sans JP&quot;, sans-serif" font-size="32" font-weight="bold" fill="#0097A7" text-decoration="underline"><tspan fill="#0097A7" font-weight="bold">● </tspan>{{TOC_ITEM_4_TITLE}}</text>
  </g>
</svg>
