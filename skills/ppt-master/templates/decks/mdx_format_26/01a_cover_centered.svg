<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="720" viewBox="0 0 1280 720">
  <!-- 表紙① タイトル (source: layout1 + slide1, 960x540 -> x1.3333) -->
  <image href="assets/cover_bg.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="none"/>

  <!-- 左右のネイビーエッジタブ -->
  <rect x="0" y="329.07" width="164.49" height="61.85" fill="#1D2088"/>
  <rect x="1115.51" y="329.07" width="164.49" height="61.85" fill="#1D2088"/>

  <!-- 中央ロゴロックアップ -->
  <image href="assets/marketing_dx_logo.png" x="516.08" y="239.29" width="202.11" height="60.09" preserveAspectRatio="xMidYMid meet"/>

  <!-- タイトル -->
  <text x="640" y="394.21" text-anchor="middle" font-family="&quot;Poppins ExtraBold&quot;, &quot;Noto Sans JP&quot;, sans-serif" font-size="71.11" font-weight="800" fill="#000000">{{TITLE}}</text>

  <!-- Marketing DX / powered by Givery ロックアップ -->
  <text x="640" y="592.11" text-anchor="middle" font-family="Poppins, &quot;Noto Sans JP&quot;, sans-serif" font-size="30.22" fill="#1D2088">Marketing DX</text>
  <text x="640" y="627.05" text-anchor="middle" font-family="Poppins, &quot;Noto Sans JP&quot;, sans-serif" font-size="17.78" fill="#1D2088">powered by Givery</text>
  <line x1="556.65" y1="649.36" x2="723.33" y2="649.36" stroke="#1D2088" stroke-width="2.67"/>

  <!-- フッター左: コピーライト -->
  <text x="163.81" y="625.93" text-anchor="middle" font-family="Poppins, &quot;Noto Sans JP&quot;, sans-serif" font-size="17.78" fill="#1D2088">© 2026 Givery, Inc</text>
  <line x1="80.47" y1="646.11" x2="247.15" y2="646.11" stroke="#1D2088" stroke-width="2.67"/>

  <!-- フッター右: 更新日 -->
  <text x="1116.19" y="625.93" text-anchor="middle" font-family="&quot;Noto Sans JP&quot;, sans-serif" font-size="17.78" fill="#000000">{{UPDATE_DATE}}</text>
  <line x1="1032.85" y1="646.11" x2="1199.53" y2="646.11" stroke="#1D2088" stroke-width="2.67"/>
</svg>
