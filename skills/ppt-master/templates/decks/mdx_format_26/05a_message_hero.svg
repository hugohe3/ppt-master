<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="720" viewBox="0 0 1280 720">
  <!-- 大きく打ち出したいメッセージ (source: layout14 + slide18, 960x540 -> x1.3333) -->
  <image href="assets/message_bg.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="none"/>

  <!-- 右上ネイビーブロック＋右寄せタイトル -->
  <rect x="1054.12" y="96.79" width="225.89" height="63.49" fill="#1D2088"/>
  <text x="1026.09" y="147.03" text-anchor="end" font-family="&quot;Poppins ExtraBold&quot;, &quot;Noto Sans JP&quot;, sans-serif" font-size="32" font-weight="800" fill="#000000">{{TITLE}}</text>

  <!-- キーメッセージ（2行以内・中央） -->
  <text x="640" y="316.01" text-anchor="middle" font-family="&quot;Poppins ExtraBold&quot;, &quot;Noto Sans JP&quot;, sans-serif" font-size="56.89" font-weight="800" fill="#000000">{{MESSAGE}}</text>

  <!-- 補足文（3行以内・中央） -->
  <text x="640" y="459.04" text-anchor="middle" font-family="&quot;Noto Sans JP&quot;, sans-serif" font-size="19.56" fill="#000000">{{NOTE}}</text>

  <!-- フッター左: コピーライト -->
  <text x="142.48" y="668.60" text-anchor="middle" font-family="Poppins, &quot;Noto Sans JP&quot;, sans-serif" font-size="17.78" fill="#1D2088">© 2026 Givery, Inc</text>
  <line x1="59.13" y1="688.77" x2="225.81" y2="688.77" stroke="#1D2088" stroke-width="2.67"/>

  <!-- フッター右: 白 Page ピル -->
  <line x1="802.84" y1="685.05" x2="1099.16" y2="685.05" stroke="#1D2088" stroke-width="2.21"/>
  <rect x="1129.45" y="667.48" width="100.16" height="35.15" rx="5.11" ry="5.11" fill="#FFFFFF"/>
  <text x="1169.67" y="697.80" text-anchor="middle" font-family="Poppins, &quot;Noto Sans JP&quot;, sans-serif" font-size="17.67" fill="#1D2088">Page</text>
  <text x="1204.15" y="691.25" text-anchor="middle" font-family="&quot;Noto Sans JP&quot;, sans-serif" font-size="17.67" fill="#000000">{{PAGE_NUM}}</text>
</svg>
