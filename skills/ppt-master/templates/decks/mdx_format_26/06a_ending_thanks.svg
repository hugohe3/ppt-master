<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="720" viewBox="0 0 1280 720">
  <!-- エンディング（サンクス） (source: layout34 literal, 960x540 -> x1.3333) -->
  <image href="assets/ending_bg.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="none"/>

  <!-- Givery 白ロゴ -->
  <image href="assets/givery_logo_white.png" x="441.41" y="155.64" width="397.17" height="78.91" preserveAspectRatio="xMidYMid meet"/>

  <!-- サンクスライン -->
  <text x="640" y="300.08" text-anchor="middle" font-family="Poppins, &quot;Noto Sans JP&quot;, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF">{{THANKS}}</text>
  <text x="640" y="377.25" text-anchor="middle" font-family="Poppins, &quot;Noto Sans JP&quot;, sans-serif" font-size="32" fill="#FFFFFF">{{SUBTEXT}}</text>

  <!-- DECA 検索ピル -->
  <rect x="322.67" y="432.40" width="549.33" height="98.67" rx="16.44" ry="16.44" fill="#FFFFFF"/>
  <rect x="852.01" y="432.39" width="129.31" height="98.65" rx="16.44" ry="16.44" fill="#1D2088"/>
  <rect x="884.65" y="448.39" width="56.03" height="56.03" fill="#FFFFFF"/>
  <line x1="926.79" y1="492.55" x2="949.43" y2="515.19" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
  <text x="587.33" y="511.85" text-anchor="middle" font-family="Poppins, &quot;Noto Sans JP&quot;, sans-serif" font-size="53.33" font-weight="bold" fill="#1D2088" letter-spacing="12">DECA</text>

  <!-- 連絡先 -->
  <text x="640" y="590.31" text-anchor="middle" font-family="Poppins, &quot;Noto Sans JP&quot;, sans-serif" font-size="21.33" fill="#FFFFFF">{{CONTACT}}</text>
</svg>
