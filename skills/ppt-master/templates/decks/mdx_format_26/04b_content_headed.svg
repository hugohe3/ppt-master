<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="720" viewBox="0 0 1280 720">
  <!-- MDX Format '26 — Content, EN-subtitle + JP-title standard (fidelity). Source slide28/37 ×1.3333 -->
  <g id="bg">
    <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>
    <image href="assets/content_bg.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>
  </g>

  <g id="header">
    <text x="96" y="107" text-anchor="start" font-family="&quot;Montserrat&quot;, Arial, sans-serif" font-size="18" fill="#C60000">{{EN_SUBTITLE}}</text>
    <text x="96" y="153" text-anchor="start" font-family="Arial, &quot;Noto Sans JP&quot;, sans-serif" font-size="39" font-weight="bold" fill="#000000">{{TITLE}}</text>
  </g>

  <g id="body">
    <text x="96" y="230" text-anchor="start" font-family="&quot;Noto Sans JP&quot;, sans-serif" font-size="20" fill="#000000">{{BODY}}</text>
  </g>

  <g id="figure">
    <rect x="96" y="300" width="1088" height="300" fill="#FFFFFF" fill-opacity="0.25" stroke="#E4007F" stroke-width="3" stroke-dasharray="4,4"/>
    <image href="assets/figure_placeholder.png" x="606" y="416" width="68" height="68" preserveAspectRatio="xMidYMid meet"/>
    <text x="640" y="512" text-anchor="middle" font-family="&quot;Noto Sans JP&quot;, sans-serif" font-size="16" fill="#A81B8D">{{FIGURE}}</text>
  </g>

  <g id="footer">
    <text x="142" y="668" text-anchor="middle" font-family="&quot;Poppins&quot;, sans-serif" font-size="18" fill="#1D2088">© 2026 Givery, Inc</text>
    <line x1="59" y1="688" x2="226" y2="688" stroke="#1D2088" stroke-width="2"/>
  </g>

  <g id="pagenum">
    <rect x="1119" y="657" width="121" height="42" rx="6" ry="6" fill="#1D2088"/>
    <text x="1179" y="684" text-anchor="middle" font-family="&quot;Poppins&quot;, sans-serif" font-size="18" fill="#FFFFFF">Page {{PAGE_NUM}}</text>
  </g>
</svg>
