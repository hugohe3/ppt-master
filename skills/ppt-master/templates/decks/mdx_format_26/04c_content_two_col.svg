<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="720" viewBox="0 0 1280 720">
  <!-- MDX Format '26 — Content, left text / right hero image (fidelity). Source slide37 ×1.3333 -->
  <g id="bg">
    <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>
    <image href="assets/content_bg.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>
  </g>

  <g id="header">
    <text x="96" y="112" text-anchor="start" font-family="Arial, &quot;Noto Sans JP&quot;, sans-serif" font-size="39" font-weight="bold" fill="#C60000">{{TITLE}}</text>
  </g>

  <g id="body">
    <text x="106" y="240" text-anchor="start" font-family="&quot;Noto Sans JP&quot;, sans-serif" font-size="18" fill="#000000">{{BODY}}</text>
  </g>

  <g id="hero-image">
    <rect x="609" y="218" width="625" height="455" fill="#FFFFFF" fill-opacity="0.25" stroke="#E4007F" stroke-width="3" stroke-dasharray="4,4"/>
    <image href="assets/figure_placeholder.png" x="887" y="411" width="68" height="68" preserveAspectRatio="xMidYMid meet"/>
    <text x="921" y="507" text-anchor="middle" font-family="&quot;Noto Sans JP&quot;, sans-serif" font-size="16" fill="#A81B8D">{{HERO_IMAGE}}</text>
  </g>

  <g id="footer">
    <text x="142" y="668" text-anchor="middle" font-family="&quot;Poppins&quot;, sans-serif" font-size="18" fill="#1D2088">© 2026 Givery, Inc</text>
    <line x1="59" y1="688" x2="226" y2="688" stroke="#1D2088" stroke-width="2"/>
  </g>

  <g id="pagenum">
    <rect x="1119" y="657" width="121" height="42" rx="6" ry="6" fill="#1D2088"/>
    <text x="1179" y="684" text-anchor="middle" font-family="&quot;Poppins&quot;, sans-serif" font-size="18" fill="#FFFFFF">Page {{PAGE_NUM}}</text>
  </g>
</svg>
