<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG 测试</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #f0f0f0;
            font-family: sans-serif;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-top: 0;
        }

        img {
            width: 100%;
            height: auto;
            border: 1px solid #ddd;
        }

        .info {
            margin-top: 10px;
            padding: 10px;
            background: #f9f9f9;
            border-left: 4px solid #2563EB;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>SVG 显示测试</h1>
        <div class="info">
            <p><strong>测试方式 1：使用 &lt;img&gt; 标签</strong></p>
        </div>
        <img src="slide_01_cover.svg" alt="SVG Cover">

        <div class="info" style="margin-top: 40px;">
            <p><strong>测试方式 2：使用 &lt;object&gt; 标签</strong></p>
        </div>
        <object data="slide_01_cover.svg" type="image/svg+xml" width="1280" height="720"
            style="border: 1px solid #ddd;">
            SVG 无法显示
        </object>

        <div class="info" style="margin-top: 40px;">
            <p><strong>测试方式 3：内联 SVG（从文件加载）</strong></p>
        </div>
        <div id="inline-svg" style="border: 1px solid #ddd;"></div>

        <script>
            fetch('slide_01_cover.svg')
                .then(response => response.text())
                .then(svg => {
                    document.getElementById('inline-svg').innerHTML = svg;
                    console.log('SVG loaded successfully');
                })
                .catch(error => {
                    console.error('Error loading SVG:', error);
                    document.getElementById('inline-svg').innerHTML = '<p style="color:red;">加载失败: ' + error.message + '</p>';
                });
        </script>
    </div>
</body>

</html>
