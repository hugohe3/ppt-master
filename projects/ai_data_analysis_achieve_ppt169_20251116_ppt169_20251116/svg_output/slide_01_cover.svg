<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!-- 定义渐变 -->
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="coverBgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EDE9FE;stop-opacity:1" />
    </linearGradient>

    <!-- 标题渐变 -->
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>

    <!-- 简化的阴影滤镜 -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1280" height="720" fill="url(#coverBgGradient)" />

  <!-- 装饰性几何图形 -->
  <circle cx="100" cy="100" r="120" fill="#2563EB" opacity="0.1" />
  <circle cx="1180" cy="620" r="150" fill="#7C3AED" opacity="0.1" />
  <rect x="900" y="50" width="200" height="200" rx="20" fill="#10B981" opacity="0.08" transform="rotate(15 1000 150)" />
  <circle cx="200" cy="600" r="80" fill="#F59E0B" opacity="0.1" />

  <!-- 主容器阴影层 -->
  <rect x="180" y="200" width="920" height="340" rx="24" fill="#000000" opacity="0.08" transform="translate(0, 4)" />

  <!-- 主内容容器 -->
  <rect x="180" y="200" width="920" height="340" rx="24" fill="#FFFFFF" />

  <!-- 顶部装饰条 -->
  <rect x="180" y="200" width="920" height="8" rx="24" fill="url(#titleGradient)" />

  <!-- 主标题 -->
  <text x="640" y="300"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
    font-size="64" font-weight="800" fill="url(#titleGradient)" text-anchor="middle" letter-spacing="2">
    AI 数据分析框架
  </text>

  <!-- 副标题 -->
  <text x="640" y="365"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
    font-size="36" font-weight="600" fill="#475569" text-anchor="middle" letter-spacing="1">
    ACHIEVE &amp; DIG 方法论
  </text>

  <!-- 装饰性分隔线 -->
  <line x1="340" y1="400" x2="940" y2="400" stroke="url(#titleGradient)" stroke-width="3" opacity="0.6" />

  <!-- emoji 装饰卡片 -->
  <g>
    <rect x="380" y="420" width="120" height="80" rx="12" fill="#EFF6FF" />
    <text x="440" y="470" font-size="40" text-anchor="middle">🤖</text>
  </g>
  <g>
    <rect x="520" y="420" width="120" height="80" rx="12" fill="#F5F3FF" />
    <text x="580" y="470" font-size="40" text-anchor="middle">📊</text>
  </g>
  <g>
    <rect x="660" y="420" width="120" height="80" rx="12" fill="#ECFDF5" />
    <text x="720" y="470" font-size="40" text-anchor="middle">🔑</text>
  </g>
  <g>
    <rect x="800" y="420" width="120" height="80" rx="12" fill="#FEF3C7" />
    <text x="860" y="470" font-size="40" text-anchor="middle">✨</text>
  </g>

  <!-- 来源标签 -->
  <rect x="500" y="575" width="280" height="45" rx="22" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2" />
  <text x="640" y="605"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
    font-size="18" font-weight="500" fill="#64748B" text-anchor="middle">
    📚 Vanderbilt University
  </text>

  <!-- 页码 -->
  <text x="1220" y="690"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
    font-size="16" fill="#94A3B8" text-anchor="end">
    1 / 15
  </text>
</svg>