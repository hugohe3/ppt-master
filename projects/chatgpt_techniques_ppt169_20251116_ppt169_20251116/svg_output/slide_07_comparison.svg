<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" width="1280" height="720">
  <defs>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#F3F4F6"/>
  
  <!-- 页面标题 -->
  <text x="60" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#1F2937">
    如何选择合适的技巧？
  </text>
  
  <!-- 装饰线 -->
  <rect x="60" y="100" width="100" height="4" fill="#2563EB" rx="2"/>
  
  <!-- 表头 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="140" width="280" height="60" fill="#2563EB" rx="12"/>
    <text x="200" y="177" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">
      技巧名称
    </text>
  </g>
  
  <g filter="url(#cardShadow)">
    <rect x="360" y="140" width="420" height="60" fill="#2563EB" rx="12"/>
    <text x="570" y="177" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">
      适用场景
    </text>
  </g>
  
  <g filter="url(#cardShadow)">
    <rect x="800" y="140" width="420" height="60" fill="#2563EB" rx="12"/>
    <text x="1010" y="177" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">
      核心价值
    </text>
  </g>
  
  <!-- 行 1 - 提示词逆向工程 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="220" width="280" height="100" fill="#DBEAFE" rx="12"/>
    <text x="90" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" fill="#1F2937">
      <tspan x="90" dy="0">提示词</tspan>
      <tspan x="90" dy="25">逆向工程</tspan>
    </text>
  </g>
  
  <g filter="url(#cardShadow)">
    <rect x="360" y="220" width="420" height="100" fill="#ffffff" rx="12"/>
    <text x="380" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#1F2937">
      <tspan x="380" dy="0">需要反复执行的固定任务</tspan>
      <tspan x="380" dy="25">建立提示词模板库</tspan>
    </text>
  </g>
  
  <g filter="url(#cardShadow)">
    <rect x="800" y="220" width="420" height="100" fill="#ffffff" rx="12"/>
    <text x="820" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#1F2937">
      <tspan x="820" dy="0">效率提升</tspan>
      <tspan x="820" dy="25">跳过反复调试过程</tspan>
    </text>
  </g>
  
  <!-- 行 2 - 五分钟放大器 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="340" width="280" height="100" fill="#FEF3C7" rx="12"/>
    <text x="90" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" fill="#1F2937">
      <tspan x="90" dy="0">五分钟</tspan>
      <tspan x="90" dy="25">放大器</tspan>
    </text>
  </g>
  
  <g filter="url(#cardShadow)">
    <rect x="360" y="340" width="420" height="100" fill="#ffffff" rx="12"/>
    <text x="380" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#1F2937">
      <tspan x="380" dy="0">内容营销与知识传播</tspan>
      <tspan x="380" dy="25">多渠道分发需求</tspan>
    </text>
  </g>
  
  <g filter="url(#cardShadow)">
    <rect x="800" y="340" width="420" height="100" fill="#ffffff" rx="12"/>
    <text x="820" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#1F2937">
      <tspan x="820" dy="0">内容价值最大化</tspan>
      <tspan x="820" dy="25">一份投入多份产出</tspan>
    </text>
  </g>
  
  <!-- 行 3 - 红队批判法 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="460" width="280" height="100" fill="#FEE2E2" rx="12"/>
    <text x="90" y="500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" fill="#1F2937">
      <tspan x="90" dy="0">红队</tspan>
      <tspan x="90" dy="25">批判法</tspan>
    </text>
  </g>
  
  <g filter="url(#cardShadow)">
    <rect x="360" y="460" width="420" height="100" fill="#ffffff" rx="12"/>
    <text x="380" y="500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#1F2937">
      <tspan x="380" dy="0">高风险文档（简历、提案）</tspan>
      <tspan x="380" dy="25">需要严格审核的内容</tspan>
    </text>
  </g>
  
  <g filter="url(#cardShadow)">
    <rect x="800" y="460" width="420" height="100" fill="#ffffff" rx="12"/>
    <text x="820" y="500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#1F2937">
      <tspan x="820" dy="0">风险预防</tspan>
      <tspan x="820" dy="25">提前发现致命缺陷</tspan>
    </text>
  </g>
  
  <!-- 行 4 - 蓝图脚手架法 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="580" width="280" height="100" fill="#E0E7FF" rx="12"/>
    <text x="90" y="620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" fill="#1F2937">
      <tspan x="90" dy="0">蓝图</tspan>
      <tspan x="90" dy="25">脚手架法</tspan>
    </text>
  </g>
  
  <g filter="url(#cardShadow)">
    <rect x="360" y="580" width="420" height="100" fill="#ffffff" rx="12"/>
    <text x="380" y="620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#1F2937">
      <tspan x="380" dy="0">复杂项目与策略文档</tspan>
      <tspan x="380" dy="25">需要自定义结构的任务</tspan>
    </text>
  </g>
  
  <g filter="url(#cardShadow)">
    <rect x="800" y="580" width="420" height="100" fill="#ffffff" rx="12"/>
    <text x="820" y="620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#1F2937">
      <tspan x="820" dy="0">方向可控</tspan>
      <tspan x="820" dy="25">避免无用输出</tspan>
    </text>
  </g>
  
  <!-- 页码 -->
  <text x="640" y="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#6B7280" text-anchor="middle">
    7
  </text>
</svg>

