<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" width="1280" height="720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DBEAFE;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  
  <!-- 装饰圆形 -->
  <circle cx="1100" cy="150" r="180" fill="#ffffff" opacity="0.1"/>
  <circle cx="180" cy="580" r="120" fill="#ffffff" opacity="0.1"/>
  
  <!-- 装饰线条 -->
  <rect x="60" y="320" width="200" height="4" fill="#ffffff" opacity="0.6" rx="2"/>
  
  <!-- 主标题 -->
  <text x="640" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="56" font-weight="700" fill="#ffffff" text-anchor="middle">
    ChatGPT 进阶技巧
  </text>
  
  <!-- 副标题 -->
  <text x="640" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="400" fill="#ffffff" text-anchor="middle" opacity="0.9">
    4 个让你效率翻倍的实用方法
  </text>
  
  <!-- 装饰卡片 -->
  <rect x="440" y="420" width="400" height="120" fill="url(#cardGradient)" rx="12" opacity="0.8"/>
  
  <!-- 特点标签 -->
  <g transform="translate(480, 460)">
    <circle cx="0" cy="0" r="6" fill="#10B981"/>
    <text x="20" y="6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#ffffff">
      易学易用
    </text>
  </g>
  
  <g transform="translate(480, 500)">
    <circle cx="0" cy="0" r="6" fill="#F97316"/>
    <text x="20" y="6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#ffffff">
      立即见效
    </text>
  </g>
  
  <!-- 装饰图标 -->
  <g transform="translate(760, 460)">
    <circle cx="20" cy="20" r="32" fill="#ffffff" opacity="0.2"/>
    <path d="M 20 8 L 20 32 M 8 20 L 32 20" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- 页码 -->
  <text x="640" y="680" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#ffffff" text-anchor="middle" opacity="0.7">
    1
  </text>
</svg>

