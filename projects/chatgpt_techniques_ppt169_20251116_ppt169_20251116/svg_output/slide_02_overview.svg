<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" width="1280" height="720">
  <defs>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#F3F4F6"/>
  
  <!-- 页面标题 -->
  <text x="60" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#1F2937">
    四大核心技巧
  </text>
  
  <!-- 装饰线 -->
  <rect x="60" y="100" width="80" height="4" fill="#2563EB" rx="2"/>
  
  <!-- 卡片 1 - 提示词逆向工程 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="160" width="560" height="240" fill="#ffffff" rx="12"/>
    
    <!-- 图标背景 -->
    <circle cx="110" cy="210" r="28" fill="#DBEAFE"/>
    <!-- 图标 - 循环箭头 -->
    <path d="M 110 192 A 18 18 0 1 1 110 228" stroke="#2563EB" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 110 192 L 105 187 M 110 192 L 115 187" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
    
    <text x="160" y="215" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="600" fill="#1F2937">
      提示词逆向工程
    </text>
    
    <text x="90" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#6B7280">
      <tspan x="90" dy="0">跳过反复修改，一次性获得完美提示词。</tspan>
      <tspan x="90" dy="30">适合需要反复使用的固定任务场景。</tspan>
    </text>
    
    <rect x="90" y="340" width="120" height="32" fill="#DBEAFE" rx="6"/>
    <text x="150" y="362" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#2563EB" text-anchor="middle">
      效率提升
    </text>
  </g>
  
  <!-- 卡片 2 - 五分钟放大器 -->
  <g filter="url(#cardShadow)">
    <rect x="660" y="160" width="560" height="240" fill="#ffffff" rx="12"/>
    
    <!-- 图标背景 -->
    <circle cx="710" cy="210" r="28" fill="#FEF3C7"/>
    <!-- 图标 - 扩散 -->
    <circle cx="710" cy="210" r="8" fill="#F97316"/>
    <circle cx="695" cy="200" r="4" fill="#F97316" opacity="0.6"/>
    <circle cx="725" cy="200" r="4" fill="#F97316" opacity="0.6"/>
    <circle cx="695" cy="220" r="4" fill="#F97316" opacity="0.6"/>
    <circle cx="725" cy="220" r="4" fill="#F97316" opacity="0.6"/>
    
    <text x="760" y="215" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="600" fill="#1F2937">
      五分钟放大器
    </text>
    
    <text x="690" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#6B7280">
      <tspan x="690" dy="0">将一份高质量内容快速转化为多种格式。</tspan>
      <tspan x="690" dy="30">适合内容营销和知识传播场景。</tspan>
    </text>
    
    <rect x="690" y="340" width="120" height="32" fill="#FEF3C7" rx="6"/>
    <text x="750" y="362" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#F97316" text-anchor="middle">
      内容放大
    </text>
  </g>
  
  <!-- 卡片 3 - 红队批判法 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="440" width="560" height="240" fill="#ffffff" rx="12"/>
    
    <!-- 图标背景 -->
    <circle cx="110" cy="490" r="28" fill="#FEE2E2"/>
    <!-- 图标 - 盾牌 -->
    <path d="M 110 470 L 95 478 L 95 495 Q 95 505 110 510 Q 125 505 125 495 L 125 478 Z" fill="none" stroke="#EF4444" stroke-width="3"/>
    
    <text x="160" y="495" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="600" fill="#1F2937">
      红队批判法
    </text>
    
    <text x="90" y="540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#6B7280">
      <tspan x="90" dy="0">让 AI 扮演批评者，提前发现内容缺陷。</tspan>
      <tspan x="90" dy="30">适合简历、提案等需要严格审核的文档。</tspan>
    </text>
    
    <rect x="90" y="620" width="120" height="32" fill="#FEE2E2" rx="6"/>
    <text x="150" y="642" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#EF4444" text-anchor="middle">
      风险预防
    </text>
  </g>
  
  <!-- 卡片 4 - 蓝图脚手架法 -->
  <g filter="url(#cardShadow)">
    <rect x="660" y="440" width="560" height="240" fill="#ffffff" rx="12"/>
    
    <!-- 图标背景 -->
    <circle cx="710" cy="490" r="28" fill="#E0E7FF"/>
    <!-- 图标 - 建筑 -->
    <rect x="695" y="480" width="30" height="20" fill="none" stroke="#8B5CF6" stroke-width="3"/>
    <path d="M 695 480 L 710 470 L 725 480" fill="none" stroke="#8B5CF6" stroke-width="3" stroke-linejoin="round"/>
    
    <text x="760" y="495" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="600" fill="#1F2937">
      蓝图脚手架法
    </text>
    
    <text x="690" y="540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#6B7280">
      <tspan x="690" dy="0">先让 AI 展示思路框架，再填充细节内容。</tspan>
      <tspan x="690" dy="30">适合复杂项目和策略性文档创作。</tspan>
    </text>
    
    <rect x="690" y="620" width="120" height="32" fill="#E0E7FF" rx="6"/>
    <text x="750" y="642" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#8B5CF6" text-anchor="middle">
      结构清晰
    </text>
  </g>
  
  <!-- 页码 -->
  <text x="640" y="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#6B7280" text-anchor="middle">
    2
  </text>
</svg>

