<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="summaryBg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.1" />
            <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0.1" />
        </linearGradient>
        <filter id="cardShadow">
            <feGaussianBlur in="SourceAlpha" stdDeviation="6" />
            <feOffset dx="0" dy="4" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.08" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- 背景 -->
    <rect width="1280" height="720" fill="#FAFAFA" />

    <!-- 页面标题 -->
    <text x="60" y="90"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="48" font-weight="bold" fill="#1F2937">
        ✨ Course Summary &amp; Critiques
    </text>

    <!-- 总结框 -->
    <g filter="url(#cardShadow)">
        <rect x="60" y="150" width="1160" height="120" rx="12" fill="url(#summaryBg)" stroke="#6366F1"
            stroke-width="2" />
        <text x="640" y="200"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="28" font-weight="600" fill="#6366F1" text-anchor="middle">
            Very good overview of Agentic AI
        </text>
        <text x="640" y="245"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="22" fill="#1F2937" text-anchor="middle">
            覆盖从基础到高级的完整光谱 · 理论与实践兼顾
        </text>
    </g>

    <!-- 批评标题 -->
    <text x="60" y="330"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="32" font-weight="600" fill="#F59E0B">
        两点批评：
    </text>

    <!-- Critique 1 -->
    <g filter="url(#cardShadow)">
        <rect x="60" y="360" width="560" height="220" rx="12" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2" />
        <text x="340" y="410"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="28" font-weight="600" fill="#F59E0B" text-anchor="middle">
            Critique 1 📚
        </text>
        <text x="340" y="460"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="20" fill="#1F2937" text-anchor="middle">
            <tspan x="340" dy="0">过于</tspan>
            <tspan fill="#F59E0B" font-weight="600">研究导向和理论化</tspan>
        </text>
        <text x="340" y="520"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="18" fill="#6B7280" text-anchor="middle">
            <tspan x="340" dy="0">缺乏关于</tspan>
            <tspan font-weight="600">部署</tspan>
            <tspan>和</tspan>
            <tspan font-weight="600">获取真实用户</tspan>
            <tspan x="340" dy="24">的实践细节</tspan>
        </text>
    </g>

    <!-- Critique 2 -->
    <g filter="url(#cardShadow)">
        <rect x="660" y="360" width="560" height="220" rx="12" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2" />
        <text x="940" y="410"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="28" font-weight="600" fill="#F59E0B" text-anchor="middle">
            Critique 2 💻
        </text>
        <text x="940" y="460"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="20" fill="#1F2937" text-anchor="middle">
            <tspan x="940" dy="0">所有作业都是</tspan>
            <tspan fill="#F59E0B" font-weight="600">代码形式</tspan>
        </text>
        <text x="940" y="520"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="18" fill="#6B7280" text-anchor="middle">
            <tspan x="940" dy="0">容易给人</tspan>
            <tspan font-weight="600">「必须会编程」</tspan>
            <tspan>的误解</tspan>
            <tspan x="940" dy="24">实际可用</tspan>
            <tspan font-weight="600" fill="#10B981">无代码工具</tspan>
            <tspan>构建</tspan>
        </text>
    </g>

    <!-- CTA 按钮 -->
    <g filter="url(#cardShadow)">
        <rect x="340" y="620" width="600" height="70" rx="35" fill="#6366F1" />
        <text x="640" y="665"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="26" font-weight="600" fill="#FFFFFF" text-anchor="middle">
            Ready to build your first agentic workflow? 🚀
        </text>
    </g>
</svg>