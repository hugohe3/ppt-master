<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
        </linearGradient>
        <filter id="cardShadow">
            <feGaussianBlur in="SourceAlpha" stdDeviation="6" />
            <feOffset dx="0" dy="4" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.08" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- 背景 -->
    <rect width="1280" height="720" fill="#FAFAFA" />

    <!-- 页面标题 -->
    <text x="60" y="90"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="48" font-weight="bold" fill="#1F2937">
        💡 核心洞察
    </text>

    <!-- 中心引用框 -->
    <g filter="url(#cardShadow)">
        <rect x="200" y="180" width="880" height="180" rx="12" fill="#FFFFFF" />
        <rect x="200" y="180" width="880" height="4" rx="2" fill="url(#borderGradient)" />

        <text x="640" y="240"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="26" fill="#1F2937" text-anchor="middle" font-weight="600">
            <tspan x="640" dy="0">Wrapping an LLM in an agentic workflow makes it</tspan>
            <tspan x="640" dy="36" font-weight="bold" fill="#6366F1">significantly better, faster, and more modular
            </tspan>
            <tspan x="640" dy="36">than direct calls</tspan>
        </text>

        <text x="1060" y="345"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="18" fill="#6B7280" text-anchor="end">
            [00:04:20]
        </text>
    </g>

    <!-- 三个支撑点卡片 -->
    <!-- Better -->
    <g filter="url(#cardShadow)">
        <rect x="140" y="420" width="300" height="220" rx="12" fill="#FFFFFF" />
        <text x="290" y="480" font-size="48" text-anchor="middle">✨</text>
        <text x="290" y="530"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="28" font-weight="600" fill="#6366F1" text-anchor="middle">
            Better
        </text>
        <text x="290" y="570"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="20" fill="#6B7280" text-anchor="middle">
            <tspan x="290" dy="0">更高质量</tspan>
            <tspan x="290" dy="28">输出</tspan>
        </text>
    </g>

    <!-- Faster -->
    <g filter="url(#cardShadow)">
        <rect x="490" y="420" width="300" height="220" rx="12" fill="#FFFFFF" />
        <text x="640" y="480" font-size="48" text-anchor="middle">⚡</text>
        <text x="640" y="530"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="28" font-weight="600" fill="#6366F1" text-anchor="middle">
            Faster
        </text>
        <text x="640" y="570"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="20" fill="#6B7280" text-anchor="middle">
            <tspan x="640" dy="0">更快迭代</tspan>
            <tspan x="640" dy="28">速度</tspan>
        </text>
    </g>

    <!-- Modular -->
    <g filter="url(#cardShadow)">
        <rect x="840" y="420" width="300" height="220" rx="12" fill="#FFFFFF" />
        <text x="990" y="480" font-size="48" text-anchor="middle">🔧</text>
        <text x="990" y="530"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="28" font-weight="600" fill="#6366F1" text-anchor="middle">
            Modular
        </text>
        <text x="990" y="570"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="20" fill="#6B7280" text-anchor="middle">
            <tspan x="990" dy="0">更好的</tspan>
            <tspan x="990" dy="28">可组合性</tspan>
        </text>
    </g>
</svg>