<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="cardShadow">
            <feGaussianBlur in="SourceAlpha" stdDeviation="6" />
            <feOffset dx="0" dy="4" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.08" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <linearGradient id="numberBg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- 背景 -->
    <rect width="1280" height="720" fill="#FAFAFA" />

    <!-- 页面标题 -->
    <text x="60" y="80"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="48" font-weight="bold" fill="#1F2937">
        🚀 Module 5: Highly Autonomous Agents
    </text>

    <!-- 副标题 -->
    <text x="60" y="140"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="36" font-weight="600" fill="#8B5CF6">
        Pattern 1: Planning
    </text>

    <!-- 用户问题气泡 -->
    <g filter="url(#cardShadow)">
        <rect x="140" y="180" width="600" height="80" rx="40" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2" />
        <text x="440" y="215"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="20" fill="#1F2937" text-anchor="middle">
            <tspan x="440" dy="0">Do you have any </tspan>
            <tspan font-weight="600" fill="#3B82F6">round sunglasses</tspan>
            <tspan> in stock</tspan>
        </text>
        <text x="440" y="245"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="20" fill="#1F2937" text-anchor="middle">
            <tspan x="440" dy="0">that are </tspan>
            <tspan font-weight="600" fill="#3B82F6">under $100</tspan>
            <tspan>?</tspan>
        </text>
    </g>

    <!-- Planning LLM 标题 -->
    <text x="800" y="220"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="24" font-weight="600" fill="#8B5CF6">
        Planning LLM 生成计划 →
    </text>

    <!-- 步骤 1 -->
    <g filter="url(#cardShadow)">
        <rect x="800" y="270" width="400" height="100" rx="12" fill="#FFFFFF" />
        <circle cx="840" cy="320" r="20" fill="url(#numberBg)" />
        <text x="840" y="327"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
            1
        </text>
        <text x="880" y="310"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="18" fill="#1F2937">
            <tspan x="880" dy="0" font-family="Monaco, Consolas, monospace" fill="#6366F1">get_item_description</tspan>
        </text>
        <text x="880" y="340"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="16" fill="#6B7280">
            查找圆形太阳镜
        </text>
    </g>

    <!-- 箭头 -->
    <text x="1000" y="390"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="24" fill="#8B5CF6">↓</text>

    <!-- 步骤 2 -->
    <g filter="url(#cardShadow)">
        <rect x="800" y="410" width="400" height="100" rx="12" fill="#FFFFFF" />
        <circle cx="840" cy="460" r="20" fill="url(#numberBg)" />
        <text x="840" y="467"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
            2
        </text>
        <text x="880" y="450"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="18" fill="#1F2937">
            <tspan x="880" dy="0" font-family="Monaco, Consolas, monospace" fill="#6366F1">check_inventory</tspan>
        </text>
        <text x="880" y="480"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="16" fill="#6B7280">
            检查库存
        </text>
    </g>

    <!-- 箭头 -->
    <text x="1000" y="530"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="24" fill="#8B5CF6">↓</text>

    <!-- 步骤 3 -->
    <g filter="url(#cardShadow)">
        <rect x="800" y="550" width="400" height="100" rx="12" fill="#FFFFFF" />
        <circle cx="840" cy="600" r="20" fill="url(#numberBg)" />
        <text x="840" y="607"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
            3
        </text>
        <text x="880" y="590"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="18" fill="#1F2937">
            <tspan x="880" dy="0" font-family="Monaco, Consolas, monospace" fill="#6366F1">get_item_price</tspan>
        </text>
        <text x="880" y="620"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="16" fill="#6B7280">
            筛选 &lt; $100 的商品
        </text>
    </g>

    <!-- 核心标注 -->
    <g filter="url(#cardShadow)">
        <rect x="140" y="320" width="560" height="280" rx="12" fill="#F3F4F6" />
        <text x="420" y="380"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="28" font-weight="600" fill="#8B5CF6" text-anchor="middle">
            Agent figures out the
        </text>
        <text x="420" y="420"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="36" font-weight="bold" fill="#8B5CF6" text-anchor="middle">
            plan
        </text>
        <text x="420" y="460"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="28" font-weight="600" fill="#8B5CF6" text-anchor="middle">
            itself
        </text>
        <text x="420" y="520"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="20" fill="#6B7280" text-anchor="middle">
            <tspan x="420" dy="0">Agent 自己确定如何</tspan>
            <tspan x="420" dy="28">分解任务并执行</tspan>
        </text>
    </g>
</svg>