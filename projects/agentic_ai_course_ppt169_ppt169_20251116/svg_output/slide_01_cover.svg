<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="20" result="coloredBlur" />
            <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- 背景 -->
    <rect width="1280" height="720" fill="url(#bgGradient)" />

    <!-- 装饰线条 -->
    <line x1="0" y1="180" x2="400" y2="180" stroke="#FFFFFF" stroke-width="2" opacity="0.3" />
    <line x1="880" y1="540" x2="1280" y2="540" stroke="#FFFFFF" stroke-width="2" opacity="0.3" />
    <circle cx="200" cy="180" r="8" fill="#FFFFFF" opacity="0.5" />
    <circle cx="1080" cy="540" r="8" fill="#FFFFFF" opacity="0.5" />

    <!-- 主标题 -->
    <text x="640" y="300"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="72" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
        Agentic AI Cliffnotes
    </text>

    <!-- 副标题 -->
    <text x="640" y="360"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="32" fill="#FFFFFF" text-anchor="middle" opacity="0.9">
        Andrew Ng 8 小时课程 30 分钟精华
    </text>

    <!-- 装饰图标 -->
    <g transform="translate(540, 420)">
        <circle cx="0" cy="0" r="40" fill="#FFFFFF" opacity="0.15" />
        <text x="0" y="15" font-size="40" text-anchor="middle">🤖</text>
    </g>
    <g transform="translate(640, 420)">
        <circle cx="0" cy="0" r="40" fill="#FFFFFF" opacity="0.15" />
        <text x="0" y="15" font-size="40" text-anchor="middle">🔄</text>
    </g>
    <g transform="translate(740, 420)">
        <circle cx="0" cy="0" r="40" fill="#FFFFFF" opacity="0.15" />
        <text x="0" y="15" font-size="40" text-anchor="middle">🚀</text>
    </g>

    <!-- 底部模块指示 -->
    <g transform="translate(640, 600)">
        <circle cx="-80" cy="0" r="6" fill="#FFFFFF" opacity="0.6" />
        <circle cx="-40" cy="0" r="6" fill="#FFFFFF" opacity="0.6" />
        <circle cx="0" cy="0" r="6" fill="#FFFFFF" opacity="0.6" />
        <circle cx="40" cy="0" r="6" fill="#FFFFFF" opacity="0.6" />
        <circle cx="80" cy="0" r="6" fill="#FFFFFF" opacity="0.6" />
    </g>

    <text x="640" y="650"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="18" fill="#FFFFFF" text-anchor="middle" opacity="0.7">
        5 个核心模块 · 完整 AI Agent 工作流解析
    </text>
</svg>