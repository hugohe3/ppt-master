<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="cardShadow">
            <feGaussianBlur in="SourceAlpha" stdDeviation="6" />
            <feOffset dx="0" dy="4" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.08" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <linearGradient id="agentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- 背景 -->
    <rect width="1280" height="720" fill="#FAFAFA" />

    <!-- 页面标题 -->
    <text x="60" y="80"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="48" font-weight="bold" fill="#1F2937">
        🔄 Modules 2&amp;3: Agentic Design Patterns
    </text>

    <!-- 副标题 -->
    <text x="60" y="140"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="36" font-weight="600" fill="#3B82F6">
        Pattern 2: Tool Use
    </text>

    <!-- 中心 Agent -->
    <g filter="url(#cardShadow)">
        <circle cx="640" cy="320" r="80" fill="url(#agentGradient)" />
        <text x="640" y="335"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="32" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
            Agent
        </text>
    </g>

    <!-- 工具卡片 - make_appointment -->
    <g filter="url(#cardShadow)">
        <rect x="340" y="180" width="200" height="70" rx="10" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2"
            stroke-dasharray="8,4" />
        <text x="440" y="222" font-family="Monaco, Consolas, 'Courier New', monospace" font-size="16" fill="#3B82F6"
            text-anchor="middle">
            make_appointment
        </text>
        <!-- 箭头指向 Agent -->
        <line x1="490" y1="250" x2="580" y2="280" stroke="#3B82F6" stroke-width="2" opacity="0.5" />
    </g>

    <!-- 工具卡片 - check_calendar -->
    <g filter="url(#cardShadow)">
        <rect x="740" y="180" width="200" height="70" rx="10" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2"
            stroke-dasharray="8,4" />
        <text x="840" y="222" font-family="Monaco, Consolas, 'Courier New', monospace" font-size="16" fill="#3B82F6"
            text-anchor="middle">
            check_calendar
        </text>
        <!-- 箭头指向 Agent -->
        <line x1="790" y1="250" x2="700" y2="280" stroke="#3B82F6" stroke-width="2" opacity="0.5" />
    </g>

    <!-- 工具卡片 - delete_appointment -->
    <g filter="url(#cardShadow)">
        <rect x="540" y="430" width="200" height="70" rx="10" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2"
            stroke-dasharray="8,4" />
        <text x="640" y="472" font-family="Monaco, Consolas, 'Courier New', monospace" font-size="16" fill="#3B82F6"
            text-anchor="middle">
            delete_appointment
        </text>
        <!-- 箭头指向 Agent -->
        <line x1="640" y1="430" x2="640" y2="400" stroke="#3B82F6" stroke-width="2" opacity="0.5" />
    </g>

    <!-- 说明框 -->
    <g filter="url(#cardShadow)">
        <rect x="100" y="550" width="1080" height="130" rx="12" fill="#FFFFFF" />
        <rect x="100" y="550" width="6" height="130" rx="3" fill="#3B82F6" />

        <text x="140" y="590"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="24" fill="#1F2937">
            <tspan x="140" dy="0">You must </tspan>
            <tspan fill="#3B82F6" font-weight="600">define the tools</tspan>
            <tspan> and inform the agent within its </tspan>
            <tspan fill="#3B82F6" font-weight="600">system prompt</tspan>
        </text>

        <text x="140" y="640"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="20" fill="#6B7280">
            <tspan x="140" dy="0">实现方式：Functions（代码函数）或 </tspan>
            <tspan fill="#3B82F6" font-weight="600">MCP (Model Context Protocol)</tspan>
        </text>
    </g>
</svg>