<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="numberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
        </linearGradient>
        <filter id="cardShadow">
            <feGaussianBlur in="SourceAlpha" stdDeviation="6" />
            <feOffset dx="0" dy="4" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.08" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- 背景 -->
    <rect width="1280" height="720" fill="#FAFAFA" />

    <!-- 页面标题 -->
    <text x="60" y="90"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="48" font-weight="bold" fill="#1F2937">
        📚 课程结构总览
    </text>

    <!-- Module 1 -->
    <g filter="url(#cardShadow)">
        <rect x="60" y="150" width="1160" height="100" rx="12" fill="#FFFFFF" />
        <circle cx="110" cy="200" r="24" fill="url(#numberGradient)" />
        <text x="110" y="208"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
            1
        </text>
        <text x="160" y="195"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="24" font-weight="600" fill="#1F2937">
            Module 1
        </text>
        <text x="160" y="225"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="20" fill="#6B7280">
            Introduction to Agentic Workflows
        </text>
    </g>

    <!-- Module 2 -->
    <g filter="url(#cardShadow)">
        <rect x="60" y="280" width="1160" height="100" rx="12" fill="#FFFFFF" />
        <circle cx="110" cy="330" r="24" fill="url(#numberGradient)" />
        <text x="110" y="338"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
            2
        </text>
        <text x="160" y="325"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="24" font-weight="600" fill="#1F2937">
            Module 2
        </text>
        <text x="160" y="355"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="20" fill="#6B7280">
            Reflection Pattern 深入
        </text>
    </g>

    <!-- Module 3 -->
    <g filter="url(#cardShadow)">
        <rect x="60" y="410" width="1160" height="100" rx="12" fill="#FFFFFF" />
        <circle cx="110" cy="460" r="24" fill="url(#numberGradient)" />
        <text x="110" y="468"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
            3
        </text>
        <text x="160" y="455"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="24" font-weight="600" fill="#1F2937">
            Module 3
        </text>
        <text x="160" y="485"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="20" fill="#6B7280">
            Tool Use Pattern 深入
        </text>
    </g>

    <!-- Module 4 - 重点标记 -->
    <g filter="url(#cardShadow)">
        <rect x="60" y="540" width="560" height="100" rx="12" fill="#FFFFFF" stroke="#F59E0B" stroke-width="3" />
        <circle cx="110" cy="590" r="24" fill="url(#numberGradient)" />
        <text x="110" y="598"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
            4
        </text>
        <text x="160" y="585"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="24" font-weight="600" fill="#1F2937">
            Module 4 ⭐
        </text>
        <text x="160" y="615"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="20" fill="#F59E0B" font-weight="600">
            Practical Tips &amp; Evaluations (最重要)
        </text>
    </g>

    <!-- Module 5 -->
    <g filter="url(#cardShadow)">
        <rect x="660" y="540" width="560" height="100" rx="12" fill="#FFFFFF" />
        <circle cx="710" cy="590" r="24" fill="url(#numberGradient)" />
        <text x="710" y="598"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
            5
        </text>
        <text x="760" y="585"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="24" font-weight="600" fill="#1F2937">
            Module 5
        </text>
        <text x="760" y="615"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="20" fill="#6B7280">
            Highly Autonomous Agents
        </text>
    </g>
</svg>