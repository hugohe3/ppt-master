<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#F8F9FA"/>
  
  <!-- 标题区 -->
  <text x="640" y="65" font-size="38" font-weight="700" text-anchor="middle" fill="#2D2D2D" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
    🛠️ 方法 1：扩展现有官方 Skills
  </text>
  
  <rect x="380" y="80" width="520" height="36" fill="#E8F5E9" rx="8"/>
  <text x="640" y="103" font-size="18" font-weight="600" text-anchor="middle" fill="#2E7D32" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
    最简单的入门方式 · 快速定制品牌化工作流
  </text>
  
  <!-- 示例场景 -->
  <rect x="100" y="140" width="1080" height="80" fill="#FFF5F0" rx="12"/>
  <text x="140" y="170" font-size="22" font-weight="600" fill="#D97757" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
    示例场景：创建品牌化 PPT Skills
  </text>
  <text x="140" y="200" font-size="17" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
    基于官方 PowerPoint Skill，扩展出符合公司品牌规范的定制版本
  </text>
  
  <!-- 四步流程 -->
  <g transform="translate(0, 240)">
    <!-- 步骤 1 -->
    <rect x="100" y="0" width="520" height="180" fill="#FFFFFF" rx="16"/>
    <circle cx="140" cy="35" r="24" fill="#D97757"/>
    <text x="140" y="45" font-size="22" font-weight="700" text-anchor="middle" fill="#FFFFFF" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">1</text>
    <text x="180" y="45" font-size="22" font-weight="700" fill="#2D2D2D" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      上传品牌模板
    </text>
    <text x="120" y="80" font-size="17" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      <tspan x="120" dy="0">将公司的品牌化演示模板上传</tspan>
      <tspan x="120" dy="26">给 Claude，包含：</tspan>
      <tspan x="120" dy="26">• 品牌配色方案</tspan>
      <tspan x="120" dy="26">• 字体规范</tspan>
      <tspan x="120" dy="26">• 布局标准</tspan>
    </text>
    
    <!-- 步骤 2 -->
    <rect x="660" y="0" width="520" height="180" fill="#FFFFFF" rx="16"/>
    <circle cx="700" cy="35" r="24" fill="#D97757"/>
    <text x="700" y="45" font-size="22" font-weight="700" text-anchor="middle" fill="#FFFFFF" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">2</text>
    <text x="740" y="45" font-size="22" font-weight="700" fill="#2D2D2D" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      让 Claude 分析扩展
    </text>
    <text x="680" y="80" font-size="17" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      <tspan x="680" dy="0">提示 Claude：</tspan>
      <tspan x="680" dy="26">"读取官方 PowerPoint Skill，</tspan>
      <tspan x="680" dy="26">研究我的模板（提取颜色/字</tspan>
      <tspan x="680" dy="26">体），创建一个扩展 Skill"</tspan>
    </text>
  </g>
  
  <g transform="translate(0, 440)">
    <!-- 步骤 3 -->
    <rect x="100" y="0" width="520" height="180" fill="#FFFFFF" rx="16"/>
    <circle cx="140" cy="35" r="24" fill="#D97757"/>
    <text x="140" y="45" font-size="22" font-weight="700" text-anchor="middle" fill="#FFFFFF" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">3</text>
    <text x="180" y="45" font-size="22" font-weight="700" fill="#2D2D2D" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      上传生成的 Skill
    </text>
    <text x="120" y="80" font-size="17" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      <tspan x="120" dy="0">Claude 会生成一个 zip 文件</tspan>
      <tspan x="120" dy="26">在 Settings > Capabilities 中</tspan>
      <tspan x="120" dy="26">上传这个自定义 Skill 文件</tspan>
    </text>
    
    <!-- 步骤 4 -->
    <rect x="660" y="0" width="520" height="180" fill="#E8F5E9" rx="16"/>
    <text x="680" y="35" font-size="28" fill="#4CAF50">✅</text>
    <text x="730" y="45" font-size="22" font-weight="700" fill="#2E7D32" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      自动触发使用
    </text>
    <text x="680" y="80" font-size="17" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      <tspan x="680" dy="0">当你说"创建一个公司品牌的</tspan>
      <tspan x="680" dy="26">演示文稿"时，Claude 会自动</tspan>
      <tspan x="680" dy="26">使用你的品牌化 Skill，生成</tspan>
      <tspan x="680" dy="26">符合规范的演示文稿</tspan>
    </text>
  </g>
</svg>

