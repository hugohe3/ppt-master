<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#F8F9FA"/>
  
  <!-- 标题区 -->
  <text x="640" y="70" font-size="40" font-weight="700" text-anchor="middle" fill="#2D2D2D" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
    🔑 Claude 生态系统：四大构建模块
  </text>
  
  <!-- 副标题 -->
  <text x="640" y="110" font-size="20" font-weight="400" text-anchor="middle" fill="#757575" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
    Skills、MCP、Projects 不是竞争关系，而是协同工作的构建模块
  </text>
  
  <!-- 四象限布局 -->
  <g transform="translate(0, 130)">
    <!-- 左上：Claude -->
    <rect x="100" y="0" width="490" height="210" fill="#FFFFFF" rx="16"/>
    <rect x="100" y="0" width="490" height="8" fill="#2196F3" rx="4"/>
    
    <text x="140" y="50" font-size="52" fill="#2196F3">🧠</text>
    <text x="220" y="63" font-size="30" font-weight="700" fill="#2D2D2D" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      Claude
    </text>
    <text x="140" y="100" font-size="19" font-weight="600" fill="#2196F3" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      核心大脑 · Core Intelligence
    </text>
    <text x="140" y="135" font-size="17" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      <tspan x="140" dy="0">AI 引擎本身，负责理解需求、</tspan>
      <tspan x="140" dy="26">做出决策、生成内容。是整个</tspan>
      <tspan x="140" dy="26">生态系统的智能核心。</tspan>
    </text>
    
    <!-- 右上：Skills -->
    <rect x="690" y="0" width="490" height="210" fill="#FFFFFF" rx="16"/>
    <rect x="690" y="0" width="490" height="8" fill="#D97757" rx="4"/>
    
    <text x="730" y="50" font-size="52" fill="#D97757">📋</text>
    <text x="810" y="63" font-size="30" font-weight="700" fill="#2D2D2D" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      Skills
    </text>
    <text x="730" y="100" font-size="19" font-weight="600" fill="#D97757" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      指令菜单 · Instruction Menu
    </text>
    <text x="730" y="135" font-size="17" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      <tspan x="730" dy="0">定义「如何」完成特定任务的</tspan>
      <tspan x="730" dy="26">标准流程、工具选择、质量标</tspan>
      <tspan x="730" dy="26">准。可复用的工作流指令。</tspan>
    </text>
    
    <!-- 左下：MCP -->
    <rect x="100" y="240" width="490" height="210" fill="#FFFFFF" rx="16"/>
    <rect x="100" y="240" width="490" height="8" fill="#9C27B0" rx="4"/>
    
    <text x="140" y="290" font-size="52" fill="#9C27B0">🔧</text>
    <text x="220" y="303" font-size="30" font-weight="700" fill="#2D2D2D" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      MCP
    </text>
    <text x="140" y="340" font-size="19" font-weight="600" fill="#9C27B0" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      工具平台 · Multi-Component Platform
    </text>
    <text x="140" y="375" font-size="17" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      <tspan x="140" dy="0">提供超出 Claude 知识范围的外</tspan>
      <tspan x="140" dy="26">部能力，如调用数据库、创建</tspan>
      <tspan x="140" dy="26">文件、访问 API 等实际操作。</tspan>
    </text>
    
    <!-- 右下：Projects -->
    <rect x="690" y="240" width="490" height="210" fill="#FFFFFF" rx="16"/>
    <rect x="690" y="240" width="490" height="8" fill="#4CAF50" rx="4"/>
    
    <text x="730" y="290" font-size="52" fill="#4CAF50">📁</text>
    <text x="810" y="303" font-size="30" font-weight="700" fill="#2D2D2D" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      Projects
    </text>
    <text x="730" y="340" font-size="19" font-weight="600" fill="#4CAF50" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      专属工作区 · Dedicated Workspace
    </text>
    <text x="730" y="375" font-size="17" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      <tspan x="730" dy="0">将 Skills、MCP 工具、背景知</tspan>
      <tspan x="730" dy="26">识组合在一起的持久化工作空</tspan>
      <tspan x="730" dy="26">间，用于特定的持续性任务。</tspan>
    </text>
  </g>
  
  <!-- 底部连接说明 -->
  <rect x="200" y="600" width="880" height="80" fill="#FFF5F0" rx="12"/>
  <text x="640" y="635" font-size="19" font-weight="600" text-anchor="middle" fill="#D97757" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
    协同工作原理
  </text>
  <text x="640" y="665" font-size="17" font-weight="400" text-anchor="middle" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
    Claude（大脑）+ Skills（指令）+ MCP（工具）→ 在 Projects（工作区）中协同完成任务
  </text>
</svg>

