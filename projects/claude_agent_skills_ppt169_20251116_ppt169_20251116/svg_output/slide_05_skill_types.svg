<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#F8F9FA"/>
  
  <!-- 标题区 -->
  <text x="640" y="70" font-size="40" font-weight="700" text-anchor="middle" fill="#2D2D2D" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
    ✨ 三种 Skills 类型
  </text>
  
  <!-- 类型 1：官方 Skills -->
  <g transform="translate(0, 130)">
    <rect x="100" y="0" width="1080" height="150" fill="#FFFFFF" rx="16"/>
    <rect x="100" y="0" width="8" height="150" fill="#2196F3" rx="4"/>
    
    <text x="140" y="40" font-size="40" fill="#2196F3">🏢</text>
    <text x="210" y="50" font-size="28" font-weight="700" fill="#2D2D2D" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      类型 1：官方 Skills (Official Skills)
    </text>
    
    <text x="140" y="90" font-size="18" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      <tspan x="140" dy="0">• 由 Anthropic 官方构建，质量有保证</tspan>
      <tspan x="640" dy="0">• 在 Settings > Capabilities 中启用</tspan>
    </text>
    <text x="140" y="120" font-size="18" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      <tspan x="140" dy="0">• 包含合作伙伴 Skills（如 Notion）</tspan>
      <tspan x="640" dy="0">⚠️ 只启用需要的，避免混淆 Claude</tspan>
    </text>
  </g>
  
  <!-- 类型 2：自定义 Skills -->
  <g transform="translate(0, 310)">
    <rect x="100" y="0" width="1080" height="150" fill="#FFFFFF" rx="16"/>
    <rect x="100" y="0" width="8" height="150" fill="#D97757" rx="4"/>
    
    <text x="140" y="40" font-size="40" fill="#D97757">⚙️</text>
    <text x="210" y="50" font-size="28" font-weight="700" fill="#2D2D2D" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      类型 2：自定义 Skills (Custom Skills)
    </text>
    
    <text x="140" y="90" font-size="18" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      <tspan x="140" dy="0">• 你自己创建的 Skills，完全按需定制</tspan>
      <tspan x="640" dy="0">• 上传 skill 文件或使用 Skill Creator</tspan>
    </text>
    <text x="140" y="120" font-size="18" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      <tspan x="140" dy="0">• 非技术用户可使用官方 Skill Creator 工具</tspan>
      <tspan x="640" dy="0">• 最灵活，可精准匹配工作流</tspan>
    </text>
  </g>
  
  <!-- 类型 3：社区 Skills -->
  <g transform="translate(0, 490)">
    <rect x="100" y="0" width="1080" height="150" fill="#FFFFFF" rx="16"/>
    <rect x="100" y="0" width="8" height="150" fill="#9C27B0" rx="4"/>
    
    <text x="140" y="40" font-size="40" fill="#9C27B0">👥</text>
    <text x="210" y="50" font-size="28" font-weight="700" fill="#2D2D2D" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      类型 3：社区创作者 Skills (Community Creator Skills)
    </text>
    
    <text x="140" y="90" font-size="18" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      <tspan x="140" dy="0">• 由其他用户创建并分享的 Skills</tspan>
      <tspan x="640" dy="0">• 可以快速获取他人的优秀工作流</tspan>
    </text>
    
    <!-- 警告框 -->
    <rect x="140" y="110" width="1000" height="32" fill="#FFF3E0" rx="8"/>
    <text x="160" y="132" font-size="17" font-weight="600" fill="#F57C00" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      ⚠️ 安全提醒：使用社区 Skills 时需要谨慎，注意审查代码和权限，避免安全风险
    </text>
  </g>
</svg>

