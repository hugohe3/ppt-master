<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#F8F9FA"/>
  
  <!-- 标题区 -->
  <text x="640" y="65" font-size="38" font-weight="700" text-anchor="middle" fill="#2D2D2D" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
    🛠️ 方法 2：将现有工作流打包为 Skill
  </text>
  
  <rect x="340" y="80" width="600" height="36" fill="#E3F2FD" rx="8"/>
  <text x="640" y="103" font-size="18" font-weight="600" text-anchor="middle" fill="#1565C0" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
    快速获胜策略 · 将已有的 Projects 指令移植为可复用 Skill
  </text>
  
  <!-- 示例场景 -->
  <rect x="100" y="140" width="1080" height="80" fill="#FFF5F0" rx="12"/>
  <text x="140" y="170" font-size="22" font-weight="600" fill="#D97757" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
    示例场景：Notion 项目仪表盘 Skill
  </text>
  <text x="140" y="200" font-size="17" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
    将已有的团队报告项目（从 Notion 数据库拉取数据）打包为通用 Skill
  </text>
  
  <!-- 三步流程 -->
  <g transform="translate(0, 240)">
    <!-- 步骤 1 -->
    <rect x="100" y="0" width="340" height="200" fill="#FFFFFF" rx="16"/>
    <circle cx="140" cy="35" r="24" fill="#2196F3"/>
    <text x="140" y="45" font-size="22" font-weight="700" text-anchor="middle" fill="#FFFFFF" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">1</text>
    <text x="180" y="45" font-size="22" font-weight="700" fill="#2D2D2D" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      选择现有项目
    </text>
    <text x="120" y="80" font-size="17" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      <tspan x="120" dy="0">找到一个有详细自</tspan>
      <tspan x="120" dy="26">定义指令的现有</tspan>
      <tspan x="120" dy="26">Project</tspan>
      <tspan x="120" dy="32">例如：团队报告项</tspan>
      <tspan x="120" dy="26">目（从 Notion 拉</tspan>
      <tspan x="120" dy="26">取数据生成报告）</tspan>
    </text>
    
    <!-- 步骤 2 -->
    <rect x="470" y="0" width="340" height="200" fill="#FFFFFF" rx="16"/>
    <circle cx="510" cy="35" r="24" fill="#2196F3"/>
    <text x="510" y="45" font-size="22" font-weight="700" text-anchor="middle" fill="#FFFFFF" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">2</text>
    <text x="550" y="45" font-size="22" font-weight="700" fill="#2D2D2D" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      启用 MCP 工具
    </text>
    <text x="490" y="80" font-size="17" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      <tspan x="490" dy="0">打开所需的 MCP</tspan>
      <tspan x="490" dy="26">工具（如 Notion</tspan>
      <tspan x="490" dy="26">MCP）</tspan>
      <tspan x="490" dy="32">将项目的全部自</tspan>
      <tspan x="490" dy="26">定义指令和工作</tspan>
      <tspan x="490" dy="26">流细节准备好</tspan>
    </text>
    
    <!-- 步骤 3 -->
    <rect x="840" y="0" width="340" height="200" fill="#FFFFFF" rx="16"/>
    <circle cx="880" cy="35" r="24" fill="#2196F3"/>
    <text x="880" y="45" font-size="22" font-weight="700" text-anchor="middle" fill="#FFFFFF" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">3</text>
    <text x="920" y="45" font-size="22" font-weight="700" fill="#2D2D2D" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      打包为 Skill
    </text>
    <text x="860" y="80" font-size="17" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      <tspan x="860" dy="0">将完整指令粘贴</tspan>
      <tspan x="860" dy="26">给 Claude，要求</tspan>
      <tspan x="860" dy="26">打包为新 Skill</tspan>
      <tspan x="860" dy="32">例如："Notion</tspan>
      <tspan x="860" dy="26">Project Dashboard"</tspan>
      <tspan x="860" dy="26">Skill</tspan>
    </text>
  </g>
  
  <!-- 结果展示 -->
  <rect x="100" y="470" width="1080" height="180" fill="#E8F5E9" rx="16"/>
  <text x="140" y="510" font-size="32" fill="#4CAF50">✅</text>
  <text x="200" y="520" font-size="28" font-weight="700" fill="#2E7D32" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
    实现效果
  </text>
  
  <text x="140" y="560" font-size="19" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
    <tspan x="140" dy="0">现在你可以在任何新对话中生成该仪表盘，工作流不再锁定在原项目中。</tspan>
  </text>
  <text x="140" y="595" font-size="19" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
    <tspan x="140" dy="0">无需重复配置，只需简单一句话："生成本周团队报告"，Claude 就会自动调用</tspan>
    <tspan x="140" dy="26">Notion MCP 获取数据，按照你的标准格式生成完整报告。</tspan>
  </text>
</svg>

