<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#F8F9FA"/>
  
  <!-- 渐变装饰 -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D97757;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#2196F3;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- 标题区 -->
  <text x="640" y="70" font-size="40" font-weight="700" text-anchor="middle" fill="#2D2D2D" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
    💡 总结与下一步行动
  </text>
  
  <!-- 核心要点 -->
  <g transform="translate(0, 120)">
    <rect x="100" y="0" width="1080" height="200" fill="#FFFFFF" rx="16"/>
    <rect x="100" y="0" width="1080" height="8" fill="#D97757" rx="4"/>
    
    <text x="140" y="45" font-size="28" font-weight="700" fill="#2D2D2D" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      🎯 核心要点回顾
    </text>
    
    <g transform="translate(140, 75)">
      <!-- 左列 -->
      <text x="0" y="0" font-size="18" font-weight="600" fill="#D97757" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
        Skills 本质
      </text>
      <text x="0" y="28" font-size="17" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
        可复用的指令菜单，账户级可用
      </text>
      
      <text x="0" y="65" font-size="18" font-weight="600" fill="#D97757" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
        三种类型
      </text>
      <text x="0" y="93" font-size="17" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
        官方 · 自定义 · 社区
      </text>
      
      <!-- 右列 -->
      <text x="540" y="0" font-size="18" font-weight="600" fill="#D97757" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
        三种创建方法
      </text>
      <text x="540" y="28" font-size="17" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
        扩展官方 · 打包现有 · 从零构建
      </text>
      
      <text x="540" y="65" font-size="18" font-weight="600" fill="#D97757" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
        协同工作
      </text>
      <text x="540" y="93" font-size="17" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
        与 Claude、MCP、Projects 协同
      </text>
    </g>
  </g>
  
  <!-- 立即行动 -->
  <g transform="translate(0, 340)">
    <rect x="100" y="0" width="1080" height="260" fill="url(#grad)" rx="16"/>
    
    <text x="140" y="45" font-size="28" font-weight="700" fill="#2D2D2D" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
      🚀 立即行动建议
    </text>
    
    <!-- 步骤卡片 -->
    <g transform="translate(140, 70)">
      <!-- 步骤 1 -->
      <rect x="0" y="0" width="310" height="160" fill="#FFFFFF" rx="12"/>
      <circle cx="30" cy="30" r="20" fill="#D97757"/>
      <text x="30" y="38" font-size="18" font-weight="700" text-anchor="middle" fill="#FFFFFF" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">1</text>
      <text x="60" y="37" font-size="20" font-weight="700" fill="#2D2D2D" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
        识别重复工作流
      </text>
      <text x="20" y="70" font-size="16" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
        <tspan x="20" dy="0">回顾最近的工作，找</tspan>
        <tspan x="20" dy="24">出重复 3+ 次的指令</tspan>
        <tspan x="20" dy="24">或流程。</tspan>
      </text>
      
      <!-- 步骤 2 -->
      <rect x="340" y="0" width="310" height="160" fill="#FFFFFF" rx="12"/>
      <circle cx="370" cy="30" r="20" fill="#2196F3"/>
      <text x="370" y="38" font-size="18" font-weight="700" text-anchor="middle" fill="#FFFFFF" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">2</text>
      <text x="400" y="37" font-size="20" font-weight="700" fill="#2D2D2D" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
        从方法 1 开始
      </text>
      <text x="360" y="70" font-size="16" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
        <tspan x="360" dy="0">选择一个官方 Skill</tspan>
        <tspan x="360" dy="24">扩展它，体验 Skills</tspan>
        <tspan x="360" dy="24">的便利性。</tspan>
      </text>
      
      <!-- 步骤 3 -->
      <rect x="680" y="0" width="310" height="160" fill="#FFFFFF" rx="12"/>
      <circle cx="710" cy="30" r="20" fill="#4CAF50"/>
      <text x="710" y="38" font-size="18" font-weight="700" text-anchor="middle" fill="#FFFFFF" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">3</text>
      <text x="740" y="37" font-size="20" font-weight="700" fill="#2D2D2D" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
        构建 Skills 库
      </text>
      <text x="700" y="70" font-size="16" font-weight="400" fill="#4A4A4A" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
        <tspan x="700" dy="0">逐步积累个人 Skills</tspan>
        <tspan x="700" dy="24">库，打造高效的 AI</tspan>
        <tspan x="700" dy="24">工作流生态系统。</tspan>
      </text>
    </g>
  </g>
  
  <!-- 底部标语 -->
  <text x="640" y="660" font-size="22" font-weight="600" text-anchor="middle" fill="#D97757" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
    开始构建你的 Claude Skills 库，让 AI 成为真正的工作伙伴！
  </text>
  
  <text x="640" y="695" font-size="16" font-weight="400" text-anchor="middle" fill="#9E9E9E" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif">
    更多资源：claude.ai/docs · 官方 Discord 社区
  </text>
</svg>

