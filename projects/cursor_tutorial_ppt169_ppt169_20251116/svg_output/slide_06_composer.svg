<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280px" height="720px">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- 标题 -->
  <text x="640" y="70" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="#1A237E" text-anchor="middle">
    Composer - Multi-File AI Agent
  </text>
  
  <!-- 核心价值横幅 -->
  <rect x="60" y="95" width="1160" height="60" fill="#6366F1" rx="8"/>
  <text x="640" y="133" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="19" font-weight="400" fill="#FFFFFF" text-anchor="middle">
    ⚡ 一次性编辑多个文件  •  🧠 理解项目结构  •  🚀 实现复杂功能
  </text>
  
  <!-- 使用场景流程图标题 -->
  <text x="60" y="195" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="600" fill="#0066FF">
    工作流程示例
  </text>
  
  <!-- 流程图：输入需求 -->
  <rect x="60" y="220" width="300" height="95" fill="#0066FF" rx="12"/>
  <text x="210" y="252" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="600" fill="#FFFFFF" text-anchor="middle">
    📝 输入需求
  </text>
  <text x="210" y="280" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="400" fill="#FFFFFF" text-anchor="middle">
    <tspan x="210" dy="0">「添加用户登录功能」</tspan>
  </text>
  
  <!-- 箭头1 -->
  <path d="M 370 267 L 440 267" stroke="#0066FF" stroke-width="3" fill="none" marker-end="url(#arrow1)"/>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#0066FF"/>
    </marker>
  </defs>
  
  <!-- 流程图：AI分析 -->
  <rect x="450" y="220" width="300" height="95" fill="#10B981" rx="12"/>
  <text x="600" y="252" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="600" fill="#FFFFFF" text-anchor="middle">
    🤖 AI 分析
  </text>
  <text x="600" y="280" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="400" fill="#FFFFFF" text-anchor="middle">
    <tspan x="600" dy="0">识别需要修改的文件</tspan>
  </text>
  
  <!-- 箭头2 -->
  <path d="M 760 267 L 830 267" stroke="#10B981" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#10B981"/>
    </marker>
  </defs>
  
  <!-- 流程图：批量生成 -->
  <rect x="840" y="220" width="300" height="95" fill="#6366F1" rx="12"/>
  <text x="990" y="252" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="600" fill="#FFFFFF" text-anchor="middle">
    ✅ 批量生成
  </text>
  <text x="990" y="280" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="400" fill="#FFFFFF" text-anchor="middle">
    <tspan x="990" dy="0">同时修改多个文件</tspan>
  </text>
  
  <!-- 文件列表区域 -->
