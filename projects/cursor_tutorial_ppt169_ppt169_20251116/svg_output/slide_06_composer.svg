  <!-- 文件1 -->
  <rect x="90" y="402" width="250" height="58" fill="#10B981" rx="6"/>
  <text x="215" y="425" font-family="'Monaco', 'Courier New', monospace" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">
    📄 auth.ts
  </text>
  <text x="215" y="447" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="#FFFFFF" text-anchor="middle">
    新建
  </text>
  
  <!-- 文件2 -->
  <rect x="365" y="402" width="250" height="58" fill="#10B981" rx="6"/>
  <text x="490" y="425" font-family="'Monaco', 'Courier New', monospace" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">
    📄 login.tsx
  </text>
  <text x="490" y="447" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="#FFFFFF" text-anchor="middle">
    新建
  </text>
  
  <!-- 文件3 -->
  <rect x="640" y="402" width="250" height="58" fill="#F59E0B" rx="6"/>
  <text x="765" y="425" font-family="'Monaco', 'Courier New', monospace" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">
    📝 api.ts
  </text>
  <text x="765" y="447" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="#FFFFFF" text-anchor="middle">
    修改
  </text>
  
  <!-- 文件4 -->
  <rect x="915" y="402" width="250" height="58" fill="#F59E0B" rx="6"/>
  <text x="1040" y="425" font-family="'Monaco', 'Courier New', monospace" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">
    📝 routes.ts
  </text>
  <text x="1040" y="447" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="#FFFFFF" text-anchor="middle">
    修改
  </text>
  
  <!-- 底部KPI卡片 -->
  <text x="60" y="565" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#1A237E">
    关键数据
  </text>
  
  <!-- KPI 1 -->
  <rect x="300" y="570" width="220" height="75" fill="#0066FF" rx="8"/>
  <text x="410" y="603" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#FFFFFF" text-anchor="middle">
    70%
  </text>
  <text x="410" y="628" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="400" fill="#FFFFFF" text-anchor="middle">
    节省时间
  </text>
  
  <!-- KPI 2 -->
  <rect x="550" y="570" width="220" height="75" fill="#10B981" rx="8"/>
  <text x="660" y="603" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#FFFFFF" text-anchor="middle">
    20+
  </text>
  <text x="660" y="628" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="400" fill="#FFFFFF" text-anchor="middle">
    文件处理
  </text>
  
  <!-- KPI 3 -->
  <rect x="800" y="570" width="220" height="75" fill="#6366F1" rx="8"/>
  <text x="910" y="603" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#FFFFFF" text-anchor="middle">
    90%+
  </text>
  <text x="910" y="628" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="400" fill="#FFFFFF" text-anchor="middle">
