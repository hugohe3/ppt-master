<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280px" height="720px">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- 标题 -->
  <text x="640" y="75" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="700" fill="#1A237E" text-anchor="middle">
    4 Core Features
  </text>
  
  <!-- 卡片1：AI Chat（左上） -->
  <rect x="60" y="120" width="560" height="265" fill="#0066FF" rx="12"/>
  
  <!-- 图标背景圆 -->
  <circle cx="110" cy="175" r="26" fill="#FFFFFF" opacity="0.2"/>
  
  <!-- 图标 -->
  <text x="110" y="188" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="32" fill="#FFFFFF" text-anchor="middle">
    💬
  </text>
  
  <!-- 功能名称 -->
  <text x="155" y="187" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">
    AI Chat
  </text>
  
  <!-- 描述 -->
  <text x="85" y="235" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#FFFFFF" opacity="0.95">
    <tspan x="85" dy="0">随时对话，解答问题</tspan>
    <tspan x="85" dy="28">获取代码建议和技术指导</tspan>
  </text>
  
  <!-- 快捷键标签 -->
  <rect x="85" y="315" width="160" height="34" fill="#FFFFFF" opacity="0.2" rx="6"/>
  <text x="165" y="338" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF" text-anchor="middle">
    Cmd/Ctrl + L
  </text>
  
  <!-- 卡片2：AI Edit（右上） -->
  <rect x="660" y="120" width="560" height="265" fill="#10B981" rx="12"/>
  
  <!-- 图标背景圆 -->
  <circle cx="710" cy="175" r="26" fill="#FFFFFF" opacity="0.2"/>
  
  <!-- 图标 -->
  <text x="710" y="188" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="32" fill="#FFFFFF" text-anchor="middle">
    ✏️
  </text>
  
  <!-- 功能名称 -->
  <text x="755" y="187" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">
    AI Edit
  </text>
  
  <!-- 描述 -->
  <text x="685" y="235" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#FFFFFF" opacity="0.95">
    <tspan x="685" dy="0">选中代码，智能修改</tspan>
    <tspan x="685" dy="28">重构、优化、添加功能</tspan>
  </text>
  
  <!-- 快捷键标签 -->
  <rect x="685" y="315" width="160" height="34" fill="#FFFFFF" opacity="0.2" rx="6"/>
  <text x="765" y="338" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF" text-anchor="middle">
    Cmd/Ctrl + K
  </text>
  
  <!-- 卡片3：AI Composer（左下） -->
  <rect x="60" y="415" width="560" height="265" fill="#6366F1" rx="12"/>
  
  <!-- 图标背景圆 -->
  <circle cx="110" cy="470" r="26" fill="#FFFFFF" opacity="0.2"/>
  
  <!-- 图标 -->
  <text x="110" y="483" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="32" fill="#FFFFFF" text-anchor="middle">
    🎼
  </text>
  
  <!-- 功能名称 -->
  <text x="155" y="482" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">
    AI Composer
  </text>
  
  <!-- 描述 -->
  <text x="85" y="530" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#FFFFFF" opacity="0.95">
    <tspan x="85" dy="0">多文件协同编辑</tspan>
    <tspan x="85" dy="28">一次性实现复杂功能</tspan>
  </text>
  
  <!-- 快捷键标签 -->
  <rect x="85" y="610" width="160" height="34" fill="#FFFFFF" opacity="0.2" rx="6"/>
  <text x="165" y="633" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF" text-anchor="middle">
    Cmd/Ctrl + I
  </text>
  
  <!-- 卡片4：Codebase Context（右下） -->
  <rect x="660" y="415" width="560" height="265" fill="#F59E0B" rx="12"/>
  
  <!-- 图标背景圆 -->
  <circle cx="710" cy="470" r="26" fill="#FFFFFF" opacity="0.2"/>
  
  <!-- 图标 -->
  <text x="710" y="483" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="32" fill="#FFFFFF" text-anchor="middle">
    🗂️
  </text>
  
  <!-- 功能名称 -->
  <text x="755" y="482" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">
    Codebase Context
  </text>
  
  <!-- 描述 -->
  <text x="685" y="530" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#FFFFFF" opacity="0.95">
    <tspan x="685" dy="0">理解整个项目上下文</tspan>
    <tspan x="685" dy="28">智能分析代码结构</tspan>
  </text>
  
  <!-- 符号标签 -->
  <rect x="685" y="610" width="140" height="34" fill="#FFFFFF" opacity="0.2" rx="6"/>
  <text x="755" y="633" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF" text-anchor="middle">
    @Codebase
  </text>
</svg>
