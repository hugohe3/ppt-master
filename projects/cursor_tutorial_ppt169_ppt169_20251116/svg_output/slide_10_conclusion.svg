<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280px" height="720px">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066FF;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  
  <!-- 主标题 -->
  <text x="640" y="100" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="700" fill="#1A237E" text-anchor="middle">
    Start Coding Smarter Today
  </text>
  
  <!-- 副标题 -->
  <text x="640" y="140" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#5F6368" text-anchor="middle">
    用 AI 重新定义你的编程方式
  </text>
  
  <!-- 核心建议标题 -->
  <text x="640" y="195" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="600" fill="#0066FF" text-anchor="middle">
    三个黄金原则
  </text>
  
  <!-- 原则1 -->
  <rect x="140" y="225" width="340" height="200" fill="#FFFFFF" rx="16" style="filter: drop-shadow(0px 4px 12px rgba(0,0,0,0.08))"/>
  
  <circle cx="310" cy="290" r="30" fill="#0066FF" opacity="0.15"/>
  <text x="310" y="303" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="40" fill="#0066FF" text-anchor="middle">
    🎯
  </text>
  
  <text x="310" y="355" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#1A237E" text-anchor="middle">
    明确表达
  </text>
  
  <text x="310" y="385" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#5F6368" text-anchor="middle">
    <tspan x="310" dy="0">清晰的指令</tspan>
    <tspan x="310" dy="24">= 准确的代码</tspan>
  </text>
  
  <!-- 原则2 -->
  <rect x="520" y="225" width="340" height="200" fill="#FFFFFF" rx="16" style="filter: drop-shadow(0px 4px 12px rgba(0,0,0,0.08))"/>
  
  <circle cx="690" cy="290" r="30" fill="#10B981" opacity="0.15"/>
  <text x="690" y="303" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="40" fill="#10B981" text-anchor="middle">
    🔄
  </text>
  
  <text x="690" y="355" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#1A237E" text-anchor="middle">
    迭代优化
  </text>
  
  <text x="690" y="385" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#5F6368" text-anchor="middle">
    <tspan x="690" dy="0">与 AI 对话</tspan>
    <tspan x="690" dy="24">逐步完善</tspan>
  </text>
  
  <!-- 原则3 -->
  <rect x="900" y="225" width="340" height="200" fill="#FFFFFF" rx="16" style="filter: drop-shadow(0px 4px 12px rgba(0,0,0,0.08))"/>
  
  <circle cx="1070" cy="290" r="30" fill="#6366F1" opacity="0.15"/>
  <text x="1070" y="303" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="40" fill="#6366F1" text-anchor="middle">
    🧠
  </text>
  
  <text x="1070" y="355" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#1A237E" text-anchor="middle">
    保持思考
  </text>
  
  <text x="1070" y="385" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#5F6368" text-anchor="middle">
    <tspan x="1070" dy="0">AI 是助手</tspan>
    <tspan x="1070" dy="24">不是替代</tspan>
  </text>
  
  <!-- 行动号召区域 -->
  <rect x="240" y="465" width="800" height="135" fill="#0066FF" rx="16"/>
  
  <text x="640" y="512" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="middle">
    🚀 立即试用
  </text>
  
  <text x="640" y="548" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="21" font-weight="400" fill="#FFFFFF" text-anchor="middle">
    14天免费试用
  </text>
  
  <text x="640" y="580" font-family="'Monaco', 'Courier New', monospace" font-size="20" font-weight="600" fill="#FFFFFF" text-anchor="middle">
    cursor.sh
  </text>
  
  <!-- 底部装饰 -->
  <circle cx="60" cy="680" r="5" fill="#0066FF" opacity="0.3"/>
  <circle cx="90" cy="680" r="5" fill="#10B981" opacity="0.3"/>
  <circle cx="120" cy="680" r="5" fill="#6366F1" opacity="0.3"/>
  
  <circle cx="1160" cy="680" r="5" fill="#6366F1" opacity="0.3"/>
  <circle cx="1190" cy="680" r="5" fill="#10B981" opacity="0.3"/>
  <circle cx="1220" cy="680" r="5" fill="#0066FF" opacity="0.3"/>
</svg>
