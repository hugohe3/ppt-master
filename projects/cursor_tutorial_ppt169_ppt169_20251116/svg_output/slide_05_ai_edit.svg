<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280px" height="720px">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- 标题 -->
  <text x="60" y="75" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="700" fill="#1A237E">
    AI Edit - Inline Code Transformation
  </text>
  
  <!-- 左栏背景 -->
  <rect x="60" y="115" width="450" height="555" fill="#F0F4FF" rx="8"/>
  
  <!-- 功能说明 -->
  <text x="90" y="155" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#5F6368">
    <tspan x="90" dy="0">选中代码后按 Cmd + K，</tspan>
    <tspan x="90" dy="24">用自然语言描述修改需求，</tspan>
    <tspan x="90" dy="24">AI 直接在原位置生成代码。</tspan>
  </text>
  
  <!-- 典型用例标题 -->
  <text x="90" y="255" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600" fill="#0066FF">
    典型用例
  </text>
  
  <!-- 用例列表 -->
  <g>
    <circle cx="105" cy="295" r="5" fill="#10B981"/>
    <text x="125" y="301" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#5F6368">
      🔄  重构代码结构
    </text>
    
    <circle cx="105" cy="335" r="5" fill="#10B981"/>
    <text x="125" y="341" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#5F6368">
      🌐  添加国际化支持
    </text>
    
    <circle cx="105" cy="375" r="5" fill="#10B981"/>
    <text x="125" y="381" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#5F6368">
      📝  生成详细注释
    </text>
    
    <circle cx="105" cy="415" r="5" fill="#10B981"/>
    <text x="125" y="421" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="400" fill="#5F6368">
      🧪  编写单元测试
    </text>
  </g>
  
  <!-- 快捷键提示 -->
  <rect x="90" y="480" width="180" height="60" fill="#0066FF" rx="8"/>
  <text x="180" y="508" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">
    <tspan x="180" dy="0">Cmd + K</tspan>
  </text>
  <text x="180" y="529" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="400" fill="#FFFFFF" text-anchor="middle" opacity="0.9">
    快捷键
  </text>
  
  <!-- 右栏：Before/After 对比 -->
  <text x="560" y="145" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" fill="#1A237E">
    实战示例：添加错误处理
  </text>
  
  <!-- Before 代码块 -->
  <rect x="560" y="170" width="660" height="160" fill="#E8EAED" rx="8"/>
  <text x="590" y="195" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="#5F6368">
    Before（原始代码）
  </text>
  <text x="590" y="225" font-family="'Monaco', 'Courier New', monospace" font-size="14" font-weight="400" fill="#1A237E">
    <tspan x="590" dy="0">function fetchUser(id) {</tspan>
    <tspan x="610" dy="20">  const data = await fetch(`/api/user/${id}`);</tspan>
    <tspan x="610" dy="20">  return data.json();</tspan>
    <tspan x="590" dy="20">}</tspan>
  </text>
  
  <!-- 箭头+指令 -->
  <g>
    <path d="M 890 345 L 890 375" stroke="#0066FF" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
        <polygon points="0 0, 10 5, 0 10" fill="#0066FF"/>
      </marker>
    </defs>
    <rect x="770" y="350" width="240" height="38" fill="#0066FF" rx="6"/>
    <text x="890" y="373" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">
      💬 "添加错误处理"
    </text>
  </g>
  
  <!-- After 代码块 -->
  <rect x="560" y="395" width="660" height="180" fill="#0066FF" fill-opacity="0.1" rx="8" stroke="#0066FF" stroke-width="2"/>
  <text x="590" y="420" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="#0066FF">
    After（AI 生成）
  </text>
  <text x="590" y="450" font-family="'Monaco', 'Courier New', monospace" font-size="14" font-weight="400" fill="#1A237E">
    <tspan x="590" dy="0">function fetchUser(id) {</tspan>
    <tspan x="610" dy="20">  try {</tspan>
    <tspan x="630" dy="20">    const response = await fetch(`/api/user/${id}`);</tspan>
    <tspan x="630" dy="20">    if (!response.ok) throw new Error('Failed');</tspan>
    <tspan x="630" dy="20">    return await response.json();</tspan>
    <tspan x="610" dy="20">  } catch (error) { console.error(error); }</tspan>
    <tspan x="590" dy="20">}</tspan>
  </text>
</svg>
