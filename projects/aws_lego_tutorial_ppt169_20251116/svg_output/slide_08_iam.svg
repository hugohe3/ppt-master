<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#27AE60" />
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#F8F9FA"/>
  
  <!-- 标题 -->
  <text x="60" y="90" 
        font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
        font-size="48" 
        font-weight="bold" 
        fill="#1A1A1A">
    权限控制：IAM 🔑
  </text>
  
  <!-- 问题说明 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="140" width="1160" height="100" rx="12" fill="#FFE5E5"/>
    
    <text x="90" y="180" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="24" 
          font-weight="600" 
          fill="#E74C3C">
      ❌ 问题：服务间默认无法通信
    </text>
    
    <text x="90" y="220" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="20" 
          fill="#666666">
      EC2 实例、S3 桶、RDS 数据库各自独立，没有互相访问的权限 → 无法协同工作
    </text>
  </g>
  
  <!-- 权限流程图 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="270" width="1160" height="390" rx="12" fill="#FFFFFF"/>
    
    <!-- 中央 IAM 图标 -->
    <g transform="translate(640, 400)">
      <circle cx="0" cy="0" r="70" fill="#FF9900"/>
      <text x="0" y="20" 
            font-size="60" 
            text-anchor="middle">
        🔑
      </text>
      
      <text x="0" y="100" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="32" 
            font-weight="bold" 
            text-anchor="middle" 
            fill="#FF9900">
        IAM
      </text>
      
      <text x="0" y="135" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="18" 
            text-anchor="middle" 
            fill="#666666">
        Identity and Access Management
      </text>
    </g>
    
    <!-- EC2 服务（左） -->
    <g transform="translate(180, 400)">
      <circle cx="0" cy="0" r="55" fill="#4A90E2" opacity="0.2"/>
      <circle cx="0" cy="0" r="45" fill="#4A90E2"/>
      <text x="0" y="15" 
            font-size="40" 
            text-anchor="middle">
        🖥️
      </text>
      
      <text x="0" y="85" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="20" 
            font-weight="600" 
            text-anchor="middle" 
            fill="#232F3E">
        EC2
      </text>
    </g>
    
    <!-- S3 服务（右上） -->
    <g transform="translate(1020, 330)">
      <circle cx="0" cy="0" r="55" fill="#27AE60" opacity="0.2"/>
      <circle cx="0" cy="0" r="45" fill="#27AE60"/>
      <text x="0" y="15" 
            font-size="40" 
            text-anchor="middle">
        📦
      </text>
      
      <text x="0" y="85" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="20" 
            font-weight="600" 
            text-anchor="middle" 
            fill="#232F3E">
        S3
      </text>
    </g>
    
    <!-- RDS 服务（右下） -->
    <g transform="translate(1020, 490)">
      <circle cx="0" cy="0" r="55" fill="#9B59B6" opacity="0.2"/>
      <circle cx="0" cy="0" r="45" fill="#9B59B6"/>
      <text x="0" y="15" 
            font-size="40" 
            text-anchor="middle">
        🗃️
      </text>
      
      <text x="0" y="85" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="20" 
            font-weight="600" 
            text-anchor="middle" 
            fill="#232F3E">
        RDS
      </text>
    </g>
    
    <!-- 连接线：IAM → EC2 -->
    <path d="M 570 400 L 235 400" stroke="#27AE60" stroke-width="3" fill="none" marker-end="url(#arrowGreen)"/>
    <text x="380" y="385" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="14" 
          fill="#27AE60">
      授予角色
    </text>
    
    <!-- 连接线：EC2 → S3 -->
    <path d="M 235 400 Q 500 300 965 330" stroke="#27AE60" stroke-width="3" fill="none" stroke-dasharray="8,4" marker-end="url(#arrowGreen)"/>
    <text x="580" y="320" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="14" 
          fill="#27AE60">
      读取图片 ✅
    </text>
    
    <!-- 连接线：EC2 → RDS -->
    <path d="M 235 400 Q 500 500 965 490" stroke="#27AE60" stroke-width="3" fill="none" stroke-dasharray="8,4" marker-end="url(#arrowGreen)"/>
    <text x="580" y="480" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="14" 
          fill="#27AE60">
      连接数据库 ✅
    </text>
    
    <!-- 顶部说明 -->
    <text x="640" y="310" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="22" 
          font-weight="600" 
          text-anchor="middle" 
          fill="#232F3E">
      IAM 控制"谁能访问什么"
    </text>
  </g>
  
  <!-- 底部关键特性 -->
  <g transform="translate(60, 680)">
    <rect x="0" y="0" width="380" height="40" rx="8" fill="#E8F5E9"/>
    <text x="190" y="27" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="16" 
          text-anchor="middle" 
          fill="#27AE60">
      🔒 无需硬编码密码
    </text>
    
    <rect x="400" y="0" width="380" height="40" rx="8" fill="#FFF3E0"/>
    <text x="590" y="27" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="16" 
          text-anchor="middle" 
          fill="#E67E22">
      🎯 精细权限控制
    </text>
    
    <rect x="800" y="0" width="380" height="40" rx="8" fill="#E8F4F8"/>
    <text x="990" y="27" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="16" 
          text-anchor="middle" 
          fill="#4A90E2">
      ⚡ 动态角色分配
    </text>
  </g>
</svg>
