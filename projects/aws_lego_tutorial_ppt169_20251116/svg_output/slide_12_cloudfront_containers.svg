<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="cdnGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#27AE60;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="containerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#4A90E2;stop-opacity:0.15" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#F8F9FA"/>
  
  <!-- 标题 -->
  <text x="60" y="90" 
        font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
        font-size="48" 
        font-weight="bold" 
        fill="#1A1A1A">
    全球加速与容器部署 🌍📦
  </text>
  
  <!-- CloudFront CDN 部分 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="140" width="1160" height="240" rx="12" fill="url(#cdnGradient)"/>
    
    <text x="90" y="180" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="28" 
          font-weight="bold" 
          fill="#4A90E2">
      CloudFront CDN 🌍
    </text>
    
    <!-- 问题 -->
    <g transform="translate(90, 210)">
      <rect x="0" y="0" width="320" height="70" rx="8" fill="#FFE5E5"/>
      <text x="160" y="25" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="18" 
            font-weight="600" 
            text-anchor="middle" 
            fill="#E74C3C">
        ❌ 问题
      </text>
      <text x="160" y="53" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="14" 
            text-anchor="middle" 
            fill="#666666">
        国际用户访问慢 🐌
      </text>
    </g>
    
    <!-- 解决方案 -->
    <g transform="translate(440, 210)">
      <rect x="0" y="0" width="720" height="140" rx="8" fill="#FFFFFF"/>
      
      <text x="20" y="30" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="18" 
            font-weight="600" 
            fill="#27AE60">
        ✅ CloudFront 解决方案
      </text>
      
      <text x="20" y="60" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="16" 
            fill="#333333">
        全球边缘节点缓存内容（图片、CSS、JS）
      </text>
      
      <!-- 全球节点示意 -->
      <g transform="translate(30, 75)">
        <!-- 亚洲 -->
        <circle cx="0" cy="0" r="18" fill="#27AE60"/>
        <text x="0" y="6" 
              font-size="18" 
              text-anchor="middle">
          🌏
        </text>
        <text x="0" y="35" 
              font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
              font-size="12" 
              text-anchor="middle" 
              fill="#666666">
          亚洲
        </text>
        
        <!-- 欧洲 -->
        <circle cx="120" cy="0" r="18" fill="#27AE60"/>
        <text x="120" y="6" 
              font-size="18" 
              text-anchor="middle">
          🌍
        </text>
        <text x="120" y="35" 
              font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
              font-size="12" 
              text-anchor="middle" 
              fill="#666666">
          欧洲
        </text>
        
        <!-- 北美 -->
        <circle cx="240" cy="0" r="18" fill="#27AE60"/>
        <text x="240" y="6" 
              font-size="18" 
              text-anchor="middle">
          🌎
        </text>
        <text x="240" y="35" 
              font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
              font-size="12" 
              text-anchor="middle" 
              fill="#666666">
          北美
        </text>
        
        <!-- 南美 -->
        <circle cx="360" cy="0" r="18" fill="#27AE60"/>
        <text x="360" y="6" 
              font-size="18" 
              text-anchor="middle">
          🌎
        </text>
        <text x="360" y="35" 
              font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
              font-size="12" 
              text-anchor="middle" 
              fill="#666666">
          南美
        </text>
        
        <!-- 大洋洲 -->
        <circle cx="480" cy="0" r="18" fill="#27AE60"/>
        <text x="480" y="6" 
              font-size="18" 
              text-anchor="middle">
          🌏
        </text>
        <text x="480" y="35" 
              font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
              font-size="12" 
              text-anchor="middle" 
              fill="#666666">
          大洋洲
        </text>
        
        <!-- 说明 -->
        <text x="590" y="10" 
              font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
              font-size="16" 
              fill="#27AE60">
          ⚡ 就近访问
        </text>
      </g>
    </g>
  </g>
  
  <!-- 容器化部署部分 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="410" width="1160" height="250" rx="12" fill="url(#containerGradient)"/>
    
    <text x="90" y="450" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="28" 
          font-weight="bold" 
          fill="#9B59B6">
      容器化部署 📦
    </text>
    
    <!-- 问题 -->
    <g transform="translate(90, 480)">
      <rect x="0" y="0" width="320" height="70" rx="8" fill="#FFE5E5"/>
      <text x="160" y="25" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="18" 
            font-weight="600" 
            text-anchor="middle" 
            fill="#E74C3C">
        ❌ 问题
      </text>
      <text x="160" y="53" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="14" 
            text-anchor="middle" 
            fill="#666666">
        直接部署易出错 💥
      </text>
    </g>
    
    <!-- 解决方案 -->
    <g transform="translate(440, 480)">
      <rect x="0" y="0" width="720" height="150" rx="8" fill="#FFFFFF"/>
      
      <text x="20" y="30" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="18" 
            font-weight="600" 
            fill="#9B59B6">
        ✅ 容器化解决方案
      </text>
      
      <!-- Docker 容器 -->
      <g transform="translate(20, 50)">
        <rect x="0" y="0" width="100" height="80" rx="8" fill="#4A90E2"/>
        <text x="50" y="40" 
              font-size="35" 
              text-anchor="middle">
          🐳
        </text>
        <text x="50" y="70" 
              font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
              font-size="12" 
              text-anchor="middle" 
              fill="#FFFFFF">
          Docker
        </text>
      </g>
      
      <!-- 箭头 -->
      <text x="150" y="100" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="30" 
            fill="#95A5A6">
        →
      </text>
      
      <!-- ECS -->
      <g transform="translate(200, 50)">
        <rect x="0" y="0" width="220" height="80" rx="8" fill="#27AE60"/>
        <text x="110" y="30" 
              font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
              font-size="20" 
              font-weight="bold" 
              text-anchor="middle" 
              fill="#FFFFFF">
          ECS
        </text>
        <text x="110" y="55" 
              font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
              font-size="14" 
              text-anchor="middle" 
              fill="#FFFFFF">
          Elastic Container Service
        </text>
        <text x="110" y="75" 
              font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
              font-size="12" 
              text-anchor="middle" 
              fill="#FFFFFF">
          简单易用
        </text>
      </g>
      
      <!-- 或 -->
      <text x="460" y="100" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="18" 
            fill="#666666">
        或
      </text>
      
      <!-- EKS -->
      <g transform="translate(490, 50)">
        <rect x="0" y="0" width="220" height="80" rx="8" fill="#9B59B6"/>
        <text x="110" y="30" 
              font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
              font-size="20" 
              font-weight="bold" 
              text-anchor="middle" 
              fill="#FFFFFF">
          EKS
        </text>
        <text x="110" y="55" 
              font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
              font-size="14" 
              text-anchor="middle" 
              fill="#FFFFFF">
          Elastic Kubernetes Service
        </text>
        <text x="110" y="75" 
              font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
              font-size="12" 
              text-anchor="middle" 
              fill="#FFFFFF">
          强大复杂
        </text>
      </g>
    </g>
  </g>
  
  <!-- 底部总结 -->
  <rect x="60" y="680" width="1160" height="40" rx="8" fill="#FFF3E0"/>
  <text x="640" y="707" 
        font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
        font-size="18" 
        text-anchor="middle" 
        fill="#E67E22">
    💡 容器化 = 打包应用与环境 → 一致、稳定、易部署
  </text>
</svg>
