<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="conclusionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9900;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#4A90E2;stop-opacity:0.15" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#F8F9FA"/>
  
  <!-- 标题 -->
  <text x="60" y="90" 
        font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
        font-size="48" 
        font-weight="bold" 
        fill="#1A1A1A">
    AWS：不止于此 ✨
  </text>
  
  <!-- 核心总结卡片 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="140" width="1160" height="200" rx="12" fill="url(#conclusionGradient)"/>
    
    <text x="640" y="190" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="32" 
          font-weight="bold" 
          text-anchor="middle" 
          fill="#232F3E">
      从小商店到全球应用，每个需求都有对应的"积木" 🧩
    </text>
    
    <!-- 服务图标矩阵 -->
    <g transform="translate(200, 220)">
      <!-- 第一行 -->
      <g transform="translate(0, 0)">
        <circle cx="0" cy="0" r="25" fill="#FF9900"/>
        <text x="0" y="8" font-size="25" text-anchor="middle">🖥️</text>
        <text x="0" y="45" 
              font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
              font-size="14" 
              text-anchor="middle" 
              fill="#666666">
          EC2
        </text>
      </g>
      
      <g transform="translate(110, 0)">
        <circle cx="0" cy="0" r="25" fill="#27AE60"/>
        <text x="0" y="8" font-size="25" text-anchor="middle">📦</text>
        <text x="0" y="45" 
              font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
              font-size="14" 
              text-anchor="middle" 
              fill="#666666">
          S3
        </text>
      </g>
      
      <g transform="translate(220, 0)">
        <circle cx="0" cy="0" r="25" fill="#4A90E2"/>
        <text x="0" y="8" font-size="25" text-anchor="middle">🗃️</text>
        <text x="0" y="45" 
              font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
              font-size="14" 
              text-anchor="middle" 
              fill="#666666">
          RDS
        </text>
      </g>
      
      <g transform="translate(330, 0)">
        <circle cx="0" cy="0" r="25" fill="#E67E22"/>
        <text x="0" y="8" font-size="25" text-anchor="middle">🔑</text>
        <text x="0" y="45" 
              font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
              font-size="14" 
              text-anchor="middle" 
              fill="#666666">
          IAM
        </text>
      </g>
      
      <g transform="translate(440, 0)">
        <circle cx="0" cy="0" r="25" fill="#9B59B6"/>
        <text x="0" y="8" font-size="25" text-anchor="middle">🌐</text>
        <text x="0" y="45" 
              font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
              font-size="14" 
              text-anchor="middle" 
              fill="#666666">
          Route 53
        </text>
      </g>
      
      <g transform="translate(550, 0)">
        <circle cx="0" cy="0" r="25" fill="#E74C3C"/>
        <text x="0" y="8" font-size="25" text-anchor="middle">📹</text>
        <text x="0" y="45" 
              font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
              font-size="14" 
              text-anchor="middle" 
              fill="#666666">
          CloudWatch
        </text>
      </g>
      
      <g transform="translate(660, 0)">
        <circle cx="0" cy="0" r="25" fill="#16A085"/>
        <text x="0" y="8" font-size="25" text-anchor="middle">🚦</text>
        <text x="0" y="45" 
              font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
              font-size="14" 
              text-anchor="middle" 
              fill="#666666">
          ELB
        </text>
      </g>
      
      <g transform="translate(770, 0)">
        <circle cx="0" cy="0" r="25" fill="#8E44AD"/>
        <text x="0" y="8" font-size="25" text-anchor="middle">⚡</text>
        <text x="0" y="45" 
              font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
              font-size="14" 
              text-anchor="middle" 
              fill="#666666">
          Lambda
        </text>
      </g>
      
      <g transform="translate(880, 0)">
        <circle cx="0" cy="0" r="25" fill="#F39C12"/>
        <text x="0" y="8" font-size="25" text-anchor="middle">📬</text>
        <text x="0" y="45" 
              font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
              font-size="14" 
              text-anchor="middle" 
              fill="#666666">
          SQS
        </text>
      </g>
    </g>
  </g>
  
  <!-- 趣味扩展服务 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="370" width="1160" height="240" rx="12" fill="#FFFFFF"/>
    
    <text x="640" y="410" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="28" 
          font-weight="600" 
          text-anchor="middle" 
          fill="#232F3E">
      🎨 AWS 还有这些有趣的服务...
    </text>
    
    <!-- 趣味服务卡片 -->
    <g transform="translate(120, 450)">
      <!-- Ground Station -->
      <rect x="0" y="0" width="320" height="120" rx="8" fill="#E8F4F8"/>
      <text x="160" y="40" 
            font-size="40" 
            text-anchor="middle">
        🛰️
      </text>
      <text x="160" y="75" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="20" 
            font-weight="600" 
            text-anchor="middle" 
            fill="#232F3E">
        Ground Station
      </text>
      <text x="160" y="100" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="14" 
            text-anchor="middle" 
            fill="#666666">
        与卫星通信
      </text>
      
      <!-- DeepRacer -->
      <rect x="360" y="0" width="320" height="120" rx="8" fill="#FFF3E0"/>
      <text x="520" y="40" 
            font-size="40" 
            text-anchor="middle">
        🏎️
      </text>
      <text x="520" y="75" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="20" 
            font-weight="600" 
            text-anchor="middle" 
            fill="#232F3E">
        DeepRacer
      </text>
      <text x="520" y="100" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="14" 
            text-anchor="middle" 
            fill="#666666">
        机器学习赛车
      </text>
      
      <!-- Braket -->
      <rect x="720" y="0" width="320" height="120" rx="8" fill="#E8F5E9"/>
      <text x="880" y="40" 
            font-size="40" 
            text-anchor="middle">
        ⚛️
      </text>
      <text x="880" y="75" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="20" 
            font-weight="600" 
            text-anchor="middle" 
            fill="#232F3E">
        Braket
      </text>
      <text x="880" y="100" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="14" 
            text-anchor="middle" 
            fill="#666666">
        量子计算
      </text>
    </g>
  </g>
  
  <!-- 结尾语 -->
  <g transform="translate(640, 650)">
    <text x="0" y="0" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="40" 
          font-weight="bold" 
          text-anchor="middle" 
          fill="#FF9900">
      The Cloud is Your LEGO Box 🧩
    </text>
    
    <text x="0" y="40" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="20" 
          text-anchor="middle" 
          fill="#666666">
      开始构建你的云端应用吧！
    </text>
  </g>
</svg>
