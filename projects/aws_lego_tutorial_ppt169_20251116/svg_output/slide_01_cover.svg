<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="awsGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#232F3E;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1280" height="720" fill="url(#awsGradient)"/>
  
  <!-- 装饰圆点（模拟 LEGO 积木的凸起） -->
  <circle cx="120" cy="80" r="20" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="200" cy="80" r="20" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="280" cy="80" r="20" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="1080" cy="640" r="20" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="1160" cy="640" r="20" fill="#FFFFFF" opacity="0.15"/>
  
  <!-- LEGO 积木块装饰（底部） -->
  <g opacity="0.25">
    <!-- 左下角积木组 -->
    <rect x="80" y="550" width="140" height="100" rx="12" fill="#FFFFFF"/>
    <circle cx="120" cy="565" r="8" fill="#232F3E" opacity="0.3"/>
    <circle cx="180" cy="565" r="8" fill="#232F3E" opacity="0.3"/>
    
    <rect x="240" y="580" width="140" height="100" rx="12" fill="#FFFFFF"/>
    <circle cx="280" cy="595" r="8" fill="#232F3E" opacity="0.3"/>
    <circle cx="340" cy="595" r="8" fill="#232F3E" opacity="0.3"/>
    
    <!-- 右下角积木组 -->
    <rect x="1060" y="560" width="140" height="100" rx="12" fill="#FFFFFF"/>
    <circle cx="1100" cy="575" r="8" fill="#232F3E" opacity="0.3"/>
    <circle cx="1160" cy="575" r="8" fill="#232F3E" opacity="0.3"/>
    
    <rect x="900" y="590" width="140" height="100" rx="12" fill="#FFFFFF"/>
    <circle cx="940" cy="605" r="8" fill="#232F3E" opacity="0.3"/>
    <circle cx="1000" cy="605" r="8" fill="#232F3E" opacity="0.3"/>
  </g>
  
  <!-- 主标题区域 -->
  <g transform="translate(640, 280)">
    <!-- LEGO emoji 背景 -->
    <circle cx="0" cy="-80" r="60" fill="#FFFFFF" opacity="0.2"/>
    <text x="0" y="-40" font-size="80" text-anchor="middle" fill="#FFFFFF">🧩</text>
    
    <!-- 主标题 -->
    <text x="0" y="60" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="64" 
          font-weight="bold" 
          text-anchor="middle" 
          fill="#FFFFFF">
      AWS as LEGO
    </text>
    
    <!-- 副标题 -->
    <text x="0" y="120" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="28" 
          text-anchor="middle" 
          fill="#FFFFFF" 
          opacity="0.9">
      A Box of Building Blocks for the Cloud
    </text>
    
    <!-- 分隔线 -->
    <line x1="-200" y1="150" x2="200" y2="150" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
    
    <!-- 底部说明 -->
    <text x="0" y="200" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="20" 
          text-anchor="middle" 
          fill="#FFFFFF" 
          opacity="0.8">
      从零开始构建云端应用
    </text>
  </g>
</svg>
