<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="storeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9900;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#4A90E2;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#F8F9FA"/>
  
  <!-- 标题 -->
  <text x="60" y="90" 
        font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
        font-size="48" 
        font-weight="bold" 
        fill="#1A1A1A">
    实战案例：在线卫衣商店 👕
  </text>
  
  <!-- 左侧：商店示意图 -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="140" width="560" height="420" rx="12" fill="#FFFFFF"/>
    
    <!-- 浏览器窗口模拟 -->
    <rect x="90" y="170" width="500" height="360" rx="8" fill="url(#storeGradient)"/>
    
    <!-- 浏览器顶栏 -->
    <rect x="90" y="170" width="500" height="40" rx="8" fill="#232F3E"/>
    <circle cx="110" cy="190" r="6" fill="#E74C3C"/>
    <circle cx="130" cy="190" r="6" fill="#F39C12"/>
    <circle cx="150" cy="190" r="6" fill="#27AE60"/>
    <rect x="180" y="180" width="280" height="20" rx="10" fill="#FFFFFF" opacity="0.3"/>
    <text x="195" y="195" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="12" 
          fill="#FFFFFF">
      hoodiestore.com
    </text>
    
    <!-- 网站内容 -->
    <text x="340" y="260" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="32" 
          font-weight="bold" 
          text-anchor="middle" 
          fill="#232F3E">
      🛒 Hoodie Store
    </text>
    
    <!-- 商品卡片模拟 -->
    <g transform="translate(130, 290)">
      <rect x="0" y="0" width="100" height="120" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2"/>
      <text x="50" y="60" font-size="50" text-anchor="middle">👕</text>
      <text x="50" y="105" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="12" 
            text-anchor="middle" 
            fill="#666666">
        ¥299
      </text>
      
      <rect x="130" y="0" width="100" height="120" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2"/>
      <text x="180" y="60" font-size="50" text-anchor="middle">👕</text>
      <text x="180" y="105" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="12" 
            text-anchor="middle" 
            fill="#666666">
        ¥399
      </text>
      
      <rect x="260" y="0" width="100" height="120" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2"/>
      <text x="310" y="60" font-size="50" text-anchor="middle">👕</text>
      <text x="310" y="105" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="12" 
            text-anchor="middle" 
            fill="#666666">
        ¥499
      </text>
    </g>
    
    <!-- 购买按钮 -->
    <rect x="220" y="450" width="200" height="40" rx="8" fill="#FF9900"/>
    <text x="320" y="477" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="18" 
          font-weight="600" 
          text-anchor="middle" 
          fill="#FFFFFF">
      立即购买
    </text>
  </g>
  
  <!-- 右侧：建设目标 -->
  <g filter="url(#cardShadow)">
    <rect x="660" y="140" width="560" height="420" rx="12" fill="#FFFFFF"/>
    
    <text x="700" y="190" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="28" 
          font-weight="600" 
          fill="#232F3E">
      我们需要什么？
    </text>
    
    <!-- 目标列表 -->
    <g transform="translate(700, 220)">
      <!-- 目标 1 -->
      <circle cx="0" cy="20" r="10" fill="#FF9900"/>
      <text x="0" y="28" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="16" 
            font-weight="bold" 
            text-anchor="middle" 
            fill="#FFFFFF">
        1
      </text>
      <text x="30" y="28" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="20" 
            fill="#333333">
        <tspan font-weight="600">24/7 在线运行</tspan>
        <tspan x="30" dy="30" font-size="18" fill="#666666">网站代码需要一台永不停机的服务器</tspan>
      </text>
      
      <!-- 目标 2 -->
      <circle cx="0" cy="100" r="10" fill="#4A90E2"/>
      <text x="0" y="108" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="16" 
            font-weight="bold" 
            text-anchor="middle" 
            fill="#FFFFFF">
        2
      </text>
      <text x="30" y="108" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="20" 
            fill="#333333">
        <tspan font-weight="600">存储产品图片</tspan>
        <tspan x="30" dy="30" font-size="18" fill="#666666">可靠、便宜、几乎无限的存储空间</tspan>
      </text>
      
      <!-- 目标 3 -->
      <circle cx="0" cy="180" r="10" fill="#27AE60"/>
      <text x="0" y="188" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="16" 
            font-weight="bold" 
            text-anchor="middle" 
            fill="#FFFFFF">
        3
      </text>
      <text x="30" y="188" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="20" 
            fill="#333333">
        <tspan font-weight="600">管理订单数据</tspan>
        <tspan x="30" dy="30" font-size="18" fill="#666666">保存用户账户、库存、订单记录</tspan>
      </text>
      
      <!-- 目标 4 -->
      <circle cx="0" cy="260" r="10" fill="#E67E22"/>
      <text x="0" y="268" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="16" 
            font-weight="bold" 
            text-anchor="middle" 
            fill="#FFFFFF">
        4
      </text>
      <text x="30" y="268" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="20" 
            fill="#333333">
        <tspan font-weight="600">全球访问快速</tspan>
        <tspan x="30" dy="30" font-size="18" fill="#666666">国际客户也能快速加载页面</tspan>
      </text>
      
      <!-- 目标 5 -->
      <circle cx="0" cy="340" r="10" fill="#9B59B6"/>
      <text x="0" y="348" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="16" 
            font-weight="bold" 
            text-anchor="middle" 
            fill="#FFFFFF">
        5
      </text>
      <text x="30" y="348" 
            font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
            font-size="20" 
            fill="#333333">
        <tspan font-weight="600">自动扩展流量</tspan>
        <tspan x="30" dy="30" font-size="18" fill="#666666">高峰期自动增加服务器，低峰期降低成本</tspan>
      </text>
    </g>
  </g>
  
  <!-- 底部时间轴 -->
  <g transform="translate(60, 600)">
    <text x="0" y="0" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="20" 
          font-weight="600" 
          fill="#666666">
      架构演进：
    </text>
    
    <!-- 时间轴线 -->
    <line x1="150" y1="-10" x2="1100" y2="-10" stroke="#E0E0E0" stroke-width="3"/>
    
    <!-- 起点 -->
    <circle cx="150" cy="-10" r="8" fill="#FF9900"/>
    <text x="150" y="25" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="16" 
          text-anchor="middle" 
          fill="#666666">
      简单起步
    </text>
    
    <!-- 终点 -->
    <circle cx="1100" cy="-10" r="8" fill="#27AE60"/>
    <text x="1100" y="25" 
          font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="16" 
          text-anchor="middle" 
          fill="#666666">
      全球扩展
    </text>
    
    <!-- 箭头 -->
    <polygon points="1100,-10 1090,-15 1090,-5" fill="#27AE60"/>
  </g>
</svg>
