<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
    <!-- 背景 -->
    <rect width="1280" height="720" fill="#F8F9FA" />

    <!-- 顶部装饰 -->
    <rect x="0" y="0" width="1280" height="8" fill="#005587" />
    <rect x="0" y="8" width="6" height="712" fill="#4A90E2" />

    <!-- 章节标签 -->
    <rect x="60" y="50" width="180" height="36" rx="4" fill="#005587" />
    <text x="150" y="75"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
        font-size="20" fill="white" text-anchor="middle" font-weight="bold">
        04 实施进度
    </text>

    <!-- 标题 -->
    <text x="60" y="140"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
        font-size="38" font-weight="bold" fill="#003F6C">
        十年磨一剑：从搁浅到交付
    </text>

    <!-- 时间轴主线 -->
    <line x1="120" y1="240" x2="1140" y2="240" stroke="#E0E6ED" stroke-width="6" />

    <!-- 2015年节点 -->
    <g transform="translate(120, 240)">
        <line x1="0" y1="0" x2="0" y2="55" stroke="#E0E6ED" stroke-width="2" />
        <circle cx="0" cy="0" r="14" fill="#7F8C8D" />
        <text x="0" y="78"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="19" fill="#7F8C8D" text-anchor="middle" font-weight="bold">
            2015
        </text>
        <text x="0" y="100"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="16" fill="#2C3E50" text-anchor="middle">
            方案搁浅
        </text>
    </g>

    <!-- 2018年节点 -->
    <g transform="translate(310, 240)">
        <line x1="0" y1="0" x2="0" y2="55" stroke="#E0E6ED" stroke-width="2" />
        <circle cx="0" cy="0" r="14" fill="#7F8C8D" />
        <text x="0" y="78"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="19" fill="#7F8C8D" text-anchor="middle" font-weight="bold">
            2018
        </text>
        <text x="0" y="100"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="16" fill="#2C3E50" text-anchor="middle">
            调查停滞
        </text>
    </g>

    <!-- 2023.5年节点 - 立项 -->
    <g transform="translate(560, 240)">
        <line x1="0" y1="0" x2="0" y2="55" stroke="#E0E6ED" stroke-width="2" />
        <circle cx="0" cy="0" r="18" fill="#2ECC71" />
        <text x="0" y="81"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="19" fill="#2ECC71" text-anchor="middle" font-weight="bold">
            2023.5
        </text>
        <text x="0" y="103"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="16" fill="#2C3E50" text-anchor="middle" font-weight="600">
            正式立项
        </text>
    </g>

    <!-- 2023.6年节点 - 签约 -->
    <g transform="translate(700, 240)">
        <line x1="0" y1="0" x2="0" y2="-55" stroke="#E0E6ED" stroke-width="2" />
        <circle cx="0" cy="0" r="16" fill="#4A90E2" />
        <text x="0" y="-68"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="19" fill="#4A90E2" text-anchor="middle" font-weight="bold">
            2023.6
        </text>
        <text x="0" y="-46"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="16" fill="#2C3E50" text-anchor="middle" font-weight="600">
            签约完成
        </text>
        <text x="0" y="-28"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="14" fill="#7F8C8D" text-anchor="middle">
            84天
        </text>
    </g>

    <!-- 2023.11年节点 - 开工 -->
    <g transform="translate(840, 240)">
        <line x1="0" y1="0" x2="0" y2="55" stroke="#E0E6ED" stroke-width="2" />
        <circle cx="0" cy="0" r="16" fill="#FF6B35" />
        <text x="0" y="81"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="19" fill="#FF6B35" text-anchor="middle" font-weight="bold">
            2023.11
        </text>
        <text x="0" y="103"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="16" fill="#2C3E50" text-anchor="middle" font-weight="600">
            开工建设
        </text>
    </g>

    <!-- 2024.8年节点 - 封顶 -->
    <g transform="translate(1000, 240)">
        <line x1="0" y1="0" x2="0" y2="-55" stroke="#E0E6ED" stroke-width="2" />
        <circle cx="0" cy="0" r="16" fill="#4A90E2" />
        <text x="0" y="-68"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="19" fill="#4A90E2" text-anchor="middle" font-weight="bold">
            2024.8
        </text>
        <text x="0" y="-46"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="16" fill="#2C3E50" text-anchor="middle" font-weight="600">
            结构封顶
        </text>
    </g>

    <!-- 2025.2年节点 - 交付 -->
    <g transform="translate(1140, 240)">
        <line x1="0" y1="0" x2="0" y2="55" stroke="#E0E6ED" stroke-width="2" />
        <circle cx="0" cy="0" r="20" fill="#2ECC71" />
        <text x="0" y="7"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="18" fill="white" text-anchor="middle" font-weight="bold">
            ✓
        </text>
        <text x="0" y="81"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="19" fill="#2ECC71" text-anchor="middle" font-weight="bold">
            2025.2
        </text>
        <text x="0" y="103"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="16" fill="#2C3E50" text-anchor="middle" font-weight="600">
            提前交付
        </text>
    </g>

    <!-- 底部统计卡片 -->
    <g transform="translate(150, 375)">
        <!-- 卡片1 -->
        <rect x="0" y="0" width="250" height="125" rx="8" fill="white" stroke="#E0E6ED" stroke-width="2" />
        <text x="125" y="40"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="18" fill="#7F8C8D" text-anchor="middle">
            筹备阶段
        </text>
        <text x="125" y="85"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="52" fill="#7F8C8D" text-anchor="middle" font-weight="bold">
            8年
        </text>
        <text x="125" y="112"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="16" fill="#7F8C8D" text-anchor="middle">
            2015-2023
        </text>

        <!-- 卡片2 -->
        <rect x="270" y="0" width="250" height="125" rx="8" fill="white" stroke="#E0E6ED" stroke-width="2" />
        <text x="395" y="40"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="18" fill="#7F8C8D" text-anchor="middle">
            签约腾房
        </text>
        <text x="395" y="85"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="52" fill="#4A90E2" text-anchor="middle" font-weight="bold">
            150天
        </text>
        <text x="395" y="112"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="16" fill="#7F8C8D" text-anchor="middle">
            84天签约+66天腾房
        </text>

        <!-- 卡片3 -->
        <rect x="540" y="0" width="250" height="125" rx="8" fill="white" stroke="#E0E6ED" stroke-width="2" />
        <text x="665" y="40"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="18" fill="#7F8C8D" text-anchor="middle">
            施工建设
        </text>
        <text x="665" y="85"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="52" fill="#FF6B35" text-anchor="middle" font-weight="bold">
            15个月
        </text>
        <text x="665" y="112"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="16" fill="#7F8C8D" text-anchor="middle">
            2023.11-2025.2
        </text>

        <!-- 卡片4 -->
        <rect x="810" y="0" width="250" height="125" rx="8" fill="white" stroke="#2ECC71" stroke-width="3" />
        <text x="935" y="40"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="18" fill="#7F8C8D" text-anchor="middle">
            提前工期
        </text>
        <text x="935" y="85"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="52" fill="#2ECC71" text-anchor="middle" font-weight="bold">
            10个月
        </text>
        <text x="935" y="112"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="16" fill="#7F8C8D" text-anchor="middle">
            原计划2026交付
        </text>
    </g>

    <!-- 底部说明 -->
    <g transform="translate(150, 545)">
        <rect x="0" y="0" width="980" height="90" rx="6" fill="#E8F8F5" />
        <text x="25" y="33"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="20" fill="#2ECC71" font-weight="bold">
            💡 项目特点
        </text>
        <text x="25" y="60"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="18" fill="#2C3E50">
            前期历经数年摸索等待，2023年立项后共识凝聚，实施阶段推进速度罕见迅速，堪称"厚积薄发"
        </text>
        <text x="25" y="82"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="18" fill="#2C3E50">
            的典范。
        </text>
    </g>

    <!-- 页码 -->
    <text x="1220" y="690"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
        font-size="16" fill="#7F8C8D" text-anchor="end">
        9
    </text>
</svg>