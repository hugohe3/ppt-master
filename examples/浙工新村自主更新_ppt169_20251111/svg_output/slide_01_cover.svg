<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
    <!-- 背景 -->
    <rect width="1280" height="720" fill="#F8F9FA" />

    <!-- 顶部装饰线 -->
    <rect x="0" y="0" width="1280" height="8" fill="#005587" />

    <!-- 左侧装饰块 -->
    <rect x="0" y="8" width="6" height="712" fill="#4A90E2" />

    <!-- 主标题 -->
    <text x="640" y="280"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
        font-size="52" font-weight="bold" fill="#005587" text-anchor="middle">
        杭州市浙工新村自主更新项目
    </text>
    <text x="640" y="340"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
        font-size="52" font-weight="bold" fill="#005587" text-anchor="middle">
        深度研究报告
    </text>

    <!-- 分隔线 -->
    <line x1="340" y1="380" x2="940" y2="380" stroke="#4A90E2" stroke-width="2" />

    <!-- 副标题 -->
    <text x="640" y="440"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
        font-size="28" fill="#7F8C8D" text-anchor="middle">
        全国首例居民自筹资金老旧小区重建案例分析
    </text>

    <!-- 关键标签 -->
    <g transform="translate(640, 500)">
        <!-- 标签1 -->
        <rect x="-280" y="0" width="160" height="45" rx="4" fill="#ECF0F1" />
        <text x="-200" y="29"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="18" fill="#005587" text-anchor="middle" font-weight="bold">
            居民主体
        </text>

        <!-- 标签2 -->
        <rect x="-100" y="0" width="160" height="45" rx="4" fill="#ECF0F1" />
        <text x="-20" y="29"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="18" fill="#005587" text-anchor="middle" font-weight="bold">
            5.3亿投资
        </text>

        <!-- 标签3 -->
        <rect x="80" y="0" width="160" height="45" rx="4" fill="#ECF0F1" />
        <text x="160" y="29"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
            font-size="18" fill="#005587" text-anchor="middle" font-weight="bold">
            548户共建
        </text>
    </g>

    <!-- 底部信息 -->
    <text x="640" y="630"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
        font-size="22" fill="#7F8C8D" text-anchor="middle">
        2025年11月
    </text>

    <!-- 页码 -->
    <text x="1220" y="690"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif"
        font-size="16" fill="#7F8C8D" text-anchor="end">
        1
    </text>
</svg>