<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- 顶部装饰条 -->
  <rect x="0" y="0" width="1280" height="4" fill="#003F6C"/>
  <rect x="0" y="4" width="8" height="716" fill="#FF6B35"/>
  
  <!-- 标题 -->
  <text x="60" y="70" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="42" font-weight="bold" fill="#003F6C">
    财务评价结论
  </text>
  
  <line x1="60" y1="85" x2="280" y2="85" stroke="#FF6B35" stroke-width="3"/>
  
  <!-- 页码 -->
  <text x="1200" y="690" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="14" fill="#7D8FA8" text-anchor="end">
    11/12
  </text>
  
  <!-- 结论1：投资规模 -->
  <g id="conclusion-1">
    <rect x="60" y="130" width="1160" height="150" fill="#F5F7FA" stroke="#005587" stroke-width="2"/>
    
    <circle cx="110" cy="185" r="20" fill="#005587"/>
    <text x="110" y="195" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
      1
    </text>
    
    <text x="160" y="165" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="600" fill="#003F6C">
      投资规模
    </text>
    
    <text x="160" y="205" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="17" fill="#2C3E50">
      <tspan x="160" dy="0">• 建设工期：1年（2025-2026年）</tspan>
      <tspan x="160" dy="32">• 项目静态投资：5,731万元  |  总投资：5,811万元（含建设期利息80万）</tspan>
      <tspan x="160" dy="32">• 融资方案：资本金20% + 银行贷款80%（利率3.50%，15年偿还期）</tspan>
    </text>
  </g>
  
  <!-- 结论2：盈利能力 -->
  <g id="conclusion-2">
    <rect x="60" y="310" width="1160" height="200" fill="#FFFFFF" stroke="#27AE60" stroke-width="3"/>
    
    <circle cx="110" cy="385" r="20" fill="#27AE60"/>
    <text x="110" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
      2
    </text>
    
    <text x="160" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="600" fill="#27AE60">
      盈利能力评价
    </text>
    
    <text x="160" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="17" fill="#2C3E50">
      <tspan x="160" dy="0">• 项目投资IRR：5.78%（税后）</tspan>
      <tspan fill="#27AE60" font-weight="600">  ✓ 高于基准收益率5%</tspan>
      <tspan x="160" dy="28">• 资本金IRR：7.2%  |  总投资收益率：6.29%  |  资本金净利润率：21.23%</tspan>
      <tspan x="160" dy="28">• 投资回收期：项目整体17.66年，充电桩部分5.6年</tspan>
      <tspan x="160" dy="28">• 41年计算期：利润总额13,309万元，净利润9,869万元</tspan>
    </text>
    
    <!-- 可行性标识 -->
    <rect x="980" y="345" width="200" height="60" fill="#27AE60"/>
    <text x="1080" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
      财务可行 ✓
    </text>
  </g>
  
  <!-- 结论3：风险控制 -->
  <g id="conclusion-3">
    <rect x="60" y="540" width="1160" height="140" fill="#FFF8F0" stroke="#FF6B35" stroke-width="2"/>
    
    <circle cx="110" cy="590" r="20" fill="#FF6B35"/>
    <text x="110" y="600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
      3
    </text>
    
    <text x="160" y="570" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="600" fill="#FF6B35">
      风险控制能力
    </text>
    
    <text x="160" y="610" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="17" fill="#2C3E50">
      <tspan x="160" dy="0">• 敏感性分析：±20%变动下资本金IRR均>4.42%，未出现负值</tspan>
      <tspan x="160" dy="28">• 盈亏平衡点：生产能力利用率55.84%（低于预测运营65%-85%）</tspan>
      <tspan x="160" dy="28">• 重点关注：</tspan>
      <tspan fill="#E74C3C" font-weight="600">市场价格波动</tspan>
      <tspan>（最敏感因素），严控建设投资与经营成本</tspan>
    </text>
  </g>
</svg>

