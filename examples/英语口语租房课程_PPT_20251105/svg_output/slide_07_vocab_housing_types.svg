<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#F5F5F5"/>
  
  <!-- 页面标题 -->
  <rect x="60" y="50" width="8" height="50" fill="#5E35B1" rx="4"/>
  <text x="90" y="88" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#424242">
    美国的各种住宅类型
  </text>
  
  <!-- 第一行 -->
  <rect x="60" y="140" width="375" height="170" fill="#FFFFFF" rx="12" filter="url(#shadow)"/>
  <rect x="80" y="160" width="100" height="80" fill="#2E7D32" opacity="0.2" rx="8"/>
  <path d="M 90 175 L 125 155 L 160 175 Z" fill="#2E7D32" opacity="0.6"/>
  <rect x="110" y="195" width="30" height="35" fill="#2E7D32" opacity="0.8"/>
  <text x="90" y="265" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="600" fill="#2E7D32">
    House
  </text>
  <text x="90" y="292" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="400" fill="#424242">
    独立别墅
  </text>
  
  <rect x="455" y="140" width="375" height="170" fill="#FFFFFF" rx="12" filter="url(#shadow)"/>
  <rect x="475" y="160" width="60" height="80" fill="#1976D2" opacity="0.2" rx="8"/>
  <rect x="535" y="160" width="60" height="80" fill="#1976D2" opacity="0.2" rx="8"/>
  <rect x="595" y="160" width="60" height="80" fill="#1976D2" opacity="0.2" rx="8"/>
  <path d="M 475 175 L 505 155 L 535 175 Z" fill="#1976D2" opacity="0.6"/>
  <path d="M 535 175 L 565 155 L 595 175 Z" fill="#1976D2" opacity="0.6"/>
  <path d="M 595 175 L 625 155 L 655 175 Z" fill="#1976D2" opacity="0.6"/>
  <text x="485" y="265" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="600" fill="#1976D2">
    Townhouse
  </text>
  <text x="485" y="292" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="400" fill="#424242">
    联排别墅
  </text>
  
  <rect x="850" y="140" width="390" height="170" fill="#FFFFFF" rx="12" filter="url(#shadow)"/>
  <rect x="870" y="160" width="120" height="80" fill="#F57C00" opacity="0.15" rx="8" stroke="#F57C00" stroke-width="2"/>
  <line x1="930" y1="175" x2="930" y2="225" stroke="#F57C00" stroke-width="1"/>
  <line x1="910" y1="200" x2="950" y2="200" stroke="#F57C00" stroke-width="1"/>
  <rect x="900" y="210" width="20" height="20" fill="#F57C00" opacity="0.3"/>
  <text x="880" y="265" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="600" fill="#F57C00">
    Apartment
  </text>
  <text x="880" y="292" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="400" fill="#424242">
    公寓（楼内的一套房）
  </text>
  
  <!-- 第二行 -->
  <rect x="60" y="330" width="375" height="150" fill="#FFFFFF" rx="12" filter="url(#shadow)"/>
  <rect x="80" y="350" width="80" height="60" fill="#5E35B1" opacity="0.2" rx="6"/>
  <circle cx="120" cy="380" r="20" fill="#5E35B1" opacity="0.4"/>
  <text x="90" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="600" fill="#5E35B1">
    Studio Apartment
  </text>
  <text x="90" y="465" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="400" fill="#424242">
    单间公寓（一室户）
  </text>
  
  <rect x="455" y="330" width="375" height="150" fill="#FFFFFF" rx="12" filter="url(#shadow)"/>
  <rect x="475" y="350" width="80" height="30" fill="#2E7D32" opacity="0.3" rx="4"/>
  <rect x="475" y="385" width="80" height="30" fill="#2E7D32" opacity="0.5" rx="4"/>
  <line x1="515" y1="380" x2="515" y2="385" stroke="#757575" stroke-width="2"/>
  <text x="485" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="600" fill="#2E7D32">
    Duplex
  </text>
  <text x="485" y="465" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="400" fill="#424242">
    复式住宅（上下两层）
  </text>
  
  <rect x="850" y="330" width="390" height="150" fill="#FFFFFF" rx="12" filter="url(#shadow)"/>
  <rect x="870" y="350" width="100" height="60" fill="#1976D2" opacity="0.2" rx="6"/>
  <path d="M 870 365 L 920 345 L 970 365 Z" fill="#1976D2" opacity="0.4"/>
  <text x="880" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="600" fill="#1976D2">
    Loft-style Apartment
  </text>
  <text x="880" y="465" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="400" fill="#424242">
    阁楼式公寓（开放空间）
  </text>
  
  <!-- 第三行 -->
  <rect x="60" y="500" width="1160" height="130" fill="#FFFFFF" rx="12" filter="url(#shadow)"/>
  <rect x="80" y="520" width="120" height="90" fill="#F57C00" opacity="0.15" rx="8" stroke="#F57C00" stroke-width="2"/>
  <rect x="100" y="540" width="20" height="20" fill="#F57C00" opacity="0.4"/>
  <rect x="125" y="545" width="20" height="20" fill="#F57C00" opacity="0.4"/>
  <rect x="100" y="570" width="20" height="20" fill="#F57C00" opacity="0.4"/>
  <rect x="125" y="575" width="20" height="20" fill="#F57C00" opacity="0.4"/>
  <text x="230" y="555" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="600" fill="#F57C00">
    Condominium
  </text>
  <text x="230" y="590" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="400" fill="#424242">
    住户有独立产权的公寓（公寓大厦） - 可以购买拥有
  </text>
  
  <!-- 对比说明 -->
  <rect x="850" y="540" width="360" height="70" fill="#F5F5F5" rx="8"/>
  <text x="870" y="565" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600" fill="#424242">
    💡 Key Difference:
  </text>
  <text x="870" y="590" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="400" fill="#757575">
    Apartment 通常是租赁，Condo 可以购买
  </text>
  
  <!-- 页码 -->
  <text x="1220" y="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="400" fill="#757575" text-anchor="end">
    07
  </text>
</svg>
