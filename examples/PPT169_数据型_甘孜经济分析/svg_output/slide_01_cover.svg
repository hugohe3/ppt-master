<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- 深蓝色渐变背景 -->
  <defs>
    <linearGradient id="coverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003F6C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005587;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1280" height="720" fill="url(#coverGradient)"/>
  
  <!-- 装饰线条 -->
  <rect x="60" y="260" width="200" height="4" fill="#FFFFFF" opacity="0.8"/>
  
  <!-- 主标题 -->
  <text x="60" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', 'Hiragino Sans GB', Arial, sans-serif" font-size="64" font-weight="bold" fill="#FFFFFF">
    甘孜藏族自治州
  </text>
  
  <!-- 副标题 -->
  <text x="60" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', 'Hiragino Sans GB', Arial, sans-serif" font-size="36" font-weight="300" fill="#FFFFFF" opacity="0.9">
    2024年区域经济分析报告
  </text>
  
  <!-- 底部数据快览 -->
  <text x="60" y="580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', 'Hiragino Sans GB', Arial, sans-serif" font-size="16" font-weight="300" fill="#FFFFFF" opacity="0.8">
    <tspan x="60" dy="0">核心数据</tspan>
  </text>
  
  <text x="60" y="620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', 'Hiragino Sans GB', Arial, sans-serif" font-size="20" fill="#FFFFFF" opacity="0.95">
    <tspan x="60" dy="0">GDP: 580.52亿元</tspan>
    <tspan x="300" dy="0">GDP占比: 0.90%</tspan>
    <tspan x="540" dy="0">人口占比: 1.33%</tspan>
    <tspan x="780" dy="0">效率比值: 0.68</tspan>
  </text>
</svg>

