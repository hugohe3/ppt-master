<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
    <!-- Gradient Definitions -->
    <defs>
        <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
            <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1" />
        </radialGradient>
        <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#005587;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0077B5;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.2" />
        </filter>
    </defs>

    <!-- Background -->
    <rect width="1280" height="720" fill="url(#bgGrad)" />

    <!-- Title -->
    <text x="640" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="48" font-weight="bold" fill="#005587" text-anchor="middle">
        总 结
    </text>
    <text x="640" y="120" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="24" fill="#5D6D7E" text-anchor="middle">
        Context Engineering 2.0 的核心洞察
    </text>

    <!-- Main Content Box -->
    <rect x="150" y="160" width="980" height="400" fill="#FFFFFF" stroke="#0077B5" stroke-width="3" rx="12"
        filter="url(#shadow)" />

    <!-- Key Insights Grid -->
    <text x="640" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="22" font-weight="600" fill="#005587" text-anchor="middle">
        🔑 关键要点
    </text>

    <!-- Four Quadrants -->
    <g id="quadrant1">
        <rect x="180" y="240" width="440" height="140" fill="#E3F2FD" stroke="#0077B5" stroke-width="2" rx="8" />
        <text x="400" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
            font-size="18" font-weight="600" fill="#005587" text-anchor="middle">
            1️⃣ 从被动到主动
        </text>
        <text x="200" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
            font-size="15" fill="#2C3E50">
            <tspan x="200" dy="0">Era 1.0（环境感知）→ Era 2.0（智能检索）</tspan>
            <tspan x="200" dy="20">→ Era 3.0（主动推断）→ Era 4.0（终身学习）</tspan>
            <tspan x="200" dy="20">系统不再被动等待，而是主动预测需求</tspan>
        </text>
    </g>

    <g id="quadrant2">
        <rect x="660" y="240" width="440" height="140" fill="#FFF3E0" stroke="#E67E22" stroke-width="2" rx="8" />
        <text x="880" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
            font-size="18" font-weight="600" fill="#E67E22" text-anchor="middle">
            2️⃣ 多模态整合
        </text>
        <text x="680" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
            font-size="15" fill="#2C3E50">
            <tspan x="680" dy="0">文本 → 文本+图像 → 文本+图像+音频</tspan>
            <tspan x="680" dy="20">→ 全模态融合（脑电、眼动、生理信号）</tspan>
            <tspan x="680" dy="20">上下文不再局限于文字，而是全方位感知</tspan>
        </text>
    </g>

    <g id="quadrant3">
        <rect x="180" y="400" width="440" height="140" fill="#E8F5E9" stroke="#27AE60" stroke-width="2" rx="8" />
        <text x="400" y="430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
            font-size="18" font-weight="600" fill="#27AE60" text-anchor="middle">
            3️⃣ 记忆层级架构
        </text>
        <text x="200" y="460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
            font-size="15" fill="#2C3E50">
            <tspan x="200" dy="0">核心记忆（Core）+ 工作记忆（Working）</tspan>
            <tspan x="200" dy="20">+ 情景记忆（Episodic）+ 语义记忆（Semantic）</tspan>
            <tspan x="200" dy="20">模拟人类记忆系统，实现长期知识积累</tspan>
        </text>
    </g>

    <g id="quadrant4">
        <rect x="660" y="400" width="440" height="140" fill="#F3E5F5" stroke="#9B59B6" stroke-width="2" rx="8" />
        <text x="880" y="430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
            font-size="18" font-weight="600" fill="#9B59B6" text-anchor="middle">
            4️⃣ 个性化与隐私
        </text>
        <text x="680" y="460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
            font-size="15" fill="#2C3E50">
            <tspan x="680" dy="0">通用模型 + 个人上下文 = 定制 AI 助手</tspan>
            <tspan x="680" dy="20">On-Device 处理 + 联邦学习保护隐私</tspan>
            <tspan x="680" dy="20">数据主权回归用户，实现真正的个人 AI</tspan>
        </text>
    </g>

    <!-- Bottom Call to Action -->
    <rect x="150" y="580" width="980" height="80" fill="url(#boxGrad)" rx="10" filter="url(#shadow)" />
    <text x="640" y="615" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
        未来已来，上下文工程将重新定义人机交互
    </text>
    <text x="640" y="648" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="18" fill="#E3F2FD" text-anchor="middle">
        The Next Era of AI is Context-Aware, Proactive, and Personalized
    </text>
</svg>