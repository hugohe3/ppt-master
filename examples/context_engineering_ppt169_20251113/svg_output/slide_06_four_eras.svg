<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
    <!-- Gradient Definitions -->
    <defs>
        <linearGradient id="era1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#FFEBEE;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#FFCDD2;stop-opacity:0.5" />
        </linearGradient>
        <linearGradient id="era2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#FFF3E0;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#FFE0B2;stop-opacity:0.5" />
        </linearGradient>
        <linearGradient id="era3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:0.5" />
        </linearGradient>
        <linearGradient id="era4Grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:0.5" />
        </linearGradient>
        <filter id="shadow">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15" />
        </filter>
    </defs>

    <!-- Background -->
    <rect width="1280" height="720" fill="#FFFFFF" />

    <!-- Title -->
    <rect x="80" y="40" width="1120" height="60" fill="#005587" rx="8" />
    <text x="640" y="78" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
        Context Engineering 1.0 → 4.0 演进路径
    </text>

    <!-- Timeline Base -->
    <line x1="140" y1="180" x2="1140" y2="180" stroke="#BDC3C7" stroke-width="6" stroke-linecap="round" />

    <!-- Era 1.0 Node -->
    <circle cx="220" cy="180" r="24" fill="#C0392B" stroke="#FFFFFF" stroke-width="4" filter="url(#shadow)" />
    <text x="220" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="18" font-weight="600" fill="#C0392B" text-anchor="middle">
        Era 1.0
    </text>
    <text x="220" y="125" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="14" fill="#5D6D7E" text-anchor="middle">
        1990s-2020
    </text>

    <!-- Era 2.0 Node -->
    <circle cx="480" cy="180" r="24" fill="#E67E22" stroke="#FFFFFF" stroke-width="4" filter="url(#shadow)" />
    <text x="480" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="18" font-weight="600" fill="#E67E22" text-anchor="middle">
        Era 2.0
    </text>
    <text x="480" y="125" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="14" fill="#5D6D7E" text-anchor="middle">
        2020-Present
    </text>

    <!-- "We are here" marker -->
    <path d="M 560 180 L 600 160 L 600 200 Z" fill="#E67E22" />
    <rect x="610" y="165" width="110" height="30" fill="#E67E22" rx="15" />
    <text x="665" y="185" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">
        We are here
    </text>

    <!-- Era 3.0 Node -->
    <circle cx="820" cy="180" r="24" fill="#0077B5" stroke="#FFFFFF" stroke-width="4" filter="url(#shadow)" />
    <text x="820" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="18" font-weight="600" fill="#0077B5" text-anchor="middle">
        Era 3.0
    </text>
    <text x="820" y="125" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="14" fill="#5D6D7E" text-anchor="middle">
        Future
    </text>

    <!-- Era 4.0 Node -->
    <circle cx="1060" cy="180" r="24" fill="#27AE60" stroke="#FFFFFF" stroke-width="4" filter="url(#shadow)" />
    <text x="1060" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="18" font-weight="600" fill="#27AE60" text-anchor="middle">
        Era 4.0
    </text>
    <text x="1060" y="125" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="14" fill="#5D6D7E" text-anchor="middle">
        Speculative
    </text>

    <!-- Era 1.0 Card -->
    <rect x="140" y="230" width="200" height="430" fill="url(#era1Grad)" filter="url(#shadow)" rx="10" />
    <rect x="140" y="230" width="200" height="8" fill="#C0392B" rx="10" />
    <text x="240" y="265" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="20" font-weight="600" fill="#C0392B" text-anchor="middle">
        原始计算
    </text>
    <text x="160" y="295" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="15" fill="#2C3E50">
        <tspan x="160" dy="0" font-weight="600">智能水平：</tspan>
        <tspan x="160" dy="22">有限结构化输入</tspan>
        <tspan x="160" dy="30" font-weight="600">上下文形式：</tspan>
        <tspan x="160" dy="22">GUI、传感器数据</tspan>
        <tspan x="160" dy="30" font-weight="600">人类角色：</tspan>
        <tspan x="160" dy="22">意图翻译者</tspan>
        <tspan x="160" dy="30" font-weight="600">代表系统：</tspan>
        <tspan x="160" dy="22">Context Toolkit</tspan>
        <tspan x="160" dy="20">Cooltown</tspan>
    </text>

    <!-- Era 2.0 Card -->
    <rect x="360" y="230" width="240" height="430" fill="url(#era2Grad)" filter="url(#shadow)" rx="10" />
    <rect x="360" y="230" width="240" height="8" fill="#E67E22" rx="10" />
    <text x="480" y="265" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="20" font-weight="600" fill="#E67E22" text-anchor="middle">
        智能代理
    </text>
    <text x="380" y="295" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="15" fill="#2C3E50">
        <tspan x="380" dy="0" font-weight="600">智能水平：</tspan>
        <tspan x="380" dy="22">NLP + 推理能力</tspan>
        <tspan x="380" dy="30" font-weight="600">上下文形式：</tspan>
        <tspan x="380" dy="22">Token 序列、RAG</tspan>
        <tspan x="380" dy="20">Tool API、Memory</tspan>
        <tspan x="380" dy="30" font-weight="600">人类角色：</tspan>
        <tspan x="380" dy="22">协作者</tspan>
        <tspan x="380" dy="30" font-weight="600">代表系统：</tspan>
        <tspan x="380" dy="22">ChatGPT、Claude</tspan>
        <tspan x="380" dy="20">LangChain、Letta</tspan>
    </text>

    <!-- Era 3.0 Card -->
    <rect x="720" y="230" width="240" height="430" fill="url(#era3Grad)" filter="url(#shadow)" rx="10" />
    <rect x="720" y="230" width="240" height="8" fill="#0077B5" rx="10" />
    <text x="840" y="265" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="20" font-weight="600" fill="#0077B5" text-anchor="middle">
        人类级智能
    </text>
    <text x="740" y="295" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="15" fill="#2C3E50">
        <tspan x="740" dy="0" font-weight="600">智能水平：</tspan>
        <tspan x="740" dy="22">情感、社交理解</tspan>
        <tspan x="740" dy="30" font-weight="600">上下文形式：</tspan>
        <tspan x="740" dy="22">多模态、触觉</tspan>
        <tspan x="740" dy="20">隐式意图推断</tspan>
        <tspan x="740" dy="30" font-weight="600">人类角色：</tspan>
        <tspan x="740" dy="22">平等伙伴</tspan>
        <tspan x="740" dy="30" font-weight="600">特征：</tspan>
        <tspan x="740" dy="22">无缝协作</tspan>
        <tspan x="740" dy="20">类人理解能力</tspan>
    </text>

    <!-- Era 4.0 Card -->
    <rect x="980" y="230" width="220" height="430" fill="url(#era4Grad)" filter="url(#shadow)" rx="10" />
    <rect x="980" y="230" width="220" height="8" fill="#27AE60" rx="10" />
    <text x="1090" y="265" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="20" font-weight="600" fill="#27AE60" text-anchor="middle">
        超人类智能
    </text>
    <text x="1000" y="295" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="15" fill="#2C3E50">
        <tspan x="1000" dy="0" font-weight="600">智能水平：</tspan>
        <tspan x="1000" dy="22">超越人类理解</tspan>
        <tspan x="1000" dy="30" font-weight="600">上下文形式：</tspan>
        <tspan x="1000" dy="22">主动构建场景</tspan>
        <tspan x="1000" dy="30" font-weight="600">人类角色：</tspan>
        <tspan x="1000" dy="22">被引导者</tspan>
        <tspan x="1000" dy="30" font-weight="600">示例：</tspan>
        <tspan x="1000" dy="22">AlphaGo 教授</tspan>
        <tspan x="1000" dy="20">职业选手新策略</tspan>
    </text>
</svg>