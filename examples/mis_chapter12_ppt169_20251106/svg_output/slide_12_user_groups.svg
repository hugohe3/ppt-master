<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- 页码标识 -->
  <text x="60" y="50" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#005587">12-4</text>
  
  <!-- 标题 -->
  <text x="60" y="100" font-family="'Microsoft YaHei', sans-serif" font-size="48" font-weight="bold" fill="#005587">不同决策群体的BI使用</text>
  <text x="60" y="130" font-family="'Segoe UI', sans-serif" font-size="24" fill="#7F8C8D">How Different Groups Use BI</text>
  
  <!-- 分隔线 -->
  <line x1="60" y1="150" x2="560" y2="150" stroke="#005587" stroke-width="2"/>
  
  <!-- 用户群体分布可视化 -->
  <text x="350" y="210" font-family="'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#2C3E50" text-anchor="middle">BI 用户群体分布</text>
  
  <!-- 临时用户（80%）- 大矩形 -->
  <rect x="80" y="240" width="540" height="200" fill="#ECF0F1" rx="12" stroke="#7F8C8D" stroke-width="3"/>
  <text x="350" y="290" font-family="'Microsoft YaHei', sans-serif" font-size="48" font-weight="bold" fill="#7F8C8D" text-anchor="middle">80%</text>
  <text x="350" y="330" font-family="'Microsoft YaHei', sans-serif" font-size="32" font-weight="bold" fill="#2C3E50" text-anchor="middle">临时用户</text>
  <text x="350" y="360" font-family="'Segoe UI', sans-serif" font-size="20" fill="#7F8C8D" text-anchor="middle">Casual Users</text>
  <text x="350" y="395" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#2C3E50" text-anchor="middle">主要依赖生产报告</text>
  <text x="350" y="422" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#2C3E50" text-anchor="middle">偶尔查看仪表盘和固定报表</text>
  
  <!-- 高级用户（20%）- 小矩形 -->
  <rect x="80" y="460" width="540" height="100" fill="#005587" rx="12"/>
  <text x="200" y="500" font-family="'Microsoft YaHei', sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF" text-anchor="middle">20%</text>
  <text x="410" y="495" font-family="'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">高级用户</text>
  <text x="410" y="523" font-family="'Segoe UI', sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle">Power Users</text>
  <text x="410" y="548" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">报告、分析、模型和预测的生产者</text>
  
  <!-- 右侧详细对比 -->
  <rect x="680" y="240" width="540" height="160" fill="#F8F9FA" rx="12"/>
  <text x="950" y="275" font-family="'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#005587" text-anchor="middle">👥 临时用户特征</text>
  <text x="700" y="310" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">• 业务部门员工和基层管理者</text>
  <text x="700" y="338" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">• 主要消费已有的报告和仪表盘</text>
  <text x="700" y="366" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">• 对BI工具的技术要求较低</text>
  <text x="700" y="394" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#7F8C8D">Focus: 获取信息以支持日常决策</text>
  
  <rect x="680" y="420" width="540" height="140" fill="#FFF5E6" rx="12"/>
  <text x="950" y="455" font-family="'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#E67E22" text-anchor="middle">⭐ 高级用户特征</text>
  <text x="700" y="488" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">• 数据分析师、BI专员、数据科学家</text>
  <text x="700" y="516" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">• 创建报告、构建模型、开展深度分析</text>
  <text x="700" y="544" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#7F8C8D">Focus: 挖掘洞察并为组织提供决策支持</text>
  
  <!-- 底部说明 -->
  <rect x="80" y="590" width="1120" height="90" fill="#005587" rx="12"/>
  <text x="640" y="625" font-family="'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">💡 BI系统设计启示</text>
  <text x="640" y="658" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle">需要同时满足两类用户的需求：为临时用户提供易用的消费界面，为高级用户提供强大的分析工具</text>
</svg>

