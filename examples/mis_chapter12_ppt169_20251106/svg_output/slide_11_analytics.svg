<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- 页码标识 -->
  <text x="60" y="50" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#005587">12-3</text>
  
  <!-- 标题 -->
  <text x="60" y="100" font-family="'Microsoft YaHei', sans-serif" font-size="48" font-weight="bold" fill="#005587">关键分析技术</text>
  <text x="60" y="130" font-family="'Segoe UI', sans-serif" font-size="24" fill="#7F8C8D">Key Analytics Techniques</text>
  
  <!-- 分隔线 -->
  <line x1="60" y1="150" x2="420" y2="150" stroke="#005587" stroke-width="2"/>
  
  <!-- 2×2 四象限布局 -->
  
  <!-- 技术1：预测分析 -->
  <rect x="80" y="190" width="560" height="220" fill="#005587" rx="12"/>
  <text x="360" y="230" font-family="'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">● 预测分析</text>
  <text x="360" y="258" font-family="'Segoe UI', sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle">Predictive Analytics</text>
  
  <text x="100" y="295" font-family="'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">核心方法：</text>
  <text x="120" y="325" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF">• 统计分析与数据挖掘技术</text>
  <text x="120" y="350" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF">• 基于历史数据和未来假设</text>
  
  <text x="100" y="380" font-family="'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">应用场景：</text>
  <text x="120" y="405" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF">信用评分、客户流失预测、需求预测</text>
  
  <!-- 技术2：大数据分析 -->
  <rect x="680" y="190" width="540" height="220" fill="#0076A8" rx="12"/>
  <text x="950" y="230" font-family="'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">● 大数据分析</text>
  <text x="950" y="258" font-family="'Segoe UI', sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle">Big Data Analytics</text>
  
  <text x="700" y="295" font-family="'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">数据来源：</text>
  <text x="720" y="325" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF">• 社交媒体、传感器、日志</text>
  <text x="720" y="350" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF">• 海量非结构化数据</text>
  
  <text x="700" y="380" font-family="'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">价值：</text>
  <text x="720" y="405" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF">更个性化的洞察与实时分析</text>
  
  <!-- 技术3：运营智能 -->
  <rect x="80" y="450" width="560" height="220" fill="#27AE60" rx="12"/>
  <text x="360" y="490" font-family="'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">● 运营智能</text>
  <text x="360" y="518" font-family="'Segoe UI', sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle">Operational Intelligence</text>
  
  <text x="100" y="555" font-family="'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">核心特征：</text>
  <text x="120" y="585" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF">• 实时数据流分析（IoT）</text>
  <text x="120" y="610" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF">• 支持日常运营决策</text>
  
  <text x="100" y="640" font-family="'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">应用：</text>
  <text x="120" y="665" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF">预测性维护、供应链实时监控</text>
  
  <!-- 技术4：位置分析与GIS -->
  <rect x="680" y="450" width="540" height="220" fill="#E67E22" rx="12"/>
  <text x="950" y="490" font-family="'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">● 位置分析与GIS</text>
  <text x="950" y="518" font-family="'Segoe UI', sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle">Location Analytics &amp; GIS</text>
  
  <text x="700" y="555" font-family="'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">核心能力：</text>
  <text x="720" y="585" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF">• 从地理位置数据获得洞察</text>
  <text x="720" y="610" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF">• 在地图上可视化点、线、区域</text>
  
  <text x="700" y="640" font-family="'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">应用：</text>
  <text x="720" y="665" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF">选址决策、物流优化、区域分析</text>
</svg>

