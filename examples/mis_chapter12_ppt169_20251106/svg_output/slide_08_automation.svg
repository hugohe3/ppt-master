<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- 页码标识 -->
  <text x="60" y="50" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#005587">12-2</text>
  
  <!-- 标题 -->
  <text x="60" y="100" font-family="'Microsoft YaHei', sans-serif" font-size="48" font-weight="bold" fill="#005587">高速自动化决策</text>
  <text x="60" y="130" font-family="'Segoe UI', sans-serif" font-size="24" fill="#7F8C8D">High-Velocity Automated Decision Making</text>
  
  <!-- 分隔线 -->
  <line x1="60" y1="150" x2="480" y2="150" stroke="#005587" stroke-width="2"/>
  
  <!-- 速度对比可视化 -->
  <text x="640" y="210" font-family="'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#2C3E50" text-anchor="middle">决策速度对比</text>
  
  <!-- 人类决策 -->
  <rect x="150" y="240" width="400" height="140" fill="#ECF0F1" rx="12"/>
  <text x="350" y="275" font-family="'Microsoft YaHei', sans-serif" font-size="26" font-weight="bold" fill="#7F8C8D" text-anchor="middle">👤 人类决策</text>
  <text x="350" y="305" font-family="'Segoe UI', sans-serif" font-size="18" fill="#7F8C8D" text-anchor="middle">Human Decision Making</text>
  
  <!-- 速度指示器 -->
  <rect x="170" y="320" width="60" height="40" fill="#7F8C8D" rx="4"/>
  <text x="200" y="345" font-family="'Microsoft YaHei', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">秒级</text>
  <text x="350" y="355" font-family="'Segoe UI', sans-serif" font-size="16" fill="#2C3E50" text-anchor="middle">Seconds ~ Minutes ~ Hours</text>
  
  <!-- VS -->
  <circle cx="640" cy="310" r="40" fill="#E67E22"/>
  <text x="640" y="325" font-family="'Arial', sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF" text-anchor="middle">VS</text>
  
  <!-- 算法决策 -->
  <rect x="730" y="240" width="400" height="140" fill="#005587" rx="12"/>
  <text x="930" y="275" font-family="'Microsoft YaHei', sans-serif" font-size="26" font-weight="bold" fill="#FFFFFF" text-anchor="middle">🤖 算法决策</text>
  <text x="930" y="305" font-family="'Segoe UI', sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle">Algorithmic Decision Making</text>
  
  <!-- 速度指示器 -->
  <rect x="750" y="320" width="100" height="40" fill="#27AE60" rx="4"/>
  <text x="800" y="345" font-family="'Microsoft YaHei', sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">毫秒/纳秒</text>
  <text x="930" y="355" font-family="'Segoe UI', sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">Milliseconds ~ Nanoseconds</text>
  
  <!-- 应用场景 -->
  <text x="60" y="440" font-family="'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#2C3E50">典型应用场景</text>
  
  <rect x="80" y="470" width="360" height="100" fill="#F8F9FA" rx="8"/>
  <text x="100" y="500" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#005587">💹 高频交易 HFT</text>
  <text x="120" y="528" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">• 毫秒级买卖决策</text>
  <text x="120" y="550" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">• 算法自动执行交易策略</text>
  
  <rect x="480" y="470" width="360" height="100" fill="#F8F9FA" rx="8"/>
  <text x="500" y="500" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#005587">🔍 搜索引擎排名</text>
  <text x="520" y="528" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">• 实时结果排序决策</text>
  <text x="520" y="550" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">• 机器学习模型驱动</text>
  
  <rect x="880" y="470" width="340" height="100" fill="#F8F9FA" rx="8"/>
  <text x="900" y="500" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#005587">📡 实时竞价 RTB</text>
  <text x="920" y="528" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">• 广告位瞬时竞价</text>
  <text x="920" y="550" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">• 100ms内完成决策</text>
  
  <!-- 完整决策流程 -->
  <rect x="80" y="590" width="1120" height="90" fill="#FFF5E6" rx="12"/>
  <text x="640" y="620" font-family="'Microsoft YaHei', sans-serif" font-size="22" font-weight="bold" fill="#E67E22" text-anchor="middle">⚡ 算法完成完整决策流程</text>
  <text x="640" y="648" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#E67E22" text-anchor="middle">情报收集 → 方案设计 → 方案选择 → 执行实施</text>
  <text x="640" y="670" font-family="'Segoe UI', sans-serif" font-size="14" fill="#E67E22" text-anchor="middle">Intelligence → Design → Choice → Implementation (All by Software Algorithms)</text>
  
  <!-- 底部警示 -->
  <text x="1220" y="710" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#7F8C8D" text-anchor="end">⚠️ 人类速度太慢，无法参与其中 | Humans are too slow to participate</text>
</svg>

