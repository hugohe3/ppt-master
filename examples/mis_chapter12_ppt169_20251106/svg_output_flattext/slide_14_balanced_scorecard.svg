<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  
  <rect width="1280" height="720" fill="#FFFFFF" />
  
  
  <text x="60" y="50" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#005587">12-4</text>
  
  
  <text x="60" y="100" font-family="'Microsoft YaHei', sans-serif" font-size="48" font-weight="bold" fill="#005587">平衡计分卡方法</text>
  <text x="60" y="130" font-family="'Segoe UI', sans-serif" font-size="24" fill="#7F8C8D">Balanced Scorecard Method</text>
  
  
  <line x1="60" y1="150" x2="440" y2="150" stroke="#005587" stroke-width="2" />
  
  
  <circle cx="640" cy="400" r="80" fill="#005587" />
  <text x="640" y="390" font-family="'Microsoft YaHei', sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">公司战略</text>
  <text x="640" y="415" font-family="'Segoe UI', sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">Company</text>
  <text x="640" y="435" font-family="'Segoe UI', sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">Strategy</text>
  
  
  
  
  <rect x="120" y="220" width="420" height="150" fill="#0076A8" rx="12" />
  <text x="330" y="260" font-family="'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">■ 财务</text>
  <text x="330" y="285" font-family="'Segoe UI', sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle">Financial Perspective</text>
  <text x="140" y="315" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF">KPI: 收入增长率、利润率、</text>
  <text x="140" y="340" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF">ROI、现金流、股东回报</text>
  <text x="140" y="362" font-family="'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">Revenue Growth, Profit Margin, ROI</text>
  
  
  <line x1="540" y1="295" x2="580" y2="340" stroke="#ECF0F1" stroke-width="2" stroke-dasharray="4,2" />
  
  
  <rect x="740" y="220" width="420" height="150" fill="#27AE60" rx="12" />
  <text x="950" y="260" font-family="'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">■ 客户</text>
  <text x="950" y="285" font-family="'Segoe UI', sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle">Customer Perspective</text>
  <text x="760" y="315" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF">KPI: 客户满意度、客户留存率、</text>
  <text x="760" y="340" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF">市场份额、客户获取成本</text>
  <text x="760" y="362" font-family="'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">Customer Satisfaction, Retention Rate</text>
  
  
  <line x1="740" y1="295" x2="700" y2="340" stroke="#ECF0F1" stroke-width="2" stroke-dasharray="4,2" />
  
  
  <rect x="120" y="480" width="420" height="150" fill="#E67E22" rx="12" />
  <text x="330" y="520" font-family="'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">■ 业务流程</text>
  <text x="330" y="545" font-family="'Segoe UI', sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle">Internal Business Process</text>
  <text x="140" y="575" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF">KPI: 流程效率、质量指标、</text>
  <text x="140" y="600" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF">创新速度、运营成本</text>
  <text x="140" y="622" font-family="'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">Process Efficiency, Quality Metrics</text>
  
  
  <line x1="540" y1="555" x2="580" y2="460" stroke="#ECF0F1" stroke-width="2" stroke-dasharray="4,2" />
  
  
  <rect x="740" y="480" width="420" height="150" fill="#9B59B6" rx="12" />
  <text x="950" y="520" font-family="'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">■ 学习与成长</text>
  <text x="950" y="545" font-family="'Segoe UI', sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle">Learning &amp; Growth</text>
  <text x="760" y="575" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF">KPI: 员工满意度、培训时长、</text>
  <text x="760" y="600" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF">技能提升率、创新能力</text>
  <text x="760" y="622" font-family="'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF">Employee Satisfaction, Training Hours</text>
  
  
  <line x1="740" y1="555" x2="700" y2="460" stroke="#ECF0F1" stroke-width="2" stroke-dasharray="4,2" />
  
  
  <rect x="120" y="650" width="1040" height="50" fill="#F8F9FA" rx="8" />
  <text x="640" y="683" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#2C3E50" text-anchor="middle">▶ 通过四个维度全面衡量公司绩效，确保短期财务目标与长期战略发展的平衡</text>
