<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    
    <marker id="dataflow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0076A8" />
    </marker>
  </defs>
  
  
  <rect width="1280" height="720" fill="#FFFFFF" />
  
  
  <text x="60" y="50" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#005587">12-3</text>
  
  
  <text x="60" y="100" font-family="'Microsoft YaHei', sans-serif" font-size="48" font-weight="bold" fill="#005587">商业智能与业务分析</text>
  <text x="60" y="130" font-family="'Segoe UI', sans-serif" font-size="24" fill="#7F8C8D">Business Intelligence &amp; Business Analytics</text>
  
  
  <line x1="60" y1="150" x2="600" y2="150" stroke="#005587" stroke-width="2" />
  
  
  <text x="640" y="190" font-family="'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#2C3E50" text-anchor="middle">商业智能环境的六大要素</text>
  
  
  
  
  <rect x="140" y="230" width="260" height="70" fill="#7F8C8D" rx="8" />
  <text x="270" y="257" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">① 数据源</text>
  <text x="270" y="280" font-family="'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Data from Business Environment</text>
  <text x="270" y="297" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle">呼叫中心·网站·社交媒体·IoT</text>
  
  
  <line x1="270" y1="300" x2="270" y2="325" stroke="#0076A8" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#dataflow)" />
  
  
  <rect x="140" y="325" width="260" height="70" fill="#005587" rx="8" stroke="#E67E22" stroke-width="3" />
  <text x="270" y="352" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">② BI基础设施</text>
  <text x="270" y="375" font-family="'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">BI Infrastructure</text>
  <text x="270" y="392" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle">数据仓库·数据集市·Hadoop</text>
  
  
  <line x1="270" y1="395" x2="270" y2="420" stroke="#0076A8" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#dataflow)" />
  
  
  <rect x="140" y="420" width="260" height="70" fill="#0076A8" rx="8" />
  <text x="270" y="447" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">③ 分析工具</text>
  <text x="270" y="470" font-family="'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Analytics Toolset</text>
  <text x="270" y="487" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle">OLAP·统计·模型·数据挖掘</text>
  
  
  
  
  <rect x="460" y="325" width="280" height="70" fill="#27AE60" rx="8" />
  <text x="600" y="352" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">④ 管理用户与方法</text>
  <text x="600" y="375" font-family="'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Managerial Users &amp; Methods</text>
  <text x="600" y="392" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle">BPM·平衡计分卡·战略目标</text>
  
  
  <rect x="460" y="420" width="280" height="70" fill="#005587" rx="8" />
  <text x="600" y="447" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">⑤ 交付平台</text>
  <text x="600" y="470" font-family="'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">Delivery Platforms</text>
  <text x="600" y="487" font-family="'Microsoft YaHei', sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle">MIS · DSS · ESS</text>
  
  
  <rect x="800" y="325" width="320" height="165" fill="#E67E22" rx="8" />
  <text x="960" y="360" font-family="'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">⑥ 用户界面</text>
  <text x="960" y="388" font-family="'Segoe UI', sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">User Interface</text>
  <text x="820" y="420" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#FFFFFF">• 报告 Reports</text>
  <text x="820" y="443" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#FFFFFF">• 仪表盘 Dashboards</text>
  <text x="820" y="466" font-family="'Microsoft YaHei', sans-serif" font-size="15" fill="#FFFFFF">• 数据可视化</text>
  <text x="820" y="485" font-family="'Microsoft YaHei', sans-serif" font-size="14" fill="#FFFFFF">Data Visualization</text>
  
  
  <path d="M 400 455 L 460 455" stroke="#0076A8" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#dataflow)" />
  <path d="M 740 455 L 800 408" stroke="#0076A8" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#dataflow)" />
  <path d="M 740 360 L 800 360" stroke="#0076A8" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#dataflow)" />
  
  
  <rect x="80" y="540" width="560" height="140" fill="#F8F9FA" rx="8" />
  <text x="100" y="570" font-family="'Microsoft YaHei', sans-serif" font-size="22" font-weight="bold" fill="#005587">核心概念定义</text>
  <text font-size="16" fill="#005587" font-family="'Microsoft YaHei', sans-serif" font-weight="bold" x="120" y="600">商业智能 (BI)</text><text font-size="16" fill="#005587" font-family="'Microsoft YaHei', sans-serif" font-weight="bold" x="120" y="625">业务分析 (BA)</text><text x="120" y="650" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">包括 OLAP、统计学、模型和数据挖掘等</text>
  
  <rect x="680" y="540" width="540" height="140" fill="#F8F9FA" rx="8" />
  <text x="700" y="570" font-family="'Microsoft YaHei', sans-serif" font-size="22" font-weight="bold" fill="#005587">数据流向</text>
  <text x="720" y="600" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">原始数据 → BI基础设施（核心）→ 分析工具 → 交付平台</text>
  <text x="720" y="625" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">→ 用户界面 → 管理者决策</text>
  <text x="720" y="650" font-family="'Segoe UI', sans-serif" font-size="14" fill="#7F8C8D">Data → Infrastructure → Analytics → Platforms → UI → Decisions</text>
</svg>