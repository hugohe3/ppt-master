  <text x="760" y="532" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">MIS项目培养实战能力</text>
  
  
  <rect x="370" y="560" width="540" height="120" fill="#F8F9FA" rx="12" stroke="#9B59B6" stroke-width="2" />
