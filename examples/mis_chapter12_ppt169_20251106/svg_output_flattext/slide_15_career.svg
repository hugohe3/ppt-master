  <rect x="80" y="180" width="1120" height="70" fill="#005587" rx="12" />
  <text x="640" y="220" font-family="'Microsoft YaHei', sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF" text-anchor="middle">★ 目标职位：数据分析师 Data Analyst</text>
  
  
  
  
  <rect x="80" y="280" width="540" height="120" fill="#F8F9FA" rx="12" stroke="#005587" stroke-width="2" />
