  <text x="180" y="532" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">MIS为数据管理提供坚实基础</text>
  
  
  <rect x="660" y="420" width="540" height="120" fill="#F8F9FA" rx="12" stroke="#E67E22" stroke-width="2" />
