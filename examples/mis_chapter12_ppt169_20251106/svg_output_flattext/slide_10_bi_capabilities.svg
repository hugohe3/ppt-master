<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  
  <rect width="1280" height="720" fill="#FFFFFF" />
  
  
  <text x="60" y="50" font-family="'Microsoft YaHei', sans-serif" font-size="20" font-weight="bold" fill="#005587">12-3</text>
  
  
  <text x="60" y="100" font-family="'Microsoft YaHei', sans-serif" font-size="48" font-weight="bold" fill="#005587">商业智能分析能力</text>
  <text x="60" y="130" font-family="'Segoe UI', sans-serif" font-size="24" fill="#7F8C8D">BI Analytical Capabilities</text>
  
  
  <line x1="60" y1="150" x2="480" y2="150" stroke="#005587" stroke-width="2" />
  
  
  
  
  <rect x="80" y="190" width="540" height="100" fill="#F8F9FA" rx="8" />
  <circle cx="130" cy="230" r="24" fill="#005587" />
  <text x="130" y="240" font-family="'Arial', sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="180" y="225" font-family="'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#005587">生产报告 Production Reports</text>
  <text x="180" y="255" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">预定义的、基于行业特定需求的标准报告</text>
  <text x="180" y="278" font-family="'Segoe UI', sans-serif" font-size="14" fill="#7F8C8D">Pre-defined reports for specific industry requirements</text>
  
  
  <rect x="660" y="190" width="540" height="100" fill="#F8F9FA" rx="8" />
  <circle cx="710" cy="230" r="24" fill="#0076A8" />
  <text x="710" y="240" font-family="'Arial', sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="760" y="225" font-family="'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#005587">参数化报告 Parameterized Reports</text>
  <text x="760" y="255" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">用户输入参数筛选数据（如数据透视表）</text>
  <text x="760" y="278" font-family="'Segoe UI', sans-serif" font-size="14" fill="#7F8C8D">User-defined parameters to filter data (Pivot Tables)</text>
  
  
  <rect x="80" y="310" width="540" height="100" fill="#F8F9FA" rx="8" />
  <circle cx="130" cy="350" r="24" fill="#005587" />
  <text x="130" y="360" font-family="'Arial', sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="180" y="345" font-family="'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#005587">仪表盘/记分卡 Dashboards/Scorecards</text>
  <text x="180" y="375" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">可视化呈现用户定义的绩效数据</text>
  <text x="180" y="398" font-family="'Segoe UI', sans-serif" font-size="14" fill="#7F8C8D">Visual presentation of user-defined performance data</text>
  
  
  <rect x="660" y="310" width="540" height="100" fill="#F8F9FA" rx="8" />
  <circle cx="710" cy="350" r="24" fill="#0076A8" />
  <text x="710" y="360" font-family="'Arial', sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="760" y="345" font-family="'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#005587">即席查询 Ad Hoc Query</text>
  <text x="760" y="375" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">用户根据查询和搜索创建自己的报告</text>
  <text x="760" y="398" font-family="'Segoe UI', sans-serif" font-size="14" fill="#7F8C8D">Users create their own reports based on queries</text>
  
  
  <rect x="80" y="430" width="540" height="100" fill="#F8F9FA" rx="8" />
  <circle cx="130" cy="470" r="24" fill="#005587" />
  <text x="130" y="480" font-family="'Arial', sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">5</text>
  <text x="180" y="465" font-family="'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#005587">向下钻取 Drill Down</text>
  <text x="180" y="495" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">从高层级摘要深入到更详细视图的能力</text>
  <text x="180" y="518" font-family="'Segoe UI', sans-serif" font-size="14" fill="#7F8C8D">Ability to dive from high-level summary to detailed view</text>
  
  
  <rect x="660" y="430" width="540" height="100" fill="#F8F9FA" rx="8" />
  <circle cx="710" cy="470" r="24" fill="#E67E22" />
  <text x="710" y="480" font-family="'Arial', sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">6</text>
  <text x="760" y="465" font-family="'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#005587">预测与建模 Forecasting &amp; Modeling</text>
  <text x="760" y="495" font-family="'Microsoft YaHei', sans-serif" font-size="16" fill="#2C3E50">线性预测、"如果…会怎样"情景分析</text>
  <text x="760" y="518" font-family="'Segoe UI', sans-serif" font-size="14" fill="#7F8C8D">Linear forecasting, "what-if" scenario analysis</text>
  
  
  <rect x="80" y="560" width="1120" height="120" fill="#005587" rx="12" />
  <text x="640" y="595" font-family="'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle">▶ 从基础到高级的能力层次</text>
  <text x="640" y="630" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle">生产报告（1-2）适合普通用户 | 仪表盘与即席查询（3-4）适合管理者</text>
  <text x="640" y="658" font-family="'Microsoft YaHei', sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle">向下钻取与预测建模（5-6）适合高级分析师和数据科学家</text>
</svg>