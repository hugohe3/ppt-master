<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" width="900" height="900">
    <defs>
        <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#FFFBEB;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#FEF3C7;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="costGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#D97706;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- 背景 -->
    <rect width="900" height="900" fill="url(#orangeGradient)" />

    <!-- 标题区域 -->
    <text x="80" y="100"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="48" font-weight="400" fill="#1F2937">
        📞
    </text>

    <text x="80" y="180"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="48" font-weight="700" fill="#1F2937">
        通信成本骤降
    </text>

    <text x="80" y="230"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="28" font-weight="400" fill="#6B7280">
        Declining Communication Costs
    </text>

    <text x="80" y="280"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="24" font-weight="600" fill="#F59E0B">
        连接一切的"高速公路"
    </text>

    <!-- 信号塔图标 -->
    <g transform="translate(680, 90)">
        <!-- 塔身 -->
        <path d="M 45 80 L 40 40 L 50 40 Z" fill="#F59E0B" />
        <rect x="42" y="40" width="6" height="8" fill="#D97706" />

        <!-- 信号波纹 -->
        <path d="M 45 35 Q 30 30, 20 20" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" />
        <path d="M 45 35 Q 35 32, 28 25" fill="none" stroke="#FBBF24" stroke-width="2" stroke-linecap="round" />
        <path d="M 45 35 Q 60 30, 70 20" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" />
        <path d="M 45 35 Q 55 32, 62 25" fill="none" stroke="#FBBF24" stroke-width="2" stroke-linecap="round" />
    </g>

    <!-- 时间线对比 -->
    <g transform="translate(80, 330)">
        <rect x="0" y="0" width="740" height="260" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2" />

        <!-- 十几年前 -->
        <g transform="translate(40, 40)">
            <text x="0" y="0"
                font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
                font-size="18" font-weight="600" fill="#1F2937">
                十几年前
            </text>
            <text x="0" y="30"
                font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
                font-size="16" font-weight="400" fill="#6B7280">
                长途电话费
            </text>
            <rect x="0" y="45" width="200" height="30" rx="4" fill="#FEF3C7" />
            <text x="100" y="67"
                font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
                font-size="20" font-weight="700" fill="#D97706" text-anchor="middle">
                ¥¥¥
            </text>
        </g>

        <!-- 分隔线 -->
        <line x1="40" y1="120" x2="700" y2="120" stroke="#E5E7EB" stroke-width="2" />

        <!-- 十年前 -->
        <g transform="translate(40, 140)">
            <text x="0" y="0"
                font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
                font-size="18" font-weight="600" fill="#1F2937">
                十年前
            </text>
            <text x="0" y="30"
                font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
                font-size="16" font-weight="400" fill="#6B7280">
                3G 流量套餐
            </text>
            <rect x="0" y="45" width="150" height="30" rx="4" fill="#FEF3C7" />
            <text x="75" y="67"
                font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
                font-size="20" font-weight="700" fill="#F59E0B" text-anchor="middle">
                ¥¥
            </text>
        </g>

        <!-- 现在 -->
        <g transform="translate(290, 140)">
            <text x="0" y="0"
                font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
                font-size="18" font-weight="600" fill="#1F2937">
                现在
            </text>
            <text x="0" y="30"
                font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
                font-size="16" font-weight="400" fill="#6B7280">
                7×24 在线 Wi-Fi + 5G
            </text>
            <rect x="0" y="45" width="100" height="30" rx="4" fill="#D1FAE5" />
            <text x="50" y="67"
                font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
                font-size="20" font-weight="700" fill="#10B981" text-anchor="middle">
                ≈ 0
            </text>
        </g>

        <!-- 趋势箭头 -->
        <g transform="translate(500, 90)">
            <text x="0" y="0"
                font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
                font-size="18" font-weight="600" fill="#F59E0B">
                成本趋势
            </text>
            <line x1="50" y1="30" x2="150" y2="90" stroke="#D97706" stroke-width="4" stroke-linecap="round" />
            <path d="M 150 90 L 145 80 L 140 88 Z" fill="#D97706" />
            <text x="100" y="110"
                font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
                font-size="24" font-weight="700" fill="#D97706" text-anchor="middle">
                → 0
            </text>
        </g>
    </g>

    <!-- 网络速度演进 -->
    <g transform="translate(80, 615)">
        <text x="0" y="0"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
            font-size="22" font-weight="600" fill="#1F2937">
            网络速度提升
        </text>

        <!-- 3G -->
        <g transform="translate(110, 40)">
            <rect x="0" y="60" width="120" height="100" rx="4" fill="url(#costGradient)" />
            <text x="60" y="45"
                font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
                font-size="24" font-weight="700" fill="#D97706" text-anchor="middle">
                3G
            </text>
            <text x="60" y="180"
                font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
                font-size="16" font-weight="400" fill="#6B7280" text-anchor="middle">
                ~2 Mbps
            </text>
        </g>

        <!-- 4G -->
        <g transform="translate(310, 40)">
            <rect x="0" y="20" width="120" height="140" rx="4" fill="url(#costGradient)" />
            <text x="60" y="5"
                font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
                font-size="24" font-weight="700" fill="#F59E0B" text-anchor="middle">
                4G
            </text>
            <text x="60" y="180"
                font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
                font-size="16" font-weight="400" fill="#6B7280" text-anchor="middle">
                ~50 Mbps
            </text>
        </g>

        <!-- 5G -->
        <g transform="translate(510, 40)">
            <rect x="0" y="0" width="120" height="160" rx="4" fill="url(#costGradient)" />
            <text x="60" y="-15"
                font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
                font-size="24" font-weight="700" fill="#FBBF24" text-anchor="middle">
                5G
            </text>
            <text x="60" y="180"
                font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
                font-size="16" font-weight="400" fill="#6B7280" text-anchor="middle">
                ~1 Gbps
            </text>
        </g>

        <!-- 坐标轴 -->
        <line x1="0" y1="240" x2="740" y2="240" stroke="#9CA3AF" stroke-width="2" />
    </g>

    <!-- 底部说明 -->
    <text x="450" y="870"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="16" font-weight="400" fill="#6B7280" text-anchor="middle">
        <tspan x="450" dy="0">连接无处不在，引爆移动互联网时代</tspan>
    </text>
</svg>