<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <defs>
        <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#005587;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0076A8;stop-opacity:1" />
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#FFFFFF" />
    <rect x="0" y="0" width="1280" height="3" fill="url(#accentGradient)" />

    <text x="60" y="75"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="36" font-weight="600" fill="#005587">
        案例总结
    </text>
    <line x1="60" y1="95" x2="1220" y2="95" stroke="#E0E0E0" stroke-width="2" />

    <!-- 问题总结 -->
    <rect x="60" y="140" width="560" height="230" fill="#F8F9FA" rx="8" />
    <rect x="60" y="140" width="8" height="230" fill="#C0392B" rx="4" />

    <text x="90" y="180"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="24" font-weight="600" fill="#C0392B">
        核心问题
    </text>

    <text x="110" y="225"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="18" font-weight="400" fill="#2C3E50">
        <tspan x="110" dy="0">恒通银行重庆大学支行前台客户</tspan>
        <tspan x="110" dy="28">经理营销积极性不足，表现为：</tspan>
        <tspan x="110" dy="28">• 营销动力严重不足</tspan>
        <tspan x="110" dy="28">• 业绩指标完成率低</tspan>
        <tspan x="110" dy="28">• 团队协作氛围差</tspan>
        <tspan x="110" dy="28">• 职业倦怠现象突出</tspan>
    </text>

    <!-- 分析总结 -->
    <rect x="660" y="140" width="560" height="230" fill="#F8F9FA" rx="8" />
    <rect x="660" y="140" width="8" height="230" fill="#0076A8" rx="4" />

    <text x="690" y="180"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="24" font-weight="600" fill="#0076A8">
        理论分析
    </text>

    <text x="710" y="225"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="18" font-weight="400" fill="#2C3E50">
        <tspan x="710" dy="0">基于组织行为学理论，从三个层面</tspan>
        <tspan x="710" dy="28">剖析问题根源：</tspan>
        <tspan x="710" dy="28">• 个体：需求满足缺失、期望降低</tspan>
        <tspan x="710" dy="28">• 团队：凝聚力缺失、角色冲突</tspan>
        <tspan x="710" dy="28">• 组织：机制缺陷、文化缺失</tspan>
    </text>

    <!-- 方案总结 -->
    <rect x="60" y="400" width="560" height="240" fill="#F8F9FA" rx="8" />
    <rect x="60" y="400" width="8" height="240" fill="#27AE60" rx="4" />

    <text x="90" y="440"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="24" font-weight="600" fill="#27AE60">
        破解方案
    </text>

    <text x="110" y="485"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="18" font-weight="400" fill="#2C3E50">
        <tspan x="110" dy="0">构建"激励—协作—发展"三位一</tspan>
        <tspan x="110" dy="28">体解决方案：</tspan>
        <tspan x="110" dy="28">• 优化激励机制</tspan>
        <tspan x="110" dy="28">• 强化团队建设</tspan>
        <tspan x="110" dy="28">• 完善职业发展</tspan>
        <tspan x="110" dy="28">• 三阶段系统化实施</tspan>
    </text>

    <!-- 价值总结 -->
    <rect x="660" y="400" width="560" height="240" fill="#F8F9FA" rx="8" />
    <rect x="660" y="400" width="8" height="240" fill="#005587" rx="4" />

    <text x="690" y="440"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="24" font-weight="600" fill="#005587">
        价值与意义
    </text>

    <text x="710" y="485"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="18" font-weight="400" fill="#2C3E50">
        <tspan x="710" dy="0">本案例为金融机构服务特色客群</tspan>
        <tspan x="710" dy="28">提供管理启示：</tspan>
        <tspan x="710" dy="28">• 理论与实践紧密结合</tspan>
        <tspan x="710" dy="28">• 系统化诊断与解决</tspan>
        <tspan x="710" dy="28">• 可推广至其他特色客群网点</tspan>
        <tspan x="710" dy="28">• 提升金融服务质量与竞争力</tspan>
    </text>

    <rect x="0" y="717" width="1280" height="3" fill="url(#accentGradient)" />
    <text x="1220" y="700"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="16" font-weight="300" fill="#7F8C8D" text-anchor="end">
        17
    </text>
</svg>