    </text>
    <text x="85" y="65" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="14" fill="#4A4A4A">
      突破剪力墙局限
    </text>
    <text x="85" y="88" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="14" fill="#4A4A4A">
      除湿区外，空间可自由组合
    </text>
  </g>
  
  <!-- 核心理念区域 -->
  <rect x="60" y="330" width="1160" height="180" rx="10" fill="#1A2F4A"/>
  
  <text x="640" y="375" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="22" fill="#C9A962" text-anchor="middle" font-weight="bold">
    全景无柱设计 · 全生命周期户型
  </text>
  
  <!-- 生命周期示意 -->
  <g transform="translate(100, 400)">
    <!-- 阶段1 -->
    <rect x="0" y="0" width="180" height="80" rx="6" fill="rgba(255,255,255,0.1)"/>
    <text x="90" y="35" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">👫 二人世界</text>
    <text x="90" y="60" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle">开放式布局</text>
    
    <!-- 箭头 -->
    <path d="M 195 40 L 230 40" stroke="#C9A962" stroke-width="2" fill="none"/>
    <polygon points="230,35 240,40 230,45" fill="#C9A962"/>
  </g>
  
  <g transform="translate(350, 400)">
    <!-- 阶段2 -->
    <rect x="0" y="0" width="180" height="80" rx="6" fill="rgba(255,255,255,0.1)"/>
    <text x="90" y="35" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">👨‍👩‍👧 三口之家</text>
    <text x="90" y="60" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle">增加儿童房</text>
    
    <!-- 箭头 -->
    <path d="M 195 40 L 230 40" stroke="#C9A962" stroke-width="2" fill="none"/>
    <polygon points="230,35 240,40 230,45" fill="#C9A962"/>
  </g>
  
  <g transform="translate(600, 400)">
    <!-- 阶段3 -->
    <rect x="0" y="0" width="180" height="80" rx="6" fill="rgba(255,255,255,0.1)"/>
    <text x="90" y="35" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">👨‍👩‍👧‍👦 二孩家庭</text>
    <text x="90" y="60" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="middle">独立学习区</text>
    
    <!-- 箭头 -->
    <path d="M 195 40 L 230 40" stroke="#C9A962" stroke-width="2" fill="none"/>
    <polygon points="230,35 240,40 230,45" fill="#C9A962"/>
  </g>
  
  <g transform="translate(850, 400)">
    <!-- 阶段4 -->
    <rect x="0" y="0" width="180" height="80" rx="6" fill="#C9A962"/>
    <text x="90" y="35" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="14" fill="#1A2F4A" text-anchor="middle" font-weight="bold">👨‍👩‍👧‍👦👴👵 三代同堂</text>
    <text x="90" y="60" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="12" fill="#1A2F4A" text-anchor="middle">双主套+独立空间</text>
  </g>
  
  <!-- 底部金句 -->
  <rect x="60" y="540" width="1160" height="130" rx="10" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
  
  <text x="640" y="590" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="26" fill="#1A2F4A" text-anchor="middle" font-weight="bold">
    "不再是人去将就房子，而是房子来适应人"
  </text>
  
  <text x="640" y="630" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="16" fill="#4A4A4A" text-anchor="middle">
    优越设计叠加新规福利，户型使用率直接硬核起飞，堪称后海片区的"天花板"
  </text>
  
  <!-- 首推信息 -->
  <rect x="1000" y="560" width="200" height="90" rx="6" fill="#1A2F4A"/>
  <text x="1100" y="595" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="14" fill="#C9A962" text-anchor="middle">
    首推 1栋
  </text>
  <text x="1100" y="625" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle" font-weight="bold">
    2T2户 · 专梯入户
  </text>
</svg>
