    </text>
    <text x="85" y="88" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="14" fill="#4A4A4A">
      减少交叉干扰，提升私密性与尊崇感
    </text>
  </g>
  
  <!-- 卖点3 -->
  <g transform="translate(850, 195)">
    <rect x="0" y="0" width="370" height="110" rx="8" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="0" y="0" width="8" height="110" rx="4" fill="#C9A962"/>
    
    <circle cx="45" cy="55" r="25" fill="#1A2F4A"/>
    <text x="45" y="62" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle">🏗️</text>
    
    <text x="85" y="40" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#1A2F4A" font-weight="bold">
