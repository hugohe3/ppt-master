<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGradient8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F6F1"/>
      <stop offset="100%" style="stop-color:#EFEAE3"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect x="0" y="0" width="1280" height="720" fill="url(#bgGradient8)"/>
  
  <!-- 顶部深色条 -->
  <rect x="0" y="0" width="1280" height="80" fill="#1A2F4A"/>
  
  <!-- 页面标题 -->
  <text x="60" y="52" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">
    户型价值：全生命周期的陪伴
  </text>
  
  <!-- 页码 -->
  <text x="1220" y="52" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.6)" text-anchor="end">
    08/10
  </text>
  
  <!-- 户型规格标签 -->
  <rect x="60" y="110" width="280" height="60" rx="6" fill="#1A2F4A"/>
  <text x="200" y="135" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="14" fill="#C9A962" text-anchor="middle">
    首推户型
  </text>
  <text x="200" y="158" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle" font-weight="bold">
    建面约197-237㎡
  </text>
  
  <!-- 新规标签 -->
  <rect x="360" y="110" width="150" height="60" rx="6" fill="#C9A962"/>
  <text x="435" y="148" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="16" fill="#1A2F4A" text-anchor="middle" font-weight="bold">
    新规户型
  </text>
  
  <!-- 核心卖点区域 -->
  <!-- 卖点1 -->
  <g transform="translate(60, 195)">
    <rect x="0" y="0" width="370" height="110" rx="8" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="0" y="0" width="8" height="110" rx="4" fill="#C9A962"/>
    
    <circle cx="45" cy="55" r="25" fill="#1A2F4A"/>
    <text x="45" y="62" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle">🏠</text>
    
    <text x="85" y="40" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#1A2F4A" font-weight="bold">
      板楼设计
    </text>
    <text x="85" y="65" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="14" fill="#4A4A4A">
      南北通透，户型方正
    </text>
    <text x="85" y="88" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="14" fill="#4A4A4A">
      三面采光，双套房朝南
    </text>
  </g>
  
  <!-- 卖点2 -->
  <g transform="translate(455, 195)">
    <rect x="0" y="0" width="370" height="110" rx="8" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="0" y="0" width="8" height="110" rx="4" fill="#C9A962"/>
    
    <circle cx="45" cy="55" r="25" fill="#1A2F4A"/>
    <text x="45" y="62" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle">🔒</text>
    
    <text x="85" y="40" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#1A2F4A" font-weight="bold">
