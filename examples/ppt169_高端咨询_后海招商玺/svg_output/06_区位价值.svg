    </text>
    <text x="20" y="164" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="14" fill="#4A4A4A">
      • 全链条国际化教育通路
    </text>
  </g>
  
  <!-- 底部说明 -->
  <rect x="60" y="620" width="1160" height="60" rx="6" fill="#1A2F4A"/>
  <text x="640" y="658" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">
    兼具CBD全球视野与经济动能，坐拥核心居住区的静谧与纯粹，为塔尖圈层提供传世资产
  </text>
</svg>
