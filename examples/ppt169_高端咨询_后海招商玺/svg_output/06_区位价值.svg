<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGradient6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F6F1"/>
      <stop offset="100%" style="stop-color:#EFEAE3"/>
    </linearGradient>
    <linearGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#C9A962;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#C9A962;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect x="0" y="0" width="1280" height="720" fill="url(#bgGradient6)"/>
  
  <!-- 顶部深色条 -->
  <rect x="0" y="0" width="1280" height="80" fill="#1A2F4A"/>
  
  <!-- 页面标题 -->
  <text x="60" y="52" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">
    区位价值：大后海生态系统
  </text>
  
  <!-- 页码 -->
  <text x="1220" y="52" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.6)" text-anchor="end">
    06/10
  </text>
  
  <!-- 中心圆形 - 后海招商玺 -->
  <circle cx="640" cy="380" r="85" fill="#1A2F4A" stroke="#C9A962" stroke-width="3"/>
  <text x="640" y="365" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="16" fill="#C9A962" text-anchor="middle">
    后海招商玺
  </text>
  <text x="640" y="395" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">
    城市巅峰资源
  </text>
  
  <!-- 连接线 -->
  <line x1="555" y1="380" x2="380" y2="260" stroke="#C9A962" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="555" y1="380" x2="380" y2="500" stroke="#C9A962" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="725" y1="380" x2="900" y2="260" stroke="#C9A962" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="725" y1="380" x2="900" y2="500" stroke="#C9A962" stroke-width="2" stroke-dasharray="5,3"/>
  
  <!-- 左上 - 硅谷的头脑 -->
  <g transform="translate(100, 130)">
    <rect x="0" y="0" width="300" height="200" rx="10" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
    <rect x="0" y="0" width="300" height="50" rx="10" fill="#1A2F4A"/>
    <rect x="0" y="40" width="300" height="10" fill="#1A2F4A"/>
    
    <!-- 图标 -->
    <circle cx="30" cy="25" r="16" fill="#C9A962"/>
    <text x="30" y="31" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="14" fill="#1A2F4A" text-anchor="middle">💡</text>
    
    <text x="55" y="32" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="18" fill="#FFFFFF" font-weight="bold">
      硅谷的头脑
    </text>
    
    <text x="20" y="80" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="14" fill="#4A4A4A">
      <tspan x="20" dy="0">• 深港穗科技集群</tspan>
      <tspan fill="#C9A962" font-weight="bold">全球第一</tspan>
    </text>
    <text x="20" y="108" font-family="PingFang SC, Microsoft YaHei, Helvetica Neue, Arial, sans-serif" font-size="14" fill="#4A4A4A">
