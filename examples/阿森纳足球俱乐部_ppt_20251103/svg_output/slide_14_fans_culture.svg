<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- 顶部装饰条 -->
  <rect x="0" y="0" width="1280" height="8" fill="#EF0107"/>
  
  <!-- 标题 -->
  <text x="640" y="100" 
        font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
        font-size="48" 
        font-weight="bold"
        fill="#EF0107" 
        text-anchor="middle">
    球迷文化 · The Arsenal Family
  </text>
  
  <!-- 球迷看台大图 -->
  <rect x="80" y="150" width="1120" height="280" 
        fill="#F5F5F5" 
        stroke="#CCCCCC" 
        stroke-width="2" 
        stroke-dasharray="8,4" 
        rx="16"/>
  <text x="640" y="275" 
        font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
        font-size="18" 
        fill="#999999" 
        text-anchor="middle">
    [图片：球迷看台红色海洋 / 酋长球场球迷助威场景]
  </text>
  <text x="640" y="305" 
        font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
        font-size="18" 
        fill="#999999" 
        text-anchor="middle">
    建议：展现球迷热情的宽幅照片
  </text>
  
  <!-- 底部信息卡片 -->
  <!-- 昵称 -->
  <g>
    <rect x="80" y="470" width="265" height="180" fill="#EF0107" rx="16" 
          style="filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.1))"/>
    
    <rect x="130" y="500" width="60" height="60" 
          fill="#F5F5F5" 
          stroke="#FFFFFF" 
          stroke-width="2" 
          stroke-dasharray="6,3" 
          rx="10"/>
    <text x="160" y="535" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="14" 
          fill="#999999" 
          text-anchor="middle">
      [图标
    </text>
    <text x="160" y="550" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="14" 
          fill="#999999" 
          text-anchor="middle">
      枪]
    </text>
    
    <text x="212" y="525" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="24" 
          fill="#D4AF37" 
          text-anchor="middle">
      昵称
    </text>
    
    <text x="212" y="580" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="28" 
          font-weight="bold"
          fill="#FFFFFF" 
          text-anchor="middle">
      枪手
    </text>
    
    <text x="212" y="615" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="20" 
          fill="#FFFFFF" 
          text-anchor="middle">
      The Gunners
    </text>
  </g>
  
  <!-- 队歌 -->
  <g>
    <rect x="380" y="470" width="265" height="180" fill="#1A2B4A" rx="16" 
          style="filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.1))"/>
    
    <rect x="430" y="500" width="60" height="60" 
          fill="#F5F5F5" 
          stroke="#FFFFFF" 
          stroke-width="2" 
          stroke-dasharray="6,3" 
          rx="10"/>
    <text x="460" y="535" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="14" 
          fill="#999999" 
          text-anchor="middle">
      [图标
    </text>
    <text x="460" y="550" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="14" 
          fill="#999999" 
          text-anchor="middle">
      音符]
    </text>
    
    <text x="512" y="525" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="24" 
          fill="#D4AF37" 
          text-anchor="middle">
      队歌
    </text>
    
    <text x="512" y="575" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="20" 
          font-style="italic"
          fill="#FFFFFF" 
          text-anchor="middle">
      <tspan x="512" dy="0">Good Old</tspan>
      <tspan x="512" dy="30">Arsenal</tspan>
    </text>
  </g>
  
  <!-- 著名看台 -->
  <g>
    <rect x="680" y="470" width="265" height="180" fill="#D4AF37" rx="16" 
          style="filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.1))"/>
    
    <rect x="730" y="500" width="60" height="60" 
          fill="#F5F5F5" 
          stroke="#FFFFFF" 
          stroke-width="2" 
          stroke-dasharray="6,3" 
          rx="10"/>
    <text x="760" y="535" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="14" 
          fill="#999999" 
          text-anchor="middle">
      [图标
    </text>
    <text x="760" y="550" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="14" 
          fill="#999999" 
          text-anchor="middle">
      看台]
    </text>
    
    <text x="812" y="525" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="24" 
          fill="#FFFFFF" 
          text-anchor="middle">
      著名看台
    </text>
    
    <text x="812" y="570" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="20" 
          fill="#FFFFFF" 
          text-anchor="middle">
      <tspan x="812" dy="0">Clock End</tspan>
      <tspan x="812" dy="30">North Bank</tspan>
    </text>
  </g>
  
  <!-- 全球球迷 -->
  <g>
    <rect x="980" y="470" width="265" height="180" fill="#EF0107" rx="16" 
          style="filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.1))"/>
    
    <rect x="1030" y="500" width="60" height="60" 
          fill="#F5F5F5" 
          stroke="#FFFFFF" 
          stroke-width="2" 
          stroke-dasharray="6,3" 
          rx="10"/>
    <text x="1060" y="535" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="14" 
          fill="#999999" 
          text-anchor="middle">
      [图标
    </text>
    <text x="1060" y="550" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="14" 
          fill="#999999" 
          text-anchor="middle">
      地球]
    </text>
    
    <text x="1112" y="525" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="24" 
          fill="#D4AF37" 
          text-anchor="middle">
      全球粉丝
    </text>
    
    <text x="1112" y="575" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="36" 
          font-weight="bold"
          fill="#FFFFFF" 
          text-anchor="middle">
      1亿+
    </text>
    
    <text x="1112" y="615" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="18" 
          fill="#FFFFFF" 
          text-anchor="middle">
      遍布全球
    </text>
  </g>
  
  <!-- 页码 -->
  <text x="1200" y="690" 
        font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
        font-size="14" 
        fill="#999999" 
        text-anchor="end">
    14
  </text>
</svg>
