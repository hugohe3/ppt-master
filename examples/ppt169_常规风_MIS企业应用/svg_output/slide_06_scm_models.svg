<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.12" />
        </filter>
        <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B" />
        </marker>
        <marker id="arrowGreen2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#16A34A" />
        </marker>
    </defs>

    <!-- 背景 -->
    <rect width="1280" height="720" fill="#FAFAFA" />

    <!-- 顶部标题区 -->
    <rect x="0" y="0" width="1280" height="90" fill="#ECFDF5" />
    <text x="60" y="55" fill="#059669" font-size="32" font-weight="bold"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">⚙️ SCM 软件与推拉模型</text>
    <text x="1220" y="55" text-anchor="end" fill="#6B7280" font-size="14"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">SCM Software &amp; Push/Pull Models</text>

    <!-- 两类SCM软件对比 -->
    <!-- 计划系统 -->
    <g transform="translate(60, 110)" filter="url(#cardShadow)">
        <rect x="0" y="0" width="545" height="230" rx="16" fill="#FFFFFF" stroke="#059669" stroke-width="2" />
        <rect x="0" y="0" width="545" height="50" rx="16" fill="#059669" />
        <rect x="0" y="25" width="545" height="25" fill="#059669" />
        <text x="272" y="35" text-anchor="middle" fill="#FFFFFF" font-size="20" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">📋 供应链计划系统</text>

        <g transform="translate(30, 70)">
            <text x="0" y="0" fill="#6B7280" font-size="13"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Supply Chain Planning Systems</text>

            <g transform="translate(0, 30)">
                <circle cx="12" cy="12" r="8" fill="#DCFCE7" stroke="#059669" stroke-width="2" />
                <text x="35" y="18" fill="#374151" font-size="16"
                    font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">需求预测 (Demand Planning)</text>
            </g>
            <g transform="translate(0, 65)">
                <circle cx="12" cy="12" r="8" fill="#DCFCE7" stroke="#059669" stroke-width="2" />
                <text x="35" y="18" fill="#374151" font-size="16"
                    font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">供应链建模与优化</text>
            </g>
            <g transform="translate(0, 100)">
                <circle cx="12" cy="12" r="8" fill="#DCFCE7" stroke="#059669" stroke-width="2" />
                <text x="35" y="18" fill="#374151" font-size="16"
                    font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">采购和制造计划制定</text>
            </g>
            <g transform="translate(0, 135)">
                <circle cx="12" cy="12" r="8" fill="#DCFCE7" stroke="#059669" stroke-width="2" />
                <text x="35" y="18" fill="#374151" font-size="16"
                    font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">库存水平决策</text>
            </g>
        </g>
    </g>

    <!-- 执行系统 -->
    <g transform="translate(635, 110)" filter="url(#cardShadow)">
        <rect x="0" y="0" width="545" height="230" rx="16" fill="#FFFFFF" stroke="#0891B2" stroke-width="2" />
        <rect x="0" y="0" width="545" height="50" rx="16" fill="#0891B2" />
        <rect x="0" y="25" width="545" height="25" fill="#0891B2" />
        <text x="272" y="35" text-anchor="middle" fill="#FFFFFF" font-size="20" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">🚛 供应链执行系统</text>

        <g transform="translate(30, 70)">
            <text x="0" y="0" fill="#6B7280" font-size="13"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Supply Chain Execution Systems</text>

            <g transform="translate(0, 30)">
                <circle cx="12" cy="12" r="8" fill="#CFFAFE" stroke="#0891B2" stroke-width="2" />
                <text x="35" y="18" fill="#374151" font-size="16"
                    font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">物流跟踪与管理</text>
            </g>
            <g transform="translate(0, 65)">
                <circle cx="12" cy="12" r="8" fill="#CFFAFE" stroke="#0891B2" stroke-width="2" />
                <text x="35" y="18" fill="#374151" font-size="16"
                    font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">仓库运营管理</text>
            </g>
            <g transform="translate(0, 100)">
                <circle cx="12" cy="12" r="8" fill="#CFFAFE" stroke="#0891B2" stroke-width="2" />
                <text x="35" y="18" fill="#374151" font-size="16"
                    font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">配送中心协调</text>
            </g>
            <g transform="translate(0, 135)">
                <circle cx="12" cy="12" r="8" fill="#CFFAFE" stroke="#0891B2" stroke-width="2" />
                <text x="35" y="18" fill="#374151" font-size="16"
                    font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">运输操作优化</text>
            </g>
        </g>
    </g>

    <!-- 推拉模型对比 -->
    <g transform="translate(60, 365)">
        <text x="0" y="25" fill="#1F2937" font-size="22" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">🔄 从推动到拉动：需求驱动的供应链</text>
    </g>

    <!-- 推动模型 -->
    <g transform="translate(60, 410)" filter="url(#cardShadow)">
        <rect x="0" y="0" width="545" height="250" rx="16" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2" />
        <text x="30" y="38" fill="#92400E" font-size="20" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">📤 推动模型 (Push-Based)</text>
        <text x="30" y="62" fill="#6B7280" font-size="13"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">"为库存生产" Build-to-Stock</text>

        <!-- 流程图 -->
        <g transform="translate(30, 85)">
            <rect x="0" y="0" width="105" height="55" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1" />
            <text x="52" y="22" text-anchor="middle" fill="#92400E" font-size="13" font-weight="600"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">需求预测</text>
            <text x="52" y="42" text-anchor="middle" fill="#92400E" font-size="11"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Forecast</text>

            <path d="M 110 27 L 130 27" stroke="#F59E0B" stroke-width="2" fill="none" marker-end="url(#arrowOrange)" />

            <rect x="135" y="0" width="105" height="55" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1" />
            <text x="187" y="22" text-anchor="middle" fill="#92400E" font-size="13" font-weight="600"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">生产制造</text>
            <text x="187" y="42" text-anchor="middle" fill="#92400E" font-size="11"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Produce</text>

            <path d="M 245 27 L 265 27" stroke="#F59E0B" stroke-width="2" fill="none" marker-end="url(#arrowOrange)" />

            <rect x="270" y="0" width="105" height="55" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1" />
            <text x="322" y="22" text-anchor="middle" fill="#92400E" font-size="13" font-weight="600"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">存入库存</text>
            <text x="322" y="42" text-anchor="middle" fill="#92400E" font-size="11"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Inventory</text>

            <path d="M 380 27 L 400 27" stroke="#F59E0B" stroke-width="2" fill="none" marker-end="url(#arrowOrange)" />

            <rect x="405" y="0" width="105" height="55" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1" />
            <text x="457" y="22" text-anchor="middle" fill="#92400E" font-size="13" font-weight="600"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">"推"给客户</text>
            <text x="457" y="42" text-anchor="middle" fill="#92400E" font-size="11"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Push</text>
        </g>

        <!-- 特点 -->
        <g transform="translate(30, 165)">
            <text x="0" y="18" fill="#374151" font-size="15"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">⚠️ 基于预测，可能导致库存过剩或短缺</text>
            <text x="0" y="48" fill="#374151" font-size="15"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">⚠️ 响应市场变化较慢</text>
        </g>
    </g>

    <!-- 拉动模型 -->
    <g transform="translate(635, 410)" filter="url(#cardShadow)">
        <rect x="0" y="0" width="545" height="250" rx="16" fill="#FFFFFF" stroke="#16A34A" stroke-width="2" />
        <text x="30" y="38" fill="#166534" font-size="20" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">📥 拉动模型 (Pull-Based)</text>
        <text x="30" y="62" fill="#6B7280" font-size="13"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">"按订单生产" Build-to-Order</text>

        <!-- 流程图（反向） -->
        <g transform="translate(30, 85)">
            <rect x="0" y="0" width="105" height="55" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="1" />
            <text x="52" y="22" text-anchor="middle" fill="#166534" font-size="13" font-weight="600"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">客户订单</text>
            <text x="52" y="42" text-anchor="middle" fill="#166534" font-size="11"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Order</text>

            <path d="M 110 27 L 130 27" stroke="#16A34A" stroke-width="2" fill="none" marker-end="url(#arrowGreen2)" />

            <rect x="135" y="0" width="105" height="55" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="1" />
            <text x="187" y="22" text-anchor="middle" fill="#166534" font-size="13" font-weight="600"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">触发生产</text>
            <text x="187" y="42" text-anchor="middle" fill="#166534" font-size="11"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Trigger</text>

            <path d="M 245 27 L 265 27" stroke="#16A34A" stroke-width="2" fill="none" marker-end="url(#arrowGreen2)" />

            <rect x="270" y="0" width="105" height="55" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="1" />
            <text x="322" y="22" text-anchor="middle" fill="#166534" font-size="13" font-weight="600"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">"拉动"供应</text>
            <text x="322" y="42" text-anchor="middle" fill="#166534" font-size="11"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Pull</text>

            <path d="M 380 27 L 400 27" stroke="#16A34A" stroke-width="2" fill="none" marker-end="url(#arrowGreen2)" />

            <rect x="405" y="0" width="105" height="55" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="1" />
            <text x="457" y="22" text-anchor="middle" fill="#166534" font-size="13" font-weight="600"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">按需交付</text>
            <text x="457" y="42" text-anchor="middle" fill="#166534" font-size="11"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Deliver</text>
        </g>

        <!-- 特点 -->
        <g transform="translate(30, 165)">
            <text x="0" y="18" fill="#374151" font-size="15"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">✅ 基于实际订单，减少库存积压</text>
            <text x="0" y="48" fill="#374151" font-size="15"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">✅ 互联网使信息流动更顺畅</text>
        </g>
    </g>

    <!-- 页码 -->
    <text x="1220" y="690" text-anchor="end" fill="#9CA3AF" font-size="14"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">6 / 12</text>
</svg>
