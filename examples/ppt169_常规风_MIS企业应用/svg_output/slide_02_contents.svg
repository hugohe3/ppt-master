<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.1" />
        </filter>
        <filter id="nodeShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.2" />
        </filter>
        <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#2563EB" />
        </marker>
        <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#059669" />
        </marker>
        <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#7C3AED" />
        </marker>
    </defs>

    <!-- 背景 -->
    <rect width="1280" height="720" fill="#FAFAFA" />

    <!-- 顶部标题区 -->
    <rect x="0" y="0" width="1280" height="100" fill="#F8FAFC" />
    <text x="60" y="62" fill="#1F2937" font-size="36" font-weight="bold"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">📋 本章内容</text>
    <text x="60" y="85" fill="#6B7280" font-size="16"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Chapter 9 Overview</text>

    <!-- 左侧竖向导航条 -->
    <rect x="60" y="130" width="8" height="530" rx="4" fill="#E5E7EB" />

    <!-- 章节 1：ERP -->
    <g transform="translate(90, 140)" filter="url(#cardShadow)">
        <circle cx="0" cy="20" r="14" fill="#2563EB" />
        <rect x="30" y="0" width="500" height="85" rx="12" fill="#FFFFFF" stroke="#2563EB" stroke-width="2" />
        <text x="55" y="32" fill="#2563EB" font-size="26"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">🏢</text>
        <text x="95" y="35" fill="#1F2937" font-size="22" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">企业系统 (ERP)</text>
        <text x="55" y="62" fill="#6B7280" font-size="16"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">集成数据 · 标准化流程 · 卓越运营</text>
    </g>

    <!-- 章节 2：SCM -->
    <g transform="translate(90, 245)" filter="url(#cardShadow)">
        <circle cx="0" cy="20" r="14" fill="#059669" />
        <rect x="30" y="0" width="500" height="85" rx="12" fill="#FFFFFF" stroke="#059669" stroke-width="2" />
        <text x="55" y="32" fill="#059669" font-size="26"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">🚚</text>
        <text x="95" y="35" fill="#1F2937" font-size="22" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">供应链管理 (SCM)</text>
        <text x="55" y="62" fill="#6B7280" font-size="16"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">协调供应商 · 优化物流 · 匹配供需</text>
    </g>

    <!-- 章节 3：CRM -->
    <g transform="translate(90, 350)" filter="url(#cardShadow)">
        <circle cx="0" cy="20" r="14" fill="#7C3AED" />
        <rect x="30" y="0" width="500" height="85" rx="12" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2" />
        <text x="55" y="32" fill="#7C3AED" font-size="26"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">❤️</text>
        <text x="95" y="35" fill="#1F2937" font-size="22" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">客户关系管理 (CRM)</text>
        <text x="55" y="62" fill="#6B7280" font-size="16"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">客户洞察 · 服务优化 · 客户亲密度</text>
    </g>

    <!-- 章节 4：挑战与新技术 -->
    <g transform="translate(90, 455)" filter="url(#cardShadow)">
        <circle cx="0" cy="20" r="14" fill="#EA580C" />
        <rect x="30" y="0" width="500" height="85" rx="12" fill="#FFFFFF" stroke="#EA580C" stroke-width="2" />
        <text x="55" y="32" fill="#EA580C" font-size="26"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">💡</text>
        <text x="95" y="35" fill="#1F2937" font-size="22" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">挑战与新技术</text>
        <text x="55" y="62" fill="#6B7280" font-size="16"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">实施难点 · 云计算 · AI/BI 创新</text>
    </g>

    <!-- 章节 5：职业价值 -->
    <g transform="translate(90, 560)" filter="url(#cardShadow)">
        <circle cx="0" cy="20" r="14" fill="#0891B2" />
        <rect x="30" y="0" width="500" height="85" rx="12" fill="#FFFFFF" stroke="#0891B2" stroke-width="2" />
        <text x="55" y="32" fill="#0891B2" font-size="26"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">💼</text>
        <text x="95" y="35" fill="#1F2937" font-size="22" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">MIS 职业价值</text>
        <text x="55" y="62" fill="#6B7280" font-size="16"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">系统实施 · 业务分析 · 职业发展</text>
    </g>

    <!-- 右侧关系图 -->
    <g transform="translate(750, 350)">
        <!-- 中心圆 -->
        <circle cx="200" cy="0" r="105" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2" filter="url(#nodeShadow)" />
        <text x="200" y="-20" text-anchor="middle" fill="#1F2937" font-size="19" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">企业级</text>
        <text x="200" y="10" text-anchor="middle" fill="#1F2937" font-size="19" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">应用系统</text>

        <!-- ERP 节点 - 顶部 -->
        <circle cx="200" cy="-185" r="50" fill="#2563EB" filter="url(#nodeShadow)" />
        <text x="200" y="-180" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">ERP</text>
        <path d="M 200 -135 L 200 -110" stroke="#2563EB" stroke-width="3" marker-end="url(#arrowBlue)" />

        <!-- SCM 节点 - 左下 -->
        <circle cx="65" cy="145" r="50" fill="#059669" filter="url(#nodeShadow)" />
        <text x="65" y="150" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">SCM</text>
        <path d="M 102 110 L 130 80" stroke="#059669" stroke-width="3" marker-end="url(#arrowGreen)" />

        <!-- CRM 节点 - 右下 -->
        <circle cx="335" cy="145" r="50" fill="#7C3AED" filter="url(#nodeShadow)" />
        <text x="335" y="150" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">CRM</text>
        <path d="M 298 110 L 270 80" stroke="#7C3AED" stroke-width="3" marker-end="url(#arrowPurple)" />
    </g>

    <!-- 页码 -->
    <text x="1220" y="690" text-anchor="end" fill="#9CA3AF" font-size="14"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">2 / 12</text>
</svg>
