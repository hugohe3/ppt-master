<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2563EB" flood-opacity="0.15" />
        </filter>
        <filter id="dbShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#2563EB" flood-opacity="0.3" />
        </filter>
        <radialGradient id="dbGradient" cx="50%" cy="30%">
            <stop offset="0%" stop-color="#3B82F6" />
            <stop offset="100%" stop-color="#1E40AF" />
        </radialGradient>
        <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#2563EB" />
        </marker>
    </defs>

    <!-- 背景 -->
    <rect width="1280" height="720" fill="#FAFAFA" />

    <!-- 顶部标题区 -->
    <rect x="0" y="0" width="1280" height="90" fill="#EFF6FF" />
    <text x="60" y="55" fill="#2563EB" font-size="32" font-weight="bold"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">🏢 什么是企业系统 (ERP)</text>
    <text x="1220" y="55" text-anchor="end" fill="#6B7280" font-size="14"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Enterprise Resource Planning</text>

    <!-- 定义卡片 -->
    <g transform="translate(60, 110)" filter="url(#cardShadow)">
        <rect x="0" y="0" width="500" height="100" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" />
        <text x="20" y="35" fill="#1F2937" font-size="18" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">📌 核心定义</text>
        <text x="20" y="65" fill="#4B5563" font-size="16"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">基于<tspan fill="#2563EB" font-weight="bold">集成的软件模块</tspan>和一个<tspan fill="#2563EB" font-weight="bold">通用中央数据库</tspan></text>
        <text x="20" y="88" fill="#4B5563" font-size="16"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">实现跨部门的实时数据共享与流程自动化</text>
    </g>

    <!-- 中央数据库架构图 -->
    <g transform="translate(640, 380)">
        <!-- 中央数据库 -->
        <g filter="url(#dbShadow)">
            <ellipse cx="0" cy="0" rx="85" ry="55" fill="url(#dbGradient)" />
            <ellipse cx="0" cy="-18" rx="85" ry="28" fill="#60A5FA" />
        </g>
        <text x="0" y="5" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">中央数据库</text>
        <text x="0" y="24" text-anchor="middle" fill="#DBEAFE" font-size="12"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Central Database</text>

        <!-- 生产模块 - 上 -->
        <g transform="translate(0, -185)" filter="url(#cardShadow)">
            <rect x="-65" y="-32" width="130" height="64" rx="12" fill="#FFFFFF" stroke="#2563EB" stroke-width="2" />
            <text x="0" y="-5" text-anchor="middle" fill="#1E40AF" font-size="22"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">🏭</text>
            <text x="0" y="20" text-anchor="middle" fill="#1F2937" font-size="15" font-weight="600"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">生产</text>
        </g>
        <path d="M 0 -120 L 0 -60" stroke="#2563EB" stroke-width="3" marker-end="url(#arrowBlue)" />

        <!-- 财务模块 - 右 -->
        <g transform="translate(210, 0)" filter="url(#cardShadow)">
            <rect x="-65" y="-32" width="130" height="64" rx="12" fill="#FFFFFF" stroke="#2563EB" stroke-width="2" />
            <text x="0" y="-5" text-anchor="middle" fill="#1E40AF" font-size="22"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">💰</text>
            <text x="0" y="20" text-anchor="middle" fill="#1F2937" font-size="15" font-weight="600"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">财务</text>
        </g>
        <path d="M 90 0 L 140 0" stroke="#2563EB" stroke-width="3" marker-end="url(#arrowBlue)" />

        <!-- 销售模块 - 下 -->
        <g transform="translate(0, 185)" filter="url(#cardShadow)">
            <rect x="-65" y="-32" width="130" height="64" rx="12" fill="#FFFFFF" stroke="#2563EB" stroke-width="2" />
            <text x="0" y="-5" text-anchor="middle" fill="#1E40AF" font-size="22"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">🛒</text>
            <text x="0" y="20" text-anchor="middle" fill="#1F2937" font-size="15" font-weight="600"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">销售</text>
        </g>
        <path d="M 0 60 L 0 120" stroke="#2563EB" stroke-width="3" marker-end="url(#arrowBlue)" />

        <!-- 人力资源模块 - 左 -->
        <g transform="translate(-210, 0)" filter="url(#cardShadow)">
            <rect x="-65" y="-32" width="130" height="64" rx="12" fill="#FFFFFF" stroke="#2563EB" stroke-width="2" />
            <text x="0" y="-5" text-anchor="middle" fill="#1E40AF" font-size="22"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">👥</text>
            <text x="0" y="20" text-anchor="middle" fill="#1F2937" font-size="15" font-weight="600"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">人力资源</text>
        </g>
        <path d="M -90 0 L -140 0" stroke="#2563EB" stroke-width="3" marker-end="url(#arrowBlue)" />
    </g>

    <!-- 右侧示例流程 -->
    <g transform="translate(950, 130)" filter="url(#cardShadow)">
        <rect x="0" y="0" width="280" height="450" rx="12" fill="#FFFFFF" stroke="#059669" stroke-width="2" />
        <rect x="0" y="0" width="280" height="50" rx="12" fill="#059669" />
        <rect x="0" y="25" width="280" height="25" fill="#059669" />
        <text x="140" y="35" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">⚡ 实时联动示例</text>

        <!-- 流程步骤 -->
        <g transform="translate(20, 70)">
            <circle cx="15" cy="15" r="17" fill="#2563EB" />
            <text x="15" y="21" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">1</text>
            <text x="45" y="21" fill="#1F2937" font-size="15"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">销售代表下订单</text>
        </g>

        <line x1="35" y1="115" x2="35" y2="135" stroke="#2563EB" stroke-width="2" />

        <g transform="translate(20, 140)">
            <circle cx="15" cy="15" r="17" fill="#2563EB" />
            <text x="15" y="21" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">2</text>
            <text x="45" y="21" fill="#1F2937" font-size="15"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">自动验证客户信用</text>
        </g>

        <line x1="35" y1="185" x2="35" y2="205" stroke="#2563EB" stroke-width="2" />

        <g transform="translate(20, 210)">
            <circle cx="15" cy="15" r="17" fill="#2563EB" />
            <text x="15" y="21" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">3</text>
            <text x="45" y="21" fill="#1F2937" font-size="15"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">安排发货时间</text>
        </g>

        <line x1="35" y1="255" x2="35" y2="275" stroke="#2563EB" stroke-width="2" />

        <g transform="translate(20, 280)">
            <circle cx="15" cy="15" r="17" fill="#2563EB" />
            <text x="15" y="21" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">4</text>
            <text x="45" y="21" fill="#1F2937" font-size="15"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">库存预留商品</text>
        </g>

        <line x1="35" y1="325" x2="35" y2="345" stroke="#2563EB" stroke-width="2" />

        <g transform="translate(20, 350)">
            <circle cx="15" cy="15" r="17" fill="#2563EB" />
            <text x="15" y="21" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">5</text>
            <text x="45" y="21" fill="#1F2937" font-size="15"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">更新生产计划</text>
        </g>

        <line x1="35" y1="395" x2="35" y2="415" stroke="#059669" stroke-width="2" />

        <g transform="translate(20, 420)">
            <circle cx="15" cy="15" r="17" fill="#059669" />
            <text x="15" y="21" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">✓</text>
            <text x="45" y="21" fill="#1F2937" font-size="15"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">更新财务记录</text>
        </g>
    </g>

    <!-- 底部关键特点 -->
    <g transform="translate(60, 600)" filter="url(#cardShadow)">
        <rect x="0" y="0" width="380" height="55" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1" />
        <text x="25" y="35" fill="#92400E" font-size="17" font-weight="600"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">💡 关键特点：实时数据共享 · 流程自动触发</text>
    </g>

    <!-- 页码 -->
    <text x="1220" y="690" text-anchor="end" fill="#9CA3AF" font-size="14"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">3 / 12</text>
</svg>
