<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1E40AF" />
            <stop offset="40%" stop-color="#2563EB" />
            <stop offset="100%" stop-color="#93C5FD" />
        </linearGradient>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="coloredBlur" />
            <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3" />
        </filter>
        <radialGradient id="circleGlow" cx="50%" cy="50%">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3" />
            <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
        </radialGradient>
    </defs>

    <!-- 背景 -->
    <rect width="1280" height="720" fill="url(#bgGradient)" />

    <!-- 背景装饰圆 -->
    <circle cx="1100" cy="200" r="300" fill="url(#circleGlow)" />
    <circle cx="200" cy="600" r="200" fill="url(#circleGlow)" />

    <!-- 装饰圆环 - 右侧 -->
    <g transform="translate(950, 360)" filter="url(#glow)">
        <!-- ERP 圆环 -->
        <circle cx="0" cy="-80" r="65" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.95" />
        <circle cx="0" cy="-80" r="50" fill="rgba(255,255,255,0.1)" />
        <text x="0" y="-75" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">ERP</text>

        <!-- SCM 圆环 -->
        <circle cx="-75" cy="55" r="65" fill="none" stroke="#10B981" stroke-width="4" opacity="0.95" />
        <circle cx="-75" cy="55" r="50" fill="rgba(16,185,129,0.15)" />
        <text x="-75" y="60" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">SCM</text>

        <!-- CRM 圆环 -->
        <circle cx="75" cy="55" r="65" fill="none" stroke="#A855F7" stroke-width="4" opacity="0.95" />
        <circle cx="75" cy="55" r="50" fill="rgba(168,85,247,0.15)" />
        <text x="75" y="60" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">CRM</text>

        <!-- 连接曲线 -->
        <path d="M -25 -25 Q -40 15 -40 25" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.5" />
        <path d="M 25 -25 Q 40 15 40 25" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.5" />
        <path d="M -10 55 Q 0 55 10 55" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.5" />
    </g>

    <!-- 左侧内容区 -->
    <g transform="translate(60, 180)" filter="url(#textShadow)">
        <!-- 章节标识 -->
        <rect x="0" y="0" width="130" height="40" rx="20" fill="#FFFFFF" opacity="0.2" />
        <text x="65" y="27" text-anchor="middle" fill="#FFFFFF" font-size="17" font-weight="600"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Chapter 9</text>

        <!-- 主标题 -->
        <text x="0" y="105" fill="#FFFFFF" font-size="60" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">企业级应用</text>

        <!-- 副标题 -->
        <text x="0" y="165" fill="#FFFFFF" font-size="30" font-weight="500" opacity="0.95"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">实现卓越运营与客户亲密度</text>

        <!-- 英文标题 -->
        <text x="0" y="215" fill="#FFFFFF" font-size="18" opacity="0.8"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Achieving Operational Excellence and Customer Intimacy</text>

        <!-- 分割线 -->
        <rect x="0" y="245" width="450" height="4" fill="#FFFFFF" opacity="0.5" rx="2" />

        <!-- 来源 -->
        <text x="0" y="290" fill="#FFFFFF" font-size="16" opacity="0.7"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Management Information Systems: Managing the Digital Firm</text>
    </g>

    <!-- 底部装饰线 -->
    <rect x="60" y="660" width="220" height="4" rx="2" fill="#FFFFFF" opacity="0.4" />

    <!-- 装饰点 -->
    <circle cx="100" cy="600" r="5" fill="#FFFFFF" opacity="0.3" />
    <circle cx="150" cy="575" r="8" fill="#FFFFFF" opacity="0.2" />
    <circle cx="210" cy="615" r="6" fill="#FFFFFF" opacity="0.25" />
    <circle cx="280" cy="590" r="4" fill="#FFFFFF" opacity="0.2" />
</svg>
