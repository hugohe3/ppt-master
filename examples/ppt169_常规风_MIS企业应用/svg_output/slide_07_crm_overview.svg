<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 中心客户圆渐变 -->
        <radialGradient id="customerGradient" cx="30%" cy="30%">
            <stop offset="0%" stop-color="#A78BFA" />
            <stop offset="100%" stop-color="#7C3AED" />
        </radialGradient>
        <!-- 外圈光晕 -->
        <radialGradient id="glowGradient" cx="50%" cy="50%">
            <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.3" />
            <stop offset="70%" stop-color="#7C3AED" stop-opacity="0.1" />
            <stop offset="100%" stop-color="#7C3AED" stop-opacity="0" />
        </radialGradient>
        <!-- 卡片阴影 -->
        <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7C3AED" flood-opacity="0.15" />
        </filter>
        <!-- 接触点阴影 -->
        <filter id="touchpointShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#7C3AED" flood-opacity="0.2" />
        </filter>
    </defs>

    <!-- 背景 -->
    <rect width="1280" height="720" fill="#FAFAFA" />

    <!-- 顶部标题区 -->
    <rect x="0" y="0" width="1280" height="90" fill="#F5F3FF" />
    <text x="60" y="55" fill="#7C3AED" font-size="32" font-weight="bold"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">❤️ 客户关系管理 (CRM) 概述</text>
    <text x="1220" y="55" text-anchor="end" fill="#6B7280" font-size="14"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Customer Relationship Management</text>

    <!-- 核心思想卡片 -->
    <g transform="translate(60, 110)" filter="url(#cardShadow)">
        <rect x="0" y="0" width="540" height="80" rx="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" />
        <text x="30" y="35" fill="#92400E" font-size="18" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">💡 核心思想</text>
        <text x="30" y="60" fill="#374151" font-size="15"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">随着竞争优势变得短暂，<tspan fill="#7C3AED" font-weight="bold">客户关系</tspan>可能是最持久的竞争优势</text>
    </g>

    <!-- 定义卡片 -->
    <g transform="translate(620, 110)" filter="url(#cardShadow)">
        <rect x="0" y="0" width="600" height="80" rx="12" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2" />
        <text x="30" y="35" fill="#7C3AED" font-size="18" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">📌 CRM 定义</text>
        <text x="30" y="60" fill="#374151" font-size="15"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">捕获 → 整合 → 分析 → 分发客户数据到各接触点</text>
    </g>

    <!-- 左侧核心问题 -->
    <g transform="translate(60, 210)" filter="url(#cardShadow)">
        <rect x="0" y="0" width="380" height="200" rx="16" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2" />
        <text x="30" y="40" fill="#7C3AED" font-size="20" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">🎯 CRM 核心问题</text>

        <g transform="translate(25, 65)">
            <rect x="0" y="0" width="330" height="55" rx="10" fill="#F5F3FF" />
            <text x="18" y="22" fill="#1F2937" font-size="15" font-weight="600"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">❓ 谁是最忠诚、最有利可图的客户？</text>
            <text x="18" y="42" fill="#6B7280" font-size="12"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Who are our most valuable customers?</text>
        </g>

        <g transform="translate(25, 130)">
            <rect x="0" y="0" width="330" height="55" rx="10" fill="#F5F3FF" />
            <text x="18" y="22" fill="#1F2937" font-size="15" font-weight="600"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">❓ 他们想买什么？</text>
            <text x="18" y="42" fill="#6B7280" font-size="12"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">What do they want to buy?</text>
        </g>
    </g>

    <!-- 左侧目标 -->
    <g transform="translate(60, 430)" filter="url(#cardShadow)">
        <rect x="0" y="0" width="380" height="180" rx="16" fill="#FFFFFF" stroke="#16A34A" stroke-width="2" />
        <text x="30" y="40" fill="#16A34A" font-size="20" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">✅ CRM 目标</text>

        <g transform="translate(30, 65)">
            <circle cx="10" cy="10" r="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="2" />
            <text x="10" y="14" text-anchor="middle" fill="#16A34A" font-size="10" font-weight="bold"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">1</text>
            <text x="32" y="16" fill="#374151" font-size="16"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">更好地服务现有客户</text>
        </g>
        <g transform="translate(30, 105)">
            <circle cx="10" cy="10" r="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="2" />
            <text x="10" y="14" text-anchor="middle" fill="#16A34A" font-size="10" font-weight="bold"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">2</text>
            <text x="32" y="16" fill="#374151" font-size="16"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">获取新客户</text>
        </g>
        <g transform="translate(30, 145)">
            <circle cx="10" cy="10" r="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="2" />
            <text x="10" y="14" text-anchor="middle" fill="#16A34A" font-size="10" font-weight="bold"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">3</text>
            <text x="32" y="16" fill="#374151" font-size="16"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">提供统一的客户视图</text>
        </g>
    </g>

    <!-- 中心客户图 - 调整位置使布局更平衡 -->
    <g transform="translate(860, 430)">
        <!-- 外圈光晕 -->
        <circle cx="0" cy="0" r="140" fill="url(#glowGradient)" />

        <!-- 连接曲线 - 使用贝塞尔曲线增加流动感 -->
        <path d="M -140 -90 Q -100 -60 -60 -35" stroke="#7C3AED" stroke-width="2" fill="none" opacity="0.6" />
        <path d="M 0 -140 Q 0 -100 0 -70" stroke="#7C3AED" stroke-width="2" fill="none" opacity="0.6" />
        <path d="M 140 -90 Q 100 -60 60 -35" stroke="#7C3AED" stroke-width="2" fill="none" opacity="0.6" />
        <path d="M 160 30 Q 120 25 65 10" stroke="#7C3AED" stroke-width="2" fill="none" opacity="0.6" />
        <path d="M 100 130 Q 70 100 40 60" stroke="#7C3AED" stroke-width="2" fill="none" opacity="0.6" />
        <path d="M -100 130 Q -70 100 -40 60" stroke="#7C3AED" stroke-width="2" fill="none" opacity="0.6" />
        <path d="M -160 30 Q -120 25 -65 10" stroke="#7C3AED" stroke-width="2" fill="none" opacity="0.6" />

        <!-- 中心客户圆 -->
        <circle cx="0" cy="0" r="70" fill="url(#customerGradient)" />
        <text x="0" y="-10" text-anchor="middle" fill="#FFFFFF" font-size="32"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">👤</text>
        <text x="0" y="20" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="bold"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">客户</text>
        <text x="0" y="40" text-anchor="middle" fill="#DDD6FE" font-size="11"
            font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">Customer</text>

        <!-- 接触点 - 电话 -->
        <g transform="translate(-150, -100)" filter="url(#touchpointShadow)">
            <circle cx="0" cy="0" r="40" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2" />
            <text x="0" y="-3" text-anchor="middle" fill="#7C3AED" font-size="22"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">📞</text>
            <text x="0" y="18" text-anchor="middle" fill="#374151" font-size="11" font-weight="600"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">电话</text>
        </g>

        <!-- 接触点 - 邮件 -->
        <g transform="translate(0, -150)" filter="url(#touchpointShadow)">
            <circle cx="0" cy="0" r="40" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2" />
            <text x="0" y="-3" text-anchor="middle" fill="#7C3AED" font-size="22"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">✉️</text>
            <text x="0" y="18" text-anchor="middle" fill="#374151" font-size="11" font-weight="600"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">邮件</text>
        </g>

        <!-- 接触点 - 网站 -->
        <g transform="translate(150, -100)" filter="url(#touchpointShadow)">
            <circle cx="0" cy="0" r="40" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2" />
            <text x="0" y="-3" text-anchor="middle" fill="#7C3AED" font-size="22"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">🌐</text>
            <text x="0" y="18" text-anchor="middle" fill="#374151" font-size="11" font-weight="600"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">网站</text>
        </g>

        <!-- 接触点 - 社交媒体 -->
        <g transform="translate(170, 35)" filter="url(#touchpointShadow)">
            <circle cx="0" cy="0" r="40" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2" />
            <text x="0" y="-3" text-anchor="middle" fill="#7C3AED" font-size="22"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">💬</text>
            <text x="0" y="18" text-anchor="middle" fill="#374151" font-size="11" font-weight="600"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">社交媒体</text>
        </g>

        <!-- 接触点 - 零售店 -->
        <g transform="translate(105, 140)" filter="url(#touchpointShadow)">
            <circle cx="0" cy="0" r="40" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2" />
            <text x="0" y="-3" text-anchor="middle" fill="#7C3AED" font-size="22"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">🏪</text>
            <text x="0" y="18" text-anchor="middle" fill="#374151" font-size="11" font-weight="600"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">零售店</text>
        </g>

        <!-- 接触点 - 移动App -->
        <g transform="translate(-105, 140)" filter="url(#touchpointShadow)">
            <circle cx="0" cy="0" r="40" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2" />
            <text x="0" y="-3" text-anchor="middle" fill="#7C3AED" font-size="22"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">📱</text>
            <text x="0" y="18" text-anchor="middle" fill="#374151" font-size="11" font-weight="600"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">移动App</text>
        </g>

        <!-- 接触点 - 客服 -->
        <g transform="translate(-170, 35)" filter="url(#touchpointShadow)">
            <circle cx="0" cy="0" r="40" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2" />
            <text x="0" y="-3" text-anchor="middle" fill="#7C3AED" font-size="22"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">🎧</text>
            <text x="0" y="18" text-anchor="middle" fill="#374151" font-size="11" font-weight="600"
                font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">客服</text>
        </g>
    </g>

    <!-- 页码 -->
    <text x="1220" y="690" text-anchor="end" fill="#9CA3AF" font-size="14"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif">7 / 12</text>
</svg>
