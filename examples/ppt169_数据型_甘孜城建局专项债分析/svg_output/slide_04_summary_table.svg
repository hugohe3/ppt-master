<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!-- 页面04 - 年度统计汇总表 -->

    <defs>
        <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
            <feOffset dx="0" dy="2" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.15" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- 背景 -->
    <rect width="1280" height="720" fill="#f0f2f5" />

    <!-- 标题区域 -->
    <text x="60" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="32" font-weight="bold" fill="#1a1a2e">
        <tspan>📈 年度统计汇总表</tspan>
    </text>
    <text x="60" y="95" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="16" fill="#666666">
        <tspan>2020-2025年专项债项目融资数据汇总</tspan>
    </text>

    <!-- 表格卡片 -->
    <g filter="url(#cardShadow)">
        <rect x="60" y="130" width="1160" height="540" rx="12" fill="#FFFFFF" />
    </g>

    <!-- 表头背景 -->
    <rect x="60" y="130" width="1160" height="60" rx="12" fill="#fafafa" />
    <rect x="60" y="178" width="1160" height="12" fill="#fafafa" />

    <!-- 表头 -->
    <text x="200" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="18" font-weight="bold" fill="#333333" text-anchor="middle">
        <tspan>年份</tspan>
    </text>
    <text x="450" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="18" font-weight="bold" fill="#333333" text-anchor="middle">
        <tspan>融资总额（亿元）</tspan>
    </text>
    <text x="750" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="18" font-weight="bold" fill="#333333" text-anchor="middle">
        <tspan>融资笔数</tspan>
    </text>
    <text x="1050" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="18" font-weight="bold" fill="#333333" text-anchor="middle">
        <tspan>占比</tspan>
    </text>

    <!-- 分割线 -->
    <line x1="100" y1="195" x2="1180" y2="195" stroke="#e8e8e8" stroke-width="1" />

    <!-- 数据行 2020年 -->
    <rect x="60" y="200" width="1160" height="55" fill="#FFFFFF" />
    <rect x="80" y="215" width="24" height="24" rx="4" fill="#36a2eb" />
    <text x="200" y="235" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        fill="#333333" text-anchor="middle">
        <tspan>2020年</tspan>
    </text>
    <text x="450" y="235" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        fill="#333333" text-anchor="middle">
        <tspan>0.64</tspan>
    </text>
    <text x="750" y="235" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        fill="#333333" text-anchor="middle">
        <tspan>3</tspan>
    </text>
    <text x="1050" y="235" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        fill="#333333" text-anchor="middle">
        <tspan>4.4%</tspan>
    </text>
    <line x1="100" y1="255" x2="1180" y2="255" stroke="#f0f0f0" stroke-width="1" />

    <!-- 数据行 2021年 -->
    <rect x="60" y="260" width="1160" height="55" fill="#fafafa" />
    <rect x="80" y="275" width="24" height="24" rx="4" fill="#ff6384" />
    <text x="200" y="295" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        fill="#333333" text-anchor="middle">
        <tspan>2021年</tspan>
    </text>
    <text x="450" y="295" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        fill="#333333" text-anchor="middle">
        <tspan>0.30</tspan>
    </text>
    <text x="750" y="295" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        fill="#333333" text-anchor="middle">
        <tspan>1</tspan>
    </text>
    <text x="1050" y="295" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        fill="#333333" text-anchor="middle">
        <tspan>2.0%</tspan>
    </text>
    <line x1="100" y1="315" x2="1180" y2="315" stroke="#f0f0f0" stroke-width="1" />

    <!-- 数据行 2022年 -->
    <rect x="60" y="320" width="1160" height="55" fill="#FFFFFF" />
    <rect x="80" y="335" width="24" height="24" rx="4" fill="#ffce56" />
    <text x="200" y="355" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        fill="#333333" text-anchor="middle">
        <tspan>2022年</tspan>
    </text>
    <text x="450" y="355" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        fill="#333333" text-anchor="middle">
        <tspan>1.98</tspan>
    </text>
    <text x="750" y="355" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        fill="#333333" text-anchor="middle">
        <tspan>3</tspan>
    </text>
    <text x="1050" y="355" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        fill="#333333" text-anchor="middle">
        <tspan>13.4%</tspan>
    </text>
    <line x1="100" y1="375" x2="1180" y2="375" stroke="#f0f0f0" stroke-width="1" />

    <!-- 数据行 2023年 -->
    <rect x="60" y="380" width="1160" height="55" fill="#fafafa" />
    <rect x="80" y="395" width="24" height="24" rx="4" fill="#4bc0c0" />
    <text x="200" y="415" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        fill="#333333" text-anchor="middle">
        <tspan>2023年</tspan>
    </text>
    <text x="450" y="415" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        fill="#333333" text-anchor="middle">
        <tspan>2.19</tspan>
    </text>
    <text x="750" y="415" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        fill="#333333" text-anchor="middle">
        <tspan>7</tspan>
    </text>
    <text x="1050" y="415" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        fill="#333333" text-anchor="middle">
        <tspan>14.9%</tspan>
    </text>
    <line x1="100" y1="435" x2="1180" y2="435" stroke="#f0f0f0" stroke-width="1" />

    <!-- 数据行 2024年 -->
    <rect x="60" y="440" width="1160" height="55" fill="#FFFFFF" />
    <rect x="80" y="455" width="24" height="24" rx="4" fill="#9966ff" />
    <text x="200" y="475" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        fill="#333333" text-anchor="middle">
        <tspan>2024年</tspan>
    </text>
    <text x="450" y="475" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        fill="#333333" text-anchor="middle">
        <tspan>2.77</tspan>
    </text>
    <text x="750" y="475" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        fill="#333333" text-anchor="middle">
        <tspan>12</tspan>
    </text>
    <text x="1050" y="475" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        fill="#333333" text-anchor="middle">
        <tspan>18.8%</tspan>
    </text>
    <line x1="100" y1="495" x2="1180" y2="495" stroke="#f0f0f0" stroke-width="1" />

    <!-- 数据行 2025年 -->
    <rect x="60" y="500" width="1160" height="55" fill="#fafafa" />
    <rect x="80" y="515" width="24" height="24" rx="4" fill="#ff9f40" />
    <text x="200" y="535" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        font-weight="bold" fill="#ff9f40" text-anchor="middle">
        <tspan>2025年</tspan>
    </text>
    <text x="450" y="535" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        font-weight="bold" fill="#ff9f40" text-anchor="middle">
        <tspan>6.82</tspan>
    </text>
    <text x="750" y="535" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        font-weight="bold" fill="#ff9f40" text-anchor="middle">
        <tspan>19</tspan>
    </text>
    <text x="1050" y="535" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        font-weight="bold" fill="#ff9f40" text-anchor="middle">
        <tspan>46.4%</tspan>
    </text>
    <line x1="100" y1="555" x2="1180" y2="555" stroke="#f0f0f0" stroke-width="1" />

    <!-- 合计行 -->
    <rect x="60" y="560" width="1160" height="60" fill="#e6f7ff" />
    <rect x="60" y="608" width="1160" height="12" rx="0 0 12 12" fill="#e6f7ff" />
    <text x="200" y="600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18"
        font-weight="bold" fill="#1890ff" text-anchor="middle">
        <tspan>总计</tspan>
    </text>
    <text x="450" y="600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18"
        font-weight="bold" fill="#1890ff" text-anchor="middle">
        <tspan>14.69</tspan>
    </text>
    <text x="750" y="600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18"
        font-weight="bold" fill="#1890ff" text-anchor="middle">
        <tspan>35</tspan>
    </text>
    <text x="1050" y="600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18"
        font-weight="bold" fill="#1890ff" text-anchor="middle">
        <tspan>100%</tspan>
    </text>
</svg>