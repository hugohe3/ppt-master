    </text>

    <rect x="1045" y="450" width="155" height="80" rx="8" fill="#e6f7ff" />
    <text x="1122" y="480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24"
        font-weight="bold" fill="#1890ff" text-anchor="middle">
