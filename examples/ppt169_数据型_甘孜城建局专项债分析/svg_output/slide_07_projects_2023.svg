    </text>
    <rect x="130" y="185" width="450" height="8" rx="4" fill="#e6f7ff" />
    <rect x="130" y="185" width="405" height="8" rx="4" fill="#1890ff" />
    <line x1="90" y1="205" x2="780" y2="205" stroke="#f0f0f0" stroke-width="1" />

