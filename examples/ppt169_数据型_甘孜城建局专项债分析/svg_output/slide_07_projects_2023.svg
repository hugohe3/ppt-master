<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <!-- 页面06 - 2023年项目明细 -->

    <defs>
        <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
            <feOffset dx="0" dy="2" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.15" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- 背景 -->
    <rect width="1280" height="720" fill="#f0f2f5" />

    <!-- 标题区域 -->
    <text x="60" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="28" font-weight="bold" fill="#1a1a2e">
        <tspan>📋 项目明细（2023年）</tspan>
    </text>

    <!-- 统计概览 -->
    <rect x="420" y="30" width="180" height="40" rx="20" fill="#e0f7fa" />
    <text x="510" y="57" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        font-weight="bold" fill="#4bc0c0" text-anchor="middle">
        <tspan>共 7 个项目</tspan>
    </text>

    <rect x="620" y="30" width="200" height="40" rx="20" fill="#e0f7fa" />
    <text x="720" y="57" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16"
        font-weight="bold" fill="#4bc0c0" text-anchor="middle">
        <tspan>融资 2.19 亿元</tspan>
    </text>

    <!-- 主卡片 -->
    <g filter="url(#cardShadow)">
