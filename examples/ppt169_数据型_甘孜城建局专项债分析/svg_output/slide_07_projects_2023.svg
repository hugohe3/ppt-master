    </text>
    <text x="870" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13"
        fill="#666666">
        <tspan>• 项目数量从3个增至7个</tspan>
    </text>
    <text x="870" y="608" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13"
        fill="#666666">
        <tspan>• 污水处理项目成为新增重点</tspan>
    </text>
    <text x="870" y="631" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13"
        fill="#666666">
