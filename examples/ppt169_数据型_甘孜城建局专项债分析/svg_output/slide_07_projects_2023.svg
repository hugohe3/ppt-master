    <text x="1050" y="268" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13"
        font-weight="bold" fill="#9966ff" text-anchor="end">
        <tspan>2个 · 0.32亿</tspan>
    </text>

    <rect x="870" y="285" width="24" height="24" rx="4" fill="#36a2eb" />
    <text x="905" y="303" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13"
        fill="#333333">
