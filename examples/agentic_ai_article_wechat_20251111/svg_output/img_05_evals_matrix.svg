<svg viewBox="0 0 1080 1080" width="1080" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EEF2FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="q1Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DBEAFE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BFDBFE;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="q2Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE9FE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DDD6FE;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="q3Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D1FAE5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A7F3D0;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="q4Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FDE68A;stop-opacity:0.8" />
    </linearGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1080" height="1080" fill="url(#bgGradient)"/>
  
  <!-- 标题 -->
  <text x="540" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="62" font-weight="800" fill="#1E293B" text-anchor="middle">
    评估矩阵
  </text>
  <text x="540" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="36" font-weight="500" fill="#64748B" text-anchor="middle">
    如何衡量 AI 智能体的质量
  </text>
  
  <!-- 矩阵坐标轴 -->
  <line x1="240" y1="260" x2="240" y2="880" stroke="#1E293B" stroke-width="5" stroke-linecap="round"/>
  <line x1="240" y1="880" x2="960" y2="880" stroke="#1E293B" stroke-width="5" stroke-linecap="round"/>
  
  <!-- 横轴标签 -->
  <text x="330" y="935" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30" font-weight="600" fill="#1E293B" text-anchor="start">
    客观 Objective
  </text>
  <text x="860" y="935" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30" font-weight="600" fill="#1E293B" text-anchor="end">
    主观 Subjective
  </text>
  <polygon points="955,875 970,880 955,885" fill="#1E293B"/>
  
  <!-- 纵轴标签（对调位置） -->
  <text x="170" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30" font-weight="600" fill="#1E293B" text-anchor="end">
    <tspan x="170" dy="0">有标准</tspan>
    <tspan x="170" dy="35">答案</tspan>
  </text>
  <text x="170" y="850" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30" font-weight="600" fill="#1E293B" text-anchor="end">
    <tspan x="170" dy="0">无标准</tspan>
    <tspan x="170" dy="35">答案</tspan>
  </text>
  <polygon points="235,265 240,250 245,265" fill="#1E293B"/>
  
  <!-- 象限1：左上 - 精确匹配 -->
  <rect x="240" y="260" width="360" height="310" fill="url(#q1Gradient)" stroke="#3B82F6" stroke-width="4" filter="url(#shadow)"/>
  <text x="420" y="365" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="38" font-weight="700" fill="#1E40AF" text-anchor="middle">
    精确匹配
  </text>
  <text x="420" y="430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="500" fill="#475569" text-anchor="middle">
    <tspan x="420" dy="0">客观 + 有标准答案</tspan>
    <tspan x="420" dy="38" font-size="22" fill="#64748B">例：发票日期提取</tspan>
    <tspan x="420" dy="35" font-size="22" fill="#64748B">直接对比 ==</tspan>
  </text>
  
  <!-- 象限2：右上 - LLM 当裁判 -->
  <rect x="600" y="260" width="360" height="310" fill="url(#q2Gradient)" stroke="#8B5CF6" stroke-width="4" filter="url(#shadow)"/>
  <text x="780" y="365" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="38" font-weight="700" fill="#6B21A8" text-anchor="middle">
    LLM 当裁判
  </text>
  <text x="780" y="430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="500" fill="#475569" text-anchor="middle">
    <tspan x="780" dy="0">主观 + 有标准答案</tspan>
    <tspan x="780" dy="38" font-size="22" fill="#64748B">例：科学论文质量</tspan>
    <tspan x="780" dy="35" font-size="22" fill="#64748B">LLM 检查关键词</tspan>
  </text>
  
  <!-- 象限3：左下 - 规则验证 -->
  <rect x="240" y="570" width="360" height="310" fill="url(#q3Gradient)" stroke="#10B981" stroke-width="4" filter="url(#shadow)"/>
  <text x="420" y="675" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="38" font-weight="700" fill="#047857" text-anchor="middle">
    规则验证
  </text>
  <text x="420" y="740" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="500" fill="#475569" text-anchor="middle">
    <tspan x="420" dy="0">客观 + 无标准答案</tspan>
    <tspan x="420" dy="38" font-size="22" fill="#64748B">例：字数限制</tspan>
    <tspan x="420" dy="35" font-size="22" fill="#64748B">len(text) &lt;= 10</tspan>
  </text>
  
  <!-- 象限4：右下 - 综合评分 -->
  <rect x="600" y="570" width="360" height="310" fill="url(#q4Gradient)" stroke="#F59E0B" stroke-width="4" filter="url(#shadow)"/>
  <text x="780" y="675" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="38" font-weight="700" fill="#B45309" text-anchor="middle">
    综合评分
  </text>
  <text x="780" y="740" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="500" fill="#475569" text-anchor="middle">
    <tspan x="780" dy="0">主观 + 无标准答案</tspan>
    <tspan x="780" dy="38" font-size="22" fill="#64748B">例：用户体验</tspan>
    <tspan x="780" dy="35" font-size="22" fill="#64748B">多维度评估</tspan>
  </text>
  
  <!-- 底部提示 -->
  <rect x="200" y="980" width="680" height="70" fill="#FFFFFF" rx="16" filter="url(#shadow)"/>
  <text x="540" y="1023" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="600" fill="#1E293B" text-anchor="middle">
    📊 评估是构建 AI 智能体的另一半
  </text>
</svg>