<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#2A5080"/>
    </linearGradient>
  </defs>
  
  <rect width="1280" height="720" fill="#F8F9FA"/>
  
  <rect x="0" y="0" width="1280" height="80" fill="url(#headerGrad)"/>
  <text x="60" y="50" fill="white" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="600">物种生物学约束：温度红线</text>
  <text x="1220" y="50" text-anchor="end" fill="#8A9AAE" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="14">SPECIES THERMAL CONSTRAINTS</text>
  
  <!-- 温度仪表盘 -->
  <g transform="translate(60, 110)">
    <rect width="1160" height="250" rx="10" fill="white" stroke="#E0E0E0"/>
    <text x="30" y="35" fill="#1E3A5F" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600">中华鲟温度耐受阈值 vs 统景环境温度</text>
    
    <!-- 温度条 -->
    <rect x="30" y="60" width="1100" height="60" rx="6" fill="#E5E7EB"/>
    
    <!-- 最适区 18-25°C -->
    <rect x="426" y="65" width="154" height="50" rx="4" fill="#228B22" opacity="0.4"/>
    <text x="503" y="50" text-anchor="middle" fill="#228B22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="600">最适温度区</text>
    
    <!-- 临界区 28-30°C -->
    <rect x="646" y="65" width="44" height="50" rx="4" fill="#E67E22" opacity="0.4"/>
    
    <!-- 致死区 33-35°C -->
    <rect x="756" y="65" width="44" height="50" rx="4" fill="#C41E3A" opacity="0.4"/>
    
    <!-- 统景夏季 30-40°C -->
    <rect x="690" y="65" width="220" height="50" rx="4" fill="none" stroke="#C41E3A" stroke-width="2" stroke-dasharray="6,3"/>
    
    <!-- 刻度 -->
    <text x="30" y="140" fill="#6C757D" font-size="12">0°C</text>
    <text x="250" y="140" fill="#6C757D" font-size="12">10°C</text>
    <text x="470" y="140" fill="#6C757D" font-size="12">20°C</text>
    <text x="690" y="140" fill="#6C757D" font-size="12">30°C</text>
    <text x="910" y="140" fill="#6C757D" font-size="12">40°C</text>
    <text x="1100" y="140" fill="#6C757D" font-size="12">50°C</text>
    
    <!-- 图例 -->
    <rect x="30" y="170" width="16" height="16" rx="3" fill="#228B22" opacity="0.5"/>
    <text x="52" y="183" fill="#4A5568" font-size="12">最适温度区 18-25°C</text>
    <rect x="230" y="170" width="16" height="16" rx="3" fill="#E67E22" opacity="0.5"/>
    <text x="252" y="183" fill="#4A5568" font-size="12">临界温度 28-30°C</text>
    <rect x="420" y="170" width="16" height="16" rx="3" fill="#C41E3A" opacity="0.5"/>
    <text x="442" y="183" fill="#4A5568" font-size="12">致死温度 33-35°C</text>
    <rect x="610" y="170" width="16" height="16" rx="3" fill="none" stroke="#C41E3A" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="632" y="183" fill="#4A5568" font-size="12">统景夏季水温 30-40°C (冲突区)</text>
    
    <!-- 结论 -->
    <rect x="30" y="205" width="1100" height="30" rx="4" fill="#FEF2F2"/>
    <text x="45" y="225" fill="#C41E3A" font-size="13" font-weight="600">⚠ 结论：统景夏季水温与中华鲟致死温度区高度重叠，无人工干预条件下物种难以存活</text>
  </g>
  
  <!-- 四个数据卡片 -->
  <g transform="translate(60, 380)">
    <rect width="270" height="130" rx="10" fill="white" stroke="#228B22" stroke-width="2"/>
    <rect x="0" y="0" width="270" height="36" rx="10" fill="#228B22"/>
    <rect x="0" y="18" width="270" height="18" fill="#228B22"/>
    <text x="135" y="25" text-anchor="middle" fill="white" font-size="14" font-weight="600">🌊 最适生长温度</text>
    <text x="135" y="80" text-anchor="middle" fill="#228B22" font-size="38" font-weight="700">18-25°C</text>
    <text x="135" y="110" text-anchor="middle" fill="#6C757D" font-size="12">生长发育・繁殖最优区间</text>
  </g>
  
  <g transform="translate(355, 380)">
    <rect width="270" height="130" rx="10" fill="white" stroke="#E67E22" stroke-width="2"/>
    <rect x="0" y="0" width="270" height="36" rx="10" fill="#E67E22"/>
    <rect x="0" y="18" width="270" height="18" fill="#E67E22"/>
    <text x="135" y="25" text-anchor="middle" fill="white" font-size="14" font-weight="600">⚠ 临界应激温度</text>
    <text x="135" y="80" text-anchor="middle" fill="#E67E22" font-size="38" font-weight="700">28-30°C</text>
    <text x="135" y="110" text-anchor="middle" fill="#6C757D" font-size="12">停止摄食・免疫下降</text>
  </g>
  
  <g transform="translate(650, 380)">
    <rect width="270" height="130" rx="10" fill="white" stroke="#C41E3A" stroke-width="2"/>
    <rect x="0" y="0" width="270" height="36" rx="10" fill="#C41E3A"/>
    <rect x="0" y="18" width="270" height="18" fill="#C41E3A"/>
    <text x="135" y="25" text-anchor="middle" fill="white" font-size="14" font-weight="600">☠ 致死温度阈值</text>
    <text x="135" y="80" text-anchor="middle" fill="#C41E3A" font-size="38" font-weight="700">33-35°C</text>
    <text x="135" y="110" text-anchor="middle" fill="#6C757D" font-size="12">器官衰竭・批量死亡</text>
  </g>
  
  <g transform="translate(945, 380)">
    <rect width="275" height="130" rx="10" fill="white" stroke="#8B0000" stroke-width="2"/>
    <rect x="0" y="0" width="275" height="36" rx="10" fill="#8B0000"/>
    <rect x="0" y="18" width="275" height="18" fill="#8B0000"/>
    <text x="137" y="25" text-anchor="middle" fill="white" font-size="14" font-weight="600">🌡️ 统景夏季水温</text>
    <text x="137" y="80" text-anchor="middle" fill="#8B0000" font-size="38" font-weight="700">30-40°C</text>
    <text x="137" y="110" text-anchor="middle" fill="#6C757D" font-size="12">7-9月自然水体实测</text>
  </g>
  
  <!-- 底部科学依据 -->
  <g transform="translate(60, 530)">
    <rect width="1160" height="140" rx="10" fill="#1A2F4A"/>
    <text x="30" y="30" fill="#C9A962" font-size="14" font-weight="600">📋 科学文献依据</text>
    <text fill="white" font-size="12">
      <tspan x="30" y="60">1. 中华鲟人工繁殖技术研究 - 中国水产科学研究院长江水产研究所 (2018)</tspan>
      <tspan x="30" y="85">2. 长江珍稀特有鱼类保护技术规范 - 农业农村部渔业渔政管理局 (2021)</tspan>
      <tspan x="30" y="110">3. 统景温泉地质勘探评估报告 - 重庆市地质矿产勘查开发局 (2020)</tspan>
      <tspan x="600" y="60">4. 渝北区年度气象监测数据汇编 - 重庆市气象局 (2019-2024)</tspan>
      <tspan x="600" y="85">5. 鲟形目鱼类生理生态学 - 中国科学院水生生物研究所 (2019)</tspan>
      <tspan x="600" y="110">6. 工厂化循环水养殖系统设计规范 - 中国水产学会 (2022)</tspan>
    </text>
  </g>
  
  <text x="1220" y="690" text-anchor="end" fill="#6C757D" font-size="12">07</text>
</svg>
