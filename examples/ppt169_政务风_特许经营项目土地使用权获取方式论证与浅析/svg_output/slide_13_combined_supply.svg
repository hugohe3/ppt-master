<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#F5F7FA"/>
  
  <!-- 页面标题 -->
  <text x="60" y="70" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" fill="#0D47A1">
    自然资源组合供应政策
  </text>
  <rect x="60" y="85" width="1160" height="3" fill="#0D47A1"/>
  
  <!-- 页码 -->
  <text x="1220" y="70" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666">
    13 / 14
  </text>
  
  <!-- 政策依据 -->
  <rect x="60" y="115" width="1160" height="60" rx="8" fill="#0D47A1"/>
  <text x="90" y="152" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="600" fill="#FFFFFF">
    📜 政策依据：自然资发〔2023〕89号《关于进一步做好用地用海要素保障的通知》
  </text>
  
  <!-- 组合供应概念 -->
  <rect x="60" y="195" width="560" height="150" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="60" y="195" width="6" height="150" rx="3" fill="#43A047"/>
  <text x="90" y="230" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="600" fill="#43A047">
    ✅ 组合供应概念
  </text>
  <text x="90" y="265" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#1A1A1A">
    <tspan x="90" dy="0">• 特定国土空间范围内</tspan>
    <tspan x="90" dy="26">• 同一使用权人需整体使用多门类自然资源资产</tspan>
    <tspan x="90" dy="26">• 一并对社会公告、签订资产配置合同</tspan>
  </text>
  
  <!-- 特许经营中的问题 -->
  <rect x="660" y="195" width="560" height="150" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="660" y="195" width="6" height="150" rx="3" fill="#FF6F00"/>
  <text x="690" y="230" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="600" fill="#FF6F00">
    ⚠️ 特许经营中的问题
  </text>
  <text x="690" y="265" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#1A1A1A">
    <tspan x="690" dy="0">• 公益性用地：划拨 ✓</tspan>
    <tspan x="690" dy="26">• 经营性配套用地：招拍挂 → 难以实现组合供应</tspan>
    <tspan x="690" dy="26">• 招标阶段经营性用地仍是"毛地"，不符合净地要求</tspan>
  </text>
  
  <!-- 招拍挂障碍分析 -->
  <rect x="60" y="365" width="560" height="170" rx="8" fill="#FFF3E0" stroke="#FF6F00" stroke-width="1"/>
  <text x="90" y="400" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="600" fill="#FF6F00">
    ❌ 招拍挂的三大障碍
  </text>
  <text x="90" y="435" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#1A1A1A">
    <tspan x="90" dy="0" font-weight="600">障碍一：</tspan>
    <tspan>项目公司未必能成为配套用地使用权人</tspan>
  </text>
  <text x="90" y="465" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#1A1A1A">
    <tspan x="90" dy="0" font-weight="600">障碍二：</tspan>
    <tspan>特许经营招标无法代替招拍挂程序</tspan>
  </text>
  <text x="90" y="495" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="#1A1A1A">
    <tspan x="90" dy="0" font-weight="600">障碍三：</tspan>
    <tspan>一二级联动属于土地管理禁区</tspan>
  </text>
  
  <!-- 实现路径 -->
  <rect x="660" y="365" width="560" height="170" rx="8" fill="#E8F5E9" stroke="#43A047" stroke-width="1"/>
  <text x="690" y="400" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="600" fill="#43A047">
    ✅ 组合供应实现路径
  </text>
  
  <!-- 流程图 -->
  <rect x="710" y="420" width="140" height="40" rx="6" fill="#0D47A1"/>
  <text x="780" y="445" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="600" fill="#FFFFFF">
    特许经营项目
  </text>
  
  <line x1="850" y1="440" x2="880" y2="440" stroke="#0D47A1" stroke-width="2"/>
  <polygon points="890,440 880,435 880,445" fill="#0D47A1"/>
  
  <rect x="900" y="415" width="120" height="25" rx="4" fill="#E3F2FD"/>
  <text x="960" y="432" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#1976D2">
    公益性用地→划拨
  </text>
  
  <rect x="900" y="445" width="120" height="25" rx="4" fill="#FFF3E0"/>
  <text x="960" y="462" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#FF6F00">
    经营性用地↓
  </text>
  
  <line x1="960" y1="470" x2="960" y2="490" stroke="#FF6F00" stroke-width="2"/>
  <polygon points="960,500 955,490 965,490" fill="#FF6F00"/>
  
  <rect x="870" y="505" width="180" height="25" rx="4" fill="#43A047"/>
  <text x="960" y="522" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#FFFFFF">
    协议/带方案/综合评价
  </text>
  
  <!-- 核心结论 -->
  <rect x="60" y="555" width="1160" height="70" rx="8" fill="#0D47A1"/>
  <text x="110" y="585" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">
    💡 核心结论
  </text>
  <text x="260" y="585" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#FFFFFF">
    通过依法合规的方式（协议出让、带方案出让、综合评价）精准锁定特许经营者获取配套土地使用权
  </text>
  <text x="110" y="610" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" fill="rgba(255,255,255,0.7)">
    ⚠️ 特别注意：TOT项目需符合国资进场交易和产权管理的相关要求
  </text>
  
  <!-- 底部装饰线 -->
  <rect x="60" y="680" width="1160" height="1" fill="#E0E0E0"/>
</svg>
