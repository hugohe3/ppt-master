<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
    <!-- 背景 -->
    <rect width="1280" height="720" fill="#F8FAFC" />

    <!-- 顶部装饰条 -->
    <rect x="0" y="0" width="1280" height="6" fill="#1E5AAF" />

    <!-- 页面标题 -->
    <text x="60" y="70" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="28"
        font-weight="700" fill="#1F2937">
        申报流程图解
    </text>
    <rect x="60" y="85" width="60" height="4" fill="#F59E0B" rx="2" />

    <!-- 上部 - 线上申报流程 -->
    <g transform="translate(60, 110)">
        <rect x="0" y="0" width="1160" height="250" fill="#FFFFFF" rx="12" />

        <!-- 标题栏 -->
        <rect x="0" y="0" width="1160" height="50" fill="#1E5AAF" rx="12" />
        <rect x="0" y="40" width="1160" height="20" fill="#1E5AAF" />
        <text x="40" y="33" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="20"
            font-weight="600" fill="#FFFFFF">
            💻 线上申报
        </text>

        <!-- 流程图 -->
        <!-- 步骤1 -->
        <g transform="translate(80, 80)">
            <rect x="0" y="0" width="280" height="140" fill="#1E5AAF" opacity="0.05" rx="10" />
            <circle cx="30" cy="30" r="20" fill="#1E5AAF" />
            <text x="30" y="37" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">
                1
            </text>
            <text x="60" y="35" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="16" font-weight="600" fill="#1F2937">
                项目录入
            </text>
            <text x="15" y="65" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="12" fill="#6B7280">
                登录国家重大建设项目库
            </text>
            <text x="15" y="85" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="12" fill="#6B7280">
                录入项目基本信息
            </text>
            <text x="15" y="105" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="12" fill="#6B7280">
                （名称、地点、内容、规模）
            </text>
            <text x="15" y="125" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="12" fill="#6B7280">
                推送至属地发改部门
            </text>
        </g>

        <!-- 箭头1 -->
        <g transform="translate(370, 140)">
            <line x1="0" y1="0" x2="50" y2="0" stroke="#1E5AAF" stroke-width="3" />
            <polygon points="55,0 45,-8 45,8" fill="#1E5AAF" />
        </g>

        <!-- 步骤2 -->
        <g transform="translate(440, 80)">
            <rect x="0" y="0" width="280" height="140" fill="#1E5AAF" opacity="0.05" rx="10" />
            <circle cx="30" cy="30" r="20" fill="#1E5AAF" />
            <text x="30" y="37" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">
                2
            </text>
            <text x="60" y="35" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="16" font-weight="600" fill="#1F2937">
                筛选审核
            </text>
            <text x="15" y="70" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="12" fill="#6B7280">
                属地发改部门
            </text>
            <text x="15" y="95" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="12" fill="#6B7280">
                会同行业主管部门
            </text>
            <text x="15" y="120" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="12" fill="#6B7280">
                进行筛选审核
            </text>
        </g>

        <!-- 箭头2 -->
        <g transform="translate(730, 140)">
            <line x1="0" y1="0" x2="50" y2="0" stroke="#1E5AAF" stroke-width="3" />
            <polygon points="55,0 45,-8 45,8" fill="#1E5AAF" />
        </g>

        <!-- 步骤3 -->
        <g transform="translate(800, 80)">
            <rect x="0" y="0" width="300" height="140" fill="#2E8B57" opacity="0.08" rx="10" />
            <rect x="0" y="0" width="4" height="140" fill="#2E8B57" rx="2" />
            <circle cx="30" cy="30" r="20" fill="#2E8B57" />
            <text x="30" y="37" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">
                3
            </text>
            <text x="60" y="35" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="16" font-weight="600" fill="#1F2937">
                纳入计划库
            </text>
            <text x="15" y="70" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="12" fill="#6B7280">
                通过审核的项目纳入
            </text>
            <text x="15" y="95" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="13" font-weight="500" fill="#2E8B57">
                国家三年滚动计划库
            </text>
            <text x="15" y="120" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="12" fill="#6B7280">
                逐级推送
            </text>
        </g>
    </g>

    <!-- 下部 - 线下申报流程 -->
    <g transform="translate(60, 385)">
        <rect x="0" y="0" width="1160" height="250" fill="#FFFFFF" rx="12" />

        <!-- 标题栏 -->
        <rect x="0" y="0" width="1160" height="50" fill="#F59E0B" rx="12" />
        <rect x="0" y="40" width="1160" height="20" fill="#F59E0B" />
        <text x="40" y="33" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="20"
            font-weight="600" fill="#FFFFFF">
            📄 线下申报
        </text>

        <!-- 流程图 -->
        <!-- 步骤1 -->
        <g transform="translate(40, 70)">
            <rect x="0" y="0" width="200" height="150" fill="#F59E0B" opacity="0.05" rx="10" />
            <circle cx="25" cy="25" r="18" fill="#F59E0B" />
            <text x="25" y="31" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">
                1
            </text>
            <text x="55" y="30" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="15" font-weight="600" fill="#1F2937">
                材料准备
            </text>
            <text x="12" y="60" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="11" fill="#6B7280">
                • 资金申请报告
            </text>
            <text x="12" y="80" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="11" fill="#6B7280">
                • 审批（核准、备案）文件
            </text>
            <text x="12" y="100" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="11" fill="#6B7280">
                • 真实性说明
            </text>
            <text x="12" y="120" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="11" fill="#6B7280">
                • 资金承诺函
            </text>
        </g>

        <!-- 箭头 -->
        <g transform="translate(250, 140)">
            <line x1="0" y1="0" x2="35" y2="0" stroke="#F59E0B" stroke-width="2" />
            <polygon points="40,0 32,-6 32,6" fill="#F59E0B" />
        </g>

        <!-- 步骤2 -->
        <g transform="translate(300, 70)">
            <rect x="0" y="0" width="180" height="150" fill="#F59E0B" opacity="0.05" rx="10" />
            <circle cx="25" cy="25" r="18" fill="#F59E0B" />
            <text x="25" y="31" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">
                2
            </text>
            <text x="55" y="30" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="15" font-weight="600" fill="#1F2937">
                初审
            </text>
            <text x="12" y="70" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="11" fill="#6B7280">
                报送属地
            </text>
            <text x="12" y="90" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="11" fill="#6B7280">
                发展改革部门
            </text>
            <text x="12" y="115" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="11" fill="#6B7280">
                进行初审
            </text>
        </g>

        <!-- 箭头 -->
        <g transform="translate(490, 140)">
            <line x1="0" y1="0" x2="35" y2="0" stroke="#F59E0B" stroke-width="2" />
            <polygon points="40,0 32,-6 32,6" fill="#F59E0B" />
        </g>

        <!-- 步骤3 -->
        <g transform="translate(540, 70)">
            <rect x="0" y="0" width="280" height="150" fill="#F59E0B" opacity="0.05" rx="10" />
            <circle cx="25" cy="25" r="18" fill="#F59E0B" />
            <text x="25" y="31" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">
                3
            </text>
            <text x="55" y="30" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="15" font-weight="600" fill="#1F2937">
                逐级审核
            </text>
            <text x="12" y="65" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="11" fill="#6B7280">
                县级部门审核 → 上报市级
            </text>
            <text x="12" y="90" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="11" fill="#6B7280">
                市级部门审核 → 上报省级
            </text>
            <!-- 流程小图 -->
            <g transform="translate(12, 110)">
                <rect x="0" y="0" width="50" height="22" fill="#F59E0B" opacity="0.2" rx="4" />
                <text x="25" y="15" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                    font-size="10" fill="#F59E0B" text-anchor="middle">
                    县级
                </text>
                <text x="62" y="15" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                    font-size="12" fill="#F59E0B">
                    →
                </text>
                <rect x="75" y="0" width="50" height="22" fill="#F59E0B" opacity="0.2" rx="4" />
                <text x="100" y="15" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                    font-size="10" fill="#F59E0B" text-anchor="middle">
                    市级
                </text>
                <text x="137" y="15" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                    font-size="12" fill="#F59E0B">
                    →
                </text>
                <rect x="150" y="0" width="50" height="22" fill="#F59E0B" opacity="0.2" rx="4" />
                <text x="175" y="15" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                    font-size="10" fill="#F59E0B" text-anchor="middle">
                    省级
                </text>
            </g>
        </g>

        <!-- 箭头 -->
        <g transform="translate(830, 140)">
            <line x1="0" y1="0" x2="35" y2="0" stroke="#F59E0B" stroke-width="2" />
            <polygon points="40,0 32,-6 32,6" fill="#F59E0B" />
        </g>

        <!-- 步骤4 -->
        <g transform="translate(880, 70)">
            <rect x="0" y="0" width="240" height="150" fill="#2E8B57" opacity="0.08" rx="10" />
            <rect x="0" y="0" width="4" height="150" fill="#2E8B57" rx="2" />
            <circle cx="25" cy="25" r="18" fill="#2E8B57" />
            <text x="25" y="31" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">
                4
            </text>
            <text x="55" y="30" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="15" font-weight="600" fill="#1F2937">
                国家审核
            </text>
            <text x="12" y="65" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="11" fill="#6B7280">
                省级发改部门汇总
            </text>
            <text x="12" y="85" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="11" fill="#6B7280">
                上报国家发展改革委
            </text>
            <text x="12" y="115" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="13" font-weight="500" fill="#2E8B57">
                确定支持项目清单
            </text>
        </g>
    </g>

    <!-- 页码 -->
    <text x="640" y="680" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="14"
        font-weight="400" fill="#9CA3AF" text-anchor="middle">
        12 / 14
    </text>

    <!-- 底部装饰条 -->
    <rect x="0" y="714" width="1280" height="6" fill="#1E5AAF" />
</svg>