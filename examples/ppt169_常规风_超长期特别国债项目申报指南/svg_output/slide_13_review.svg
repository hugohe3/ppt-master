<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
    <!-- 背景 -->
    <rect width="1280" height="720" fill="#F8FAFC" />

    <!-- 顶部装饰条 -->
    <rect x="0" y="0" width="1280" height="6" fill="#1E5AAF" />

    <!-- 页面标题 -->
    <text x="60" y="70" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="28"
        font-weight="700" fill="#1F2937">
        审核要点与步骤
    </text>
    <rect x="60" y="85" width="60" height="4" fill="#F59E0B" rx="2" />

    <!-- 上区块 - 六大审核要点 2×3网格 -->
    <text x="60" y="130" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="18"
        font-weight="600" fill="#1F2937">
        六大审核要点
    </text>

    <!-- 要点1: 投向审核 -->
    <g transform="translate(60, 150)">
        <rect x="0" y="0" width="370" height="110" fill="#FFFFFF" rx="10" />
        <circle cx="30" cy="30" r="20" fill="#1E5AAF" opacity="0.15" />
        <text x="30" y="36" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="16"
            text-anchor="middle">
            🎯
        </text>
        <text x="60" y="35" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="15"
            font-weight="600" fill="#1F2937">
            投向审核
        </text>
        <text x="20" y="65" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="12"
            fill="#6B7280">
            必须符合投向，禁止房地产开发、
        </text>
        <text x="20" y="85" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="12"
            fill="#6B7280">
            楼堂馆所等政策禁止内容
        </text>
    </g>

    <!-- 要点2: 成熟度审核 -->
    <g transform="translate(455, 150)">
        <rect x="0" y="0" width="370" height="110" fill="#FFFFFF" rx="10" />
        <circle cx="30" cy="30" r="20" fill="#2E8B57" opacity="0.15" />
        <text x="30" y="36" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="16"
            text-anchor="middle">
            ✅
        </text>
        <text x="60" y="35" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="15"
            font-weight="600" fill="#1F2937">
            成熟度审核
        </text>
        <text x="20" y="65" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="12"
            fill="#6B7280">
            前期手续应完成办理，
        </text>
        <text x="20" y="85" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="12"
            fill="#6B7280">
            特殊情况可出具书面承诺函
        </text>
    </g>

    <!-- 要点3: 资金来源 -->
    <g transform="translate(850, 150)">
        <rect x="0" y="0" width="370" height="110" fill="#FFFFFF" rx="10" />
        <circle cx="30" cy="30" r="20" fill="#F59E0B" opacity="0.15" />
        <text x="30" y="36" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="16"
            text-anchor="middle">
            💰
        </text>
        <text x="60" y="35" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="15"
            font-weight="600" fill="#1F2937">
            资金来源
        </text>
        <text x="20" y="65" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="12"
            fill="#6B7280">
            资金拼盘完整闭合，
        </text>
        <text x="20" y="85" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="12"
            fill="#6B7280">
            各渠道资金应有相应证明
        </text>
    </g>

    <!-- 要点4: 防范违规 -->
    <g transform="translate(60, 275)">
        <rect x="0" y="0" width="370" height="110" fill="#FFFFFF" rx="10" />
        <circle cx="30" cy="30" r="20" fill="#DC3545" opacity="0.15" />
        <text x="30" y="36" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="16"
            text-anchor="middle">
            🚫
        </text>
        <text x="60" y="35" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="15"
            font-weight="600" fill="#1F2937">
            防范违规
        </text>
        <text x="20" y="65" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="12"
            fill="#6B7280">
            禁止重复申报、多头申报，
        </text>
        <text x="20" y="85" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="12"
            fill="#6B7280">
            失信单位不得申报
        </text>
    </g>

    <!-- 要点5: 信息准确 -->
    <g transform="translate(455, 275)">
        <rect x="0" y="0" width="370" height="110" fill="#FFFFFF" rx="10" />
        <circle cx="30" cy="30" r="20" fill="#1E5AAF" opacity="0.15" />
        <text x="30" y="36" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="16"
            text-anchor="middle">
            📋
        </text>
        <text x="60" y="35" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="15"
            font-weight="600" fill="#1F2937">
            信息准确
        </text>
        <text x="20" y="65" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="12"
            fill="#6B7280">
            项目信息与可研报告、环评、
        </text>
        <text x="20" y="85" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="12"
            fill="#6B7280">
            能评等手续保持一致
        </text>
    </g>

    <!-- 要点6: 合规性审查 -->
    <g transform="translate(850, 275)">
        <rect x="0" y="0" width="370" height="110" fill="#FFFFFF" rx="10" />
        <circle cx="30" cy="30" r="20" fill="#2E8B57" opacity="0.15" />
        <text x="30" y="36" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="16"
            text-anchor="middle">
            ⚖️
        </text>
        <text x="60" y="35" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="15"
            font-weight="600" fill="#1F2937">
            合规性审查
        </text>
        <text x="20" y="65" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="12"
            fill="#6B7280">
            支持领域符合性、前期手续进度、
        </text>
        <text x="20" y="85" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="12"
            fill="#6B7280">
            开工条件等
        </text>
    </g>

    <!-- 下区块 - 审核步骤流程 -->
    <g transform="translate(60, 410)">
        <rect x="0" y="0" width="1160" height="200" fill="#FFFFFF" rx="12" />

        <text x="30" y="35" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="16"
            font-weight="600" fill="#1F2937">
            审核步骤流程
        </text>
        <line x1="30" y1="55" x2="1130" y2="55" stroke="#E5E7EB" stroke-width="1" />

        <!-- 步骤流程 -->
        <!-- 步骤1 -->
        <g transform="translate(80, 80)">
            <rect x="0" y="0" width="230" height="100" fill="#1E5AAF" opacity="0.08" rx="10" />
            <rect x="0" y="0" width="230" height="5" fill="#1E5AAF" rx="3" />
            <circle cx="25" cy="35" r="16" fill="#1E5AAF" />
            <text x="25" y="41" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">
                1
            </text>
            <text x="50" y="40" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="14" font-weight="600" fill="#1F2937">
                合规性审查
            </text>
            <text x="15" y="65" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="11" fill="#6B7280">
                支持领域、资格能力
            </text>
            <text x="15" y="83" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="11" fill="#6B7280">
                前期手续、资金落实
            </text>
        </g>

        <!-- 箭头 -->
        <g transform="translate(320, 125)">
            <line x1="0" y1="0" x2="40" y2="0" stroke="#1E5AAF" stroke-width="2" />
            <polygon points="45,0 37,-5 37,5" fill="#1E5AAF" />
        </g>

        <!-- 步骤2 -->
        <g transform="translate(375, 80)">
            <rect x="0" y="0" width="230" height="100" fill="#2E8B57" opacity="0.08" rx="10" />
            <rect x="0" y="0" width="230" height="5" fill="#2E8B57" rx="3" />
            <circle cx="25" cy="35" r="16" fill="#2E8B57" />
            <text x="25" y="41" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">
                2
            </text>
            <text x="50" y="40" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="14" font-weight="600" fill="#1F2937">
                定性审查
            </text>
            <text x="15" y="65" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="11" fill="#6B7280">
                规模方案科学性
            </text>
            <text x="15" y="83" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="11" fill="#6B7280">
                建设内容政策符合性
            </text>
        </g>

        <!-- 箭头 -->
        <g transform="translate(615, 125)">
            <line x1="0" y1="0" x2="40" y2="0" stroke="#2E8B57" stroke-width="2" />
            <polygon points="45,0 37,-5 37,5" fill="#2E8B57" />
        </g>

        <!-- 步骤3 -->
        <g transform="translate(670, 80)">
            <rect x="0" y="0" width="230" height="100" fill="#F59E0B" opacity="0.08" rx="10" />
            <rect x="0" y="0" width="230" height="5" fill="#F59E0B" rx="3" />
            <circle cx="25" cy="35" r="16" fill="#F59E0B" />
            <text x="25" y="41" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">
                3
            </text>
            <text x="50" y="40" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="14" font-weight="600" fill="#1F2937">
                定量审查
            </text>
            <text x="15" y="65" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="11" fill="#6B7280">
                投资构成合理性
            </text>
            <text x="15" y="83" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="11" fill="#6B7280">
                建设投资经济性
            </text>
        </g>

        <!-- 箭头 -->
        <g transform="translate(910, 125)">
            <line x1="0" y1="0" x2="40" y2="0" stroke="#F59E0B" stroke-width="2" />
            <polygon points="45,0 37,-5 37,5" fill="#F59E0B" />
        </g>

        <!-- 步骤4 -->
        <g transform="translate(965, 80)">
            <rect x="0" y="0" width="160" height="100" fill="#1E5AAF" rx="10" />
            <circle cx="25" cy="35" r="16" fill="#FFFFFF" />
            <text x="25" y="41" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="12" font-weight="700" fill="#1E5AAF" text-anchor="middle">
                4
            </text>
            <text x="50" y="40" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="14" font-weight="600" fill="#FFFFFF">
                排序打分
            </text>
            <text x="15" y="70" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="11" fill="#FFFFFF" opacity="0.9">
                综合评定
            </text>
            <text x="15" y="88" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="11" fill="#FFFFFF" opacity="0.9">
                确定清单
            </text>
        </g>
    </g>

    <!-- 页码 -->
    <text x="640" y="680" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="14"
        font-weight="400" fill="#9CA3AF" text-anchor="middle">
        13 / 14
    </text>

    <!-- 底部装饰条 -->
    <rect x="0" y="714" width="1280" height="6" fill="#1E5AAF" />
</svg>