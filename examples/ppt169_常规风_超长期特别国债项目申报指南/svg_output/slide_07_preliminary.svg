<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
    <!-- 背景 -->
    <rect width="1280" height="720" fill="#F8FAFC" />

    <!-- 顶部装饰条 -->
    <rect x="0" y="0" width="1280" height="6" fill="#1E5AAF" />

    <!-- 页面标题 -->
    <text x="60" y="70" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="28"
        font-weight="700" fill="#1F2937">
        前期工作要求
    </text>
    <rect x="60" y="85" width="60" height="4" fill="#1E5AAF" rx="2" />

    <!-- 左栏 - "两重"项目 -->
    <g transform="translate(60, 110)">
        <rect x="0" y="0" width="560" height="530" fill="#FFFFFF" rx="12" />
        <rect x="0" y="0" width="560" height="60" fill="#1E5AAF" rx="12" />
        <rect x="0" y="50" width="560" height="20" fill="#1E5AAF" />

        <!-- 标题 -->
        <text x="280" y="40" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
            font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">
            "两重"项目前期工作
        </text>

        <!-- 基本要求卡片 -->
        <g transform="translate(20, 80)">
            <rect x="0" y="0" width="520" height="180" fill="#2E8B57" opacity="0.08" rx="10" />
            <rect x="0" y="0" width="4" height="180" fill="#2E8B57" rx="2" />

            <rect x="16" y="15" width="90" height="28" fill="#2E8B57" opacity="0.15" rx="14" />
            <text x="61" y="35" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="13" font-weight="600" fill="#2E8B57" text-anchor="middle">
                ✓ 基本要求
            </text>

            <text x="16" y="70" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="15" fill="#1F2937">
                原则上应当已完成项目审批（核准）
            </text>
            <text x="16" y="95" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="15" fill="#1F2937">
                或备案手续
            </text>

            <line x1="16" y1="115" x2="504" y2="115" stroke="#2E8B57" stroke-width="1" opacity="0.3" />

            <text x="16" y="140" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="14" fill="#6B7280">
                优先支持已办理完毕用地（用海）、环评、
            </text>
            <text x="16" y="163" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="14" fill="#6B7280">
                用能等各项前期手续，具备开工条件的项目
            </text>
        </g>

        <!-- 特殊情况卡片 -->
        <g transform="translate(20, 280)">
            <rect x="0" y="0" width="520" height="230" fill="#F59E0B" opacity="0.08" rx="10" />
            <rect x="0" y="0" width="4" height="230" fill="#F59E0B" rx="2" />

            <rect x="16" y="15" width="110" height="28" fill="#F59E0B" opacity="0.15" rx="14" />
            <text x="71" y="35" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="13" font-weight="600" fill="#F59E0B" text-anchor="middle">
                💡 特殊情况处理
            </text>

            <text x="16" y="70" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="15" fill="#1F2937">
                对已完成审批但缺少部分手续的项目：
            </text>

            <g transform="translate(16, 95)">
                <circle cx="8" cy="8" r="4" fill="#F59E0B" />
                <text x="22" y="13" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                    font-size="14" fill="#6B7280">
                    可按权限出具书面承诺函
                </text>
            </g>

            <g transform="translate(16, 125)">
                <circle cx="8" cy="8" r="4" fill="#F59E0B" />
                <text x="22" y="13" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                    font-size="14" fill="#6B7280">
                    附各项前期工作完成时间表
                </text>
            </g>

            <g transform="translate(16, 155)">
                <circle cx="8" cy="8" r="4" fill="#F59E0B" />
                <text x="22" y="13" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                    font-size="14" fill="#6B7280">
                    明确责任人
                </text>
            </g>

            <g transform="translate(16, 185)">
                <circle cx="8" cy="8" r="4" fill="#F59E0B" />
                <text x="22" y="13" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                    font-size="14" fill="#6B7280">
                    同时抓紧按承诺办理相关手续
                </text>
            </g>
        </g>
    </g>

    <!-- 右栏 - "两新"项目 -->
    <g transform="translate(660, 110)">
        <rect x="0" y="0" width="560" height="530" fill="#FFFFFF" rx="12" />
        <rect x="0" y="0" width="560" height="60" fill="#2E8B57" rx="12" />
        <rect x="0" y="50" width="560" height="20" fill="#2E8B57" />

        <!-- 标题 -->
        <text x="280" y="40" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
            font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">
            "两新"项目前期工作
        </text>

        <!-- 必须完成的前置条件 -->
        <g transform="translate(20, 80)">
            <text x="0" y="20" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="16" font-weight="600" fill="#1F2937">
                必须完成的前置条件：
            </text>

            <!-- 6个标签 2×3排列 -->
            <g transform="translate(0, 40)">
                <rect x="0" y="0" width="160" height="50" fill="#2E8B57" opacity="0.1" rx="8" />
                <text x="80" y="32" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                    font-size="16" font-weight="500" fill="#2E8B57" text-anchor="middle">
                    项目审批
                </text>
            </g>

            <g transform="translate(180, 40)">
                <rect x="0" y="0" width="160" height="50" fill="#2E8B57" opacity="0.1" rx="8" />
                <text x="80" y="32" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                    font-size="16" font-weight="500" fill="#2E8B57" text-anchor="middle">
                    环评
                </text>
            </g>

            <g transform="translate(360, 40)">
                <rect x="0" y="0" width="160" height="50" fill="#2E8B57" opacity="0.1" rx="8" />
                <text x="80" y="32" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                    font-size="16" font-weight="500" fill="#2E8B57" text-anchor="middle">
                    用地
                </text>
            </g>

            <g transform="translate(0, 105)">
                <rect x="0" y="0" width="160" height="50" fill="#2E8B57" opacity="0.1" rx="8" />
                <text x="80" y="32" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                    font-size="16" font-weight="500" fill="#2E8B57" text-anchor="middle">
                    规划
                </text>
            </g>

            <g transform="translate(180, 105)">
                <rect x="0" y="0" width="160" height="50" fill="#2E8B57" opacity="0.1" rx="8" />
                <text x="80" y="32" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                    font-size="16" font-weight="500" fill="#2E8B57" text-anchor="middle">
                    能评
                </text>
            </g>

            <g transform="translate(360, 105)">
                <rect x="0" y="0" width="160" height="50" fill="#2E8B57" opacity="0.1" rx="8" />
                <text x="80" y="32" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                    font-size="16" font-weight="500" fill="#2E8B57" text-anchor="middle">
                    安全评价
                </text>
            </g>
        </g>

        <!-- 特殊说明卡片 -->
        <g transform="translate(20, 300)">
            <rect x="0" y="0" width="520" height="210" fill="#F59E0B" opacity="0.08" rx="10" />
            <rect x="0" y="0" width="4" height="210" fill="#F59E0B" rx="2" />

            <rect x="16" y="15" width="90" height="28" fill="#F59E0B" opacity="0.15" rx="14" />
            <text x="61" y="35" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="13" font-weight="600" fill="#F59E0B" text-anchor="middle">
                ⚠️ 特殊说明
            </text>

            <g transform="translate(16, 60)">
                <circle cx="8" cy="8" r="4" fill="#F59E0B" />
                <text x="22" y="13" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                    font-size="14" fill="#1F2937">
                    如个别条件不需要，应由相关
                </text>
                <text x="22" y="35" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                    font-size="14" fill="#1F2937">
                    政府部门出具说明
                </text>
            </g>

            <g transform="translate(16, 120)">
                <circle cx="8" cy="8" r="4" fill="#F59E0B" />
                <text x="22" y="13" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                    font-size="14" fill="#1F2937">
                    有产能政策要求的行业，项目需
                </text>
                <text x="22" y="35" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                    font-size="14" fill="#1F2937">
                    落实产能置换等相关规定
                </text>
            </g>
        </g>
    </g>

    <!-- 页码 -->
    <text x="640" y="680" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="14"
        font-weight="400" fill="#9CA3AF" text-anchor="middle">
        07 / 14
    </text>

    <!-- 底部装饰条 -->
    <rect x="0" y="714" width="1280" height="6" fill="#1E5AAF" />
</svg>