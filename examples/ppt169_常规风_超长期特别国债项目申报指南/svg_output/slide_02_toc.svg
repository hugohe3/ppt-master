        <text x="50" y="68" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="28"
            text-anchor="middle">
            📋
        </text>

        <!-- 章节编号 -->
        <text x="100" y="50" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
            font-size="14" font-weight="500" fill="#1E5AAF">
