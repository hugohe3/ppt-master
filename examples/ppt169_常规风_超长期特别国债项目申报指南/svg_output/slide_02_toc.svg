            <text x="12" y="17" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="12" font-weight="700" fill="#F59E0B" text-anchor="middle">
                3
            </text>
            <text x="36" y="17" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
                font-size="16" font-weight="500" fill="#1F2937">
