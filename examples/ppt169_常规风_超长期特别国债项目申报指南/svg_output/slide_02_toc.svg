        </g>

        <!-- 页码指示 -->
        <text x="310" y="450" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif"
            font-size="14" font-weight="500" fill="#9CA3AF" text-anchor="end">
