<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
    <!-- 背景 -->
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#EEF2F7;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#1E5AAF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#2E7DD1;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="1280" height="720" fill="url(#bgGradient)" />

    <!-- 顶部装饰条 -->
    <rect x="0" y="0" width="1280" height="6" fill="url(#blueGradient)" />

    <!-- 右上角装饰几何图形 -->
    <circle cx="1150" cy="100" r="180" fill="#1E5AAF" opacity="0.05" />
    <circle cx="1200" cy="50" r="120" fill="#1E5AAF" opacity="0.08" />
    <rect x="1100" y="200" width="200" height="4" fill="#1E5AAF" opacity="0.1" rx="2" />
    <rect x="1150" y="220" width="150" height="4" fill="#1E5AAF" opacity="0.1" rx="2" />

    <!-- 左侧装饰竖条 -->
    <rect x="60" y="180" width="6" height="160" fill="#1E5AAF" rx="3" />
    <rect x="75" y="200" width="4" height="120" fill="#2E8B57" rx="2" />
    <rect x="88" y="220" width="4" height="80" fill="#F59E0B" rx="2" />

    <!-- 政策标签 -->
    <rect x="120" y="140" width="320" height="36" fill="#1E5AAF" opacity="0.1" rx="18" />
    <text x="140" y="165" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="16"
        font-weight="500" fill="#1E5AAF">
        中国工程咨询协会团体标准解读
    </text>

    <!-- 主标题 -->
    <text x="120" y="260" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="48"
        font-weight="700" fill="#1F2937">
        超长期特别国债
    </text>
    <text x="120" y="330" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="48"
        font-weight="700" fill="#1E5AAF">
        项目申报工作指南
    </text>

    <!-- 副标题 -->
    <text x="120" y="390" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="22"
        font-weight="400" fill="#6B7280">
        《超长期特别国债项目申报工作指南（征求意见稿）》核心要点梳理
    </text>

    <!-- 分隔线 -->
    <line x1="120" y1="430" x2="520" y2="430" stroke="#1E5AAF" stroke-width="3" stroke-linecap="round" />

    <!-- 背景数据卡片 -->
    <rect x="120" y="470" width="480" height="90" fill="#FFFFFF" rx="12" />
    <rect x="120" y="470" width="480" height="90" fill="#1E5AAF" opacity="0.03" rx="12" />

    <!-- 数据点1 -->
    <circle cx="160" cy="515" r="24" fill="#1E5AAF" opacity="0.1" />
    <text x="160" y="520" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="18"
        font-weight="700" fill="#1E5AAF" text-anchor="middle">
        💰
    </text>
    <text x="200" y="508" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="14"
        font-weight="400" fill="#6B7280">
        累计发行
    </text>
    <text x="200" y="530" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="20"
        font-weight="600" fill="#1F2937">
        2.5 万亿元
    </text>

    <!-- 分隔线 -->
    <line x1="360" y1="490" x2="360" y2="540" stroke="#E5E7EB" stroke-width="1" />

    <!-- 数据点2 -->
    <circle cx="400" cy="515" r="24" fill="#2E8B57" opacity="0.1" />
    <text x="400" y="520" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="18"
        font-weight="700" fill="#2E8B57" text-anchor="middle">
        ✓
    </text>
    <text x="440" y="508" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="14"
        font-weight="400" fill="#6B7280">
        2026年第一批次
    </text>
    <text x="440" y="530" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="20"
        font-weight="600" fill="#1F2937">
        已完成上报
    </text>

    <!-- 右侧装饰图标组 -->
    <g transform="translate(900, 280)">
        <!-- 外圈 -->
        <circle cx="120" cy="120" r="140" fill="none" stroke="#1E5AAF" stroke-width="2" opacity="0.1" />
        <circle cx="120" cy="120" r="110" fill="none" stroke="#1E5AAF" stroke-width="2" opacity="0.15" />
        <circle cx="120" cy="120" r="80" fill="#FFFFFF" />
        <circle cx="120" cy="120" r="80" fill="#1E5AAF" opacity="0.05" />

        <!-- 文档图标 -->
        <g transform="translate(80, 75)">
            <rect x="0" y="0" width="60" height="75" fill="#FFFFFF" stroke="#1E5AAF" stroke-width="2" rx="4" />
            <rect x="0" y="0" width="60" height="20" fill="#1E5AAF" rx="4" />
            <rect x="0" y="16" width="60" height="4" fill="#1E5AAF" />
            <line x1="10" y1="35" x2="50" y2="35" stroke="#1E5AAF" stroke-width="2" opacity="0.5" />
            <line x1="10" y1="47" x2="50" y2="47" stroke="#1E5AAF" stroke-width="2" opacity="0.5" />
            <line x1="10" y1="59" x2="35" y2="59" stroke="#1E5AAF" stroke-width="2" opacity="0.5" />
            <!-- 勾选标记 -->
            <circle cx="55" cy="70" r="12" fill="#2E8B57" />
            <path d="M49 70 L53 74 L61 66" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"
                stroke-linejoin="round" />
        </g>
    </g>

    <!-- 底部信息栏 -->
    <rect x="0" y="620" width="1280" height="100" fill="#FFFFFF" />
    <line x1="0" y1="620" x2="1280" y2="620" stroke="#E5E7EB" stroke-width="1" />

    <!-- 底部警示提示 -->
    <rect x="120" y="645" width="24" height="24" fill="#F59E0B" opacity="0.15" rx="4" />
    <text x="132" y="663" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="14"
        font-weight="500" fill="#F59E0B" text-anchor="middle">
        !
    </text>
    <text x="160" y="663" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="14"
        font-weight="400" fill="#6B7280">
        本文仅供参考，请以实际申报文件为准
    </text>

    <!-- 日期 -->
    <text x="1160" y="663" font-family="Microsoft YaHei, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="16"
        font-weight="400" fill="#9CA3AF" text-anchor="end">
        2025年12月
    </text>

    <!-- 底部装饰条 -->
    <rect x="0" y="714" width="1280" height="6" fill="url(#blueGradient)" />
</svg>