    <text font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="middle" fill="#666666" font-size="22" x="825" y="540">      </text><text font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="middle" fill="#666666" font-size="22" x="825" y="540">2次英超冠军 · 2次足总杯冠军</text><text font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="middle" fill="#666666" font-size="22" x="825" y="575">4次英超金靴 · 2003年欧洲金靴奖</text></g>
  
  
  <rect x="80" y="630" width="1120" height="60" fill="#EF0107" rx="12" />
