  <g>
    
    <rect x="450" y="200" width="750" height="80" fill="#EF0107" rx="16" style="filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.1))" />
    <text x="825" y="250" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
