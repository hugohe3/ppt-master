<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  
  <rect width="1280" height="720" fill="#F5F5F5" />
  
  
  <rect x="0" y="0" width="1280" height="8" fill="#EF0107" />
  
  
  <text x="80" y="120" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="48" font-weight="bold" fill="#EF0107" text-anchor="start">
    俱乐部历史 · 起源
  </text>
  
  
  <text x="80" y="165" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" fill="#666666" text-anchor="start">
    The Origins (1886-1913)
  </text>
  
  
  <rect x="750" y="200" width="450" height="300" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="2" stroke-dasharray="8,4" rx="16" />
  <text x="975" y="340" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#999999" text-anchor="middle">
    [图片：历史老照片/
  </text>
  <text x="975" y="365" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#999999" text-anchor="middle">
    队徽演变图]
  </text>
  
  
  <g>
    
    <line x1="100" y1="250" x2="100" y2="580" stroke="#EF0107" stroke-width="4" />
    
    
    <circle cx="100" cy="250" r="12" fill="#EF0107" />
    <text x="140" y="240" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#EF0107" text-anchor="start">
      1886年
    </text>
    <text font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="start" fill="#2C2C2C" font-size="22" x="140" y="275">      </text><text font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="start" fill="#2C2C2C" font-size="22" x="140" y="275">建队于伍尔维奇（Woolwich）</text><text font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="start" fill="#2C2C2C" font-size="22" x="140" y="305">最初名为 Dial Square</text><text font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="start" fill="#2C2C2C" font-size="22" x="140" y="335">由皇家兵工厂工人创建</text><circle cx="100" cy="420" r="12" fill="#EF0107" />
    <text x="140" y="410" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#EF0107" text-anchor="start">
      1891年
    </text>
    <text font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="start" fill="#2C2C2C" font-size="22" x="140" y="445">      </text><text font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="start" fill="#2C2C2C" font-size="22" x="140" y="445">更名为 Woolwich Arsenal</text><text font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="start" fill="#2C2C2C" font-size="22" x="140" y="475">职业化，加入足球联盟</text><circle cx="100" cy="560" r="12" fill="#D4AF37" />
    <text x="140" y="550" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#D4AF37" text-anchor="start">
      1913年
    </text>
    <text font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="start" fill="#2C2C2C" font-size="22" x="140" y="585">      </text><text font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="start" fill="#2C2C2C" font-size="22" x="140" y="585">迁至北伦敦海布里球场</text><text font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="start" fill="#2C2C2C" font-size="22" x="140" y="615">正式更名为 Arsenal F.C.</text></g>
  
  
  <rect x="80" y="630" width="1120" height="60" fill="#FFFFFF" rx="12" style="filter: drop-shadow(0px 2px 8px rgba(0,0,0,0.1))" />
  <text x="120" y="668" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#666666" text-anchor="start">
    💡 名字由来："Arsenal" 源自"兵工厂"，因球队由皇家兵工厂的工人创立而得名
  </text>
  
  
  <text x="1200" y="690" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#999999" text-anchor="end">
    03
  </text>
</svg>