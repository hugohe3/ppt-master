    </text>
    <text x="240" y="460" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#999999" text-anchor="middle">
      标志性照片]
    </text>
    
    
    <text x="410" y="300" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#2C2C2C" text-anchor="start">
      执教数据
    </text>
    
    <text x="410" y="350" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="48" font-weight="bold" fill="#EF0107" text-anchor="start">
      828
    </text>
    <text x="410" y="385" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#666666" text-anchor="start">
      场比赛
    </text>
    
    <text font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="start" fill="#2C2C2C" font-size="22" x="410" y="440">      </text><text font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="start" fill="#2C2C2C" font-size="22" x="410" y="440">528胜</text><text font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="start" fill="#2C2C2C" font-size="22" x="410" y="470">197平</text><text font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" text-anchor="start" fill="#2C2C2C" font-size="22" x="410" y="500">103负</text><text x="410" y="570" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#666666" text-anchor="start">
      胜率 63.8%
    </text>
  </g>
  
  
  <g>
    <rect x="660" y="220" width="540" height="420" fill="#FFFFFF" rx="16" style="filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.1))" />
    
    <text x="930" y="280" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="bold" fill="#EF0107" text-anchor="middle">
      主要成就
    </text>
    
    
    <g>
      
      <rect x="700" y="320" width="60" height="60" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="2" stroke-dasharray="6,3" rx="10" />
      <text x="730" y="355" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#999999" text-anchor="middle">
        [图标
      </text>
      <text x="730" y="370" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#999999" text-anchor="middle">
        奖杯]
      </text>
      
      <text x="800" y="360" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#2C2C2C" text-anchor="start">
