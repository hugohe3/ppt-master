      </text>
      <text x="800" y="390" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#666666" text-anchor="start">
        1998, 2002, 2004
      </text>
    </g>
    
    <g>
      
      <rect x="700" y="420" width="60" height="60" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="2" stroke-dasharray="6,3" rx="10" />
      <text x="730" y="455" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#999999" text-anchor="middle">
        [图标
      </text>
      <text x="730" y="470" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#999999" text-anchor="middle">
        奖杯]
      </text>
      
      <text x="800" y="460" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="bold" fill="#2C2C2C" text-anchor="start">
