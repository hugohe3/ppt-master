  </text>
  
  
  <g>
    <rect x="80" y="220" width="540" height="420" fill="#FFFFFF" rx="16" style="filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.1))" />
    
    
    <rect x="120" y="260" width="240" height="320" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="2" stroke-dasharray="8,4" rx="12" />
    <text x="240" y="410" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#999999" text-anchor="middle">
