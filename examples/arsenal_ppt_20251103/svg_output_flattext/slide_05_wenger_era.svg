      </text>
      <text x="800" y="490" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#666666" text-anchor="start">
        英格兰历史最多
      </text>
    </g>
    
    
    <rect x="700" y="530" width="460" height="80" fill="#D4AF37" rx="12" />
    <text x="930" y="565" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
