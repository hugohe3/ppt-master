    </text>
    <text x="930" y="595" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle">
      英超历史唯一 · 49场不败
    </text>
  </g>
  
  
  <text x="1200" y="690" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#999999" text-anchor="end">
