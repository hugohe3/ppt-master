<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- 顶部装饰条 -->
  <rect x="0" y="0" width="1280" height="10" fill="#EF0107"/>
  
  <!-- 标题 -->
  <text x="640" y="120" 
        font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
        font-size="48" 
        font-weight="bold"
        fill="#EF0107" 
        text-anchor="middle">
    目录 / CONTENTS
  </text>
  
  <!-- 第1列：俱乐部历史 -->
  <g>
    <!-- 图标占位 -->
    <rect x="120" y="220" width="80" height="80" 
          fill="#F5F5F5" 
          stroke="#CCCCCC" 
          stroke-width="2" 
          stroke-dasharray="8,4" 
          rx="12"/>
    <text x="160" y="265" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="14" 
          fill="#999999" 
          text-anchor="middle">
      [图标：
    </text>
    <text x="160" y="282" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="14" 
          fill="#999999" 
          text-anchor="middle">
      历史]
    </text>
    
    <text x="250" y="250" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="32" 
          font-weight="bold"
          fill="#EF0107" 
          text-anchor="start">
      01
    </text>
    
    <text x="120" y="340" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="24" 
          font-weight="bold"
          fill="#2C2C2C" 
          text-anchor="start">
      俱乐部历史
    </text>
    
    <text x="120" y="375" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="18" 
          fill="#666666" 
          text-anchor="start">
      1886-2024
    </text>
  </g>
  
  <!-- 第2列：荣誉殿堂 -->
  <g>
    <rect x="400" y="220" width="80" height="80" 
          fill="#F5F5F5" 
          stroke="#CCCCCC" 
          stroke-width="2" 
          stroke-dasharray="8,4" 
          rx="12"/>
    <text x="440" y="265" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="14" 
          fill="#999999" 
          text-anchor="middle">
      [图标：
    </text>
    <text x="440" y="282" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="14" 
          fill="#999999" 
          text-anchor="middle">
      奖杯]
    </text>
    
    <text x="530" y="250" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="32" 
          font-weight="bold"
          fill="#EF0107" 
          text-anchor="start">
      02
    </text>
    
    <text x="400" y="340" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="24" 
          font-weight="bold"
          fill="#2C2C2C" 
          text-anchor="start">
      荣誉殿堂
    </text>
    
    <text x="400" y="375" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="18" 
          fill="#666666" 
          text-anchor="start">
      47座冠军奖杯
    </text>
  </g>
  
  <!-- 第3列：传奇时刻 -->
  <g>
    <rect x="680" y="220" width="80" height="80" 
          fill="#F5F5F5" 
          stroke="#CCCCCC" 
          stroke-width="2" 
          stroke-dasharray="8,4" 
          rx="12"/>
    <text x="720" y="265" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="14" 
          fill="#999999" 
          text-anchor="middle">
      [图标：
    </text>
    <text x="720" y="282" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="14" 
          fill="#999999" 
          text-anchor="middle">
      球星]
    </text>
    
    <text x="810" y="250" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="32" 
          font-weight="bold"
          fill="#EF0107" 
          text-anchor="start">
      03
    </text>
    
    <text x="680" y="340" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="24" 
          font-weight="bold"
          fill="#2C2C2C" 
          text-anchor="start">
      传奇球星
    </text>
    
    <text x="680" y="375" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="18" 
          fill="#666666" 
          text-anchor="start">
      群星闪耀
    </text>
  </g>
  
  <!-- 第4列：现代阿森纳 -->
  <g>
    <rect x="960" y="220" width="80" height="80" 
          fill="#F5F5F5" 
          stroke="#CCCCCC" 
          stroke-width="2" 
          stroke-dasharray="8,4" 
          rx="12"/>
    <text x="1000" y="265" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="14" 
          fill="#999999" 
          text-anchor="middle">
      [图标：
    </text>
    <text x="1000" y="282" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="14" 
          fill="#999999" 
          text-anchor="middle">
      战术]
    </text>
    
    <text x="1090" y="250" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="32" 
          font-weight="bold"
          fill="#EF0107" 
          text-anchor="start">
      04
    </text>
    
    <text x="960" y="340" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="24" 
          font-weight="bold"
          fill="#2C2C2C" 
          text-anchor="start">
      现代阿森纳
    </text>
    
    <text x="960" y="375" 
          font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
          font-size="18" 
          fill="#666666" 
          text-anchor="start">
      阿尔特塔时代
    </text>
  </g>
  
  <!-- 底部分隔线 -->
  <line x1="120" y1="450" x2="1160" y2="450" stroke="#EF0107" stroke-width="3"/>
  
  <!-- 底部说明 -->
  <text x="640" y="520" 
        font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
        font-size="22" 
        fill="#666666" 
        text-anchor="middle">
    从1886年建队至今，阿森纳创造了138年的辉煌历史
  </text>
  
  <text x="640" y="560" 
        font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
        font-size="22" 
        fill="#666666" 
        text-anchor="middle">
    这份报告将带您深入了解这支传奇球队
  </text>
  
  <!-- 页码 -->
  <text x="1200" y="690" 
        font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" 
        font-size="14" 
        fill="#999999" 
        text-anchor="end">
    02
  </text>
</svg>
