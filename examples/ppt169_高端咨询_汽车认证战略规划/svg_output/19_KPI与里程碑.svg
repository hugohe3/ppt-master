    <text x="280" y="130" fill="#FFFFFF" font-size="12" font-family="-apple-system, 'PingFang SC', sans-serif">✓ 远程审核推广</text>
    <text x="280" y="155" fill="#FFFFFF" font-size="12" font-family="-apple-system, 'PingFang SC', sans-serif">✓ 碳足迹认证量产</text>
    <text x="280" y="180" fill="#FFFFFF" font-size="12" font-family="-apple-system, 'PingFang SC', sans-serif">✓ EMC实验室建成</text>
    <text x="280" y="205" fill="#FFFFFF" font-size="12" font-family="-apple-system, 'PingFang SC', sans-serif">✓ 周期缩短20%达成</text>
    
    <!-- 2028 -->
