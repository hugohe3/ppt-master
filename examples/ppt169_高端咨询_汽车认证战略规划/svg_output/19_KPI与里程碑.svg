<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" fill="#F5F7FA"/>
  <rect x="0" y="0" width="8" height="720" fill="#003C71"/>
  
  <rect x="80" y="25" width="200" height="30" rx="4" fill="#003C71"/>
  <text x="180" y="47" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="500" font-family="-apple-system, 'PingFang SC', sans-serif">06 阶段性目标</text>
  <text x="300" y="47" fill="#003C71" font-size="28" font-weight="bold" font-family="-apple-system, 'PingFang SC', sans-serif">关键里程碑与KPI指标</text>
  
  <g transform="translate(60, 80)">
