    <text x="140" y="160" fill="#1E293B" font-size="14" font-family="-apple-system, 'PingFang SC', sans-serif">客户线上平台覆盖</text>
    <text x="140" y="180" fill="#64748B" font-size="12" font-family="-apple-system, 'PingFang SC', sans-serif">2029年前全面切换</text>
    
