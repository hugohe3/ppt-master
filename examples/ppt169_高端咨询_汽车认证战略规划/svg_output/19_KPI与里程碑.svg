    <text x="510" y="130" fill="#FFFFFF" font-size="12" font-family="-apple-system, 'PingFang SC', sans-serif">✓ AI审核系统升级</text>
    <text x="510" y="155" fill="#FFFFFF" font-size="12" font-family="-apple-system, 'PingFang SC', sans-serif">✓ 四大产品线全面铺开</text>
    <text x="510" y="180" fill="#FFFFFF" font-size="12" font-family="-apple-system, 'PingFang SC', sans-serif">✓ 网安实验室建成</text>
    <text x="510" y="205" fill="#FFFFFF" font-size="12" font-family="-apple-system, 'PingFang SC', sans-serif">✓ 东南亚代表处开业</text>
    
    <!-- 2029 -->
