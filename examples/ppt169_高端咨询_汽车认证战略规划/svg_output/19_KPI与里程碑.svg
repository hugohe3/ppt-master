    <text x="825" y="100" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="bold" font-family="-apple-system, 'PingFang SC', sans-serif">2029</text>
    <text x="740" y="130" fill="#FFFFFF" font-size="12" font-family="-apple-system, 'PingFang SC', sans-serif">✓ 80%客户线上化</text>
    <text x="740" y="155" fill="#FFFFFF" font-size="12" font-family="-apple-system, 'PingFang SC', sans-serif">✓ 新业务占比30%</text>
    <text x="740" y="180" fill="#FFFFFF" font-size="12" font-family="-apple-system, 'PingFang SC', sans-serif">✓ 欧洲联合认证启动</text>
    <text x="740" y="205" fill="#FFFFFF" font-size="12" font-family="-apple-system, 'PingFang SC', sans-serif">✓ ILAC/IAF资格获取</text>
    
    <!-- 2030 -->
    <rect x="950" y="70" width="180" height="210" rx="8" fill="#22C55E" opacity="0.8"/>
    <text x="1040" y="100" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="bold" font-family="-apple-system, 'PingFang SC', sans-serif">2030 🎯</text>
    <text x="970" y="130" fill="#FFFFFF" font-size="12" font-family="-apple-system, 'PingFang SC', sans-serif">✓ 行业数字化标杆</text>
    <text x="970" y="155" fill="#FFFFFF" font-size="12" font-family="-apple-system, 'PingFang SC', sans-serif">✓ 国际认证联盟牵头</text>
    <text x="970" y="180" fill="#FFFFFF" font-size="12" font-family="-apple-system, 'PingFang SC', sans-serif">✓ 实验室国际先进</text>
    <text x="970" y="205" fill="#FFFFFF" font-size="12" font-family="-apple-system, 'PingFang SC', sans-serif">✓ 国际知名品牌</text>
