    <!-- 2026 -->
    <rect x="30" y="70" width="210" height="210" rx="8" fill="#FFFFFF" opacity="0.1"/>
    <text x="135" y="100" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="bold" font-family="-apple-system, 'PingFang SC', sans-serif">2026</text>
    <text x="50" y="130" fill="#FFFFFF" font-size="12" font-family="-apple-system, 'PingFang SC', sans-serif">✓ 数字平台上线</text>
    <text x="50" y="155" fill="#FFFFFF" font-size="12" font-family="-apple-system, 'PingFang SC', sans-serif">✓ 首批试点认证发布</text>
    <text x="50" y="180" fill="#FFFFFF" font-size="12" font-family="-apple-system, 'PingFang SC', sans-serif">✓ 电池实验室扩容</text>
    <text x="50" y="205" fill="#FFFFFF" font-size="12" font-family="-apple-system, 'PingFang SC', sans-serif">✓ 东盟MOU签署</text>
    
