    <rect x="0" y="25" width="380" height="25" fill="#0066B3"/>
    <text x="190" y="35" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="bold" font-family="-apple-system, 'PingFang SC', sans-serif">📋 数字化转型KPI</text>
    
    <rect x="20" y="70" width="340" height="60" rx="6" fill="#F0F9FF"/>
    <text x="40" y="95" fill="#003C71" font-size="32" font-weight="bold" font-family="-apple-system, 'PingFang SC', sans-serif">40%</text>
    <text x="140" y="90" fill="#1E293B" font-size="14" font-family="-apple-system, 'PingFang SC', sans-serif">认证效率提升</text>
    <text x="140" y="110" fill="#64748B" font-size="12" font-family="-apple-system, 'PingFang SC', sans-serif">AI智能审核+数字化管理</text>
    
