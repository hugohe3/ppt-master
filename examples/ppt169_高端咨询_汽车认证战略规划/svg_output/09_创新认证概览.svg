<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#F5F7FA"/>
  
  <!-- 左侧深蓝色装饰条 -->
  <rect x="0" y="0" width="8" height="720" fill="#003C71"/>
  
  <!-- 章节标签 -->
  <rect x="80" y="25" width="180" height="30" rx="4" fill="#003C71"/>
  <text x="170" y="47" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="500"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">03 创新认证产品</text>
  
  <!-- 页面标题 -->
  <text x="280" y="47" fill="#003C71" font-size="28" font-weight="bold"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
    四大创新认证产品线布局
  </text>
  
  <!-- 2x2矩阵 -->
  <g transform="translate(60, 80)">
    <!-- 绿色低碳认证 -->
    <rect x="0" y="0" width="570" height="290" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="0" y="0" width="10" height="290" rx="5" fill="#22C55E"/>
    <text x="40" y="45" fill="#166534" font-size="24" font-weight="bold"
          font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">🌱 绿色低碳认证</text>
    <text x="40" y="75" fill="#64748B" font-size="14"
          font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">聚焦"双碳"目标，引领绿色发展</text>
    
    <rect x="40" y="100" width="240" height="70" rx="6" fill="#F0FDF4"/>
    <text x="60" y="130" fill="#166534" font-size="14" font-weight="600"
