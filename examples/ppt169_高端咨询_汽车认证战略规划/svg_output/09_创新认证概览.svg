    <text x="60" y="540" fill="#64748B" font-size="12"
          font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">互联互通/数据安全</text>
    
    <rect x="295" y="490" width="240" height="70" rx="6" fill="#F0F9FF"/>
    <text x="315" y="520" fill="#003C71" font-size="14" font-weight="600"
