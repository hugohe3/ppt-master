    <rect x="630" y="185" width="240" height="70" rx="6" fill="#FEE2E2"/>
    <text x="650" y="215" fill="#991B1B" font-size="14" font-weight="600"
          font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">网络安全认证</text>
    <text x="650" y="235" fill="#64748B" font-size="12"
          font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">ISO/SAE21434车载通信</text>
    
