    <text x="315" y="150" fill="#64748B" font-size="12"
          font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">中国绿色产品认证体系</text>
    
    <rect x="40" y="185" width="240" height="70" rx="6" fill="#F0FDF4"/>
    <text x="60" y="215" fill="#166534" font-size="14" font-weight="600"
          font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">电池回收认证</text>
    <text x="60" y="235" fill="#64748B" font-size="12"
          font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">退役电池循环利用管理</text>
    
    <rect x="295" y="185" width="240" height="70" rx="6" fill="#F0FDF4"/>
    <text x="315" y="215" fill="#166534" font-size="14" font-weight="600"
