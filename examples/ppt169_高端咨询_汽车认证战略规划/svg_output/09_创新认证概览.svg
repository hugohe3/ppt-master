    <text x="630" y="380" fill="#64748B" font-size="14"
          font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">服务中高端制造，权威品质背书</text>
    
    <rect x="630" y="405" width="240" height="70" rx="6" fill="#FEF3C7"/>
    <text x="650" y="435" fill="#92400E" font-size="14" font-weight="600"
          font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">零部件优选</text>
    <text x="650" y="455" fill="#64748B" font-size="12"
          font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">发动机/变速箱/底盘/芯片</text>
    
    <rect x="885" y="405" width="240" height="70" rx="6" fill="#FEF3C7"/>
    <text x="905" y="435" fill="#92400E" font-size="14" font-weight="600"
          font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">改装车认证</text>
    <text x="905" y="455" fill="#64748B" font-size="12"
          font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">动力提升/安全改进</text>
    
    <rect x="630" y="490" width="495" height="70" rx="6" fill="#003C71"/>
    <text x="877" y="525" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="600"
          font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">🎯 从合规性认证向卓越性能认证扩展</text>
    <text x="877" y="550" text-anchor="middle" fill="#FFFFFF" font-size="13" opacity="0.9"
          font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">让"自愿认证"成为提升产品附加值的重要依据</text>
  </g>
  
  <!-- 页码 -->
  <text x="1200" y="700" fill="#64748B" font-size="14"
        font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
    09 / 20
  </text>
