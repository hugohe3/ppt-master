<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="flowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#004B8D"/>
      <stop offset="100%" style="stop-color:#008CD6"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#008CD6"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- 页眉装饰条 -->
  <rect x="0" y="0" width="6" height="80" fill="#004B8D"/>
  <rect x="0" y="0" width="1280" height="4" fill="#004B8D"/>
  
  <!-- 页面标题 -->
  <text x="60" y="55" font-family="'Microsoft YaHei', 'PingFang SC', 'Heiti SC', system-ui, sans-serif" font-size="28" font-weight="bold" fill="#004B8D">数字化转型战略（一）</text>
  <text x="380" y="55" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" fill="#666666">— 全流程数字化管理平台</text>
  
  <!-- 机构标识 -->
  <text x="1220" y="50" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" fill="#666666" text-anchor="end">中国汽研</text>
  
  <!-- 战略目标 -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="1160" height="70" rx="6" fill="#004B8D" opacity="0.08"/>
    <rect x="0" y="0" width="6" height="70" rx="3" fill="#004B8D"/>
    <text x="30" y="30" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" font-weight="bold" fill="#004B8D">2029年目标</text>
    <text x="30" y="55" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" fill="#333333">实现全行业统一、高效、可靠的数字化认证服务体系，覆盖认证全过程的数字化管理和安全可靠的数据追溯</text>
  </g>
  
  <!-- 认证全生命周期流程图 -->
  <g transform="translate(60, 195)">
    <text x="0" y="0" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="bold" fill="#008CD6">认证全生命周期数字化流程</text>
    <line x1="0" y1="15" x2="280" y2="15" stroke="#008CD6" stroke-width="2"/>
  </g>
  
  <!-- 流程节点 -->
  <g transform="translate(60, 240)">
    <!-- 节点1: 申请 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="180" height="90" rx="6" fill="url(#flowGradient)"/>
      <text x="90" y="35" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">认证申请</text>
      <text x="90" y="60" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#FFFFFF" opacity="0.9" text-anchor="middle">线上提交 • 电子材料</text>
      <text x="90" y="78" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#FFFFFF" opacity="0.9" text-anchor="middle">智能初审</text>
    </g>
    
    <!-- 箭头1 -->
    <line x1="185" y1="45" x2="220" y2="45" stroke="#008CD6" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- 节点2: 审核 -->
    <g transform="translate(225, 0)">
      <rect x="0" y="0" width="180" height="90" rx="6" fill="url(#flowGradient)"/>
      <text x="90" y="35" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">审核实施</text>
      <text x="90" y="60" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#FFFFFF" opacity="0.9" text-anchor="middle">远程+现场 • AI辅助</text>
      <text x="90" y="78" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#FFFFFF" opacity="0.9" text-anchor="middle">数字化协同</text>
    </g>
    
    <!-- 箭头2 -->
    <line x1="410" y1="45" x2="445" y2="45" stroke="#008CD6" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- 节点3: 决议 -->
    <g transform="translate(450, 0)">
      <rect x="0" y="0" width="180" height="90" rx="6" fill="url(#flowGradient)"/>
      <text x="90" y="35" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">认证决定</text>
      <text x="90" y="60" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#FFFFFF" opacity="0.9" text-anchor="middle">结构化数据 • 自动校验</text>
      <text x="90" y="78" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#FFFFFF" opacity="0.9" text-anchor="middle">风险预警</text>
    </g>
    
    <!-- 箭头3 -->
    <line x1="635" y1="45" x2="670" y2="45" stroke="#008CD6" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- 节点4: 发证 -->
    <g transform="translate(675, 0)">
      <rect x="0" y="0" width="180" height="90" rx="6" fill="url(#flowGradient)"/>
      <text x="90" y="35" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">证书发放</text>
      <text x="90" y="60" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#FFFFFF" opacity="0.9" text-anchor="middle">电子证书 • 数字签名</text>
      <text x="90" y="78" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#FFFFFF" opacity="0.9" text-anchor="middle">时间戳存证</text>
    </g>
    
    <!-- 箭头4 -->
    <line x1="860" y1="45" x2="895" y2="45" stroke="#008CD6" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- 节点5: 监督 -->
    <g transform="translate(900, 0)">
      <rect x="0" y="0" width="180" height="90" rx="6" fill="url(#flowGradient)"/>
      <text x="90" y="35" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">证后监督</text>
      <text x="90" y="60" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#FFFFFF" opacity="0.9" text-anchor="middle">持续监控 • 数据追溯</text>
      <text x="90" y="78" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#FFFFFF" opacity="0.9" text-anchor="middle">信息公示</text>
    </g>
  </g>
  
  <!-- 底部数据层 -->
  <g transform="translate(60, 350)">
    <rect x="0" y="0" width="1100" height="45" rx="4" fill="#F5F7FA" stroke="#E1E4E8" stroke-width="1"/>
    <text x="550" y="28" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" fill="#666666" text-anchor="middle">
      <tspan font-weight="bold" fill="#004B8D">数据中台：</tspan>
      <tspan>真实 • 可追溯 • 不可篡改 — 云计算 + 大数据 + 区块链存证</tspan>
    </text>
  </g>
  
  <!-- 核心能力模块 -->
  <g transform="translate(60, 420)">
    <text x="0" y="0" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="bold" fill="#008CD6">平台核心能力</text>
    <line x1="0" y1="15" x2="150" y2="15" stroke="#008CD6" stroke-width="2"/>
  </g>
  
  <g transform="translate(60, 455)">
    <!-- 能力1 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="270" height="140" rx="6" fill="#FFFFFF" stroke="#E1E4E8" stroke-width="1"/>
      <rect x="0" y="0" width="6" height="140" rx="3" fill="#004B8D"/>
      <text x="25" y="30" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" font-weight="bold" fill="#004B8D">流程规范化</text>
      <text x="25" y="60" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#333333">• 标准化审核流程</text>
      <text x="25" y="85" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#333333">• 数字化任务分配</text>
      <text x="25" y="110" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#333333">• 多方线上协同</text>
    </g>
    
    <!-- 能力2 -->
    <g transform="translate(290, 0)">
      <rect x="0" y="0" width="270" height="140" rx="6" fill="#FFFFFF" stroke="#E1E4E8" stroke-width="1"/>
      <rect x="0" y="0" width="6" height="140" rx="3" fill="#008CD6"/>
      <text x="25" y="30" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" font-weight="bold" fill="#008CD6">数据结构化</text>
      <text x="25" y="60" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#333333">• 基础数据字典化</text>
      <text x="25" y="85" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#333333">• 审核依据条款化</text>
      <text x="25" y="110" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#333333">• 自动技术校验</text>
    </g>
    
    <!-- 能力3 -->
    <g transform="translate(580, 0)">
      <rect x="0" y="0" width="270" height="140" rx="6" fill="#FFFFFF" stroke="#E1E4E8" stroke-width="1"/>
      <rect x="0" y="0" width="6" height="140" rx="3" fill="#28A745"/>
      <text x="25" y="30" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" font-weight="bold" fill="#28A745">风险管控</text>
      <text x="25" y="60" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#333333">• 异常发证预警</text>
      <text x="25" y="85" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#333333">• 高风险领域监控</text>
      <text x="25" y="110" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#333333">• 闭环问题管理</text>
    </g>
    
    <!-- 能力4 -->
    <g transform="translate(870, 0)">
      <rect x="0" y="0" width="270" height="140" rx="6" fill="#FFFFFF" stroke="#E1E4E8" stroke-width="1"/>
      <rect x="0" y="0" width="6" height="140" rx="3" fill="#F0AD4E"/>
      <text x="25" y="30" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" font-weight="bold" fill="#F0AD4E">服务优化</text>
      <text x="25" y="60" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#333333">• 客户自助查询</text>
      <text x="25" y="85" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#333333">• 进度实时跟踪</text>
      <text x="25" y="110" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#333333">• 运营效率提升</text>
    </g>
  </g>
  
  <!-- 页脚 -->
  <line x1="60" y1="680" x2="1220" y2="680" stroke="#E1E4E8" stroke-width="1"/>
  <text x="60" y="700" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#999999">汽车及零部件领域自愿性产品认证五年战略规划（2026–2030）</text>
  <text x="1220" y="700" font-family="Arial, sans-serif" font-size="12" fill="#999999" text-anchor="end">05 / 14</text>
</svg>

