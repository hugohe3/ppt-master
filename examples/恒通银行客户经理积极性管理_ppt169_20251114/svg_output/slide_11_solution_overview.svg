<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <defs>
        <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#005587;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0076A8;stop-opacity:1" />
        </linearGradient>
    </defs>

    <rect width="1280" height="720" fill="#FFFFFF" />
    <rect x="0" y="0" width="1280" height="3" fill="url(#accentGradient)" />

    <text x="60" y="75"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="36" font-weight="600" fill="#27AE60">
        破解策略："激励—协作—发展"三位一体解决方案
    </text>
    <line x1="60" y1="95" x2="1220" y2="95" stroke="#E0E0E0" stroke-width="2" />

    <!-- 中心圆 -->
    <circle cx="640" cy="380" r="120" fill="#27AE60" opacity="0.1" />
    <text x="640" y="370"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="22" font-weight="700" fill="#27AE60" text-anchor="middle">
        激发积极性
    </text>
    <text x="640" y="400"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="18" font-weight="400" fill="#27AE60" text-anchor="middle">
        提升团队战斗力
    </text>

    <!-- 三大支柱 -->
    <!-- 支柱1：激励机制 -->
    <rect x="100" y="200" width="280" height="340" fill="#F8F9FA" rx="8" />
    <rect x="100" y="200" width="280" height="8" fill="#005587" rx="4" />

    <circle cx="240" cy="250" r="30" fill="#005587" opacity="0.2" />
    <text x="240" y="262"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="28" font-weight="700" fill="#005587" text-anchor="middle">
        1
    </text>

    <text x="240" y="310"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="24" font-weight="600" fill="#005587" text-anchor="middle">
        优化激励机制
    </text>

    <text x="130" y="350"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="17" font-weight="400" fill="#2C3E50">
        <tspan x="130" dy="0">• 科学设定考核指标</tspan>
        <tspan x="130" dy="30"> 基础+弹性体系</tspan>
        <tspan x="130" dy="30">• 完善薪酬与奖励</tspan>
        <tspan x="130" dy="30"> 多元化回报机制</tspan>
        <tspan x="130" dy="30">• 丰富非物质激励</tspan>
        <tspan x="130" dy="30"> 培训、认可、成长</tspan>
    </text>

    <!-- 支柱2：团队建设 -->
    <rect x="500" y="200" width="280" height="340" fill="#F8F9FA" rx="8" />
    <rect x="500" y="200" width="280" height="8" fill="#0076A8" rx="4" />

    <circle cx="640" cy="250" r="30" fill="#0076A8" opacity="0.2" />
    <text x="640" y="262"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="28" font-weight="700" fill="#0076A8" text-anchor="middle">
        2
    </text>

    <text x="640" y="310"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="24" font-weight="600" fill="#0076A8" text-anchor="middle">
        强化团队建设
    </text>

    <text x="530" y="350"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="17" font-weight="400" fill="#2C3E50">
        <tspan x="530" dy="0">• 建立共同目标</tspan>
        <tspan x="530" dy="30"> 团队协作导向</tspan>
        <tspan x="530" dy="30">• 搭建协作平台</tspan>
        <tspan x="530" dy="30"> 资源共享系统</tspan>
        <tspan x="530" dy="30">• 化解角色冲突</tspan>
        <tspan x="530" dy="30"> 明确职责边界</tspan>
    </text>

    <!-- 支柱3：职业发展 -->
    <rect x="900" y="200" width="280" height="340" fill="#F8F9FA" rx="8" />
    <rect x="900" y="200" width="280" height="8" fill="#27AE60" rx="4" />

    <circle cx="1040" cy="250" r="30" fill="#27AE60" opacity="0.2" />
    <text x="1040" y="262"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="28" font-weight="700" fill="#27AE60" text-anchor="middle">
        3
    </text>

    <text x="1040" y="310"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="24" font-weight="600" fill="#27AE60" text-anchor="middle">
        完善职业发展
    </text>

    <text x="930" y="350"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="17" font-weight="400" fill="#2C3E50">
        <tspan x="930" dy="0">• 构建晋升通道</tspan>
        <tspan x="930" dy="30"> 管理+专业双轨</tspan>
        <tspan x="930" dy="30">• 改善工作环境</tspan>
        <tspan x="930" dy="30"> 工具、健康保障</tspan>
        <tspan x="930" dy="30">• 重塑组织文化</tspan>
        <tspan x="930" dy="30"> 服务型领导</tspan>
    </text>

    <!-- 核心理念 -->
    <rect x="150" y="580" width="980" height="60" fill="#27AE60" opacity="0.1" rx="8" />
    <text x="640" y="615"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="20" font-weight="500" fill="#27AE60" text-anchor="middle">
        以需求满足激发动机 以共同目标强化协作 以发展保障增强归属
    </text>

    <rect x="0" y="717" width="1280" height="3" fill="url(#accentGradient)" />
    <text x="1220" y="700"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="16" font-weight="300" fill="#7F8C8D" text-anchor="end">
        11
    </text>
</svg>