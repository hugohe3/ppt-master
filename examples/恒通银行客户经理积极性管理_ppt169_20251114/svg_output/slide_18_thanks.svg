<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1A2332;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#2C3E50;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#005587;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0076A8;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- 背景 -->
    <rect width="1280" height="720" fill="url(#bgGradient)" />

    <!-- 顶部装饰线 -->
    <rect x="0" y="0" width="1280" height="4" fill="url(#accentGradient)" />

    <!-- 装饰性几何图形 -->
    <circle cx="200" cy="150" r="100" fill="#005587" opacity="0.1" />
    <circle cx="1080" cy="570" r="120" fill="#005587" opacity="0.1" />

    <!-- 主标题 -->
    <text x="640" y="220"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="56" font-weight="700" fill="#FFFFFF" text-anchor="middle">
        Thank You
    </text>

    <!-- 中文标题 -->
    <text x="640" y="280"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="32" font-weight="600" fill="#95A5A6" text-anchor="middle">
        感谢聆听
    </text>

    <!-- 分隔线 -->
    <line x1="440" y1="310" x2="840" y2="310" stroke="#005587" stroke-width="2" />

    <!-- 副标题 -->
    <text x="640" y="360"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="24" font-weight="400" fill="#BDC3C7" text-anchor="middle">
        期待您的宝贵意见与建议
    </text>

    <!-- 课程信息框 -->
    <rect x="340" y="410" width="600" height="240" fill="#2C3E50" rx="8" opacity="0.8" />

    <!-- 课程信息 -->
    <text x="640" y="455"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="22" font-weight="600" fill="#E0E0E0" text-anchor="middle">
        组织行为学课程案例分析
    </text>

    <line x1="370" y1="475" x2="910" y2="475" stroke="#005587" stroke-width="1" />

    <text x="640" y="510"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="19" font-weight="400" fill="#BDC3C7" text-anchor="middle">
        <tspan x="640" dy="0">指导教师：廖冰</tspan>
        <tspan x="640" dy="32">上课时间：2025 年 9 月 - 2025 年 10 月</tspan>
    </text>

    <line x1="370" y1="565" x2="910" y2="565" stroke="#005587" stroke-width="1" />

    <!-- 小组成员 -->
    <text x="640" y="600"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="18" font-weight="400" fill="#95A5A6" text-anchor="middle">
        小组成员
    </text>

    <text x="640" y="630"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="17" font-weight="300" fill="#95A5A6" text-anchor="middle">
        何泉志 陈莲 王燕 冉鹰红 付琼 何雨果
    </text>

    <!-- 底部装饰线 -->
    <rect x="0" y="716" width="1280" height="4" fill="url(#accentGradient)" />

    <!-- 页码 -->
    <text x="1220" y="700"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="16" font-weight="300" fill="#7F8C8D" text-anchor="end">
        18
    </text>
</svg>