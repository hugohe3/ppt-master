<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383" width="900" height="383">
    <!-- 背景 -->
    <rect width="900" height="383" fill="#ECF0F1" />

    <!-- 左侧：循环阅读图标 -->
    <g transform="translate(200, 191.5)">
        <!-- 背景圆形 -->
        <circle cx="0" cy="0" r="75" fill="#E74C3C" opacity="0.1" />

        <!-- 书本图标 -->
        <rect x="-35" y="-25" width="70" height="50" fill="none" stroke="#E74C3C" stroke-width="3" rx="3" />
        <line x1="-35" y1="-10" x2="35" y2="-10" stroke="#E74C3C" stroke-width="2.5" />
        <line x1="-35" y1="0" x2="35" y2="0" stroke="#E74C3C" stroke-width="2.5" />
        <line x1="-35" y1="10" x2="35" y2="10" stroke="#E74C3C" stroke-width="2.5" />
        <line x1="0" y1="-25" x2="0" y2="25" stroke="#E74C3C" stroke-width="2.5" />

        <!-- 循环箭头 -->
        <defs>
            <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
                <polygon points="0 0, 10 3, 0 6" fill="#E74C3C" />
            </marker>
        </defs>
        <path d="M 50 -35 Q 75 -40 85 -20" fill="none" stroke="#E74C3C" stroke-width="3.5"
            marker-end="url(#arrowRed)" />
        <path d="M 85 20 Q 75 40 50 35" fill="none" stroke="#E74C3C" stroke-width="3.5" marker-end="url(#arrowRed)" />

        <!-- 叉号标记 -->
        <g transform="translate(65, 0)">
            <circle cx="0" cy="0" r="18" fill="#E74C3C" />
            <line x1="-8" y1="-8" x2="8" y2="8" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />
            <line x1="8" y1="-8" x2="-8" y2="8" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />
        </g>
    </g>

    <!-- 右侧：文字信息 -->
    <!-- 标题 -->
    <text x="420" y="70"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="42" font-weight="700" fill="#2C3E50">
        <tspan x="420" dy="0">📖 误区一：反复阅读</tspan>
    </text>

    <!-- 核心概念 -->
    <text x="420" y="130"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="28" font-weight="700" fill="#E74C3C">
        <tspan x="420" dy="0">熟练度错觉 ≠ 真正掌握</tspan>
    </text>

    <!-- 关键数据 -->
    <text x="420" y="180"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="24" font-weight="400" fill="#2C3E50">
        <tspan x="420" dy="0">⚠️ </tspan>
        <tspan font-weight="700" fill="#E74C3C">84%</tspan>
        <tspan> 的学生在用这种方法</tspan>
    </text>

    <!-- 类比说明 -->
    <text x="420" y="225"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="24" font-weight="400" fill="#2C3E50">
        <tspan x="420" dy="0">就像 KTV 跟着原唱哼</tspan>
        <tspan x="420" dy="36">≠ 真的会唱歌</tspan>
    </text>

    <!-- 研究来源 -->
    <text x="420" y="315"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="20" font-weight="400" fill="#7F8C8D">
        <tspan x="420" dy="0">📚 来源：邓洛斯基教授综合报告</tspan>
    </text>

    <!-- 底部装饰线 -->
    <rect x="40" y="360" width="820" height="2" fill="#E74C3C" opacity="0.2" rx="1" />
</svg>