<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383" width="900" height="383">
    <!-- 背景 -->
    <rect width="900" height="383" fill="#ECF0F1" />

    <!-- 左侧：文字信息 -->
    <!-- 标题 -->
    <text x="60" y="65"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="40" font-weight="700" fill="#2C3E50">
        <tspan x="60" dy="0">🧠 误区四：</tspan>
        <tspan x="60" dy="50">学习风格迷信</tspan>
    </text>

    <!-- 常见说法 -->
    <text x="60" y="170"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="24" font-weight="400" fill="#7F8C8D">
        <tspan x="60" dy="0">"我是视觉型/听觉型学习者"</tspan>
    </text>

    <!-- 科学结论 -->
    <text x="60" y="220"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="26" font-weight="700" fill="#3498DB">
        <tspan x="60" dy="0">⚠️ 缺乏足够科学依据</tspan>
    </text>

    <!-- 危险说明 -->
    <text x="60" y="270"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="23" font-weight="400" fill="#2C3E50">
        <tspan x="60" dy="0">💡 真正的危险：</tspan>
        <tspan x="60" dy="35">拒绝"不舒服但高效"的方法</tspan>
    </text>

    <!-- 真理 -->
    <text x="60" y="345"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="22" font-weight="700" fill="#F39C12">
        <tspan x="60" dy="0">高效学习往往不轻松</tspan>
    </text>

    <!-- 右侧：学习风格图标组 -->
    <g transform="translate(700, 191.5)">
        <!-- 背景圆形 -->
        <circle cx="0" cy="0" r="85" fill="#3498DB" opacity="0.08" />

        <!-- 眼睛图标（视觉型） -->
        <g transform="translate(-50, -40)">
            <circle cx="0" cy="0" r="28" fill="#FFFFFF" stroke="#3498DB" stroke-width="3" />
            <ellipse cx="0" cy="0" rx="18" ry="20" fill="none" stroke="#2C3E50" stroke-width="2.5" />
            <circle cx="0" cy="0" r="8" fill="#2C3E50" />
            <circle cx="2" cy="-2" r="3" fill="#FFFFFF" />
        </g>

        <!-- 耳朵图标（听觉型） -->
        <g transform="translate(50, -40)">
            <circle cx="0" cy="0" r="28" fill="#FFFFFF" stroke="#F39C12" stroke-width="3" />
            <path d="M -8 -12 Q -15 0 -8 12 Q -3 8 -3 0 Q -3 -8 -8 -12 Z" fill="none" stroke="#2C3E50"
                stroke-width="2.5" />
            <path d="M -7 -6 Q -10 0 -7 6" fill="none" stroke="#2C3E50" stroke-width="2" />
        </g>

        <!-- 手图标（动觉型） -->
        <g transform="translate(0, 45)">
            <circle cx="0" cy="0" r="28" fill="#FFFFFF" stroke="#2ECC71" stroke-width="3" />
            <!-- 手掌 -->
            <ellipse cx="0" cy="2" rx="10" ry="12" fill="none" stroke="#2C3E50" stroke-width="2.5" />
            <!-- 手指 -->
            <line x1="-6" y1="-8" x2="-6" y2="-14" stroke="#2C3E50" stroke-width="2.5" stroke-linecap="round" />
            <line x1="-2" y1="-10" x2="-2" y2="-16" stroke="#2C3E50" stroke-width="2.5" stroke-linecap="round" />
            <line x1="2" y1="-10" x2="2" y2="-16" stroke="#2C3E50" stroke-width="2.5" stroke-linecap="round" />
            <line x1="6" y1="-8" x2="6" y2="-13" stroke="#2C3E50" stroke-width="2.5" stroke-linecap="round" />
        </g>

        <!-- 大问号标记 -->
        <g transform="translate(0, -5)">
            <text x="0" y="0"
                font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
                font-size="75" font-weight="700" fill="#E74C3C" text-anchor="middle" opacity="0.25">
                ?
            </text>
        </g>

        <!-- 叉号标记 -->
        <g transform="translate(70, -70)">
            <circle cx="0" cy="0" r="18" fill="#E74C3C" />
            <line x1="-8" y1="-8" x2="8" y2="8" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />
            <line x1="8" y1="-8" x2="-8" y2="8" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />
        </g>
    </g>

    <!-- 底部装饰线 -->
    <rect x="40" y="375" width="820" height="2" fill="#3498DB" opacity="0.2" rx="1" />
</svg>