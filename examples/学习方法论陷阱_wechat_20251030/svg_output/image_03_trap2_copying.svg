<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383" width="900" height="383">
    <!-- 背景 - 温暖米色模拟笔记纸 -->
    <rect width="900" height="383" fill="#F5F5DC" />

    <!-- 左侧：文字信息 -->
    <!-- 标题 -->
    <text x="60" y="70"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="42" font-weight="700" fill="#2C3E50">
        <tspan x="60" dy="0">✏️ 误区二：工整的抄写</tspan>
    </text>

    <!-- 核心概念 -->
    <text x="60" y="130"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="28" font-weight="700" fill="#F39C12">
        <tspan x="60" dy="0">感动自己的"无效劳动"</tspan>
    </text>

    <!-- 关键发现 -->
    <text x="60" y="180"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="24" font-weight="400" fill="#2C3E50">
        <tspan x="60" dy="0">📊 研究发现：</tspan>
        <tspan x="60" dy="36" font-weight="700">照抄组 ≈ 只读组</tspan>
        <tspan x="60" dy="36">（成绩无显著差异）</tspan>
    </text>

    <!-- Hugo 的建议 -->
    <text x="60" y="290"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
        font-size="22" font-weight="400" fill="#2C3E50">
        <tspan x="60" dy="0">💡 Hugo 的做法：</tspan>
        <tspan x="60" dy="33">直接在原书上做笔记</tspan>
    </text>

    <!-- 右侧：精美笔记图标 -->
    <g transform="translate(700, 191.5)">
        <!-- 背景圆形 -->
        <circle cx="0" cy="0" r="75" fill="#F39C12" opacity="0.1" />

        <!-- 笔记本 -->
        <rect x="-45" y="-55" width="90" height="110" fill="#FFFFFF" stroke="#7F8C8D" stroke-width="2.5" rx="4" />

        <!-- 螺旋装订 -->
        <circle cx="-30" cy="-55" r="4" fill="none" stroke="#7F8C8D" stroke-width="2" />
        <circle cx="0" cy="-55" r="4" fill="none" stroke="#7F8C8D" stroke-width="2" />
        <circle cx="30" cy="-55" r="4" fill="none" stroke="#7F8C8D" stroke-width="2" />

        <!-- 笔记内容线条（整齐但无意义） -->
        <line x1="-35" y1="-35" x2="35" y2="-35" stroke="#3498DB" stroke-width="2.5" />
        <line x1="-35" y1="-20" x2="35" y2="-20" stroke="#2C3E50" stroke-width="2" />
        <line x1="-35" y1="-10" x2="35" y2="-10" stroke="#2C3E50" stroke-width="2" />
        <line x1="-35" y1="0" x2="25" y2="0" stroke="#2C3E50" stroke-width="2" />
        <line x1="-35" y1="10" x2="35" y2="10" stroke="#2C3E50" stroke-width="2" />
        <line x1="-35" y1="20" x2="30" y2="20" stroke="#2C3E50" stroke-width="2" />
        <line x1="-35" y1="30" x2="35" y2="30" stroke="#2C3E50" stroke-width="2" />

        <!-- 彩色笔 -->
        <g transform="translate(55, -25)">
            <!-- 橙色笔 -->
            <rect x="0" y="0" width="8" height="45" fill="#F39C12" rx="2" />
            <rect x="0" y="45" width="8" height="6" fill="#E67E22" rx="1" />
        </g>
        <g transform="translate(55, 25)">
            <!-- 绿色笔 -->
            <rect x="0" y="0" width="8" height="38" fill="#2ECC71" rx="2" />
            <rect x="0" y="38" width="8" height="5" fill="#27AE60" rx="1" />
        </g>

        <!-- 叉号标记 -->
        <g transform="translate(-60, -60)">
            <circle cx="0" cy="0" r="16" fill="#E74C3C" />
            <line x1="-7" y1="-7" x2="7" y2="7" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" />
            <line x1="7" y1="-7" x2="-7" y2="7" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" />
        </g>
    </g>

    <!-- 底部装饰线 -->
    <rect x="40" y="360" width="820" height="2" fill="#F39C12" opacity="0.2" rx="1" />
</svg>