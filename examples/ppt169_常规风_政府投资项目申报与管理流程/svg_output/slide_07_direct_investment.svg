<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
    <!-- 背景 -->
    <rect width="1280" height="720" fill="#FFFFFF" />

    <!-- 顶部装饰条 -->
    <rect x="0" y="0" width="1280" height="4" fill="#005587" />

    <!-- 页面标题 -->
    <text x="60" y="85"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
        font-size="42" font-weight="700" fill="#005587">
        二、路径一 - 直接投资（标准流程）
    </text>

    <!-- 标题下分隔线 -->
    <line x1="60" y1="110" x2="1220" y2="110" stroke="#E8E8E8" stroke-width="2" />

    <!-- 适用对象卡片 -->
    <rect x="60" y="150" width="1160" height="80" fill="#F8F9FA" stroke="#005587" stroke-width="2" rx="8" />
    <text x="90" y="185"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
        font-size="24" font-weight="600" fill="#005587">
        适用对象：非经营性项目，政府机构/事业单位
    </text>
    <text x="90" y="215"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
        font-size="20" font-weight="400" fill="#666666">
        这是最标准、最主要的政府投资方式
    </text>

    <!-- 流程图 -->
    <defs>
        <marker id="arrowhead2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
            <polygon points="0 0, 10 3, 0 6" fill="#005587" />
        </marker>
    </defs>

    <!-- 阶段1：项目建议书 -->
    <g>
        <rect x="60" y="270" width="200" height="90" fill="#005587" stroke="#003F6C" stroke-width="2" rx="8" />
        <text x="160" y="305"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
            font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">
            阶段一
        </text>
        <text x="160" y="330"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
            font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="middle">
            项目建议书审批
        </text>
    </g>

    <!-- 箭头 -->
    <line x1="260" y1="315" x2="320" y2="315" stroke="#005587" stroke-width="3" marker-end="url(#arrowhead2)" />

    <!-- 阶段2：可行性研究报告 -->
    <g>
        <rect x="330" y="270" width="200" height="90" fill="#005587" stroke="#003F6C" stroke-width="2" rx="8" />
        <text x="430" y="305"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
            font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">
            阶段二
        </text>
        <text x="430" y="330"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
            font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="middle">
            可研报告审批
        </text>
    </g>

    <!-- 箭头 -->
    <line x1="530" y1="315" x2="590" y2="315" stroke="#005587" stroke-width="3" marker-end="url(#arrowhead2)" />

    <!-- 阶段3：初步设计及概算 -->
    <g>
        <rect x="600" y="270" width="200" height="90" fill="#005587" stroke="#003F6C" stroke-width="2" rx="8" />
        <text x="700" y="305"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
            font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">
            阶段三
        </text>
        <text x="700" y="330"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
            font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="middle">
            初步设计及概算
        </text>
    </g>

    <!-- 箭头 -->
    <line x1="800" y1="315" x2="860" y2="315" stroke="#005587" stroke-width="3" marker-end="url(#arrowhead2)" />

    <!-- 概算批复 -->
    <g>
        <rect x="870" y="270" width="170" height="90" fill="#4A90E2" stroke="#005587" stroke-width="2" rx="8" />
        <text x="955" y="305"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
            font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">
            概算批复
        </text>
        <text x="955" y="330"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
            font-size="18" font-weight="400" fill="#FFFFFF" text-anchor="middle">
            确定资金额度
        </text>
    </g>

    <!-- 箭头 -->
    <line x1="1040" y1="315" x2="1100" y2="315" stroke="#5CB85C" stroke-width="3" marker-end="url(#arrowhead2)" />

    <!-- 资金拨付 -->
    <g>
        <rect x="1050" y="270" width="170" height="90" fill="#5CB85C" stroke="#4CAF50" stroke-width="2" rx="8" />
        <text x="1135" y="305"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
            font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">
            资金拨付
        </text>
        <text x="1135" y="330"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
            font-size="18" font-weight="400" fill="#FFFFFF" text-anchor="middle">
            财政部门
        </text>
    </g>

    <!-- 关键要点 -->
    <text x="60" y="410"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
        font-size="26" font-weight="600" fill="#333333">
        三大关键要点
    </text>

    <!-- 要点1 -->
    <g>
        <rect x="60" y="440" width="360" height="110" fill="#F8F9FA" stroke="#4A90E2" stroke-width="2" rx="8" />
        <circle cx="100" cy="475" r="8" fill="#005587" />
        <text x="120" y="480"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
            font-size="22" font-weight="600" fill="#005587">
            资金获取深度嵌入
        </text>
        <text x="100" y="510"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
            font-size="18" font-weight="400" fill="#666666">
            资金的获取深度嵌入在"三阶段"
        </text>
        <text x="100" y="535"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
            font-size="18" font-weight="400" fill="#666666">
            审批流程中，不是单独申请
        </text>
    </g>

    <!-- 要点2 -->
    <g>
        <rect x="460" y="440" width="360" height="110" fill="#F8F9FA" stroke="#4A90E2" stroke-width="2" rx="8" />
        <circle cx="500" cy="475" r="8" fill="#005587" />
        <text x="520" y="480"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
            font-size="22" font-weight="600" fill="#005587">
            概算是拨付依据
        </text>
        <text x="500" y="510"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
            font-size="18" font-weight="400" fill="#666666">
            概算获批后，财政部门根据批准
        </text>
        <text x="500" y="535"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
            font-size="18" font-weight="400" fill="#666666">
            的预算拨付资金
        </text>
    </g>

    <!-- 要点3 -->
    <g>
        <rect x="860" y="440" width="360" height="110" fill="#F8F9FA" stroke="#4A90E2" stroke-width="2" rx="8" />
        <circle cx="900" cy="475" r="8" fill="#005587" />
        <text x="920" y="480"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
            font-size="22" font-weight="600" fill="#005587">
            流程最为标准
        </text>
        <text x="900" y="510"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
            font-size="18" font-weight="400" fill="#666666">
            适用于绝大多数非经营性政府
        </text>
        <text x="900" y="535"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
            font-size="18" font-weight="400" fill="#666666">
            投资项目
        </text>
    </g>

    <!-- 底部提示 -->
    <rect x="60" y="580" width="1160" height="80" fill="#FFF9F5" stroke="#F0AD4E" stroke-width="2" rx="6" />
    <text x="90" y="615"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
        font-size="22" font-weight="600" fill="#005587">
        实操提示
    </text>
    <text x="90" y="645"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
        font-size="20" font-weight="400" fill="#666666">
        项目单位必须在每个阶段完成后才能进入下一阶段，不可跳过或合并（除特殊简化情形）
    </text>

    <!-- 页码 -->
    <text x="1220" y="700"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
        font-size="18" font-weight="400" fill="#999999" text-anchor="end">
        07
    </text>
</svg>