<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    
    <rect width="1280" height="720" fill="#FFFFFF" />

    
    <rect x="0" y="0" width="1280" height="4" fill="#005587" />

    
    <text x="60" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="42" font-weight="700" fill="#005587">
        四、理解"双轨制"困局
    </text>

    
    <line x1="60" y1="110" x2="1220" y2="110" stroke="#E8E8E8" stroke-width="2" />

    
    <rect x="60" y="150" width="1160" height="80" fill="#FFF5F5" stroke="#D9534F" stroke-width="3" rx="8" />
    <text x="640" y="192" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="32" font-weight="700" fill="#D9534F" text-anchor="middle">
        ⚠ 仅在A轨获批，不等于能获得资金！
    </text>

    
    <text x="60" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="26" font-weight="600" fill="#333333">
        双轨并行机制
    </text>

    
    <g>
        <rect x="60" y="300" width="520" height="150" fill="#F8F9FA" stroke="#005587" stroke-width="3" rx="8" />
        <rect x="60" y="300" width="520" height="50" fill="#005587" rx="8" />
        <text x="320" y="332" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="26" font-weight="700" fill="#FFFFFF" text-anchor="middle">
            A轨：技术审批轨
        </text>

        <text x="90" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="22" font-weight="600" fill="#005587">
            四川省在线平台
        </text>
        <text x="90" y="410" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="400" fill="#666666">
            • 项目建议书审批
        </text>
        <text x="90" y="435" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="400" fill="#666666">
            • 可行性研究报告审批
        </text>
        <text x="350" y="410" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="400" fill="#666666">
            • 初步设计及概算审批
        </text>
        <text x="350" y="435" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="400" fill="#666666">
            → 解决"合法性""可行性"
        </text>
    </g>

    
    <g>
        <rect x="640" y="300" width="580" height="150" fill="#F8F9FA" stroke="#D9534F" stroke-width="3" rx="8" />
        <rect x="640" y="300" width="580" height="50" fill="#D9534F" rx="8" />
        <text x="930" y="332" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="26" font-weight="700" fill="#FFFFFF" text-anchor="middle">
            B轨：财务预算轨
        </text>

        <text x="670" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="22" font-weight="600" fill="#D9534F">
            国家重大建设项目库
        </text>
        <text x="670" y="410" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="400" fill="#666666">
            • 项目入库登记
        </text>
        <text x="670" y="435" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="400" fill="#666666">
            • 三年滚动投资计划
        </text>
        <text x="950" y="410" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="400" fill="#666666">
            • 年度计划编制
        </text>
        <text x="950" y="435" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="400" fill="#666666">
            → 解决"资金来源"
        </text>
    </g>

    
    <text x="640" y="490" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="36" font-weight="700" fill="#D9534F" text-anchor="middle">
        ↕
    </text>
    <text x="640" y="520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="22" font-weight="700" fill="#D9534F" text-anchor="middle">
        必须动态同步
    </text>

    
    <text x="60" y="560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="26" font-weight="600" fill="#333333">
        B轨资金筛选机制
    </text>

    
    <polygon points="100,590 250,590 220,640 130,640" fill="#4A90E2" stroke="#005587" stroke-width="2" />
    <text x="175" y="620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="600" fill="#FFFFFF" text-anchor="middle">
        项目储备库
    </text>

    <polygon points="130,640 220,640 200,680 150,680" fill="#005587" stroke="#003F6C" stroke-width="2" />
    <text x="175" y="665" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" font-weight="600" fill="#FFFFFF" text-anchor="middle">
        滚动计划
    </text>

    <polygon points="150,680 200,680 185,710 165,710" fill="#D9534F" />
    <text x="175" y="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" text-anchor="middle">
        年度计划
    </text>

    
    <g>
        <rect x="320" y="590" width="280" height="60" fill="#FFF9F5" stroke="#F0AD4E" stroke-width="2" rx="6" />
        <text x="460" y="620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="600" fill="#005587" text-anchor="middle">
            硬性门槛
        </text>
        <text x="460" y="643" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" font-weight="400" fill="#666666" text-anchor="middle">
            未入滚动计划 = 不得列入年度计划
        </text>
    </g>

    <g>
        <rect x="640" y="590" width="280" height="60" fill="#FFF9F5" stroke="#F0AD4E" stroke-width="2" rx="6" />
        <text x="780" y="620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="600" fill="#005587" text-anchor="middle">
            年度计划真相
        </text>
        <text x="780" y="643" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" font-weight="400" fill="#666666" text-anchor="middle">
            滚动计划的"第一年"
        </text>
    </g>

    <g>
        <rect x="960" y="590" width="260" height="60" fill="#FFF9F5" stroke="#F0AD4E" stroke-width="2" rx="6" />
        <text x="1090" y="620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="600" fill="#005587" text-anchor="middle">
            关键窗口期
        </text>
        <text x="1090" y="643" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" font-weight="400" fill="#666666" text-anchor="middle">
            Q3/Q4 编制次年计划
        </text>
    </g>

    
    <text x="1220" y="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="400" fill="#999999" text-anchor="end">
        15
    </text>
</svg>