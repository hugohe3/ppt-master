<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
    <!-- 背景渐变 -->
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#F0F5F9;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="1280" height="720" fill="url(#bgGradient)" />

    <!-- 顶部装饰条 -->
    <rect x="0" y="0" width="1280" height="4" fill="#005587" />

    <!-- 中央主标题 -->
    <text x="640" y="240"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
        font-size="56" font-weight="700" fill="#005587" text-anchor="middle">
        谢谢聆听
    </text>

    <!-- 英文标题 -->
    <text x="640" y="290"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
        font-size="32" font-weight="300" fill="#4A90E2" text-anchor="middle">
        Thank You
    </text>

    <!-- 分隔线 -->
    <line x1="440" y1="330" x2="840" y2="330" stroke="#005587" stroke-width="2" />

    <!-- 联系信息框 -->
    <rect x="340" y="370" width="600" height="200" fill="#FFFFFF" stroke="#005587" stroke-width="3" rx="12" />

    <text x="640" y="410"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
        font-size="26" font-weight="600" fill="#005587" text-anchor="middle">
        问题与讨论
    </text>

    <text x="640" y="455"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
        font-size="22" font-weight="400" fill="#333333" text-anchor="middle">
        如有具体项目咨询需求，欢迎课后交流
    </text>

    <text x="640" y="500"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
        font-size="20" font-weight="400" fill="#666666" text-anchor="middle">
        在线审批平台网址：
    </text>
    <text x="640" y="530" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Courier New', monospace"
        font-size="18" font-weight="400" fill="#4A90E2" text-anchor="middle">
        https://xmsb.ndrc.sc.gov.cn
    </text>

    <!-- 装饰元素：左侧 -->
    <circle cx="150" cy="200" r="60" fill="none" stroke="#005587" stroke-width="3" opacity="0.3" />
    <circle cx="150" cy="200" r="40" fill="none" stroke="#4A90E2" stroke-width="2" opacity="0.5" />

    <!-- 装饰元素：右侧 -->
    <rect x="1030" y="480" width="120" height="120" fill="none" stroke="#005587" stroke-width="3" opacity="0.3"
        rx="8" />
    <rect x="1050" y="500" width="80" height="80" fill="none" stroke="#4A90E2" stroke-width="2" opacity="0.5" rx="8" />

    <!-- 底部日期 -->
    <text x="640" y="650"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
        font-size="20" font-weight="400" fill="#999999" text-anchor="middle">
        2025年11月13日
    </text>

    <!-- 页码 -->
    <text x="1220" y="700"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif"
        font-size="18" font-weight="400" fill="#999999" text-anchor="end">
        20
    </text>
</svg>