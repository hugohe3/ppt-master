<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    
    <rect width="1280" height="720" fill="#FFFFFF" />

    
    <rect x="0" y="0" width="1280" height="4" fill="#005587" />

    
    <text x="60" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="42" font-weight="700" fill="#005587">
        一、审批权限的层级划分
    </text>

    
    <line x1="60" y1="110" x2="1220" y2="110" stroke="#E8E8E8" stroke-width="2" />

    
    <rect x="60" y="150" width="1160" height="80" fill="#F8F9FA" stroke="#005587" stroke-width="2" rx="8" />
    <text x="640" y="185" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="28" font-weight="600" fill="#005587" text-anchor="middle">
        四川省投资项目在线审批监管平台
    </text>
    <text x="640" y="215" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="400" fill="#666666" text-anchor="middle">
        所有政府投资项目申报、审批和监管的唯一入口
    </text>

    
    
    <rect x="60" y="280" width="560" height="70" fill="#003F6C" rx="8" />
    <text x="340" y="322" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">
        中央级
    </text>

    
    <rect x="60" y="365" width="560" height="70" fill="#005587" rx="8" />
    <text x="340" y="407" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">
        省级（四川省发改委）
    </text>

    
    <rect x="60" y="450" width="560" height="70" fill="#4A90E2" rx="8" />
    <text x="340" y="492" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">
        市（州）级（含扩权县）
    </text>

    
    <rect x="60" y="535" width="560" height="70" fill="#87CEEB" rx="8" />
    <text x="340" y="577" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">
        区（县）级
    </text>

    
    <g>
        <circle cx="680" cy="320" r="8" fill="#005587" />
        <text x="700" y="326" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="400" fill="#333333">
            根据投资管理体制明确划分
        </text>

        <circle cx="680" cy="370" r="8" fill="#005587" />
        <text x="700" y="376" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="400" fill="#333333">
            确保各级政府事权严格执行
        </text>

        <circle cx="680" cy="420" r="8" fill="#005587" />
        <text x="700" y="426" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="400" fill="#333333">
