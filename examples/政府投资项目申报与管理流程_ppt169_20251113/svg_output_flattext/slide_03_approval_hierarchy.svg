        </text>
    </g>

    
    <rect x="60" y="620" width="1160" height="60" fill="#FFF5F5" stroke="#D9534F" stroke-width="2" rx="6" />
    <text x="90" y="655" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="22" font-weight="600" fill="#D9534F">
        ⚠ 关键提示：正确选择管辖层级是申报成功的第一步，错误选择将导致申请被直接驳回或延误
    </text>

    
    <text x="1220" y="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="400" fill="#999999" text-anchor="end">
        03
    </text>
</svg>