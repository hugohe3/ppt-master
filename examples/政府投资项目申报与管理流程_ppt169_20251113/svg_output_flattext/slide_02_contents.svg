    <rect x="60" y="550" width="1160" height="100" fill="#FFF9F5" stroke="#F0AD4E" stroke-width="2" rx="6" />
    <text x="90" y="590" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="24" font-weight="600" fill="#005587">
