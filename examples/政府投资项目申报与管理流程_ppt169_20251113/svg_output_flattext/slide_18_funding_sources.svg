        </text>
    </g>

    
    <rect x="60" y="630" width="1160" height="60" fill="#FFF5F5" stroke="#D9534F" stroke-width="2" rx="6" />
    <text x="90" y="667" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="22" font-weight="600" fill="#D9534F">
        ⚠ 数据一致性：两库信息（项目名称、总投资、建设内容）必须衔接一致，否则会被系统标记为高风险
    </text>

    
    <text x="1220" y="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="400" fill="#999999" text-anchor="end">
        18
    </text>
</svg>