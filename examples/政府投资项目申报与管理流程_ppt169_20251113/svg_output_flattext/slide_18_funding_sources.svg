        </text>
    </g>

    
    <g>
        <rect x="660" y="190" width="560" height="420" fill="#F8F9FA" stroke="#D9534F" stroke-width="3" rx="8" />
        <rect x="660" y="190" width="560" height="60" fill="#D9534F" rx="8" />
        <text x="940" y="227" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="middle">
