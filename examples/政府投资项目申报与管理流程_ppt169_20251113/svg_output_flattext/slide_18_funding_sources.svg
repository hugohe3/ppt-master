    </text>

    
    <g>
        <rect x="60" y="190" width="560" height="420" fill="#F8F9FA" stroke="#005587" stroke-width="3" rx="8" />
        <rect x="60" y="190" width="560" height="60" fill="#005587" rx="8" />
        <text x="340" y="227" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="middle">
