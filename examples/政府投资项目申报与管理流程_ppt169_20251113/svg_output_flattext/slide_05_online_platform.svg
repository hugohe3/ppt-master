        </text>
        <text x="1040" y="600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="400" fill="#666666" text-anchor="middle">
            立项到竣工全流程跟踪
        </text>
    </g>

    
    <rect x="60" y="640" width="1160" height="50" fill="#FFF5F5" stroke="#D9534F" stroke-width="2" rx="6" />
    <text x="640" y="672" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="600" fill="#D9534F" text-anchor="middle">
        所有文件、沟通和批复均须通过平台留痕，确保申报程序合规
    </text>

    
    <text x="1220" y="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="400" fill="#999999" text-anchor="end">
        05
    </text>
</svg>