    </text>

    
    <g>
        <rect x="60" y="530" width="360" height="90" fill="#F8F9FA" stroke="#4A90E2" stroke-width="2" rx="8" />
        <text x="240" y="565" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="24" font-weight="600" fill="#005587" text-anchor="middle">
            "一张网"服务
        </text>
        <text x="240" y="600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="400" fill="#666666" text-anchor="middle">
            整合跨部门审批事项
        </text>
    </g>

    <g>
        <rect x="460" y="530" width="360" height="90" fill="#F8F9FA" stroke="#4A90E2" stroke-width="2" rx="8" />
        <text x="640" y="565" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="24" font-weight="600" fill="#005587" text-anchor="middle">
            "最多跑一次"
        </text>
        <text x="640" y="600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" font-weight="400" fill="#666666" text-anchor="middle">
            线上提交，高效便捷
        </text>
    </g>

    <g>
        <rect x="860" y="530" width="360" height="90" fill="#F8F9FA" stroke="#4A90E2" stroke-width="2" rx="8" />
        <text x="1040" y="565" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="24" font-weight="600" fill="#005587" text-anchor="middle">
