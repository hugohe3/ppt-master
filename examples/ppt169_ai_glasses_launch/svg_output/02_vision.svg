<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="gradAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2E6BE6"/><stop offset="100%" stop-color="#1B47B0"/>
    </linearGradient>
    <linearGradient id="leftScrim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="46%" stop-color="#FFFFFF" stop-opacity="0.66"/>
      <stop offset="72%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g id="bg">
    <image href="images/hero_wearing.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#leftScrim)"/>
  </g>

  <g id="copy">
    <text x="80" y="248" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="1.6" fill="#2E6BE6">趋势 · 为什么是眼镜</text>
    <text x="78" y="324" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="46" font-weight="800" letter-spacing="-1" fill="#0C1B33">下一代计算界面，</text>
    <text x="78" y="384" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="46" font-weight="800" letter-spacing="-1" fill="#0C1B33">正从屏幕回到<tspan fill="#2E6BE6">视野</tspan></text>
    <rect x="82" y="408" width="96" height="6" rx="3" fill="url(#gradAccent)"/>
    <text x="82" y="460" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="19" font-weight="400" fill="#4A5568">我们每天低头看手机超过 5 小时。</text>
    <text x="82" y="492" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="19" font-weight="400" fill="#4A5568">信息本该<tspan fill="#13315C" font-weight="700">抬头即见</tspan>，而不是把人困在屏幕里。</text>
    <text x="82" y="524" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="19" font-weight="400" fill="#4A5568">眼镜，是离感官最近、最自然的入口。</text>
  </g>

  <g id="footer">
    <text x="80" y="676" font-family="Arial, sans-serif" font-size="12" letter-spacing="1" fill="#9AA8BD">VEO ONE</text>
    <text x="1200" y="676" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#9AA8BD">02</text>
  </g>
</svg>
