<svg viewBox="0 0 1080 1080" width="1080" height="1080" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="uiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.3" />
            <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:0.2" />
        </linearGradient>
        <linearGradient id="kernelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#DC2626;stop-opacity:0.4" />
            <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:0.3" />
        </linearGradient>
        <filter id="shadow">
            <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
            <feOffset dx="0" dy="6" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.3" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="glow">
            <feGaussianBlur stdDeviation="4" result="coloredBlur" />
            <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- 背景 -->
    <rect width="1080" height="1080" fill="url(#bgGradient)" />

    <!-- 背景网格 -->
    <g opacity="0.05" stroke="#60A5FA" stroke-width="1">
        <line x1="0" y1="200" x2="1080" y2="200" />
        <line x1="0" y1="400" x2="1080" y2="400" />
        <line x1="0" y1="600" x2="1080" y2="600" />
        <line x1="0" y1="800" x2="1080" y2="800" />
    </g>

    <!-- 标题 -->
    <text x="540" y="90"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="48" font-weight="800" fill="#FFFFFF" text-anchor="middle">
        💡 核心洞察
    </text>

    <!-- UI 层 - 上层 -->
    <g filter="url(#shadow)">
        <rect x="120" y="160" width="840" height="280" fill="url(#uiGradient)" stroke="#3B82F6" stroke-width="3"
            rx="20" />

        <!-- UI 层标签 -->
        <rect x="120" y="160" width="180" height="50" fill="#3B82F6" rx="20" />
        <rect x="120" y="185" width="180" height="25" fill="#3B82F6" />
        <text x="210" y="195" font-family="Monaco, Consolas, monospace" font-size="22" font-weight="700" fill="#FFFFFF"
            text-anchor="middle">
            UI Layer
        </text>

        <!-- UI 内容 - 财务数据展示 -->
        <text x="540" y="240"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="36" font-weight="600" fill="#E0E7FF" text-anchor="middle">
            财务数据 · 估值模型 · 报表
        </text>

        <!-- 模拟 Excel/数据卡片 -->
        <g>
            <rect x="180" y="280" width="200" height="120" fill="#1E3A8A" rx="12" opacity="0.8" />
            <text x="280" y="320" font-family="Monaco, Consolas, monospace" font-size="18" fill="#60A5FA"
                text-anchor="middle">IRR</text>
            <text x="280" y="365" font-family="Monaco, Consolas, monospace" font-size="32" font-weight="700"
                fill="#10B981" text-anchor="middle">18.5%</text>

            <rect x="440" y="280" width="200" height="120" fill="#1E3A8A" rx="12" opacity="0.8" />
            <text x="540" y="320" font-family="Monaco, Consolas, monospace" font-size="18" fill="#60A5FA"
                text-anchor="middle">NPV</text>
            <text x="540" y="365" font-family="Monaco, Consolas, monospace" font-size="32" font-weight="700"
                fill="#10B981" text-anchor="middle">¥2.3M</text>

            <rect x="700" y="280" width="200" height="120" fill="#1E3A8A" rx="12" opacity="0.8" />
            <text x="800" y="320" font-family="Monaco, Consolas, monospace" font-size="18" fill="#60A5FA"
                text-anchor="middle">ROI</text>
            <text x="800" y="365" font-family="Monaco, Consolas, monospace" font-size="32" font-weight="700"
                fill="#10B981" text-anchor="middle">156%</text>
        </g>
    </g>

    <!-- 连接箭头 -->
    <g filter="url(#glow)">
        <line x1="540" y1="450" x2="540" y2="520" stroke="#F59E0B" stroke-width="4" stroke-dasharray="10,6" />
        <polygon points="540,540 525,515 555,515" fill="#F59E0B" />
    </g>

    <!-- 分隔标注 -->
    <text x="540" y="495"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="20" font-weight="600" fill="#F59E0B" text-anchor="middle">
        ▼ 驱动层 ▼
    </text>

    <!-- Kernel 层 - 底层 -->
    <g filter="url(#shadow)">
        <rect x="120" y="560" width="840" height="320" fill="url(#kernelGradient)" stroke="#DC2626" stroke-width="3"
            rx="20" />

        <!-- Kernel 层标签 -->
        <rect x="120" y="560" width="220" height="50" fill="#DC2626" rx="20" />
        <rect x="120" y="585" width="220" height="25" fill="#DC2626" />
        <text x="230" y="595" font-family="Monaco, Consolas, monospace" font-size="22" font-weight="700" fill="#FFFFFF"
            text-anchor="middle">
            Kernel Layer
        </text>

        <!-- Kernel 内容 - 文化维度 -->
        <text x="540" y="650"
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
            font-size="36" font-weight="600" fill="#FEE2E2" text-anchor="middle">
            文化维度 · 组织基因 · 隐形参数
        </text>

        <!-- 代码风格的维度展示 -->
        <g font-family="Monaco, Consolas, monospace" font-size="22">
            <text x="200" y="720" fill="#FCA5A5">power_distance:</text>
            <text x="440" y="720" fill="#10B981" font-weight="600">HIGH | LOW</text>

            <text x="200" y="760" fill="#FCA5A5">uncertainty_avoid:</text>
            <text x="480" y="760" fill="#F59E0B" font-weight="600">STRICT | FLEX</text>

            <text x="200" y="800" fill="#FCA5A5">time_orientation:</text>
            <text x="470" y="800" fill="#8B5CF6" font-weight="600">LONG | SHORT</text>

            <text x="200" y="840" fill="#FCA5A5">individualism:</text>
            <text x="420" y="840" fill="#06B6D4" font-weight="600">SELF | GROUP</text>
        </g>
    </g>

    <!-- 底部核心洞察 -->
    <rect x="180" y="920" width="720" height="100" fill="#1E3A8A" rx="16" opacity="0.6" stroke="#60A5FA"
        stroke-width="2" />
    <text x="540" y="965"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="middle">
        项目"崩了"不是因为界面不好看
    </text>
    <text x="540" y="1000"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="24" font-weight="500" fill="#F59E0B" text-anchor="middle">
        而是底层参数不兼容 🔧
    </text>
</svg>