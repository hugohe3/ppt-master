<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- 页眉装饰条 -->
  <rect x="0" y="0" width="6" height="80" fill="#004B8D"/>
  <rect x="0" y="0" width="1280" height="4" fill="#004B8D"/>
  
  <!-- 页面标题 -->
  <text x="60" y="55" font-family="'Microsoft YaHei', 'PingFang SC', 'Heiti SC', system-ui, sans-serif" font-size="28" font-weight="bold" fill="#004B8D">创新自愿性认证产品拓展（二）</text>
  
  <!-- 机构标识 -->
  <text x="1220" y="50" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" fill="#666666" text-anchor="end">中国汽研</text>
  
  <!-- 左侧：功能及智能认证 -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="560" height="420" rx="8" fill="#E3F2FD" stroke="#008CD6" stroke-width="2"/>
    
    <!-- 标题区 -->
    <rect x="0" y="0" width="560" height="60" rx="8" fill="#008CD6"/>
    <rect x="0" y="55" width="560" height="5" fill="#008CD6"/>
    
    <!-- 图标 -->
    <circle cx="40" cy="30" r="22" fill="#FFFFFF" opacity="0.2"/>
    <text x="40" y="38" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" text-anchor="middle">🚗</text>
    
    <text x="75" y="40" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">功能及智能认证</text>
    
    <!-- 副标题 -->
    <text x="20" y="95" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" fill="#008CD6" font-weight="bold">围绕智能网联和用户体验，推出差异化认证</text>
    
    <!-- 认证项目列表 -->
    <g transform="translate(20, 115)">
      <!-- 项目1 -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="520" height="68" rx="6" fill="#FFFFFF" stroke="#E1E4E8" stroke-width="1"/>
        <rect x="0" y="0" width="5" height="68" rx="2" fill="#008CD6"/>
        <text x="20" y="26" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" font-weight="bold" fill="#333333">智能座舱功能认证</text>
        <text x="20" y="50" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#666666">车载信息娱乐系统人机交互便利性、软件可靠性评估</text>
      </g>
      
      <!-- 项目2 -->
      <g transform="translate(0, 78)">
        <rect x="0" y="0" width="520" height="68" rx="6" fill="#FFFFFF" stroke="#E1E4E8" stroke-width="1"/>
        <rect x="0" y="0" width="5" height="68" rx="2" fill="#008CD6"/>
        <text x="20" y="26" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" font-weight="bold" fill="#333333">自动泊车/辅助驾驶性能认证</text>
        <text x="20" y="50" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#666666">验证智能功能在不同环境下的有效性和稳定性，分级认证</text>
      </g>
      
      <!-- 项目3 -->
      <g transform="translate(0, 156)">
        <rect x="0" y="0" width="520" height="68" rx="6" fill="#FFFFFF" stroke="#E1E4E8" stroke-width="1"/>
        <rect x="0" y="0" width="5" height="68" rx="2" fill="#008CD6"/>
        <text x="20" y="26" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" font-weight="bold" fill="#333333">车联网互联互通认证</text>
        <text x="20" y="50" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#666666">测试车机与手机App、云服务的兼容性和数据安全</text>
      </g>
      
      <!-- 项目4 -->
      <g transform="translate(0, 234)">
        <rect x="0" y="0" width="520" height="68" rx="6" fill="#FFFFFF" stroke="#E1E4E8" stroke-width="1"/>
        <rect x="0" y="0" width="5" height="68" rx="2" fill="#28A745"/>
        <text x="20" y="26" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" font-weight="bold" fill="#333333">电动汽车整车性能认证</text>
        <text x="20" y="50" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="12" fill="#666666">续航里程、充电效率、低温性能等高于国标的评价等级</text>
      </g>
    </g>
  </g>
  
  <!-- 右侧：高端品质认证 -->
  <g transform="translate(660, 100)">
    <rect x="0" y="0" width="560" height="420" rx="8" fill="#FBE9E7" stroke="#004B8D" stroke-width="2"/>
    
    <!-- 标题区 -->
    <rect x="0" y="0" width="560" height="60" rx="8" fill="#004B8D"/>
    <rect x="0" y="55" width="560" height="5" fill="#004B8D"/>
    
    <!-- 图标 -->
    <circle cx="40" cy="30" r="22" fill="#FFFFFF" opacity="0.2"/>
    <text x="40" y="38" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" text-anchor="middle">⭐</text>
    
    <text x="75" y="40" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">高端品质认证</text>
    
    <!-- 副标题 -->
    <text x="20" y="95" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" fill="#004B8D" font-weight="bold">服务产业迈向中高端制造，为优质产品背书</text>
    
    <!-- 认证项目列表 -->
    <g transform="translate(20, 120)">
      <!-- 项目1 -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="520" height="85" rx="6" fill="#FFFFFF" stroke="#E1E4E8" stroke-width="1"/>
        <rect x="0" y="0" width="5" height="85" rx="2" fill="#004B8D"/>
        <text x="20" y="28" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" font-weight="bold" fill="#333333">高端零部件优选认证</text>
        <text x="20" y="52" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#666666">针对发动机、变速箱、底盘、车用芯片等关键零部件</text>
        <text x="20" y="72" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#666666">制定严于行业平均的寿命、精度、可靠性指标</text>
      </g>
      
      <!-- 项目2 -->
      <g transform="translate(0, 100)">
        <rect x="0" y="0" width="520" height="85" rx="6" fill="#FFFFFF" stroke="#E1E4E8" stroke-width="1"/>
        <rect x="0" y="0" width="5" height="85" rx="2" fill="#F0AD4E"/>
        <text x="20" y="28" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" font-weight="bold" fill="#333333">改装和运动型车辆认证</text>
        <text x="20" y="52" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#666666">针对改装零件、性能车动力提升、安全改进进行认证</text>
        <text x="20" y="72" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#666666">规范改装市场，满足车迷群体合规需求</text>
      </g>
      
      <!-- 项目3 -->
      <g transform="translate(0, 200)">
        <rect x="0" y="0" width="520" height="70" rx="6" fill="#FFFFFF" stroke="#E1E4E8" stroke-width="1"/>
        <rect x="0" y="0" width="5" height="70" rx="2" fill="#28A745"/>
        <text x="20" y="28" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" font-weight="bold" fill="#333333">高端品质认证标志</text>
        <text x="20" y="52" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#666666">助力自主零部件品牌在高端市场树立信誉</text>
      </g>
    </g>
  </g>
  
  <!-- 底部总结 -->
  <g transform="translate(60, 545)">
    <rect x="0" y="0" width="1160" height="90" rx="6" fill="#004B8D" opacity="0.05"/>
    <rect x="0" y="0" width="6" height="90" rx="3" fill="#004B8D"/>
    
    <text x="30" y="30" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" font-weight="bold" fill="#004B8D">战略升级路径</text>
    
    <g transform="translate(30, 50)">
      <rect x="0" y="0" width="200" height="30" rx="15" fill="#004B8D"/>
      <text x="100" y="20" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle">合规性认证</text>
    </g>
    
    <!-- 箭头（指向右） -->
    <polygon points="250,60 250,70 315,70 315,75 350,65 315,55 315,60" fill="#008CD6"/>
    
    <g transform="translate(370, 50)">
      <rect x="0" y="0" width="200" height="30" rx="15" fill="#008CD6"/>
      <text x="100" y="20" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle">性能与品质证明</text>
    </g>
    
    <!-- 箭头（指向右） -->
    <polygon points="590,60 590,70 655,70 655,75 690,65 655,55 655,60" fill="#28A745"/>
    
    <g transform="translate(710, 50)">
      <rect x="0" y="0" width="200" height="30" rx="15" fill="#28A745"/>
      <text x="100" y="20" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle">卓越性能认证</text>
    </g>
    
    <text x="950" y="70" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#666666">→ 产品附加值提升</text>
  </g>
  
  <!-- 页脚 -->
  <line x1="60" y1="680" x2="1220" y2="680" stroke="#E1E4E8" stroke-width="1"/>
  <text x="60" y="700" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#999999">汽车及零部件领域自愿性产品认证五年战略规划（2026–2030）</text>
  <text x="1220" y="700" font-family="Arial, sans-serif" font-size="12" fill="#999999" text-anchor="end">08 / 14</text>
</svg>

