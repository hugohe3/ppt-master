<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="summaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003D73"/>
      <stop offset="50%" style="stop-color:#004B8D"/>
      <stop offset="100%" style="stop-color:#006BB3"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1280" height="720" fill="url(#summaryGradient)"/>
  
  <!-- 装饰元素 -->
  <g opacity="0.1">
    <circle cx="200" cy="150" r="100" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <circle cx="200" cy="150" r="150" fill="none" stroke="#FFFFFF" stroke-width="0.5"/>
    <circle cx="1100" cy="550" r="80" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <circle cx="1100" cy="550" r="120" fill="none" stroke="#FFFFFF" stroke-width="0.5"/>
  </g>
  
  <!-- 装饰线条 -->
  <g opacity="0.15">
    <path d="M0,600 Q300,550 600,600 T1280,550" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <path d="M0,650 Q400,600 800,650 T1280,600" fill="none" stroke="#FFFFFF" stroke-width="0.5"/>
  </g>
  
  <!-- 页面标题 -->
  <text x="640" y="100" font-family="'Microsoft YaHei', 'PingFang SC', 'Heiti SC', system-ui, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF" text-anchor="middle">战略定位与结语</text>
  
  <!-- 核心定位框 -->
  <g transform="translate(140, 140)">
    <rect x="0" y="0" width="1000" height="160" rx="12" fill="#FFFFFF" opacity="0.15"/>
    <rect x="0" y="0" width="8" height="160" rx="4" fill="#FFFFFF"/>
    
    <text x="40" y="45" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" fill="#FFFFFF" opacity="0.8">战略定位</text>
    
    <text x="40" y="95" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="26" font-weight="bold" fill="#FFFFFF">"以数字化驱动、绿色低碳和智能创新为双轮，</text>
    <text x="40" y="135" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="26" font-weight="bold" fill="#FFFFFF">构建国内领先、国际互认的汽车产品认证服务平台"</text>
  </g>
  
  <!-- 四大核心理念 -->
  <g transform="translate(140, 330)">
    <text x="0" y="0" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" fill="#FFFFFF" opacity="0.8">核心理念</text>
    
    <g transform="translate(0, 25)">
      <!-- 理念1 -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="230" height="80" rx="8" fill="#FFFFFF" opacity="0.2"/>
        <rect x="0" y="0" width="6" height="80" rx="3" fill="#FFFFFF"/>
        <text x="25" y="35" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">公正科学</text>
        <text x="25" y="60" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#FFFFFF" opacity="0.8">坚守认证独立性与专业性</text>
      </g>
      
      <!-- 理念2 -->
      <g transform="translate(255, 0)">
        <rect x="0" y="0" width="230" height="80" rx="8" fill="#FFFFFF" opacity="0.2"/>
        <rect x="0" y="0" width="6" height="80" rx="3" fill="#FFFFFF"/>
        <text x="25" y="35" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">国际接轨</text>
        <text x="25" y="60" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#FFFFFF" opacity="0.8">对标国际标准与互认合作</text>
      </g>
      
      <!-- 理念3 -->
      <g transform="translate(510, 0)">
        <rect x="0" y="0" width="230" height="80" rx="8" fill="#FFFFFF" opacity="0.2"/>
        <rect x="0" y="0" width="6" height="80" rx="3" fill="#FFFFFF"/>
        <text x="25" y="35" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">服务产业</text>
        <text x="25" y="60" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#FFFFFF" opacity="0.8">以高标准认证助力产业发展</text>
      </g>
      
      <!-- 理念4 -->
      <g transform="translate(765, 0)">
        <rect x="0" y="0" width="230" height="80" rx="8" fill="#FFFFFF" opacity="0.2"/>
        <rect x="0" y="0" width="6" height="80" rx="3" fill="#FFFFFF"/>
        <text x="25" y="35" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">引领标准</text>
        <text x="25" y="60" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="13" fill="#FFFFFF" opacity="0.8">从跟跑到领跑的跨越</text>
      </g>
    </g>
  </g>
  
  <!-- 发展愿景 -->
  <g transform="translate(140, 465)">
    <text x="0" y="0" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="18" fill="#FFFFFF" opacity="0.8">五年愿景</text>
    
    <g transform="translate(0, 25)">
      <rect x="0" y="0" width="1000" height="100" rx="8" fill="#FFFFFF" opacity="0.1"/>
      
      <!-- 发展路径 -->
      <g transform="translate(50, 35)">
        <rect x="0" y="0" width="120" height="35" rx="17" fill="#FFFFFF" opacity="0.3"/>
        <text x="60" y="24" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" fill="#FFFFFF" text-anchor="middle">跟跑者</text>
      </g>
      
      <!-- 箭头（指向右） -->
      <polygon points="200,47 200,57 255,57 255,62 280,52 255,42 255,47" fill="#FFFFFF" opacity="0.5"/>
      
      <g transform="translate(310, 35)">
        <rect x="0" y="0" width="120" height="35" rx="17" fill="#FFFFFF" opacity="0.5"/>
        <text x="60" y="24" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" fill="#FFFFFF" text-anchor="middle">并跑者</text>
      </g>
      
      <!-- 箭头（指向右） -->
      <polygon points="460,47 460,57 515,57 515,62 540,52 515,42 515,47" fill="#FFFFFF" opacity="0.5"/>
      
      <g transform="translate(570, 35)">
        <rect x="0" y="0" width="120" height="35" rx="17" fill="#FFFFFF"/>
        <text x="60" y="24" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="15" font-weight="bold" fill="#004B8D" text-anchor="middle">领跑者</text>
      </g>
      
      <text x="750" y="55" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" fill="#FFFFFF" opacity="0.9">打造中国汽车认证金字招牌</text>
    </g>
  </g>
  
  <!-- 底部结语 -->
  <g transform="translate(140, 580)">
    <text x="500" y="0" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle" opacity="0.9">
      砥砺奋进，谱写高质量发展的崭新篇章！
    </text>
  </g>
  
  <!-- LOGO 区域 - 底部居中 (400, 615) 尺寸 480×90 -->
  <g id="logo-area" transform="translate(400, 615)">
  </g>
  
  <!-- 页码 -->
  <text x="1220" y="700" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.5" text-anchor="end">14 / 14</text>
</svg>

