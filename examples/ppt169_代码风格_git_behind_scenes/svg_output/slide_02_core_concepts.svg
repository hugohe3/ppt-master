<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
    <!-- 渐变背景 -->
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
        </linearGradient>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    <rect width="1280" height="720" fill="url(#bgGradient)" />

    <!-- 标题区 -->
    <rect x="0" y="0" width="1280" height="90" fill="#0f172a" opacity="0.8" />
    <text x="640" y="58" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="34" font-weight="600" fill="#e2e8f0" text-anchor="middle">
        Git 的核心：键值数据库
    </text>
    <rect x="540" y="75" width="200" height="3" rx="1.5" fill="#3b82f6" />

    <!-- 中心说明卡片 -->
    <rect x="340" y="110" width="600" height="120" rx="16" fill="url(#cardGradient)" stroke="#334155"
        stroke-width="1" />
    <text x="640" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="24" font-weight="600" fill="#f8fafc" text-anchor="middle">
        Git 对象数据库
    </text>
    <text x="640" y="182" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="16" fill="#94a3b8"
        text-anchor="middle">
        存储在 .git/objects/ 目录
    </text>
    <text x="640" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="16" fill="#64748b" text-anchor="middle">
        使用 SHA-1 哈希作为"键"来索引每个对象
    </text>

    <!-- SHA-1 示例框 -->
    <rect x="340" y="250" width="600" height="65" rx="10" fill="#0f172a" stroke="#22c55e" stroke-width="2" />
    <text x="640" y="288" font-family="'Cascadia Code', 'Fira Code', 'Consolas', monospace" font-size="20"
        fill="#22c55e" text-anchor="middle" filter="url(#glow)">
        a1b2c3d4e5f6789012345678901234567890abcd
    </text>
    <text x="640" y="306" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="13" fill="#64748b" text-anchor="middle">
        40位十六进制 SHA-1 哈希值
    </text>

    <!-- 三大对象类型标题 -->
    <text x="640" y="365" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="22" font-weight="600" fill="#e2e8f0" text-anchor="middle">
        三种核心对象类型
    </text>

    <!-- Blob 对象 -->
    <g transform="translate(130, 395)">
        <rect x="0" y="0" width="320" height="260" rx="16" fill="url(#cardGradient)" stroke="#8b5cf6"
            stroke-width="2" />
        <circle cx="160" cy="55" r="35" fill="#8b5cf6" opacity="0.2" />
        <text x="160" y="65" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="36" font-weight="bold"
            fill="#8b5cf6" text-anchor="middle" filter="url(#glow)">
            B
        </text>
        <text x="160" y="115" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="26" font-weight="600" fill="#c4b5fd" text-anchor="middle">
            Blob
        </text>
        <line x1="40" y1="135" x2="280" y2="135" stroke="#334155" stroke-width="1" />
        <text x="160" y="168" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="18" fill="#e2e8f0" text-anchor="middle">
            文件内容
        </text>
        <text x="160" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="15" fill="#94a3b8" text-anchor="middle">
            <tspan x="160" dy="0">存储原始数据</tspan>
            <tspan x="160" dy="26">无文件名信息</tspan>
        </text>
    </g>

    <!-- Tree 对象 -->
    <g transform="translate(480, 395)">
        <rect x="0" y="0" width="320" height="260" rx="16" fill="url(#cardGradient)" stroke="#10b981"
            stroke-width="2" />
        <circle cx="160" cy="55" r="35" fill="#10b981" opacity="0.2" />
        <text x="160" y="65" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="36" font-weight="bold"
            fill="#10b981" text-anchor="middle" filter="url(#glow)">
            T
        </text>
        <text x="160" y="115" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="26" font-weight="600" fill="#6ee7b7" text-anchor="middle">
            Tree
        </text>
        <line x1="40" y1="135" x2="280" y2="135" stroke="#334155" stroke-width="1" />
        <text x="160" y="168" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="18" fill="#e2e8f0" text-anchor="middle">
            目录结构
        </text>
        <text x="160" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="15" fill="#94a3b8" text-anchor="middle">
            <tspan x="160" dy="0">指向 Blobs/Trees</tspan>
            <tspan x="160" dy="26">记录文件名权限</tspan>
        </text>
    </g>

    <!-- Commit 对象 -->
    <g transform="translate(830, 395)">
        <rect x="0" y="0" width="320" height="260" rx="16" fill="url(#cardGradient)" stroke="#f59e0b"
            stroke-width="2" />
        <circle cx="160" cy="55" r="35" fill="#f59e0b" opacity="0.2" />
        <text x="160" y="65" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="36" font-weight="bold"
            fill="#f59e0b" text-anchor="middle" filter="url(#glow)">
            C
        </text>
        <text x="160" y="115" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="26" font-weight="600" fill="#fcd34d" text-anchor="middle">
            Commit
        </text>
        <line x1="40" y1="135" x2="280" y2="135" stroke="#334155" stroke-width="1" />
        <text x="160" y="168" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="18" fill="#e2e8f0" text-anchor="middle">
            项目快照
        </text>
        <text x="160" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="15" fill="#94a3b8" text-anchor="middle">
            <tspan x="160" dy="0">指向顶层 Tree</tspan>
            <tspan x="160" dy="26">含作者/消息</tspan>
        </text>
    </g>
</svg>