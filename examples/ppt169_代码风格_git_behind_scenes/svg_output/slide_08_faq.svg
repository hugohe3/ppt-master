<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
    <!-- 渐变背景 -->
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
        </linearGradient>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    <rect width="1280" height="720" fill="url(#bgGradient)" />

    <!-- 标题区 -->
    <rect x="0" y="0" width="1280" height="90" fill="#0f172a" opacity="0.8" />
    <text x="640" y="58" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="34" font-weight="600" fill="#e2e8f0" text-anchor="middle">
        FAQ：底层原理答疑
    </text>
    <rect x="540" y="75" width="200" height="3" rx="1.5" fill="#3b82f6" />

    <!-- Q1 -->
    <g transform="translate(50, 115)">
        <rect x="0" y="0" width="1180" height="120" rx="12" fill="url(#cardGradient)" stroke="#3b82f6"
            stroke-width="2" />
        <rect x="0" y="0" width="50" height="120" rx="12" fill="#3b82f6" opacity="0.2" />
        <text x="25" y="70" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="28" font-weight="bold" fill="#3b82f6" text-anchor="middle" filter="url(#glow)">
            Q1
        </text>
        <text x="75" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="18" font-weight="600" fill="#e2e8f0">
            Git 如何知道文件没有变化？
        </text>
        <text x="75" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="16" fill="#94a3b8">
            <tspan font-weight="600" fill="#22c55e">A: </tspan>
            <tspan fill="#e2e8f0">如果两个不同提交中的某个文件内容完全一样，它们对应的 Tree 对象就会指向同一个 Blob 哈希。</tspan>
        </text>
        <text x="75" y="95" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="15" fill="#94a3b8">
            Git 只需比较哈希值，如果相同，就无需重复存储该文件的内容。这就是 Git 的高效之处：内容去重。
        </text>
    </g>

    <!-- Q2 -->
    <g transform="translate(50, 255)">
        <rect x="0" y="0" width="1180" height="120" rx="12" fill="url(#cardGradient)" stroke="#10b981"
            stroke-width="2" />
        <rect x="0" y="0" width="50" height="120" rx="12" fill="#10b981" opacity="0.2" />
        <text x="25" y="70" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="28" font-weight="bold" fill="#10b981" text-anchor="middle" filter="url(#glow)">
            Q2
        </text>
        <text x="75" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="18" font-weight="600" fill="#e2e8f0">
            Git 如何追溯历史？
        </text>
        <text x="75" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="16" fill="#94a3b8">
            <tspan font-weight="600" fill="#22c55e">A: </tspan>
            <tspan fill="#e2e8f0">每个 Commit 对象内部都包含一个 parent 指针，指向它的父提交（首次提交除外）。</tspan>
        </text>
        <text x="75" y="95" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="15" fill="#94a3b8">
            通过这个父子关系链，Git 可以从任何一个提交点出发，回溯整个项目的演进历史。这形成了一个有向无环图（DAG）结构。
        </text>
    </g>

    <!-- Q3 -->
    <g transform="translate(50, 395)">
        <rect x="0" y="0" width="1180" height="120" rx="12" fill="url(#cardGradient)" stroke="#ef4444"
            stroke-width="2" />
        <rect x="0" y="0" width="50" height="120" rx="12" fill="#ef4444" opacity="0.2" />
        <text x="25" y="70" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="28" font-weight="bold" fill="#ef4444" text-anchor="middle" filter="url(#glow)">
            Q3
        </text>
        <text x="75" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="18" font-weight="600" fill="#e2e8f0">
            为什么不建议手动修改 .git 目录？
        </text>
        <text x="75" y="65" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="16" fill="#94a3b8">
            <tspan font-weight="600" fill="#22c55e">A: </tspan>
            <tspan fill="#e2e8f0">.git 目录是 Git 的"大脑"，包含了所有对象、引用、配置等关键数据。</tspan>
        </text>
        <text x="75" y="95" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="15" fill="#94a3b8">
            手动编辑或删除文件极易破坏对象间的引用关系，导致仓库损坏、数据丢失。应该始终通过 Git 命令来操作。
        </text>
    </g>

    <!-- 底部提示栏 -->
    <rect x="50" y="545" width="1180" height="120" rx="16" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" />
    <text x="640" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="22" font-weight="600" fill="#fcd34d" text-anchor="middle" filter="url(#glow)">
        💡 给初学者的建议
    </text>
    <text x="640" y="620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="17" fill="#e2e8f0" text-anchor="middle">
        理解这些原理能让你成为更好的 Git 用户，但日常工作中应重点掌握高层命令
    </text>
    <text x="640" y="650" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="16" fill="#94a3b8" text-anchor="middle">
        (add、commit、push、merge 等)，再逐步深入底层机制
    </text>
</svg>