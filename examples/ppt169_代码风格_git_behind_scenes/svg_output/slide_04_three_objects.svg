<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
    <!-- 渐变背景 -->
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
        </linearGradient>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    <rect width="1280" height="720" fill="url(#bgGradient)" />

    <!-- 标题区 -->
    <rect x="0" y="0" width="1280" height="90" fill="#0f172a" opacity="0.8" />
    <text x="640" y="58" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="34" font-weight="600" fill="#e2e8f0" text-anchor="middle">
        Git 的三种核心对象
    </text>
    <rect x="540" y="75" width="200" height="3" rx="1.5" fill="#3b82f6" />

    <!-- Blob 对象卡片 -->
    <g transform="translate(50, 110)">
        <rect x="0" y="0" width="380" height="555" rx="16" fill="url(#cardGradient)" stroke="#8b5cf6"
            stroke-width="2" />

        <!-- 图标区 -->
        <circle cx="190" cy="65" r="40" fill="#8b5cf6" opacity="0.15" />
        <rect x="165" y="45" width="50" height="40" rx="6" fill="none" stroke="#8b5cf6" stroke-width="2.5" />
        <line x1="175" y1="55" x2="205" y2="55" stroke="#8b5cf6" stroke-width="2" opacity="0.6" />
        <line x1="175" y1="65" x2="205" y2="65" stroke="#8b5cf6" stroke-width="2" opacity="0.6" />
        <line x1="175" y1="75" x2="195" y2="75" stroke="#8b5cf6" stroke-width="2" opacity="0.6" />

        <!-- 标题 -->
        <text x="190" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="32" font-weight="700" fill="#c4b5fd" text-anchor="middle" filter="url(#glow)">
            Blob
        </text>
        <text x="190" y="165" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#64748b"
            text-anchor="middle">
            Binary Large Object
        </text>

        <line x1="40" y1="185" x2="340" y2="185" stroke="#334155" stroke-width="1" />

        <!-- 特性列表 -->
        <circle cx="55" cy="220" r="5" fill="#8b5cf6" />
        <text x="75" y="226" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="17" fill="#e2e8f0">
            存储文件的原始内容
        </text>

        <circle cx="55" cy="265" r="5" fill="#8b5cf6" />
        <text x="75" y="271" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="17" fill="#e2e8f0">
            只关心数据本身
        </text>

        <circle cx="55" cy="310" r="5" fill="#8b5cf6" />
        <text x="75" y="316" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="17" fill="#e2e8f0">
            不包含文件名
        </text>

        <circle cx="55" cy="355" r="5" fill="#8b5cf6" />
        <text x="75" y="361" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="17" fill="#e2e8f0">
            不包含路径信息
        </text>

        <circle cx="55" cy="400" r="5" fill="#8b5cf6" />
        <text x="75" y="406" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="17" fill="#e2e8f0">
            不包含任何元数据
        </text>

        <!-- 示例 -->
        <rect x="25" y="450" width="330" height="80" rx="10" fill="#0f172a" stroke="#8b5cf6" stroke-width="1" />
        <text x="190" y="480" font-family="'Cascadia Code', 'Fira Code', 'Consolas', monospace" font-size="16"
            fill="#c4b5fd" text-anchor="middle">
            Hello, Git!
        </text>
        <text x="190" y="510" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="13" fill="#64748b" text-anchor="middle">
            纯文本内容
        </text>
    </g>

    <!-- Tree 对象卡片 -->
    <g transform="translate(450, 110)">
        <rect x="0" y="0" width="380" height="555" rx="16" fill="url(#cardGradient)" stroke="#10b981"
            stroke-width="2" />

        <!-- 图标区 -->
        <circle cx="190" cy="65" r="40" fill="#10b981" opacity="0.15" />
        <rect x="170" y="40" width="40" height="50" rx="4" fill="none" stroke="#10b981" stroke-width="2.5" />
        <line x1="180" y1="55" x2="200" y2="55" stroke="#10b981" stroke-width="2" opacity="0.6" />
        <line x1="180" y1="65" x2="200" y2="65" stroke="#10b981" stroke-width="2" opacity="0.6" />
        <line x1="180" y1="75" x2="200" y2="75" stroke="#10b981" stroke-width="2" opacity="0.6" />
        <path d="M155 75 L170 60 M155 75 L170 80" fill="none" stroke="#10b981" stroke-width="2" />

        <!-- 标题 -->
        <text x="190" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="32" font-weight="700" fill="#6ee7b7" text-anchor="middle" filter="url(#glow)">
            Tree
        </text>
        <text x="190" y="165" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#64748b"
            text-anchor="middle">
            Directory Structure
        </text>

        <line x1="40" y1="185" x2="340" y2="185" stroke="#334155" stroke-width="1" />

        <!-- 特性列表 -->
        <circle cx="55" cy="220" r="5" fill="#10b981" />
        <text x="75" y="226" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="17" fill="#e2e8f0">
            表示目录结构
        </text>

        <circle cx="55" cy="265" r="5" fill="#10b981" />
        <text x="75" y="271" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="17" fill="#e2e8f0">
            指向 Blobs（文件）
        </text>

        <circle cx="55" cy="310" r="5" fill="#10b981" />
        <text x="75" y="316" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="17" fill="#e2e8f0">
            指向其他 Trees（子目录）
        </text>

        <circle cx="55" cy="355" r="5" fill="#10b981" />
        <text x="75" y="361" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="17" fill="#e2e8f0">
            记录文件名
        </text>

        <circle cx="55" cy="400" r="5" fill="#10b981" />
        <text x="75" y="406" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="17" fill="#e2e8f0">
            记录权限和哈希值
        </text>

        <!-- 示例 -->
        <rect x="25" y="450" width="330" height="80" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="1" />
        <text x="190" y="478" font-family="'Cascadia Code', 'Fira Code', 'Consolas', monospace" font-size="13"
            fill="#6ee7b7" text-anchor="middle">
            100644 blob a1b2c3...
        </text>
        <text x="190" y="505" font-family="'Cascadia Code', 'Fira Code', 'Consolas', monospace" font-size="13"
            fill="#6ee7b7" text-anchor="middle">
            040000 tree e5c7d4...
        </text>
    </g>

    <!-- Commit 对象卡片 -->
    <g transform="translate(850, 110)">
        <rect x="0" y="0" width="380" height="555" rx="16" fill="url(#cardGradient)" stroke="#f59e0b"
            stroke-width="2" />

        <!-- 图标区 -->
        <circle cx="190" cy="65" r="40" fill="#f59e0b" opacity="0.15" />
        <circle cx="190" cy="65" r="22" fill="none" stroke="#f59e0b" stroke-width="2.5" />
        <path d="M 190 43 L 190 65 L 208 65" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" />
        <circle cx="190" cy="65" r="4" fill="#f59e0b" />

        <!-- 标题 -->
        <text x="190" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="32" font-weight="700" fill="#fcd34d" text-anchor="middle" filter="url(#glow)">
            Commit
        </text>
        <text x="190" y="165" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#64748b"
            text-anchor="middle">
            Project Snapshot
        </text>

        <line x1="40" y1="185" x2="340" y2="185" stroke="#334155" stroke-width="1" />

        <!-- 特性列表 -->
        <circle cx="55" cy="220" r="5" fill="#f59e0b" />
        <text x="75" y="226" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="17" fill="#e2e8f0">
            代表一个项目快照
        </text>

        <circle cx="55" cy="265" r="5" fill="#f59e0b" />
        <text x="75" y="271" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="17" fill="#e2e8f0">
            指向顶层 Tree 对象
        </text>

        <circle cx="55" cy="310" r="5" fill="#f59e0b" />
        <text x="75" y="316" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="17" fill="#e2e8f0">
            包含 author 信息
        </text>

        <circle cx="55" cy="355" r="5" fill="#f59e0b" />
        <text x="75" y="361" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="17" fill="#e2e8f0">
            包含 commit message
        </text>

        <circle cx="55" cy="400" r="5" fill="#f59e0b" />
        <text x="75" y="406" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
            font-size="17" fill="#e2e8f0">
            指向 parent commits
        </text>

        <!-- 示例 -->
        <rect x="25" y="450" width="330" height="80" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="1" />
        <text x="190" y="478" font-family="'Cascadia Code', 'Fira Code', 'Consolas', monospace" font-size="13"
            fill="#fcd34d" text-anchor="middle">
            tree e5c7d4f1a28b3906...
        </text>
        <text x="190" y="505" font-family="'Cascadia Code', 'Fira Code', 'Consolas', monospace" font-size="13"
            fill="#fcd34d" text-anchor="middle">
            parent a3f8d91c2e54...
        </text>
    </g>
</svg>