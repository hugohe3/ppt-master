<svg viewBox="0 0 1280 720" width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
    <!-- 背景 -->
    <rect width="1280" height="720" fill="#ffffff" />

    <!-- 标题区 -->
    <rect x="0" y="0" width="1280" height="100" fill="#f3f4f6" />
    <text x="640" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="32" font-weight="600" fill="#1e40af" text-anchor="middle">
        SHA-1 哈希：唯一身份标识
    </text>

    <!-- 左侧概念卡片 -->
    <rect x="60" y="140" width="560" height="520" rx="12" fill="#f3f4f6" />

    <!-- 标题 -->
    <text x="340" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="28" font-weight="600" fill="#1e40af" text-anchor="middle">
        什么是 SHA-1？
    </text>

    <!-- 内容点 1 -->
    <circle cx="90" cy="245" r="8" fill="#2563eb" />
    <text x="120" y="252" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="20" fill="#1f2937">
        <tspan x="120" dy="0" font-weight="600">40 位十六进制字符串</tspan>
        <tspan x="120" dy="28">每个 Git 对象的唯一标识符</tspan>
    </text>

    <!-- 内容点 2 -->
    <circle cx="90" cy="325" r="8" fill="#10b981" />
    <text x="120" y="332" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="20" fill="#1f2937">
        <tspan x="120" dy="0" font-weight="600">内容相同，哈希必同</tspan>
        <tspan x="120" dy="28">通过对内容进行哈希计算生成</tspan>
        <tspan x="120" dy="28">确保数据完整性</tspan>
    </text>

    <!-- 内容点 3 -->
    <circle cx="90" cy="425" r="8" fill="#f59e0b" />
    <text x="120" y="432" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="20" fill="#1f2937">
        <tspan x="120" dy="0" font-weight="600">作为对象的"键"</tspan>
        <tspan x="120" dy="28">在 .git/objects/ 中索引对象</tspan>
        <tspan x="120" dy="28">前 2 位为目录名，后 38 位为文件名</tspan>
    </text>

    <!-- 内容点 4 -->
    <circle cx="90" cy="545" r="8" fill="#8b5cf6" />
    <text x="120" y="552" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="20" fill="#1f2937">
        <tspan x="120" dy="0" font-weight="600">内容寻址系统</tspan>
        <tspan x="120" dy="28">基于内容而非位置来存储和检索</tspan>
        <tspan x="120" dy="28">自动去重相同内容</tspan>
    </text>

    <!-- 右侧哈希示例 -->
    <rect x="660" y="140" width="560" height="520" rx="12" fill="#1f2937" />

    <text x="940" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="24" font-weight="600" fill="#e5e7eb" text-anchor="middle">
        哈希值示例
    </text>

    <!-- Commit 哈希 -->
    <rect x="690" y="220" width="500" height="120" rx="8" fill="#2563eb" opacity="0.1" />
    <text x="940" y="250" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="18" fill="#f59e0b" text-anchor="middle">
        Commit 对象
    </text>
    <text x="940" y="280" font-family="'Cascadia Code', 'Fira Code', 'Consolas', monospace" font-size="16"
        fill="#22c55e" text-anchor="middle">
        a3f8d91c2e547b8a
    </text>
    <text x="940" y="305" font-family="'Cascadia Code', 'Fira Code', 'Consolas', monospace" font-size="16"
        fill="#22c55e" text-anchor="middle">
        9012d4e7890f12b3
    </text>
    <text x="940" y="330" font-family="'Cascadia Code', 'Fira Code', 'Consolas', monospace" font-size="16"
        fill="#22c55e" text-anchor="middle">
        4567c8a9b0123def
    </text>

    <!-- Tree 哈希 -->
    <rect x="690" y="360" width="500" height="120" rx="8" fill="#2563eb" opacity="0.1" />
    <text x="940" y="390" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="18" fill="#10b981" text-anchor="middle">
        Tree 对象
    </text>
    <text x="940" y="420" font-family="'Cascadia Code', 'Fira Code', 'Consolas', monospace" font-size="16"
        fill="#3b82f6" text-anchor="middle">
        e5c7d4f1a28b3906
    </text>
    <text x="940" y="445" font-family="'Cascadia Code', 'Fira Code', 'Consolas', monospace" font-size="16"
        fill="#3b82f6" text-anchor="middle">
        5432178f9a0bcd1e
    </text>
    <text x="940" y="470" font-family="'Cascadia Code', 'Fira Code', 'Consolas', monospace" font-size="16"
        fill="#3b82f6" text-anchor="middle">
        234567890abcdef1
    </text>

    <!-- Blob 哈希 -->
    <rect x="690" y="500" width="500" height="120" rx="8" fill="#2563eb" opacity="0.1" />
    <text x="940" y="530" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif"
        font-size="18" fill="#8b5cf6" text-anchor="middle">
        Blob 对象
    </text>
    <text x="940" y="560" font-family="'Cascadia Code', 'Fira Code', 'Consolas', monospace" font-size="16"
        fill="#fb923c" text-anchor="middle">
        b2d8f6e3c1a79045
    </text>
    <text x="940" y="585" font-family="'Cascadia Code', 'Fira Code', 'Consolas', monospace" font-size="16"
        fill="#fb923c" text-anchor="middle">
        6789012345abcdef
    </text>
    <text x="940" y="610" font-family="'Cascadia Code', 'Fira Code', 'Consolas', monospace" font-size="16"
        fill="#fb923c" text-anchor="middle">
        0123456789fedcba
    </text>
</svg>